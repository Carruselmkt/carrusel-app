async function generarPilares(estrategiaId) {
  if (!checkApiKey()) return;
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  if (!estrategia) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  abrirModalGeneracion(
    'Generar Pilares de contenido',
    '🪶',
    `La IA va a proponer 4-5 pilares de contenido con porcentajes sugeridos para el calendario de ${cliente.nombre}.`
  );

  // Incluir buyer personas si ya los hay
  const buyerPersonas = parseJsonSafe(estrategia.buyer_personas_json);
  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS DEFINIDOS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores}; deseos: ${bp.deseos}`).join('\n')
    : '';

  const systemPrompt = `Sos una estrategista de contenido para redes sociales. Trabajás para Carrusel MKT, una agencia argentina.

Tu tarea: generar pilares de contenido accionables y variados para una estrategia específica.

REGLAS:
- Los pilares son CATEGORÍAS TEMÁTICAS recurrentes que estructurarán el calendario de contenido.
- Proponé 4 o 5 pilares, no más.
- Cada pilar debe conectar con dolores/deseos del público y con los objetivos del cliente.
- Los porcentajes deben sumar 100%.
- Típicamente: un pilar educativo, uno aspiracional/inspiracional, uno de venta, uno de marca/detrás de escena. Adaptá según el momento del cliente.
- Considerá el MOMENTO del cliente: en pre-lanzamiento hay más presentación, en crecimiento más educativo, en consolidación más venta, etc.
- Usá español rioplatense.

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin explicaciones). Formato exacto:

[
  {
    "nombre": "Nombre corto y evocativo del pilar",
    "porcentaje": 35,
    "descripcion": "Qué tipo de contenido entra en este pilar y por qué es importante para esta estrategia",
    "aborda": "Qué dolor o deseo del público aborda este pilar",
    "temas": ["Tema concreto 1", "Tema concreto 2", "Tema concreto 3", "Tema concreto 4"]
  }
]`;

  const userPrompt = `Información del cliente:

${buildBriefContext(state.currentClienteId)}

Información de la estrategia:

${buildEstrategiaContext(estrategia)}${buyerContext}

Generá 4 o 5 pilares de contenido para esta estrategia, con porcentajes que sumen 100%.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2500 });
    const pilares = extractJson(raw);
    if (!Array.isArray(pilares) || pilares.length === 0) throw new Error('La IA no devolvió pilares válidos');
    mostrarPreviewPilares(estrategiaId, pilares);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function mostrarPreviewPilares(estrategiaId, pilares) {
  const total = pilares.reduce((sum, p) => sum + (Number(p.porcentaje) || 0), 0);
  const cardsHtml = pilares.map((p, i) => `
    <div class="pilar-card" data-pilar-idx="${i}">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px;">
        <div style="flex: 1;">
          <span class="editable-label">Nombre del pilar</span>
          <h4 class="editable-field" contenteditable="true" data-field="nombre" data-placeholder="Nombre corto y evocativo">${esc(p.nombre || '')}</h4>
        </div>
        <div style="text-align: center;">
          <span class="editable-label">%</span>
          <input type="number" class="form-input" data-field="porcentaje" value="${esc(String(p.porcentaje || ''))}" style="width: 70px; padding: 4px 6px; font-size: 13px; text-align: center;" min="0" max="100">
        </div>
      </div>
      <span class="editable-label">Descripción</span>
      <div class="editable-field" contenteditable="true" data-field="descripcion" data-placeholder="Qué tipo de contenido entra en este pilar">${esc(p.descripcion || '')}</div>
      <span class="editable-label">Aborda (dolor/deseo del público)</span>
      <div class="editable-field" contenteditable="true" data-field="aborda" data-placeholder="Qué dolor o deseo del público aborda">${esc(p.aborda || '')}</div>
      <span class="editable-label">Ejemplos de temas (separados por coma)</span>
      <div class="editable-field" contenteditable="true" data-field="temas" data-placeholder="Tema 1, Tema 2, Tema 3">${esc(Array.isArray(p.temas) ? p.temas.join(', ') : (p.temas || ''))}</div>
      <div style="margin-top: 10px; text-align: right;">
        <button class="btn-ghost btn-danger btn-sm" onclick="removePreviewCard(this, 'pilar-idx'); actualizarTotalPilares();" style="font-size: 11.5px;">🗑 Eliminar este pilar</button>
      </div>
    </div>
  `).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header" id="pilaresHeader">✨ Propuesta de pilares (total: ${total}%)</div>
      <div class="editable-hint">
        💡 Podés editar cualquier texto o porcentaje, eliminar pilares completos, o aceptar como está. Los porcentajes deberían sumar 100%.
      </div>
      <div id="pilaresPreview">${cardsHtml}</div>
    </div>
  `;
  window._pendingEstrategiaId = estrategiaId;

  // Recalcular total al cambiar porcentajes
  setTimeout(() => {
    document.querySelectorAll('#pilaresPreview input[data-field="porcentaje"]').forEach(inp => {
      inp.addEventListener('input', actualizarTotalPilares);
    });
  }, 50);

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-secondary" onclick="generarPilares('${estrategiaId}')">🔄 Regenerar</button>
    <button class="btn btn-primary" onclick="aceptarPilares()">✓ Aceptar y guardar</button>
  `;
}

function actualizarTotalPilares() {
  const inputs = document.querySelectorAll('#pilaresPreview input[data-field="porcentaje"]');
  let total = 0;
  inputs.forEach(inp => { total += Number(inp.value) || 0; });
  const header = $('pilaresHeader');
  if (header) {
    const color = total === 100 ? 'var(--verde)' : 'var(--fucsia)';
    header.innerHTML = `✨ Propuesta de pilares (total: <span style="color: ${color};">${total}%</span>)`;
  }
}

function extractPilaresFromDOM() {
  const cards = document.querySelectorAll('#pilaresPreview [data-pilar-idx]');
  const pilares = [];
  cards.forEach(card => {
    const p = {};
    card.querySelectorAll('[data-field]').forEach(field => {
      let val;
      if (field.tagName === 'INPUT') val = field.value.trim();
      else val = field.innerText.trim();
      if (field.dataset.field === 'porcentaje') {
        p.porcentaje = Number(val) || 0;
      } else if (field.dataset.field === 'temas') {
        if (val) p.temas = val.split(',').map(t => t.trim()).filter(t => t);
      } else if (val) {
        p[field.dataset.field] = val;
      }
    });
    if (p.nombre || p.descripcion) pilares.push(p);
  });
  return pilares;
}

async function aceptarPilares() {
  const pilares = extractPilaresFromDOM();
  if (pilares.length === 0) {
    showToast('No hay pilares para guardar', 'error');
    return;
  }
  const estrategiaId = window._pendingEstrategiaId;
  try {
    await sheetUpdate('Estrategias', estrategiaId, { pilares_json: JSON.stringify(pilares) });
    closeModal();
    showToast('Pilares guardados', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function generarKpis(estrategiaId) {
  if (!checkApiKey()) return;
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  if (!estrategia) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  abrirModalGeneracion(
    'Generar KPIs sugeridos',
    '📈',
    `La IA va a sugerir las métricas a seguir según el momento y objetivos de ${cliente.nombre}.`
  );

  const systemPrompt = `Sos una analista de marketing digital. Trabajás para Carrusel MKT, agencia argentina.

Tu tarea: proponer KPIs (indicadores clave) accionables para una estrategia de redes sociales, con METAS NUMÉRICAS concretas.

REGLAS:
- Los KPIs deben ser MEDIBLES en redes sociales (IG, FB, TikTok) sin herramientas pagas.
- Alineá con el momento del cliente:
  - Pre-lanzamiento / Lanzamiento: foco en alcance, reconocimiento, crecimiento de seguidores.
  - Crecimiento: alcance + interacción (saves, compartidos, comentarios).
  - Consolidación: conversión (clicks al link, mensajes directos, turnos/ventas).
- Incluí entre 4 y 6 KPIs (pocos y bien enfocados es mejor que muchos).
- Cada KPI debe ser específico y tener una meta numérica razonable.
- Asigná prioridad: "alta" para 2-3 KPIs clave, "media" para el resto.
- La métrica asociada debe ser UNA de estas opciones exactas:
  visualizaciones, cuentas_alcanzadas, interacciones, seguidores_fin,
  empezaron_seguir, me_gusta, respuestas, veces_compartido, guardados,
  visitas_perfil, toques_enlace_externo, toques_direccion, otro
- Usá español rioplatense.

FORMATO DE SALIDA: devolvés SOLO un JSON válido (array de objetos). Formato exacto:

[
  {
    "nombre": "Nombre corto y claro del KPI (ej: 'Alcance mensual')",
    "meta": 5000,
    "unidad": "cuentas" o "%" o "por mes" o similar (string corto),
    "metrica_asociada": "cuentas_alcanzadas",
    "prioridad": "alta"
  }
]

EJEMPLOS BUENOS:
- {"nombre": "Alcance mensual", "meta": 5000, "unidad": "cuentas", "metrica_asociada": "cuentas_alcanzadas", "prioridad": "alta"}
- {"nombre": "Nuevos seguidores", "meta": 100, "unidad": "por mes", "metrica_asociada": "empezaron_seguir", "prioridad": "alta"}
- {"nombre": "Guardados", "meta": 80, "unidad": "por mes", "metrica_asociada": "guardados", "prioridad": "media"}
- {"nombre": "Clicks al link", "meta": 50, "unidad": "por mes", "metrica_asociada": "toques_enlace_externo", "prioridad": "alta"}`;

  const userPrompt = `Información del cliente:

${buildBriefContext(state.currentClienteId)}

Información de la estrategia:

${buildEstrategiaContext(estrategia)}

Proponé KPIs estructurados con metas numéricas concretas para esta estrategia.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 1800 });
    const kpis = extractJson(raw);
    if (!Array.isArray(kpis) || kpis.length === 0) throw new Error('La IA no devolvió KPIs válidos');
    mostrarPreviewKpis(estrategiaId, kpis);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

const METRICAS_ASOCIADAS = [
  { v: 'visualizaciones', l: 'Visualizaciones' },
  { v: 'cuentas_alcanzadas', l: 'Cuentas alcanzadas' },
  { v: 'interacciones', l: 'Interacciones' },
  { v: 'seguidores_fin', l: 'Seguidores totales' },
  { v: 'empezaron_seguir', l: 'Nuevos seguidores' },
  { v: 'me_gusta', l: 'Me gusta' },
  { v: 'respuestas', l: 'Respuestas / Comentarios' },
  { v: 'veces_compartido', l: 'Veces compartido' },
  { v: 'guardados', l: 'Guardados' },
  { v: 'visitas_perfil', l: 'Visitas al perfil' },
  { v: 'toques_enlace_externo', l: 'Toques en link bio' },
  { v: 'toques_direccion', l: 'Toques en dirección' },
  { v: 'otro', l: 'Otro (manual)' },
];

// Normaliza KPIs viejos (strings) al formato nuevo (objetos)
function normalizarKpis(kpis) {
  if (!Array.isArray(kpis)) return [];
  return kpis.map(k => {
    if (typeof k === 'string') {
      // KPI viejo: solo texto
      return { nombre: k, meta: '', unidad: '', metrica_asociada: 'otro', prioridad: 'media' };
    }
    // KPI nuevo (objeto)
    return {
      nombre: k.nombre || '',
      meta: k.meta || '',
      unidad: k.unidad || '',
      metrica_asociada: k.metrica_asociada || 'otro',
      prioridad: k.prioridad || 'media',
    };
  });
}

// Renderiza los KPIs en modo lectura (para la vista de estrategia)
function renderKpisVistaLectura(kpis) {
  const prioridadColor = { alta: 'var(--fucsia)', media: 'var(--petroleo)', baja: 'var(--gris-text-muted)' };
  const prioridadLabel = { alta: '⭐ Alta', media: 'Media', baja: 'Baja' };

  return kpis.map(k => {
    const tieneMetaNumerica = k.meta && !isNaN(Number(k.meta));
    const metricaLabel = (METRICAS_ASOCIADAS.find(m => m.v === k.metrica_asociada) || {}).l || 'Manual';
    return `
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-left: 3px solid ${prioridadColor[k.prioridad] || prioridadColor.media}; background: #fafafa; border-radius: 0 4px 4px 0; margin-bottom: 6px;">
        <div style="flex: 1; min-width: 0;">
          <div style="font-weight: 600; font-size: 13.5px; color: var(--gris-text);">${esc(k.nombre)}</div>
          <div style="font-size: 11.5px; color: var(--gris-text-muted); margin-top: 2px;">
            📊 ${esc(metricaLabel)} · ${esc(prioridadLabel[k.prioridad] || 'Media')}
          </div>
        </div>
        ${tieneMetaNumerica ? `
          <div style="text-align: right; padding-left: 10px;">
            <div style="font-size: 17px; font-weight: 700; color: var(--fucsia); font-family: 'Fraunces', serif;">${formatMilesCompacto(k.meta)}</div>
            ${k.unidad ? `<div style="font-size: 10.5px; color: var(--gris-text-muted);">${esc(k.unidad)}</div>` : ''}
          </div>
        ` : `
          <div style="font-size: 11px; color: var(--gris-text-muted); font-style: italic;">sin meta</div>
        `}
      </div>
    `;
  }).join('');
}

function mostrarPreviewKpis(estrategiaId, kpis) {
  const kpisNormalizados = normalizarKpis(kpis);

  const itemsHtml = kpisNormalizados.map((k, i) => renderKpiEditRow(k, i)).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">

  `;
}

  const metricasOptions = METRICAS_ASOCIADAS.map(m =>
    `<option value="${m.v}" ${k.metrica_asociada === m.v ? 'selected' : ''}>${m.l}</option>`

          <input type="number" class="form-input kpi-meta" value="${esc(String(k.meta || ''))}" placeholder="100" style="padding: 5px 8px; font-size: 12.5px;">
        </div>
        <div>
          <div style="font-size: 10.5px; color: var(--gris-text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;">Unidad</div>
          <input type="text" class="form-input kpi-unidad" value="${esc(k.unidad || '')}" placeholder="ej: cuentas, %, por mes" style="padding: 5px 8px; font-size: 12.5px;">
        </div>
        <div>
          <div style="font-size: 10.5px; color: var(--gris-text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;">Métrica asociada</div>
          <select class="form-select kpi-metrica" style="padding: 5px 8px; font-size: 12.5px;">
            ${metricasOptions}
          </select>

          <div style="font-size: 10.5px; color: var(--gris-text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;">Prioridad</div>

            <option value="baja" ${k.prioridad === 'baja' ? 'selected' : ''}>Baja</option>
          </select>
        </div>
      </div>
    </div>
  `;
}

function agregarKpiManual() {
  const container = $('kpisPreview');

  const div = document.createElement('div');

function extractKpisFromDOM() {

}

      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="genModalBody"></div>
    <div class="modal-footer" id="genModalFooter"></div>

// parseJsonSafe ajustado: para tono de voz (objeto) también lo devuelve correctamente
// (la original devolvía [] si fallaba, pero ahora mantenemos retrocompatibilidad)

// ============================================================================
// TAB: IDEAS (banco de ideas del cliente)
// ============================================================================
const FORMATOS_CONTENIDO = ['Post', 'Carrusel', 'Reel', 'Story', 'Video'];

let ideaFilters = { pilar: 'todos', formato: 'todos', estado: 'todos' };

async function renderTabIdeas() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando banco de ideas...</div>`;

  try {
    // Cargar ideas + briefs + estrategias en paralelo (los necesito para generar)
    const [ideasRes, briefsRes, estrategiasRes] = await Promise.all([
      sheetRead('Ideas'),
      sheetRead('Briefs'),
      sheetRead('Estrategias'),
    ]);
    const ideas = ideasRes.data.filter(i => i.cliente_id === cliente.id);
    state.ideas = ideas;
    state.briefs = briefsRes.data;
    state.estrategias = estrategiasRes.data.filter(e => e.cliente_id === cliente.id);

    renderIdeasList();
  } catch (e) {
    $('tabContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

function renderIdeasList() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
  const pilares = estrategiaActiva ? parseJsonSafe(estrategiaActiva.pilares_json) : [];

  // Aplicar filtros
  let ideasFiltradas = [...state.ideas];
  if (ideaFilters.pilar !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => i.pilar === ideaFilters.pilar);
  if (ideaFilters.formato !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => i.formato === ideaFilters.formato);
  if (ideaFilters.estado !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => (i.estado || 'Sin usar') === ideaFilters.estado);

  // Ordenar: sin usar primero, después por fecha
  ideasFiltradas.sort((a, b) => {
    const orden = { 'Sin usar': 0, 'Agendada': 1, 'Publicada': 2 };
    const oA = orden[a.estado || 'Sin usar'] ?? 3;
    const oB = orden[b.estado || 'Sin usar'] ?? 3;
    if (oA !== oB) return oA - oB;
    return (b.fecha_creada || '').localeCompare(a.fecha_creada || '');
  });

  // Stats
  const stats = {
    total: state.ideas.length,
    sinUsar: state.ideas.filter(i => (i.estado || 'Sin usar') === 'Sin usar').length,
    agendadas: state.ideas.filter(i => i.estado === 'Agendada').length,
    publicadas: state.ideas.filter(i => i.estado === 'Publicada').length,
  };

  // Filtros de pilar dinámicos
  const pilarFilters = ['todos', ...new Set(state.ideas.map(i => i.pilar).filter(Boolean))];

  const ideasHtml = ideasFiltradas.length === 0 ? `
    <div class="empty-state">
      <p>${state.ideas.length === 0 ? 'Aún no hay ideas cargadas.' : 'No hay ideas con esos filtros.'}</p>
      ${state.ideas.length === 0 ? `
        <p style="font-size: 12px; margin-top: 8px;">Generá un lote de ideas con IA, o agregá manualmente las primeras.</p>
        <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
          <button class="btn btn-secondary" onclick="openIdeaModal()">+ Agregar manualmente</button>
          ${estrategiaActiva ? `<button class="gen-btn" onclick="abrirGeneradorIdeas()">✨ Generar lote con IA</button>` : ''}
        </div>
      ` : ''}
    </div>
  ` : ideasFiltradas.map(idea => renderIdeaCard(idea)).join('');

  $('tabContent').innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
      <div>
        <h3>Banco de ideas</h3>
        <p style="color: var(--gris-text-soft); font-size: 13px; margin-top: 2px;">
          ${stats.total} ideas · ${stats.sinUsar} sin usar · ${stats.agendadas} agendadas · ${stats.publicadas} publicadas
        </p>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-secondary btn-sm" onclick="openIdeaModal()">+ Manual</button>
        ${estrategiaActiva ? `<button class="gen-btn gen-btn-small" onclick="abrirGeneradorIdeas()">✨ Generar ideas con IA</button>` : ''}
      </div>
    </div>

    ${!estrategiaActiva ? `
      <div style="padding: 12px 14px; background: #fff4e0; border-radius: var(--radio-sm); margin-bottom: 14px; font-size: 13px; color: #8a6a20;">
        ⚠️ Para generar ideas con IA necesitás tener una estrategia <strong>Principal</strong> activa (con pilares definidos) para este cliente.
      </div>
    ` : ''}

    ${state.ideas.length > 0 ? `
      <div class="idea-filters">
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Pilar</div>
        ${pilarFilters.map(p => `
          <button class="idea-filter ${ideaFilters.pilar === p ? 'active' : ''}" onclick="setIdeaFilter('pilar', '${esc(p)}')">${p === 'todos' ? 'Todos' : esc(p)}</button>
        `).join('')}
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;">Formato</div>
        <button class="idea-filter ${ideaFilters.formato === 'todos' ? 'active' : ''}" onclick="setIdeaFilter('formato', 'todos')">Todos</button>
        ${FORMATOS_CONTENIDO.map(f => `
          <button class="idea-filter ${ideaFilters.formato === f ? 'active' : ''}" onclick="setIdeaFilter('formato', '${f}')">${f}</button>
        `).join('')}
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;">Estado</div>
        <button class="idea-filter ${ideaFilters.estado === 'todos' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'todos')">Todos</button>
        <button class="idea-filter ${ideaFilters.estado === 'Sin usar' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Sin usar')">Sin usar</button>
        <button class="idea-filter ${ideaFilters.estado === 'Agendada' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Agendada')">Agendadas</button>
        <button class="idea-filter ${ideaFilters.estado === 'Publicada' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Publicada')">Publicadas</button>
      </div>
    ` : ''}

    <div id="ideasList">${ideasHtml}</div>
  `;
}

function setIdeaFilter(tipo, valor) {
  ideaFilters[tipo] = valor;
  renderIdeasList();
}

function renderIdeaCard(idea) {
  const estado = idea.estado || 'Sin usar';
  const estadoClase = estado.toLowerCase().replace(/ /g, '-');
  const tieneCopyDesarrollado = idea.copy && idea.copy.trim();

  // Detectar si tiene carrusel o reel guardados en notas (formato: "CARRUSEL_SLIDES:JSON" o "REEL_GUION:JSON")
  let tieneCarrusel = false, tieneReel = false;
  let slidesCount = 0, escenasCount = 0;
  if (idea.notas && typeof idea.notas === 'string') {
    if (idea.notas.startsWith('CARRUSEL_SLIDES:')) {
      tieneCarrusel = true;
      try {
        const slides = JSON.parse(idea.notas.substring('CARRUSEL_SLIDES:'.length));
        slidesCount = Array.isArray(slides) ? slides.length : 0;
      } catch (e) {}
    } else if (idea.notas.startsWith('REEL_GUION:')) {
      tieneReel = true;
      try {
        const escenas = JSON.parse(idea.notas.substring('REEL_GUION:'.length));
        escenasCount = Array.isArray(escenas) ? escenas.length : 0;
      } catch (e) {}
    }
  }

  return `
    <div class="idea-card estado-${estadoClase}">
      <div class="idea-header">
        <div class="idea-title">${esc(idea.titulo || '(sin título)')}</div>
        <span class="badge badge-${estado === 'Sin usar' ? 'idea' : estado === 'Agendada' ? 'revision' : 'publicada'}">${esc(estado)}</span>
      </div>

      <div class="idea-meta">
        ${idea.pilar ? `<span class="idea-chip pilar">🪶 ${esc(idea.pilar)}</span>` : ''}
        ${idea.formato ? `<span class="idea-chip formato">${esc(idea.formato)}</span>` : ''}
        ${idea.origen === 'IA' ? `<span class="idea-chip origen-ia">🤖 IA</span>` : `<span class="idea-chip origen-manual">✏️ Manual</span>`}
        ${tieneCopyDesarrollado ? `<span class="idea-chip" style="background: #e6f4ef; color: var(--verde);">✓ Copy desarrollado</span>` : ''}
        ${tieneCarrusel ? `<span class="idea-chip" style="background: #fef0e5; color: #c06a3d;">🎠 ${slidesCount} slides</span>` : ''}
        ${tieneReel ? `<span class="idea-chip" style="background: #e6f0fb; color: var(--petroleo);">🎬 ${escenasCount} escenas</span>` : ''}
      </div>

      ${idea.hook ? `<div class="idea-hook">"${esc(idea.hook)}"</div>` : ''}
      ${idea.idea && idea.idea !== idea.titulo && !tieneCarrusel && !tieneReel ? `<div class="idea-descripcion">${esc(idea.idea)}</div>` : ''}

      ${tieneCopyDesarrollado ? `
        <details style="margin-bottom: 10px;">
          <summary style="cursor: pointer; color: var(--petroleo); font-size: 12.5px; font-weight: 600;">Ver copy completo</summary>
          <div style="padding: 10px 12px; background: #f8fbfd; border-radius: 6px; margin-top: 6px; font-size: 13px; white-space: pre-wrap;">${esc(idea.copy)}</div>
          ${idea.hashtags ? `<div style="margin-top: 6px; font-size: 12px; color: var(--gris-text-soft);">${esc(idea.hashtags)}</div>` : ''}
          ${idea.cta ? `<div style="margin-top: 4px; font-size: 12px;"><strong>CTA:</strong> ${esc(idea.cta)}</div>` : ''}
        </details>
      ` : ''}

      ${tieneCarrusel ? `
        <div style="margin-bottom: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="verCarruselDeIdea('${esc(idea.id)}')">🎠 Ver ${slidesCount} slides</button>
        </div>
      ` : ''}
      ${tieneReel ? `
        <div style="margin-bottom: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="verReelDeIdea('${esc(idea.id)}')">🎬 Ver ${escenasCount} escenas</button>
        </div>
      ` : ''}

      <div class="idea-actions">
        ${estado !== 'Publicada' ? `
          ${!tieneCopyDesarrollado && !tieneCarrusel && !tieneReel ? `<button class="gen-btn gen-btn-small" onclick="desarrollarIdea('${esc(idea.id)}')">✨ Desarrollar copy</button>` : ''}
          ${estado !== 'Agendada' ? `<button class="btn btn-primary btn-sm" onclick="agendarIdea('${esc(idea.id)}')">📅 Agendar</button>` : ''}
        ` : ''}
        <button class="btn btn-secondary btn-sm" onclick="openIdeaModal('${esc(idea.id)}')">✏️ Editar</button>
        <button class="btn-ghost btn-danger btn-sm" onclick="confirmDeleteIdea('${esc(idea.id)}', '${esc((idea.titulo || '').replace(/'/g, "\\'"))}')">🗑</button>
      </div>
    </div>`;
}

// Ver el carrusel guardado en una idea (solo lectura con opción de cerrar)
function verCarruselDeIdea(ideaId) {
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea || !idea.notas) return;
  let slides = [];
  try { slides = JSON.parse(idea.notas.substring('CARRUSEL_SLIDES:'.length)); } catch (e) { showToast('Error leyendo el carrusel', 'error'); return; }

  const slidesHtml = slides.map((s, i) => {
    const tipoLower = (s.tipo || 'Desarrollo').toLowerCase();
    return `
      <div class="slide-card ${tipoLower}">
        <span class="slide-number ${tipoLower}">Slide ${s.numero || (i+1)} · ${esc(s.tipo || 'Desarrollo')}</span>
        ${s.texto_principal ? `<div class="slide-section"><span class="slide-section-label">Texto principal</span><div style="font-weight: 600;">${esc(s.texto_principal)}</div></div>` : ''}
        ${s.texto_secundario ? `<div class="slide-section"><span class="slide-section-label">Texto secundario</span><div>${esc(s.texto_secundario)}</div></div>` : ''}
        ${s.visual ? `<div class="slide-section"><span class="slide-section-label">🎨 Visual</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(s.visual)}</div></div>` : ''}
      </div>`;
  }).join('');

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>🎠 Carrusel: ${esc(idea.titulo)}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${slidesHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

function verReelDeIdea(ideaId) {
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea || !idea.notas) return;
  let escenas = [];
  try { escenas = JSON.parse(idea.notas.substring('REEL_GUION:'.length)); } catch (e) { showToast('Error leyendo el guión', 'error'); return; }

  const escenasHtml = escenas.map(e => `
    <div class="escena-card">
      <span class="escena-tiempo">⏱️ ${esc(e.tiempo || '?')}</span>
      ${e.texto_pantalla ? `<div class="slide-section"><span class="slide-section-label">📝 Texto en pantalla</span><div style="font-weight: 600;">${esc(e.texto_pantalla)}</div></div>` : ''}
      ${e.voz_audio ? `<div class="slide-section"><span class="slide-section-label">🎤 Voz / Audio</span><div>${esc(e.voz_audio)}</div></div>` : ''}
      ${e.accion ? `<div class="slide-section"><span class="slide-section-label">🎬 Acción</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(e.accion)}</div></div>` : ''}
    </div>`).join('');

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>🎬 Reel: ${esc(idea.titulo)}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${escenasHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

// ============================================================================
// MODAL DE IDEA (crear/editar manual)
// ============================================================================
function openIdeaModal(id = null) {
  const idea = id ? state.ideas.find(x => x.id === id) : {};
  const esNueva = !id;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  const pilaresOptions = pilares.length > 0
    ? pilares.map(p => `<option value="${esc(p.nombre)}" ${idea.pilar === p.nombre ? 'selected' : ''}>${esc(p.nombre)}</option>`).join('')
    : '<option value="" disabled>No hay pilares definidos</option>';

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>${esNueva ? '+ Nueva idea' : '✏️ Editar idea'}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Título *</label>
        <input type="text" class="form-input" id="f_titulo" value="${esc(idea.titulo || '')}" placeholder="Nombre corto y descriptivo de la idea">
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Pilar</label>
          <select class="form-select" id="f_pilar">
            <option value="">—</option>
            ${pilaresOptions}
          </select>
        </div>
        <div>
          <label class="form-label">Formato</label>
          <select class="form-select" id="f_formato">
            <option value="">—</option>
            ${FORMATOS_CONTENIDO.map(f => `<option value="${f}" ${idea.formato === f ? 'selected' : ''}>${f}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Hook / Gancho</label>
        <input type="text" class="form-input" id="f_hook" value="${esc(idea.hook || '')}" placeholder="Primera línea que capta la atención">
      </div>
      <div class="form-row">
        <label class="form-label">Descripción / Idea</label>
        <textarea class="form-textarea" id="f_idea" placeholder="Desarrollo de la idea, qué contar, ángulo...">${esc(idea.idea || '')}</textarea>
      </div>
      ${idea.copy ? `
        <div class="form-row">
          <label class="form-label">Copy desarrollado</label>
          <textarea class="form-textarea" id="f_copy" style="min-height: 120px;">${esc(idea.copy || '')}</textarea>
        </div>
        <div class="form-row-grid">
          <div>
            <label class="form-label">Hashtags</label>
            <textarea class="form-textarea" id="f_hashtags" style="min-height: 60px;">${esc(idea.hashtags || '')}</textarea>
          </div>
          <div>
            <label class="form-label">CTA</label>
            <input type="text" class="form-input" id="f_cta" value="${esc(idea.cta || '')}">
          </div>
        </div>
      ` : ''}
      <div class="form-row">
        <label class="form-label">Estado</label>
        <select class="form-select" id="f_estado">
          <option value="Sin usar" ${(idea.estado || 'Sin usar') === 'Sin usar' ? 'selected' : ''}>Sin usar</option>
          <option value="Agendada" ${idea.estado === 'Agendada' ? 'selected' : ''}>Agendada</option>
          <option value="Publicada" ${idea.estado === 'Publicada' ? 'selected' : ''}>Publicada</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Notas</label>
        <textarea class="form-textarea" id="f_notas">${esc(idea.notas || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveIdea('${id || ''}')">${esNueva ? 'Crear idea' : 'Guardar'}</button>
    </div>`;
  $('modalOverlay').classList.add('active');
  setTimeout(() => $('f_titulo').focus(), 100);
}

async function saveIdea(id) {
  const titulo = $('f_titulo').value.trim();
  if (!titulo) { showToast('El título es obligatorio', 'error'); return; }
  const idea = id ? state.ideas.find(i => i.id === id) : {};

  const data = {
    cliente_id: state.currentClienteId,
    titulo,
    pilar: $('f_pilar').value,
    formato: $('f_formato').value,
    hook: $('f_hook').value.trim(),
    idea: $('f_idea').value.trim(),
    estado: $('f_estado').value,
    notas: $('f_notas').value.trim(),
  };

  // Si existe copy y el modal lo mostró, también guardarlo
  if ($('f_copy')) data.copy = $('f_copy').value.trim();
  if ($('f_hashtags')) data.hashtags = $('f_hashtags').value.trim();
  if ($('f_cta')) data.cta = $('f_cta').value.trim();

  try {
    if (id) {
      await sheetUpdate('Ideas', id, data);
      showToast('Idea actualizada', 'success');
    } else {
      data.id = genId('idea');
      data.fecha_creada = todayISO();
      data.origen = 'Manual';
      await sheetAppend('Ideas', data);
      showToast('Idea creada', 'success');
    }
    closeModal();
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function confirmDeleteIdea(id, titulo) {
  $('modal').className = 'modal';
  $('modal').innerHTML = `
    <div class="modal-header"><h2>Eliminar idea</h2><button class="btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><p>¿Eliminar la idea <strong>${esc(titulo)}</strong>?</p></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="background: var(--rojo);" onclick="deleteIdea('${id}')">Eliminar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

async function deleteIdea(id) {
  try {
    await sheetDelete('Ideas', id);
    closeModal();
    showToast('Idea eliminada', 'success');
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// ============================================================================
// GENERADOR: LOTE DE IDEAS CON IA
// ============================================================================
function abrirGeneradorIdeas() {
  if (!checkApiKey()) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
  if (!estrategiaActiva) {

function cambiarTipoEnfoque() {

async function ejecutarGeneradorIdeas(estrategiaId) {
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  const pilarElegido = $('gen_pilar').value;
  const cantidad = parseInt($('gen_cantidad').value);
  const formato = $('gen_formato').value;
  const tipoEnfoque = $('gen_tipo_enfoque').value;

  // Construir el enfoque principal según el tipo elegido
  let enfoquePrincipal = null;
  let enfoqueLabel = '';

  if (tipoEnfoque === 'fase') {
    const fase = FASES_MOMENTO.find(f => f.v === estrategia.momento_fase);
    const faseNombre = fase ? fase.label : estrategia.momento_fase;
    enfoqueLabel = 'Fase: ' + faseNombre;
    enfoquePrincipal = {
      tipo: 'fase',
      descripcion: faseNombre,
      contexto: estrategia.momento_descripcion || '',
      fase: estrategia.momento_fase,
    };
  } else if (tipoEnfoque === 'campana') {
    const campanaId = $('gen_campana_id').value;
    const campana = state.estrategias.find(e => e.id === campanaId);
    if (campana) {
      enfoqueLabel = 'Campaña: ' + campana.nombre;
      enfoquePrincipal = {
        tipo: 'campana',
        descripcion: campana.nombre,
        objetivo: campana.objetivo_principal || '',
        contexto: campana.momento_descripcion || '',
        fechas: `${campana.fecha_inicio || ''}${campana.fecha_fin ? ' a ' + campana.fecha_fin : ''}`,
      };
    }
  } else if (tipoEnfoque === 'tema') {
    const tema = $('gen_tema_libre').value.trim();
    if (tema) {
      enfoqueLabel = 'Tema: ' + tema.substring(0, 40) + (tema.length > 40 ? '...' : '');
      enfoquePrincipal = {
        tipo: 'tema',
        descripcion: tema,
      };
    }
  }

  const detalles = $('gen_detalles') ? $('gen_detalles').value.trim() : '';

  abrirModalGeneracion(
    'Generando ideas',
    '✨',
    `Generando ${cantidad} ideas${enfoqueLabel ? ' — ' + enfoqueLabel : ''}.`
  );

  const buyerPersonas = parseJsonSafe(estrategia.buyer_personas_json);
  const pilares = parseJsonSafe(estrategia.pilares_json);
  const tonoVoz = parseJsonSafe(estrategia.tono_voz_json);

  const pilaresContext = pilarElegido === 'todos'
    ? pilares.map(p => `- ${p.nombre} (${p.porcentaje || 0}%): ${p.descripcion || ''}. Aborda: ${p.aborda || ''}`).join('\n')
    : (() => {
        const p = pilares.find(x => x.nombre === pilarElegido);
        return p ? `PILAR: ${p.nombre}\nDescripción: ${p.descripcion || ''}\nAborda: ${p.aborda || ''}\nTemas ejemplo: ${Array.isArray(p.temas) ? p.temas.join(', ') : (p.temas || '')}` : '';
      })();

  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores || '-'}; deseos: ${bp.deseos || '-'}`).join('\n')
    : '';

  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}`
    : '';

  const formatoContext = formato === 'variado'
    ? 'Mezclá formatos: mayoritariamente carruseles y reels (son lo que mejor funciona), algunos posts simples y stories.'
    : `TODAS las ideas deben ser en formato: ${formato}.`;

  // Construir el bloque de ENFOQUE PRINCIPAL — el cambio más importante
  let enfoqueBloque = '';
  let reglaEnfoquePrompt = '';
  if (enfoquePrincipal) {
    if (enfoquePrincipal.tipo === 'fase') {
      enfoqueBloque = `
========================================
🎯 ENFOQUE PRINCIPAL OBLIGATORIO DEL LOTE
========================================
TODAS las ${cantidad} ideas deben servir a este momento: ${enfoquePrincipal.descripcion}
${enfoquePrincipal.contexto ? 'Contexto específico: ' + enfoquePrincipal.contexto : ''}

Esto significa:
- Cada idea debe estar pensada PARA este momento, no para cualquier momento.
- Si es pre-lanzamiento: todas apuntan a generar expectativa, presentar a la marca/equipo, construir comunidad antes de abrir, hablar de lo que viene, mostrar preparación.
- Si es lanzamiento: todas refuerzan la apertura, invitan a conocer, generan urgencia de los primeros días.
- Si es crecimiento: todas aportan valor educativo/aspiracional para sumar audiencia nueva.
- Si es consolidación: todas apuntan a conversión, casos de éxito, diferenciación vs competencia.
- Si es reposicionamiento: todas refuerzan el nuevo mensaje.
- Si es relanzamiento: todas hablan del regreso, qué hay de nuevo, por qué ahora.

NO mezcles ideas "genéricas del rubro" que servirían en cualquier momento. TODAS tienen que estar pensadas para ${enfoquePrincipal.descripcion}.
`;
      reglaEnfoquePrompt = `OBLIGATORIO: Las ${cantidad} ideas deben estar CADA UNA conectada al momento "${enfoquePrincipal.descripcion}". No ideas genéricas. Si la idea también funcionaría fuera de este momento, repensala.`;
    } else if (enfoquePrincipal.tipo === 'campana') {
      enfoqueBloque = `
========================================
🎯 ENFOQUE PRINCIPAL OBLIGATORIO DEL LOTE
========================================
TODAS las ${cantidad} ideas deben servir a la campaña: "${enfoquePrincipal.descripcion}"
Objetivo de la campaña: ${enfoquePrincipal.objetivo}
${enfoquePrincipal.contexto ? 'Contexto: ' + enfoquePrincipal.contexto : ''}
Fechas: ${enfoquePrincipal.fechas}

Cada idea debe estar pensada para esta campaña específica. No ideas del rubro en general.
`;
      reglaEnfoquePrompt = `OBLIGATORIO: Las ${cantidad} ideas deben estar CADA UNA conectada a la campaña "${enfoquePrincipal.descripcion}".`;
    } else if (enfoquePrincipal.tipo === 'tema') {
      enfoqueBloque = `
========================================
🎯 ENFOQUE PRINCIPAL OBLIGATORIO DEL LOTE
========================================
Directiva específica de la estratega: "${enfoquePrincipal.descripcion}"

TODAS las ${cantidad} ideas deben cumplir esta directiva. Si una idea no encaja, no la incluyas.
`;
      reglaEnfoquePrompt = `OBLIGATORIO: Las ${cantidad} ideas deben cumplir la directiva: "${enfoquePrincipal.descripcion}".`;
    }
  }

  const detallesContext = detalles ? `\n\nDETALLES ADICIONALES DE LA ESTRATEGA:\n${detalles}` : '';

  const systemPrompt = `Sos una estratega de contenido de Carrusel MKT, agencia argentina. Generás ideas de contenido para redes sociales que son ACCIONABLES, ESPECÍFICAS y conectan con el público.

REGLAS FUNDAMENTALES:
${enfoquePrincipal ? `\n⚠️ REGLA #1 — ENFOQUE OBLIGATORIO ⚠️\n${reglaEnfoquePrompt}\nEsta regla es inviolable. Antes de proponer cada idea, preguntate: "¿esta idea está 100% alineada con el enfoque principal?". Si no, descartala y proponé otra.\n` : ''}
- VARIEDAD DE TEMAS: cada idea del lote debe tocar un tema DIFERENTE dentro del enfoque. No generes 3 ideas distintas sobre el mismo tema (ej: no 3 ideas sobre implantes).
- ESPECIFICIDAD: nada genérico. Nada de "5 tips sobre X" o "Hablemos de Y". Ir directo al ángulo concreto.
- HOOK CRÍTICO: tiene que parar el scroll. Curiosidad, polémica, pregunta inesperada, dato sorprendente, confesión, historia.
- CONEXIÓN CON DOLORES/DESEOS de los buyer personas. No contenido autorreferencial del cliente.
- COMPACTAS: el campo "idea" debe ser un desarrollo de 2-3 líneas máximo (no slide por slide, eso es para el generador de carrusel). Explicar el ángulo y qué mensaje da.
- Usá español rioplatense (vos, no tú).
${formatoContext}

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin texto adicional):

[
  {
    "titulo": "Título corto descriptivo (para identificar la idea rápido)",
    "pilar": "Nombre exacto del pilar",
    "formato": "Post | Carrusel | Reel | Story | Video",
    "hook": "Primera frase del post (máximo 15 palabras)",
    "idea": "Desarrollo compacto: qué ángulo toma, qué mensaje da, por qué funciona. 2-3 líneas máximo."
  }
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

ESTRATEGIA ACTIVA: ${estrategia.nombre}
Momento: ${estrategia.momento_fase || ''}
Objetivo: ${estrategia.objetivo_principal}
${estrategia.momento_descripcion ? 'Contexto: ' + estrategia.momento_descripcion : ''}

PILARES:
${pilaresContext}${buyerContext}${tonoContext}${enfoqueBloque}${detallesContext}

Generá EXACTAMENTE ${cantidad} ideas ${pilarElegido === 'todos' ? 'distribuidas proporcionalmente según los porcentajes de los pilares' : 'del pilar "' + pilarElegido + '"'}.

${enfoquePrincipal ? `\n⚠️ ANTES DE ENTREGAR: revisá cada una de las ${cantidad} ideas. ¿Todas están 100% conectadas al enfoque principal? Si alguna no lo está, reemplazala.` : ''}`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 4000 });
    const ideas = extractJson(raw);
    if (!Array.isArray(ideas) || ideas.length === 0) throw new Error('La IA no devolvió ideas válidas');
    mostrarPreviewIdeas(ideas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

      <div style="flex: 1;">
        <div style="font-weight: 600; font-size: 13.5px; margin-bottom: 4px;">${esc(idea.titulo || 'Idea ' + (i+1))}</div>
        <div style="display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap;">
          ${idea.pilar ? `<span class="idea-chip pilar">🪶 ${esc(idea.pilar)}</span>` : ''}
          ${idea.formato ? `<span class="idea-chip formato">${esc(idea.formato)}</span>` : ''}
        </div>
        ${idea.hook ? `<div style="font-size: 12.5px; font-style: italic; color: var(--fucsia); margin-bottom: 4px;">"${esc(idea.hook)}"</div>` : ''}
        ${idea.idea ? `<div style="font-size: 12.5px; color: var(--gris-text-soft);">${esc(idea.idea)}</div>` : ''}
      </div>
    </div>
  `).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header">✨ ${ideas.length} ideas generadas — destildá las que no te gusten</div>
      <div class="editable-hint">
        💡 Por defecto todas están seleccionadas. Destildá las que no quieras guardar. Después podés editar cada idea individualmente desde el banco.
      </div>
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button class="btn btn-secondary btn-sm" onclick="toggleAllIdeas(true)">Seleccionar todas</button>
        <button class="btn btn-secondary btn-sm" onclick="toggleAllIdeas(false)">Ninguna</button>
      </div>
      <div class="idea-preview-list">${itemsHtml}</div>
    </div>
  `;
  window._pendingIdeas = ideas;

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar todas</button>
    <button class="btn btn-primary" onclick="aceptarIdeasGeneradas()">✓ Guardar seleccionadas</button>
  `;
}

function toggleAllIdeas(value) {
  document.querySelectorAll('[data-idea-check]').forEach(cb => { cb.checked = value; });
}

async function aceptarIdeasGeneradas() {
  const ideas = window._pendingIdeas;
  const checked = Array.from(document.querySelectorAll('[data-idea-check]'))
    .filter(cb => cb.checked)
    .map(cb => parseInt(cb.dataset.ideaCheck));
  const seleccionadas = checked.map(i => ideas[i]);

  if (seleccionadas.length === 0) {
    showToast('No seleccionaste ninguna idea', 'error');
    return;
  }

  showAutosave('saving', `Guardando ${seleccionadas.length} ideas...`);

  try {
    for (const idea of seleccionadas) {
      await sheetAppend('Ideas', {
        id: genId('idea'),
        cliente_id: state.currentClienteId,
        fecha_creada: todayISO(),
        titulo: idea.titulo || '',
        pilar: idea.pilar || '',
        formato: idea.formato || '',
        hook: idea.hook || '',
        idea: idea.idea || '',
        estado: 'Sin usar',
        origen: 'IA',
      });
    }
    showAutosave('saved', `${seleccionadas.length} ideas guardadas`);
    closeModal();
    showToast(`${seleccionadas.length} ideas guardadas en el banco`, 'success');
    renderTabIdeas();
  } catch (e) {
    showAutosave('error', 'Error al guardar');
    showToast('Error: ' + e.message, 'error');
  }
}

// DESARROLLAR IDEA: generar copy completo a partir de una idea

async function desarrollarIdea(ideaId) {
  if (!checkApiKey()) return;
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea) return;
  const estrategia = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  abrirModalGeneracion(
    'Desarrollar copy completo',
    '✨',
    `La IA va a desarrollar el copy completo para la idea "${idea.titulo}".`
  );

  await generarCopyIA({
    titulo: idea.titulo,
    pilar: idea.pilar,
    formato: idea.formato,
    hook: idea.hook,
    idea: idea.idea,
    estrategia: estrategia,
    onAccept: async (copyData) => {
      // Actualizar la idea existente con el copy
      try {
        await sheetUpdate('Ideas', ideaId, {
          copy: copyData.copy || '',
          hashtags: copyData.hashtags || '',
          cta: copyData.cta || '',
          hook: copyData.hook || idea.hook || '',
        });
        closeModal();
        showToast('Copy desarrollado y guardado', 'success');
        renderTabIdeas();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }
  });
}

// GENERADOR DE COPY (reutilizable: desde calendario o desde idea)
// ============================================================================
async function generarCopyIA({ titulo, pilar, formato, hook, idea, estrategia, onAccept, instrucciones }) {
  const buyerPersonas = estrategia ? parseJsonSafe(estrategia.buyer_personas_json) : [];
  const tonoVoz = estrategia ? parseJsonSafe(estrategia.tono_voz_json) : {};
  const pilares = estrategia ? parseJsonSafe(estrategia.pilares_json) : [];
  const pilarInfo = pilares.find(p => p.nombre === pilar);

  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores || '-'}; deseos: ${bp.deseos || '-'}`).join('\n')
    : '';

  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}\nEmojis: ${tonoVoz.emojis || 'sin restricciones'}\nEjemplos de frases de la marca:\n${tonoVoz.ejemplos || ''}`
    : '';

  const pilarContext = pilarInfo ? `\nPILAR DE CONTENIDO: ${pilarInfo.nombre}\nDescripción: ${pilarInfo.descripcion || ''}\nAborda: ${pilarInfo.aborda || ''}` : (pilar ? '\nPILAR: ' + pilar : '');

  const formatoReglas = {
    'Post': 'Un post simple de feed. Copy conciso de 3-6 líneas.',
    'Carrusel': 'Carrusel de 5-8 slides. En el copy NO reemplazás al carrusel; el copy del pie debe complementar, despertar curiosidad y cerrar con CTA. Dejá las slides para el generador de carrusel.',
    'Reel': 'Reel de video corto. En el copy NO escribís el guión (eso es otro generador); escribís solo el caption que acompaña al reel.',
    'Story': 'Story de 24h. Texto más breve, directo.',
    'Video': 'Video largo. Caption descriptivo con contexto.',
  };
  const formatoReglaEspecifica = formatoReglas[formato] || 'Caption general.';

  const systemPrompt = `Sos una copywriter de Carrusel MKT, agencia argentina. Especialista en contenido para redes sociales que genera engagement real.

REGLAS DE COPYWRITING:
- El hook DEBE parar el scroll. Usá recursos: pregunta inesperada, dato sorprendente, confesión, historia personal, contradicción, número específico, promesa concreta.
- El copy debe tener VOZ. Nada de textos genéricos que podrían aplicarse a cualquier marca.
- Usá oraciones CORTAS mezcladas con algunas más largas. Ritmo.
- Espacios en blanco: hacé saltos de línea. No bloques densos.
- Siempre hay un CTA claro al final, adaptado al momento del cliente.
- Hashtags: entre 8 y 15, mezclá de alta y baja cantidad de publicaciones para maximizar alcance. Prioritariamente en español, locales si aplica.
- Usá español rioplatense (vos, no tú).
- Respetá RIGUROSAMENTE el tono de voz definido.

FORMATO ESPECÍFICO: ${formatoReglaEspecifica}

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin texto extra):

{
  "hook": "Primera línea que para el scroll",
  "copy": "Copy completo del post, con saltos de línea reales \\n entre párrafos",
  "hashtags": "#hashtag1 #hashtag2 #hashtag3 ...",
  "cta": "Llamado a la acción específico (ej: 'Agendá tu turno en el link de la bio')"
}`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}

${pilarContext}${buyerContext}${tonoContext}

IDEA A DESARROLLAR:
Título: ${titulo}
Formato: ${formato || 'Post'}
${hook ? 'Hook base: ' + hook : ''}
${idea ? 'Desarrollo: ' + idea : ''}
${instrucciones ? '\nINSTRUCCIONES ADICIONALES: ' + instrucciones : ''}

Desarrollá el copy completo.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2000 });
    const copyData = extractJson(raw);
    if (!copyData || typeof copyData !== 'object') throw new Error('La IA no devolvió copy válido');

function extractCopyFromDOM() {
  const data = {};
  document.querySelectorAll('#copyPreview [data-field]').forEach(field => {

  });
  return data;
}

async function aceptarCopyGenerado() {
  const copyData = extractCopyFromDOM();

async function regenerarCopy() {
  const ctx = window._pendingCopyContext;

    onAccept: window._pendingCopyOnAccept,

}

async function confirmarAgendarIdea(ideaId) {
  const idea = state.ideas.find(i => i.id === ideaId);
  const fecha = $('f_agendar_fecha').value;
  if (!fecha) { showToast('Elegí una fecha', 'error'); return; }

  const publicacion = {
    id: genId('pub'),
    cliente_id: state.currentClienteId,
    fecha_publicacion: fecha,
    hora: $('f_agendar_hora').value,
    red_social: $('f_agendar_red').value,
    formato: idea.formato || 'Post',
    pilar: idea.pilar || '',
    titulo: idea.titulo || '',
    hook: idea.hook || '',
    copy: idea.copy || '',
    hashtags: idea.hashtags || '',
    cta: idea.cta || '',
    estado: 'Borrador',
    idea_id: ideaId,
  };

  // Si la idea tiene carrusel o reel guardado en notas, traspasarlo a la publicación
  if (idea.notas && typeof idea.notas === 'string') {
    if (idea.notas.startsWith('CARRUSEL_SLIDES:')) {
      publicacion.carrusel_slides = idea.notas.substring('CARRUSEL_SLIDES:'.length);
    } else if (idea.notas.startsWith('REEL_GUION:')) {
      publicacion.reel_guion = idea.notas.substring('REEL_GUION:'.length);
    }
  }

  try {
    await Promise.all([
      sheetAppend('Calendario', publicacion),
      sheetUpdate('Ideas', ideaId, { estado: 'Agendada' }),
    ]);
    closeModal();
    showToast(`Agendada para ${formatDateEs(fecha)}`, 'success');
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// GENERAR COPY DESDE EL EDITOR DE PUBLICACIÓN
// ============================================================================
async function generarCopyDesdeEditorPost() {
  if (!checkApiKey()) return;

  // Leer datos actuales del editor de publicación
  const titulo = $('f_titulo') ? $('f_titulo').value.trim() : '';
  const pilar = $('f_pilar') ? $('f_pilar').value.trim() : '';
  const formato = $('f_formato') ? $('f_formato').value : 'Post';
  const hook = $('f_hook') ? $('f_hook').value.trim() : '';

  if (!titulo && !pilar && !hook) {
    showToast('Completá al menos el título, pilar o hook para que la IA tenga contexto', 'error');
    return;
  }

  // Cargar estrategia activa si no está
  if (!state.estrategias || state.estrategias.length === 0) {
    try {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data.filter(e => e.cliente_id === state.currentClienteId);
    } catch (e) {}
  }
  const estrategia = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  // Guardar el modal actual para reabrirlo después
  window._postModalEditorData = {
    fecha_publicacion: $('f_fecha_publicacion').value,
    hora: $('f_hora').value,
    red_social: $('f_red_social').value,
    formato, pilar, titulo, hook,
    copy: $('f_copy').value,
    hashtags: $('f_hashtags').value,
    cta: $('f_cta').value,
    link_diseno: $('f_link_diseno').value,
    link_multimedia: $('f_link_multimedia').value,
    estado: $('f_estado').value,
    notas: $('f_notas').value,
    postId: window._postModalEditingId || null,
  };

  abrirModalGeneracion(
    'Generando copy',
    '✨',
    `Generando copy para "${titulo || pilar || hook}"...`
  );

  await generarCopyIA({
    titulo, pilar, formato, hook,
    idea: '',
    estrategia,
    onAccept: async (copyData) => {
      // Volver al editor con los datos generados, preservando carrusel/reel si había
      window._preservarPendings = true;
      closeModal();
      const saved = window._postModalEditorData;
      setTimeout(() => {
        openPostModal(saved.postId, saved.fecha_publicacion);
        setTimeout(() => {
          // Llenar campos generados
          if ($('f_hook') && copyData.hook) $('f_hook').value = copyData.hook;
          if ($('f_copy') && copyData.copy) $('f_copy').value = copyData.copy;
          if ($('f_hashtags') && copyData.hashtags) $('f_hashtags').value = copyData.hashtags;
          if ($('f_cta') && copyData.cta) $('f_cta').value = copyData.cta;
          // Restaurar los otros campos
          if ($('f_hora') && saved.hora) $('f_hora').value = saved.hora;
          if ($('f_red_social') && saved.red_social) $('f_red_social').value = saved.red_social;
          if ($('f_formato') && saved.formato) $('f_formato').value = saved.formato;
          if ($('f_pilar') && saved.pilar) $('f_pilar').value = saved.pilar;
          if ($('f_titulo') && saved.titulo) $('f_titulo').value = saved.titulo;
          if ($('f_estado') && saved.estado) $('f_estado').value = saved.estado;
          if ($('f_link_diseno') && saved.link_diseno) $('f_link_diseno').value = saved.link_diseno;
          if ($('f_link_multimedia') && saved.link_multimedia) $('f_link_multimedia').value = saved.link_multimedia;
          if ($('f_notas') && saved.notas) $('f_notas').value = saved.notas;
          showToast('Copy generado — revisá y guardá', 'success');
        }, 150);
      }, 100);
    }
  });
}

  if (r.includes('linked')) return '💼';

  if (r.includes('whats')) return '💬';

// ============================================================================
// VISTA GRILLA (mensual clásica)
// ============================================================================
function renderCalendarioGrilla(posts, year, month) {
  // Primera fecha del mes
  const firstDay = new Date(year, month, 1);
  const firstDayWeek = firstDay.getDay();
  const mondayOffset = firstDayWeek === 0 ? 6 : firstDayWeek - 1;
  const startDate = new Date(year, month, 1 - mondayOffset);

  // Generar 42 celdas (6 semanas)
  const today = new Date(); today.setHours(0,0,0,0);
  let dayCells = '';
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = toLocalISODate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = d.getTime() === today.getTime();
    const dayPosts = posts.filter(p => p.fecha_publicacion === dateStr);
    const postsHtml = dayPosts.map(p => `
      <div class="calendar-post ${(p.estado || 'idea').toLowerCase()}" onclick="event.stopPropagation(); openPostModal('${esc(p.id)}')" title="${esc(p.titulo || p.hook || 'Sin título')}">
        ${esc(p.titulo || p.hook || '(sin título)')}
      </div>`).join('');
    dayCells += `
      <div class="calendar-day ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}" onclick="openPostModal(null, '${dateStr}')">
        <div class="calendar-day-num">${d.getDate()}</div>
        ${postsHtml}
      </div>`;
  }

  return `
    <div class="calendar-grid">
      <div class="calendar-day-header">Lun</div>
      <div class="calendar-day-header">Mar</div>
      <div class="calendar-day-header">Mié</div>

// Helper: fecha local en ISO sin problemas de UTC
function toLocalISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ============================================================================
// VISTA CARDS (tipo Kalend.ia)
// ============================================================================
function renderCalendarioCards(posts, year, month) {
  // Filtrar solo posts del mes visible (con fecha), ordenados por fecha
  const monthPosts = posts
    .filter(p => {
      if (!p.fecha_publicacion) return false;
      const pd = new Date(p.fecha_publicacion + 'T00:00:00');
      return pd.getFullYear() === year && pd.getMonth() === month;
    })
    .sort((a, b) => (a.fecha_publicacion || '').localeCompare(b.fecha_publicacion || ''));

  if (monthPosts.length === 0) {
    return `
      <div class="cal-empty-cards">
        <p style="font-size: 14px; margin: 0 0 4px;">📭 No hay publicaciones en este mes.</p>
        <p style="font-size: 12.5px; margin: 0 0 14px;">Generalas con IA o creá una manual para empezar.</p>
        <button class="btn btn-primary btn-sm" onclick="openPostModal()">+ Nueva publicación</button>
      </div>
    `;
  }

  // Agrupar por semana (una sección por semana)
  const porSemana = {};
  monthPosts.forEach(p => {
    const d = new Date(p.fecha_publicacion + 'T00:00:00');
    const semanaInicio = getLunesDeSemana(d);
    const key = toLocalISODate(semanaInicio);
    if (!porSemana[key]) porSemana[key] = { inicio: semanaInicio, posts: [] };
    porSemana[key].posts.push(p);
  });

  const semanasOrdenadas = Object.keys(porSemana).sort();
  const today = new Date(); today.setHours(0,0,0,0);

  const seccionesHtml = semanasOrdenadas.map(key => {
    const { inicio, posts: semanaPosts } = porSemana[key];
    const fin = new Date(inicio); fin.setDate(fin.getDate() + 6);
    const tituloSemana = `Semana del ${inicio.getDate()} al ${fin.getDate()} de ${inicio.toLocaleDateString('es-AR', { month: 'short' })}`;

    const cardsHtml = semanaPosts.map(p => renderCalCard(p, today)).join('');

    return `
      <div>
        <div class="cal-cards-section-title">
          📅 ${esc(tituloSemana)}
          <span class="cal-cards-section-count">${semanaPosts.length} ${semanaPosts.length === 1 ? 'post' : 'posts'}</span>
        </div>
        <div class="cards-grid">
          ${cardsHtml}
        </div>
      </div>
    `;
  }).join('');

  return seccionesHtml;
}

function getLunesDeSemana(d) {
  const x = new Date(d);
  x.setHours(0,0,0,0);
  const dow = x.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  x.setDate(x.getDate() + diff);
  return x;
}

function renderCalCard(p, today) {
  const formatoKey = (p.formato || 'post').toLowerCase().replace(/\s+/g, '_');
  const estadoKey = (p.estado || 'idea').toLowerCase();
  const fechaObj = p.fecha_publicacion ? new Date(p.fecha_publicacion + 'T00:00:00') : null;
  const esHoy = fechaObj && fechaObj.getTime() === today.getTime();

  const nombresDias = ['DOM', 'LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB'];
  const diaLabel = fechaObj ? `${nombresDias[fechaObj.getDay()]} ${fechaObj.getDate()}` : 'SIN FECHA';
  const redSocial = p.red_social || 'Instagram';

  const titulo = p.titulo || p.hook || '(sin título)';
  // Preview: combina descripcion / cta / objetivo
  const preview = p.descripcion || p.hook || p.cta || '';

  const pilar = p.pilar ? `<div class="cal-card-pilar-chip">${esc(p.pilar)}</div>` : '';
  const formato = p.formato || 'Post';

  return `
    <div class="cal-card" onclick="openPostModal('${esc(p.id)}')">
      <div class="cal-card-border ${formatoKey}"></div>
      <div class="cal-card-head">
        <div class="cal-card-day ${esHoy ? 'today' : ''}">${esc(diaLabel)}</div>
        <div class="cal-card-format-badge ${formatoKey}">${esc(formato)}</div>
      </div>
      <div class="cal-card-network">📷 ${esc(redSocial)}</div>
      ${pilar}
      <div class="cal-card-title">${esc(titulo)}</div>
      ${preview ? `<div class="cal-card-preview">${esc(preview)}</div>` : '<div style="flex: 1;"></div>'}
      <div class="cal-card-footer">
        <div class="cal-card-estado-chip ${estadoKey}">${esc(p.estado || 'Idea')}</div>
        <div class="cal-card-arrow">→</div>
      </div>
    </div>
  `;
}

async function savePost(id) {
  const fecha = $('f_fecha_publicacion').value;
  if (!fecha) { showToast('La fecha es obligatoria', 'error'); return; }
  const data = {
    cliente_id: state.currentClienteId,
    fecha_publicacion: fecha,
    hora: $('f_hora').value,
    red_social: $('f_red_social').value,
    formato: $('f_formato').value,
    pilar: $('f_pilar').value.trim(),
    titulo: $('f_titulo').value.trim(),
    hook: $('f_hook').value.trim(),
    copy: $('f_copy').value.trim(),
    hashtags: $('f_hashtags').value.trim(),
    cta: $('f_cta').value.trim(),
    link_diseno: $('f_link_diseno').value.trim(),
    link_multimedia: $('f_link_multimedia').value.trim(),
    estado: $('f_estado').value,
    notas: $('f_notas').value.trim(),
  };

  // Si hay carrusel pendiente de guardar, incluirlo
  if (window._pendingCarruselSlides) {
    data.carrusel_slides = window._pendingCarruselSlides;
  }
  // Si hay guión de reel pendiente, incluirlo
  if (window._pendingReelGuion) {
    data.reel_guion = window._pendingReelGuion;
  }

  try {
    if (id) {
      await sheetUpdate('Calendario', id, data);
      showToast('Publicación actualizada', 'success');
    } else {
      data.id = genId('pub');
      await sheetAppend('Calendario', data);
      showToast('Publicación creada', 'success');
    }
    // Limpiar globals pendientes
    window._pendingCarruselSlides = null;
    window._pendingReelGuion = null;
    closeModal();
    renderTabCalendario();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function cargarPilaresClienteLibre() {
  const clienteId = $('libre_cliente').value;
  const pilarSelect = $('libre_pilar');
  if (!pilarSelect) return;
  pilarSelect.innerHTML = '<option value="">—</option>';
  try {
    // Cargar estrategias del cliente para extraer pilares
    const { data } = await sheetRead('Estrategias');
    const estrategiaActiva = data.find(e => e.cliente_id === clienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
    if (estrategiaActiva) {
      const pilares = parseJsonSafe(estrategiaActiva.pilares_json);
      pilares.forEach(p => {
        pilarSelect.innerHTML += `<option value="${esc(p.nombre)}">${esc(p.nombre)}</option>`;
      });
    }
    // Guardar el cliente_id y estrategia para usarlos al ejecutar
    window._libreClienteId = clienteId;
    window._libreEstrategia = estrategiaActiva || null;
  } catch (e) { console.warn('Error cargando pilares:', e); }
}

async function ejecutarGeneradorLibre(tipo) {
  if (!checkApiKey()) return;
  const clienteId = $('libre_cliente').value;
  const titulo = $('libre_titulo').value.trim();
  const pilar = $('libre_pilar').value;
  const hook = $('libre_hook').value.trim();
  const contexto = $('libre_contexto').value.trim();

  if (!clienteId) { showToast('Elegí un cliente', 'error'); return; }
  if (!titulo) { showToast('Poné un título o tema', 'error'); return; }

  // Setear estado para que los generadores funcionen bien
  state.currentClienteId = clienteId;

  // Cargar brief y estrategia del cliente si no están
  try {
    if (!state.briefs || state.briefs.length === 0) {
      const { data } = await sheetRead('Briefs');
      state.briefs = data;
    }
    if (!state.estrategias || !state.estrategias.some(e => e.cliente_id === clienteId)) {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data;
    }
  } catch (e) { showToast('Error cargando datos: ' + e.message, 'error'); return; }

  const estrategia = state.estrategias.find(e => e.cliente_id === clienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  // Mostrar modal de generación
  const titulos = {
    copy: { icon: '📝', title: 'Generando copy' },
    carrusel: { icon: '🎠', title: 'Generando carrusel' },
    reel: { icon: '🎬', title: 'Generando reel' },
  };
  const t = titulos[tipo];
  abrirModalGeneracion(t.title, t.icon, `Generando ${tipo} para "${titulo}"...`);

  // Disparar el generador correspondiente
  if (tipo === 'copy') {
    await generarCopyLibre({ clienteId, titulo, pilar, hook, contexto, estrategia });
  } else if (tipo === 'carrusel') {
    await generarCarruselLibre({ clienteId, titulo, pilar, hook, contexto, estrategia });
  } else if (tipo === 'reel') {
    await generarReelLibre({ clienteId, titulo, pilar, hook, contexto, estrategia });
  }
}

async function generarCarruselLibre({ clienteId, titulo, pilar, hook, contexto, estrategia }) {

    : '';
  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}\nEmojis: ${tonoVoz.emojis || ''}`
    : '';

  const systemPrompt = `Sos una diseñadora de contenido de Carrusel MKT, agencia argentina. Especialista en armar carruseles de Instagram que son leídos de principio a fin.

REGLAS DE CARRUSELES:
- Total: entre 5 y 8 slides.
- Slide 1 (portada): el HOOK visual. Texto corto, impacto fuerte.
- Slides intermedios: desarrollan el tema de forma progresiva. Cada slide aporta valor.
- Último slide: CTA claro.
- TEXTOS CORTOS Y LEGIBLES.
- Usá español rioplatense.
- Respetá el tono de voz del cliente.

FORMATO DE SALIDA: SOLO un JSON válido (sin markdown):
[
  { "numero": 1, "tipo": "Portada", "texto_principal": "...", "texto_secundario": "...", "visual": "..." },
  { "numero": 2, "tipo": "Desarrollo", "texto_principal": "...", "texto_secundario": "...", "visual": "..." },
  { "numero": "último", "tipo": "CTA", "texto_principal": "...", "texto_secundario": "...", "visual": "..." }
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === clienteId).nombre}

${buildBriefContext(clienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}${buyerContext}${tonoContext}

TEMA DEL CARRUSEL:
Título: ${titulo}
${pilar ? 'Pilar: ' + pilar : ''}
${hook ? 'Hook: ' + hook : ''}
${contexto ? 'Contexto/ángulo: ' + contexto : ''}

Generá la estructura del carrusel, slide por slide.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 3000 });

function extractCarruselFromDOM() {

async function generarReelDesdeEditor() {
  if (!checkApiKey()) return;

  const titulo = $('f_titulo') ? $('f_titulo').value.trim() : '';
  const pilar = $('f_pilar') ? $('f_pilar').value.trim() : '';
  const hook = $('f_hook') ? $('f_hook').value.trim() : '';
  const copy = $('f_copy') ? $('f_copy').value.trim() : '';

  if (!titulo && !hook && !copy) {
    showToast('Completá al menos el título, hook o copy para generar el guión', 'error');
    return;
  }

  window._postModalEditorData = {
    fecha_publicacion: $('f_fecha_publicacion').value,
    hora: $('f_hora').value,
    red_social: $('f_red_social').value,
    formato: $('f_formato').value,
    pilar, titulo, hook, copy,
    hashtags: $('f_hashtags').value,
    cta: $('f_cta').value,
    link_diseno: $('f_link_diseno').value,
    link_multimedia: $('f_link_multimedia').value,
    estado: $('f_estado').value,
    notas: $('f_notas').value,
    postId: window._postModalEditingId || null,
  };

  if (!state.estrategias || state.estrategias.length === 0) {
    try {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data.filter(e => e.cliente_id === state.currentClienteId);
    } catch (e) {}
  }
  const estrategia = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  abrirModalGeneracion('Generando guión de reel', '🎬', `Armando escenas para "${titulo || hook}"...`);

  const tonoVoz = estrategia ? parseJsonSafe(estrategia.tono_voz_json) : {};
  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}`
    : '';

  const systemPrompt = `Sos una productora de reels de Carrusel MKT, agencia argentina. Especialista en reels que capturan la atención en los primeros 3 segundos.

REGLAS DE REELS:
- Duración total: entre 15 y 45 segundos. Recomendado: 20-30s.
- Escena 1 (0-3s): HOOK VISUAL que frena el scroll. Texto en pantalla grande + acción impactante. Nunca desperdiciar estos segundos.
- Escenas intermedias: desarrollan el tema con ritmo rápido. Cortes cada 2-4 segundos.
- Escena final: CTA + loop (termina de forma que invite a verlo de nuevo).
- TEXTO EN PANTALLA: corto, grande, legible. Los reels se miran sin sonido.
- VOZ EN OFF O AUDIO: sugerir tipo de audio (música trending, voz propia, audio viral, etc.).
- ACCIÓN: qué se ve, qué se filma, qué pasa.
- Usá español rioplatense.

FORMATO DE SALIDA: SOLO un JSON válido (sin markdown):

[
  {
    "tiempo": "0-3s",
    "texto_pantalla": "Texto que aparece en pantalla (corto, 5-8 palabras máx)",
    "voz_audio": "Lo que se dice o tipo de audio: 'Voz en off: ...' o 'Música trending tipo X' o 'Audio viral: ...'",
    "accion": "Qué pasa en cámara: qué se filma, movimientos, planos"
  },
  ...
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}${tonoContext}

TEMA DEL REEL:
Título: ${titulo}
${pilar ? 'Pilar: ' + pilar : ''}
${hook ? 'Hook: ' + hook : ''}
${copy ? 'Contexto del copy: ' + copy : ''}

Generá el guión completo, escena por escena.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2500 });
    const escenas = extractJson(raw);
    if (!Array.isArray(escenas) || escenas.length === 0) throw new Error('No se pudo generar el guión');
    mostrarPreviewReel(escenas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}
