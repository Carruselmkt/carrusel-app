<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
  :root {
    --fucsia: #ba0d66;
    --fucsia-dark: #8f0a4e;
    --fucsia-light: #e74a9a;
    --salmon: #f79f6f;
    --petroleo: #176b87;
    --petroleo-dark: #0f4d61;
    --crema: #fdf4e3;
    --gris-bg: #f7f7f5;
    --gris-card: #ffffff;
    --gris-border: #e5e5e0;
    --gris-text: #2a2a2a;
    --gris-text-soft: #6b6b6b;
    --gris-text-muted: #9a9a9a;
    --verde: #2d9d78;
    --rojo: #c43c3c;
    --amarillo: #e0a430;
    --sombra: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
    --sombra-lg: 0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.06);
    --radio: 10px;
    --radio-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--gris-bg);
    color: var(--gris-text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 { font-family: 'Fraunces', serif; font-weight: 600; letter-spacing: -0.01em; }
  h1 { font-size: 24px; }
  h2 { font-size: 20px; }
  h3 { font-size: 17px; }

  button { font-family: inherit; font-size: 14px; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  a { color: var(--petroleo); }

  /* ===== LOGIN ===== */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--crema) 0%, #fff 60%, var(--gris-bg) 100%);
    padding: 20px;
  }
  .login-box {
    background: #fff; padding: 44px 40px 40px; border-radius: 14px;
    box-shadow: var(--sombra-lg); max-width: 420px; width: 100%; text-align: center;
    border: 1px solid var(--gris-border);
  }
  .login-logo {
    font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700;
    color: var(--fucsia); letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .login-subtitle { color: var(--gris-text-soft); font-size: 13px; margin-bottom: 32px; font-style: italic; }
  .login-text { color: var(--gris-text); margin-bottom: 28px; font-size: 14px; line-height: 1.6; }
  .google-btn {
    background: #fff; border: 1.5px solid var(--gris-border); padding: 12px 20px;
    border-radius: var(--radio); display: inline-flex; align-items: center; gap: 10px;
    font-weight: 500; color: var(--gris-text); transition: all 0.15s; width: 100%; justify-content: center;
  }
  .google-btn:hover { border-color: var(--fucsia); background: #fafafa; }
  .google-g {
    width: 18px; height: 18px;
    background: conic-gradient(from 0deg, #ea4335, #fbbc04, #34a853, #4285f4, #ea4335);
    border-radius: 50%;
  }
  .login-footer { margin-top: 28px; font-size: 12px; color: var(--gris-text-muted); line-height: 1.5; }

  /* ===== LAYOUT ===== */
  .app { display: none; min-height: 100vh; }
  .app.active { display: grid; grid-template-columns: 240px 1fr; }

  .sidebar {
    background: #fff; border-right: 1px solid var(--gris-border);
    padding: 20px 14px; display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700;
    color: var(--fucsia); padding: 4px 10px 18px;
    border-bottom: 1px solid var(--gris-border); margin-bottom: 14px; letter-spacing: -0.02em;
  }
  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: var(--radio-sm); color: var(--gris-text-soft);
    font-weight: 500; font-size: 13.5px; transition: all 0.12s; text-align: left; width: 100%;
  }
  .nav-item:hover { background: var(--gris-bg); color: var(--gris-text); }
  .nav-item.active { background: var(--fucsia); color: #fff; }
  .nav-item.disabled { color: var(--gris-text-muted); cursor: not-allowed; }
  .nav-item.disabled:hover { background: transparent; }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }
  .nav-badge {
    font-size: 9px; background: var(--gris-border); color: var(--gris-text-muted);
    padding: 2px 6px; border-radius: 20px; margin-left: auto; font-weight: 600;
  }
  .sidebar-user {
    padding-top: 14px; border-top: 1px solid var(--gris-border);
    display: flex; align-items: center; gap: 10px; font-size: 12px;
  }
  .user-avatar {
    width: 32px; height: 32px; background: var(--fucsia); color: #fff;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
  }
  .user-info { flex: 1; min-width: 0; overflow: hidden; }
  .user-name { font-weight: 600; color: var(--gris-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-email { color: var(--gris-text-muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .logout-btn { color: var(--gris-text-muted); font-size: 11px; padding: 4px; }
  .logout-btn:hover { color: var(--rojo); }

  .main { padding: 32px 40px; max-width: 1200px; width: 100%; }

  .page-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 20px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .page-title { font-size: 28px; margin-bottom: 4px; }
  .page-subtitle { color: var(--gris-text-soft); font-size: 13.5px; }

  .breadcrumb {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    color: var(--gris-text-muted); margin-bottom: 12px;
  }
  .breadcrumb button { color: var(--petroleo); font-weight: 500; }
  .breadcrumb button:hover { text-decoration: underline; }

  /* ===== BOTONES ===== */
  .btn {
    padding: 9px 16px; border-radius: var(--radio-sm);
    font-weight: 500; font-size: 13.5px; display: inline-flex;
    align-items: center; gap: 6px; transition: all 0.12s;
  }
  .btn-primary { background: var(--fucsia); color: #fff; }
  .btn-primary:hover { background: var(--fucsia-dark); }
  .btn-secondary { background: #fff; color: var(--gris-text); border: 1px solid var(--gris-border); }
  .btn-secondary:hover { border-color: var(--fucsia); color: var(--fucsia); }
  .btn-ghost { color: var(--gris-text-soft); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--gris-bg); color: var(--gris-text); }
  .btn-danger { color: var(--rojo); }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }

  /* ===== CARDS Y TABLAS ===== */
  .card {
    background: #fff; border: 1px solid var(--gris-border);
    border-radius: var(--radio); padding: 20px; box-shadow: var(--sombra);
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--gris-text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px;
  }

  .table-wrap { background: #fff; border: 1px solid var(--gris-border); border-radius: var(--radio); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 12px 16px; background: var(--gris-bg);
    font-weight: 600; color: var(--gris-text-soft); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--gris-border);
  }
  td { padding: 14px 16px; border-bottom: 1px solid var(--gris-border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.clickable { cursor: pointer; transition: background 0.1s; }
  tr.clickable:hover { background: #fafafa; }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge-activo { background: #e6f4ef; color: var(--verde); }
  .badge-pausado { background: #fff4e0; color: var(--amarillo); }
  .badge-finalizado { background: var(--gris-bg); color: var(--gris-text-muted); }
  .badge-practica { background: #fde6f0; color: var(--fucsia); }
  .badge-idea { background: #eef2f6; color: var(--gris-text-soft); }
  .badge-borrador { background: #fff4e0; color: var(--amarillo); }
  .badge-revision { background: #e6f0fb; color: var(--petroleo); }
  .badge-aprobada { background: #e6f4ef; color: var(--verde); }
  .badge-publicada { background: #d4e9e0; color: #1d6b4e; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gris-text-muted); }
  .empty-state h3 { color: var(--gris-text-soft); margin-bottom: 6px; }
  .empty-state p { margin-bottom: 20px; font-size: 13.5px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 560px; width: 100%;
    max-height: 90vh; overflow-y: auto; box-shadow: var(--sombra-lg);
  }
  .modal-lg { max-width: 720px; }
  .modal-header {
    padding: 22px 26px 14px; border-bottom: 1px solid var(--gris-border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-body { padding: 22px 26px; }
  .modal-footer {
    padding: 16px 26px 22px; display: flex; justify-content: flex-end;
    gap: 10px; border-top: 1px solid var(--gris-border);
  }

  /* ===== FORMULARIOS ===== */
  .form-row { margin-bottom: 16px; }
  .form-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 12.5px; font-weight: 600;
    color: var(--gris-text-soft); margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--gris-border);
    border-radius: var(--radio-sm); background: #fff; color: var(--gris-text);
    transition: border 0.12s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: var(--fucsia);
  }
  .form-textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .form-help { font-size: 11.5px; color: var(--gris-text-muted); margin-top: 4px; }

  /* ===== TABS (solapas) ===== */
  .tabs-container { background: #fff; border: 1px solid var(--gris-border); border-radius: var(--radio); overflow: hidden; }
  .tabs-nav {
    display: flex; border-bottom: 1px solid var(--gris-border);
    overflow-x: auto; background: #fafafa;
  }
  .tab-btn {
    padding: 14px 20px; font-size: 13.5px; font-weight: 500;
    color: var(--gris-text-soft); white-space: nowrap;
    border-bottom: 2px solid transparent; transition: all 0.12s;
  }
  .tab-btn:hover { color: var(--gris-text); }
  .tab-btn.active { color: var(--fucsia); border-bottom-color: var(--fucsia); background: #fff; }
  .tab-content { padding: 24px; }

  /* ===== BRIEF: secciones plegables ===== */
  .brief-section {
    border: 1px solid var(--gris-border); border-radius: var(--radio);
    margin-bottom: 14px; overflow: hidden; background: #fff;
  }
  .brief-section-header {
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none; background: #fafafa;
    border-bottom: 1px solid transparent; transition: all 0.12s;
  }
  .brief-section-header:hover { background: #f3f3f0; }
  .brief-section.open .brief-section-header { border-bottom-color: var(--gris-border); }
  .brief-section-icon { font-size: 18px; }
  .brief-section-title { flex: 1; font-weight: 600; font-size: 14px; color: var(--gris-text); }
  .brief-section-caret { color: var(--gris-text-muted); transition: transform 0.15s; }
  .brief-section.open .brief-section-caret { transform: rotate(90deg); }
  .brief-section-body { display: none; padding: 18px; }
  .brief-section.open .brief-section-body { display: block; }
  .brief-progress {
    font-size: 11.5px; color: var(--gris-text-muted);
    padding: 2px 8px; border-radius: 10px; background: #fff;
    border: 1px solid var(--gris-border);
  }
  .brief-progress.complete { background: #e6f4ef; color: var(--verde); border-color: transparent; }

  /* ===== AUTOGUARDADO: indicador ===== */
  .autosave-indicator {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--gris-text); color: #fff; padding: 8px 16px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 150;
    display: flex; align-items: center; gap: 8px;
  }
  .autosave-indicator.show { opacity: 1; }
  .autosave-indicator.saved { background: var(--verde); }
  .autosave-indicator.error { background: var(--rojo); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--gris-text); color: #fff; padding: 12px 20px;
    border-radius: var(--radio); font-size: 13px; font-weight: 500;
    box-shadow: var(--sombra-lg); opacity: 0; transform: translateY(10px);
    transition: all 0.2s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--verde); }
  .toast.error { background: var(--rojo); }

  /* ===== CONFIG ===== */
  .config-item { padding: 16px 0; border-bottom: 1px solid var(--gris-border); }
  .config-item:last-child { border-bottom: none; }
  .config-label { font-weight: 600; margin-bottom: 2px; }
  .config-value { color: var(--gris-text-soft); font-size: 13px; word-break: break-all; font-family: 'Courier New', monospace; }
  .config-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px;
    font-weight: 600; margin-top: 6px;
  }
  .config-status.ok { background: #e6f4ef; color: var(--verde); }
  .config-status.error { background: #fde8e8; color: var(--rojo); }

  /* ===== LOADING ===== */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--gris-text-muted); }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--gris-border);
    border-top-color: var(--fucsia); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== VISTA DETALLE CLIENTE ===== */
  .cliente-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px; background: #fff; border: 1px solid var(--gris-border);
    border-radius: var(--radio); margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .cliente-header-info h2 { font-size: 24px; margin-bottom: 4px; }
  .cliente-header-meta { font-size: 13px; color: var(--gris-text-soft); display: flex; gap: 14px; flex-wrap: wrap; }
  .cliente-header-actions { display: flex; gap: 8px; }

  /* ===== CALENDARIO ===== */
  .calendar-controls {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .calendar-month { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px; background: var(--gris-border); border: 1px solid var(--gris-border);
    border-radius: var(--radio); overflow: hidden;
  }
  .calendar-day-header {
    background: #fafafa; padding: 10px 8px; font-size: 11px;
    text-transform: uppercase; font-weight: 600; color: var(--gris-text-muted);
    text-align: center; letter-spacing: 0.04em;
  }
  .calendar-day {
    background: #fff; min-height: 100px; padding: 6px;
    display: flex; flex-direction: column; gap: 3px;
    cursor: pointer; transition: background 0.1s;
  }
  .calendar-day:hover { background: #fafafa; }
  .calendar-day.other-month { background: #f8f8f5; color: var(--gris-text-muted); }
  .calendar-day.today { background: #fff4e0; }
  .calendar-day-num { font-size: 12px; font-weight: 600; color: var(--gris-text-soft); }
  .calendar-day.today .calendar-day-num { color: var(--fucsia); font-weight: 700; }
  .calendar-post {
    font-size: 10.5px; padding: 3px 6px; border-radius: 4px;
    background: #eef2f6; color: var(--gris-text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; border-left: 3px solid var(--gris-border);
  }
  .calendar-post.idea { border-left-color: var(--gris-text-muted); }
  .calendar-post.borrador { border-left-color: var(--amarillo); background: #fff4e0; }
  .calendar-post.revision { border-left-color: var(--petroleo); background: #e6f0fb; }
  .calendar-post.aprobada { border-left-color: var(--verde); background: #e6f4ef; }
  .calendar-post.publicada { border-left-color: #1d6b4e; background: #d4e9e0; }

  /* ===== ACCESOS ===== */
  .acceso-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border: 1px solid var(--gris-border);
    border-radius: var(--radio-sm); margin-bottom: 10px;
  }
  .acceso-info { flex: 1; }
  .acceso-red { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .acceso-meta { font-size: 12px; color: var(--gris-text-muted); margin-top: 2px; }
  .acceso-actions { display: flex; gap: 6px; }

  /* ===== ESTRATEGIA ===== */
  .estrategia-card {
    background: #fff; border: 1px solid var(--gris-border);
    border-radius: var(--radio); margin-bottom: 12px; overflow: hidden;
    transition: border-color 0.15s;
  }
  .estrategia-card.activa { border-left: 4px solid var(--fucsia); }
  .estrategia-card.principal.activa { border-left-color: var(--fucsia); }
  .estrategia-card.campana.activa { border-left-color: var(--salmon); }
  .estrategia-card.prueba.activa { border-left-color: var(--petroleo); }
  .estrategia-card.cerrada { opacity: 0.75; border-left: 4px solid var(--gris-border); }

  .estrategia-header {
    padding: 16px 20px; display: flex; justify-content: space-between;
    align-items: center; gap: 12px; cursor: pointer; transition: background 0.1s;
  }
  .estrategia-header:hover { background: #fafafa; }
  .estrategia-title-area { flex: 1; min-width: 0; }
  .estrategia-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
  .estrategia-meta {
    font-size: 12px; color: var(--gris-text-muted);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .estrategia-badge-tipo {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .estrategia-badge-tipo.principal { background: #fde6f0; color: var(--fucsia); }
  .estrategia-badge-tipo.campana { background: #fef0e5; color: #c06a3d; }
  .estrategia-badge-tipo.prueba { background: #e6f0fb; color: var(--petroleo); }
  .estrategia-caret { color: var(--gris-text-muted); transition: transform 0.15s; font-size: 18px; }
  .estrategia-card.open .estrategia-caret { transform: rotate(90deg); }
  .estrategia-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--gris-border); padding-top: 18px; }
  .estrategia-card.open .estrategia-body { display: block; }

  .estrategia-section {
    background: var(--gris-bg); padding: 14px 16px;
    border-radius: var(--radio-sm); margin-bottom: 12px;
  }
  .estrategia-section-title {
    font-size: 12px; font-weight: 600; color: var(--gris-text-muted);
    text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .estrategia-section-content { font-size: 13.5px; color: var(--gris-text); line-height: 1.55; }
  .estrategia-section-content.empty { color: var(--gris-text-muted); font-style: italic; }
  .estrategia-ai-placeholder {
    background: #fff; border: 1px dashed var(--gris-border);
    padding: 16px; border-radius: var(--radio-sm); text-align: center;
    font-size: 13px; color: var(--gris-text-muted); margin-top: 8px;
  }

  .estrategia-historial-label {
    font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted);

<script>
// ============================================================================
// CONFIG
// ============================================================================
const CONFIG = {
  CLIENT_ID: '720522210798-hvq1d1c0lkg8mvm524sv1835dul2v26g.apps.googleusercontent.com',
  SPREADSHEET_ID: '1sbCRUoEh6qshKyAXi7PZDhHYEEKdlbYgq4MUe93AqdI',
  SCOPES: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
  DISCOVERY_DOC: 'https://sheets.googleapis.com/$discovery/rest?version=v4',
};

let state = {
  user: null,
  accessToken: null,
  apiKey: null,
  currentPage: 'clientes',
  currentClienteId: null,
  currentClienteTab: 'ficha',
  calendarDate: new Date(),
  clientes: [],
  briefs: [],
  estrategias: [],
  accesos: [],
  calendario: [],
  ideas: [],
};

let tokenClient = null;
let autosaveTimers = {};
let gapiReadyResolve = null;
const gapiReady = new Promise(resolve => { gapiReadyResolve = resolve; });

// ============================================================================
// HELPERS
// ============================================================================
function $(id) { return document.getElementById(id); }
function esc(s) { if (s === undefined || s === null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }

function showToast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.classList.remove('show'), 2600);
}

function showAutosave(estado, msg) {
  const el = $('autosave');
  el.className = 'autosave-indicator show ' + estado;
  el.innerHTML = (estado === 'saved' ? '✓ ' : estado === 'error' ? '⚠ ' : '') + msg;
  if (estado === 'saved' || estado === 'error') {
    setTimeout(() => el.classList.remove('show'), 1800);
  }
}

function formatDateEs(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function todayISO() { return new Date().toISOString().split('T')[0]; }
function genId(prefix = 'id') { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); }

// ============================================================================
// AUTH
// ============================================================================
function initGoogleAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: async (tokenResponse) => {
      if (tokenResponse.error) { showToast('Error de autenticación', 'error'); return; }
      state.accessToken = tokenResponse.access_token;
      // Guardar token con tiempo de expiración para mantener sesión al refrescar
      const expiresAt = Date.now() + (tokenResponse.expires_in || 3600) * 1000;
      try {
        localStorage.setItem('carrusel_token', tokenResponse.access_token);
        localStorage.setItem('carrusel_token_expires', String(expiresAt));
      } catch (e) { console.warn('localStorage no disponible'); }
      gapi.client.setToken({ access_token: tokenResponse.access_token });
      await loadUserInfo();
      enterApp();
    },
  });

  // Intentar restaurar sesión anterior si el token sigue vigente
  tryRestoreSession();
}

async function tryRestoreSession() {
  try {
    const token = localStorage.getItem('carrusel_token');
    const expiresAt = parseInt(localStorage.getItem('carrusel_token_expires') || '0');
    if (!token || !expiresAt) return;
    // Si quedan menos de 2 minutos, mejor pedir login nuevo
    if (Date.now() > expiresAt - 120000) {
      localStorage.removeItem('carrusel_token');
      localStorage.removeItem('carrusel_token_expires');
      return;
    }
    // Validar que el token aún funcione
    state.accessToken = token;
    await gapiReady; // esperar que gapi.client esté inicializado
    gapi.client.setToken({ access_token: token });
    try {
      await loadUserInfo();
      // Si pude cargar la info del usuario, el token es válido
      enterApp();
    } catch (e) {
      // Token inválido o expirado: limpiar y mostrar login
      localStorage.removeItem('carrusel_token');
      localStorage.removeItem('carrusel_token_expires');
      state.accessToken = null;
    }
  } catch (e) {
    console.warn('Error restaurando sesión:', e);
  }
}

async function loadUserInfo() {
  const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + state.accessToken }
  });
  if (!res.ok) throw new Error('Token inválido');
  const data = await res.json();
  state.user = { name: data.name, email: data.email, picture: data.picture };
  $('userName').textContent = data.name || data.email;
  $('userEmail').textContent = data.email;
  $('userAvatar').textContent = (data.name || data.email)[0].toUpperCase();
}

function handleLogin() {
  if (!tokenClient) { showToast('Esperá unos segundos y reintentá', 'error'); return; }
  tokenClient.requestAccessToken({ prompt: '' });
}

function handleLogout() {
  google.accounts.oauth2.revoke(state.accessToken, () => {});
  try {
    localStorage.removeItem('carrusel_token');
    localStorage.removeItem('carrusel_token_expires');
  } catch (e) {}
  state = { ...state, user: null, accessToken: null, clientes: [], briefs: [], estrategias: [], accesos: [], calendario: [], ideas: [] };
  $('loginScreen').style.display = 'flex';
  $('app').classList.remove('active');
}

function enterApp() {
  $('loginScreen').style.display = 'none';
  $('app').classList.add('active');
  loadApiKey(); // cargar key desde Config
  navigateTo(state.currentPage);
}

async function loadApiKey() {
  try {
    const { data } = await sheetRead('Config');
    const row = data.find(r => r.clave === 'anthropic_api_key');
    if (row && row.valor && row.valor.startsWith('sk-ant-')) {
      state.apiKey = row.valor.trim();
    } else {
      state.apiKey = null;
    }
  } catch (e) {
    console.error('Error cargando API key:', e);
    state.apiKey = null;
  }
}

function initGapi() {
  gapi.load('client', async () => {
    try {
      await gapi.client.init({ discoveryDocs: [CONFIG.DISCOVERY_DOC] });
      gapiReadyResolve(); // señal: gapi.client ya está listo
    } catch (e) {
      console.error('Error iniciando gapi client:', e);
      gapiReadyResolve(); // resolver igual para no bloquear
    }
  });
}

// ============================================================================
// SHEETS
// ============================================================================
async function sheetRead(sheetName) {
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: CONFIG.SPREADSHEET_ID,
      range: sheetName,
    });
    const rows = res.result.values || [];
    if (rows.length < 2) return { headers: rows[0] || [], data: [] };
    const headers = rows[0];
    const data = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    });
    return { headers, data };
  } catch (e) {
    console.error('sheetRead error:', e);
    throw new Error('No pude leer la hoja ' + sheetName);
  }
}

async function sheetAppend(sheetName, rowObj) {
  const { headers } = await sheetRead(sheetName);
  const row = headers.map(h => rowObj[h] || '');
  await gapi.client.sheets.spreadsheets.values.append({
    spreadsheetId: CONFIG.SPREADSHEET_ID, range: sheetName,
    valueInputOption: 'USER_ENTERED', insertDataOption: 'INSERT_ROWS',
    resource: { values: [row] },
  });
}

async function sheetUpdate(sheetName, idValue, rowObj, idCol = 'id') {
  const { headers, data } = await sheetRead(sheetName);
  const idx = data.findIndex(r => r[idCol] === idValue);
  if (idx === -1) throw new Error('No encontré el registro');
  const rowNum = idx + 2;
  const newRow = headers.map(h => rowObj[h] !== undefined ? rowObj[h] : (data[idx][h] || ''));
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: CONFIG.SPREADSHEET_ID,
    range: `${sheetName}!A${rowNum}`,
    valueInputOption: 'USER_ENTERED',
    resource: { values: [newRow] },
  });
}

async function sheetDelete(sheetName, idValue, idCol = 'id') {
  const { data } = await sheetRead(sheetName);
  const idx = data.findIndex(r => r[idCol] === idValue);
  if (idx === -1) throw new Error('No encontré el registro');
  const rowNum = idx + 2;
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: CONFIG.SPREADSHEET_ID });
  const sheet = meta.result.sheets.find(s => s.properties.title === sheetName);
  if (!sheet) throw new Error('No encontré la hoja ' + sheetName);
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: CONFIG.SPREADSHEET_ID,
    resource: {
      requests: [{
        deleteDimension: {
          range: { sheetId: sheet.properties.sheetId, dimension: 'ROWS', startIndex: rowNum - 1, endIndex: rowNum }
        }
      }]
    }
  });
}

// Encuentra un registro por cliente_id en una hoja, lo crea si no existe. Devuelve el registro actualizado.
async function upsertByClienteId(sheetName, clienteId, dataObj) {
  const { data } = await sheetRead(sheetName);
  const existing = data.find(r => r.cliente_id === clienteId);
  if (existing) {
    await sheetUpdate(sheetName, existing.id, dataObj);
    return { ...existing, ...dataObj };
  } else {
    const newObj = { id: genId(sheetName.substr(0,3).toLowerCase()), cliente_id: clienteId, ...dataObj };
    await sheetAppend(sheetName, newObj);
    return newObj;
  }
}

async function saveCliente(id) {
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

  const data = {
    nombre,
    tipo_cliente: $('f_tipo_cliente').value,
    rubro: $('f_rubro').value.trim(),
    estado: $('f_estado').value,
    servicio_contratado: $('f_servicio_contratado').value.trim(),
    frecuencia_posts: $('f_frecuencia_posts').value,
    fecha_inicio_servicio: $('f_fecha_inicio_servicio').value,
    canal_comunicacion: $('f_canal_comunicacion').value.trim(),
    rondas_revision: $('f_rondas_revision').value,
    notas: $('f_notas').value.trim(),
  };

  try {
    if (id) {
      await sheetUpdate('Clientes', id, data);
      showToast('Cliente actualizado', 'success');
      // actualizar en estado local
      const idx = state.clientes.findIndex(c => c.id === id);
      if (idx !== -1) state.clientes[idx] = { ...state.clientes[idx], ...data };
    } else {
      data.id = genId('cli');
      data.fecha_alta = todayISO();
      await sheetAppend('Clientes', data);
      state.clientes.push(data);
      showToast('Cliente creado', 'success');
    }
    closeModal();
    if (state.currentClienteId) renderClienteDetalle();
    else renderClientesList();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function deleteCliente(id) {
  try {
    await sheetDelete('Clientes', id);
    state.clientes = state.clientes.filter(c => c.id !== id);
    closeModal();
    showToast('Cliente eliminado', 'success');
    navigateTo('clientes');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function closeModal() {
  $('modalOverlay').classList.remove('active');
  // Limpiar globals solo si no estamos en medio de un flujo de "aceptar carrusel/reel"
  // (esos flujos setean _preservarPendings antes de cerrar)
  if (!window._preservarPendings) {
    window._pendingCarruselSlides = null;
    window._pendingReelGuion = null;
  }
  window._preservarPendings = false;
}

        return `
          <div class="form-row">
            <label class="form-label">${esc(f.label)}</label>
            ${input}
          </div>`;
      }).join('');

      return `
        <div class="brief-section ${isComplete || isPartial ? 'open' : ''}" data-section="${section.id}">

        </div>`;
    }).join('');

    const totalAll = BRIEF_SECTIONS.reduce((a, s) => a + s.fields.length, 0);
    const completedAll = BRIEF_SECTIONS.reduce((a, s) => a + s.fields.filter(f => brief[f.k] && brief[f.k].trim()).length, 0);
    const pct = Math.round((completedAll / totalAll) * 100);

    $('tabContent').innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px;">

          <div style="font-size: 11px; color: var(--gris-text-muted);">${completedAll} de ${totalAll} campos</div>

  }
}

async function saveBriefField(clienteId, field, value) {
  // Debounce: evitar saves consecutivos del mismo campo
  const key = clienteId + '_' + field;
  clearTimeout(autosaveTimers[key]);
  autosaveTimers[key] = setTimeout(async () => {
    showAutosave('saving', 'Guardando...');
    try {
      // Buscar brief existente
      const { data } = await sheetRead('Briefs');
      const existing = data.find(b => b.cliente_id === clienteId);
      if (existing) {
        if ((existing[field] || '') === value) { showAutosave('saved', 'Guardado'); return; }
        await sheetUpdate('Briefs', existing.id, { [field]: value });
      } else {
        const newBrief = { id: genId('bri'), cliente_id: clienteId, fecha_completado: todayISO(), [field]: value };
        await sheetAppend('Briefs', newBrief);
      }
      showAutosave('saved', 'Guardado');
      // Actualizar contador de progreso sin re-renderizar todo
      updateBriefProgress(clienteId, field, value);
    } catch (e) {
      showAutosave('error', 'Error al guardar');
      console.error(e);
    }
  }, 400);
}

function updateBriefProgress(clienteId, field, value) {
  // Encontrar la sección que contiene el campo
  const section = BRIEF_SECTIONS.find(s => s.fields.some(f => f.k === field));
  if (!section) return;
  const sectionEl = document.querySelector(`[data-section="${section.id}"]`);
  if (!sectionEl) return;
  const inputs = sectionEl.querySelectorAll('[data-field]');
  let completed = 0;
  inputs.forEach(inp => { if (inp.value && inp.value.trim()) completed++; });
  const progressEl = sectionEl.querySelector('.brief-progress');
  if (progressEl) {
    progressEl.textContent = `${completed}/${section.fields.length}`;
    progressEl.classList.toggle('complete', completed === section.fields.length);
  }
  // actualizar progreso global
  let totalAll = 0, completedAll = 0;
  BRIEF_SECTIONS.forEach(s => {
    const se = document.querySelector(`[data-section="${s.id}"]`);
    if (!se) return;
    const ins = se.querySelectorAll('[data-field]');
    totalAll += ins.length;
    ins.forEach(i => { if (i.value && i.value.trim()) completedAll++; });
  });
  const pct = Math.round((completedAll / totalAll) * 100);
  const pctEl = document.querySelector('#tabContent > div:first-child > div:last-child > div:nth-child(2)');
  if (pctEl) {
    pctEl.textContent = pct + '%';
    pctEl.style.color = pct === 100 ? 'var(--verde)' : 'var(--fucsia)';
    const countEl = pctEl.nextElementSibling;
    if (countEl) countEl.textContent = `${completedAll} de ${totalAll} campos`;
  }
}

async function callClaude(systemPrompt, userPrompt, options = {}) {
  if (!state.apiKey) {
    throw new Error('No hay API key configurada. Cargala en la hoja "Config" de tu planilla (fila con clave "anthropic_api_key").');
  }

  const model = options.model || 'claude-sonnet-4-5';
  const maxTokens = options.maxTokens || 2048;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });

    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      const msg = errorData?.error?.message || `Error ${res.status}`;
      if (res.status === 401) throw new Error('API key inválida. Verificala en la hoja Config de tu planilla.');
      if (res.status === 429) throw new Error('Límite de velocidad alcanzado. Esperá unos segundos y reintentá.');
      if (res.status === 400 && msg.includes('credit')) throw new Error('Sin crédito disponible en Anthropic. Cargá más en console.anthropic.com');
      throw new Error(msg);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    return text;
  } catch (e) {
    if (e.message.includes('Failed to fetch')) {
      throw new Error('Error de red. Verificá tu conexión a internet.');
    }
    throw e;
  }
}

// Extrae el primer bloque JSON válido de una respuesta de texto
function extractJson(text) {
  // Intento 1: parsear directo
  try { return JSON.parse(text); } catch (e) {}
  // Intento 2: buscar entre ```json ... ```
  const match1 = text.match(/```json\s*([\s\S]*?)\s*```/);
  if (match1) { try { return JSON.parse(match1[1]); } catch (e) {} }
  // Intento 3: buscar entre ``` ... ```
  const match2 = text.match(/```\s*([\s\S]*?)\s*```/);
  if (match2) { try { return JSON.parse(match2[1]); } catch (e) {} }
  // Intento 4: buscar primer { o [ hasta el último } o ]
  const first = Math.min(
    text.indexOf('{') === -1 ? Infinity : text.indexOf('{'),
    text.indexOf('[') === -1 ? Infinity : text.indexOf('[')
  );
  const last = Math.max(text.lastIndexOf('}'), text.lastIndexOf(']'));
  if (first !== Infinity && last !== -1 && last > first) {
    try { return JSON.parse(text.substring(first, last + 1)); } catch (e) {}
  }
  throw new Error('La IA no devolvió un JSON válido. Intentá regenerar.');
}

function buildEstrategiaContext(estrategia) {
  let ctx = `NOMBRE DE LA ESTRATEGIA: ${estrategia.nombre}\n`;
  ctx += `TIPO: ${estrategia.tipo}\n`;
  if (estrategia.momento_fase) {
    const fase = FASES_MOMENTO.find(f => f.v === estrategia.momento_fase);
    ctx += `MOMENTO/FASE: ${fase ? fase.label : estrategia.momento_fase}\n`;
  }
  if (estrategia.momento_descripcion) ctx += `CONTEXTO DEL MOMENTO: ${estrategia.momento_descripcion}\n`;
  ctx += `OBJETIVO PRINCIPAL: ${estrategia.objetivo_principal}\n`;
  if (estrategia.metricas_meta) ctx += `METAS CONCRETAS: ${estrategia.metricas_meta}\n`;

  return ctx;
}

              ${tonoVoz.ejemplos ? `<div><strong>Ejemplos de frases:</strong><br><em style="color: var(--gris-text-soft);">${esc(tonoVoz.ejemplos).replace(/\n/g, '<br>')}</em></div>` : ''}

          ${!kpisSugeridos || kpisSugeridos.length === 0 ? `
            <div class="estrategia-ai-placeholder">

            <div style="background: #fff; padding: 12px 14px; border-radius: 6px; border: 1px solid var(--gris-border);">
              <ul style="font-size: 13px; padding-left: 18px; margin: 0;">
                ${kpisSugeridos.map(k => `<li style="margin-bottom: 4px;">${esc(k)}</li>`).join('')}
              </ul>
            </div>

        ${e.notas ? `
          <div class="estrategia-section">

          </div>
        ` : ''}

        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px;">
          <button class="btn btn-secondary btn-sm" onclick="openEstrategiaModal('${esc(e.id)}')">✏️ Editar</button>
          ${esActiva ? `
            <button class="btn btn-secondary btn-sm" onclick="cerrarEstrategia('${esc(e.id)}', 'cumplida')">✅ Cerrar como cumplida</button>
            <button class="btn btn-secondary btn-sm" onclick="cerrarEstrategia('${esc(e.id)}', 'descartada')">⊘ Cerrar como descartada</button>
          ` : `
            <button class="btn btn-secondary btn-sm" onclick="reactivarEstrategia('${esc(e.id)}')">↻ Reactivar</button>
          `}
          <button class="btn-ghost btn-danger btn-sm" onclick="confirmDeleteEstrategia('${esc(e.id)}', '${esc((e.nombre || '').replace(/'/g, "\\'"))}')">🗑</button>
        </div>
      </div>
    </div>`;
}

function parseJsonSafe(str) {
  if (!str || str === '') return [];
  try {
    const parsed = JSON.parse(str);
    return parsed;
  } catch (e) { return []; }
}

async function saveEstrategia(id) {
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }
  const objetivo = $('f_objetivo_principal').value.trim();
  if (!objetivo) { showToast('El objetivo principal es obligatorio', 'error'); return; }

  const data = {
    cliente_id: state.currentClienteId,
    nombre,
    tipo: $('f_tipo').value,
    estado: 'Activa',
    fecha_inicio: $('f_fecha_inicio').value,
    fecha_fin: $('f_fecha_fin').value,
    momento_fase: $('f_momento_fase').value,
    momento_descripcion: $('f_momento_descripcion').value.trim(),
    objetivo_principal: objetivo,
    metricas_meta: $('f_metricas_meta').value.trim(),
    notas: $('f_notas').value.trim(),
  };

  try {
    if (id) {
      await sheetUpdate('Estrategias', id, data);
      showToast('Estrategia actualizada', 'success');
    } else {
      data.id = genId('est');
      data.fecha_creacion = todayISO();
      data.buyer_personas_json = '';
      data.pilares_json = '';
      data.tono_voz_json = '';
      data.kpis_sugeridos_json = '';
      await sheetAppend('Estrategias', data);
      showToast('Estrategia creada', 'success');
    }
    closeModal();
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function cerrarEstrategia(id, motivo) {
  const est = state.estrategias.find(e => e.id === id);
  if (!est) return;
  const esCumplida = motivo === 'cumplida';
  $('modal').className = 'modal';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>${esCumplida ? 'Cerrar como cumplida' : 'Cerrar como descartada'}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p>Vas a cerrar la estrategia <strong>${esc(est.nombre)}</strong>.</p>
      <p style="margin-top: 10px; color: var(--gris-text-soft); font-size: 13px;">
        ${esCumplida ? 'Se marcará como cumplida y pasará al historial. Podés reactivarla en cualquier momento.' : 'Se marcará como descartada y pasará al historial.'}
      </p>
      <div class="form-row" style="margin-top: 14px;">
        <label class="form-label">Notas de cierre (opcional)</label>
        <textarea class="form-textarea" id="f_nota_cierre" placeholder="¿Cómo resultó? ¿Qué aprendiste?"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCierreEstrategia('${id}', '${motivo}')">Confirmar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

async function confirmarCierreEstrategia(id, motivo) {
  const est = state.estrategias.find(e => e.id === id);
  if (!est) return;
  const notaCierre = $('f_nota_cierre').value.trim();
  const nuevasNotas = notaCierre
    ? (est.notas ? est.notas + '\n\n--- Cierre ---\n' + notaCierre : 'Cierre: ' + notaCierre)
    : est.notas;
  const estado = motivo === 'cumplida' ? 'Cumplida' : 'Descartada';
  try {
    await sheetUpdate('Estrategias', id, {
      estado,
      fecha_cierre: todayISO(),
      notas: nuevasNotas,
    });
    closeModal();
    showToast('Estrategia cerrada', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function reactivarEstrategia(id) {
  try {
    await sheetUpdate('Estrategias', id, { estado: 'Activa', fecha_cierre: '' });
    showToast('Estrategia reactivada', 'success');
    renderTabEstrategia();

}

async function generarBuyerPersonas(estrategiaId) {
  if (!checkApiKey()) return;
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  if (!estrategia) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  abrirModalGeneracion(
    'Generar Buyer Personas',
    '👥',
    `La IA va a analizar el brief de ${cliente.nombre} y la estrategia "${estrategia.nombre}" para proponer 2-3 perfiles detallados de público objetivo.`
  );

  const systemPrompt = `Sos una estrategista de marketing digital experta en crear buyer personas detallados y útiles. Trabajás para Carrusel MKT, una agencia argentina dirigida por Marianela.

Tu tarea: a partir de la información de un cliente, generás 2 o 3 buyer personas (perfiles de público objetivo) detallados y accionables.

REGLAS:
- Los buyer personas deben ser específicos y diferenciados entre sí (distinto perfil demográfico, distinto momento de vida, distintos dolores).
- Los dolores, deseos y objeciones tienen que estar conectados con lo que el cliente ofrece.
- Usá español rioplatense (vos, no tú).
- NO inventes datos que no se pueden deducir del brief. Si algo no está claro, usá perfiles razonables para el rubro y momento.

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin texto extra, sin markdown, sin explicaciones). Formato exacto:

[
  {
    "nombre": "Nombre descriptivo del perfil (ej: 'Sofía, 32, profesional con miedo al dentista')",
    "demografia": "Edad, género, ocupación, zona de residencia, nivel socioeconómico",
    "contexto": "Cómo vive, qué hace en el día a día, en qué momento de vida está",
    "dolores": "Qué le duele, qué la frustra, qué problemas quiere resolver. Sé específico.",
    "deseos": "Qué quiere lograr, cómo se quiere sentir, qué aspira",
    "objeciones": "Por qué NO le compraría a este cliente (miedos, creencias que la frenan)",
    "canales": "En qué redes y formatos consume contenido, horarios"
  }
]`;

  const userPrompt = `Información del cliente:

${buildBriefContext(state.currentClienteId)}

Información de la estrategia actual:

${buildEstrategiaContext(estrategia)}

Generá 2 o 3 buyer personas para esta estrategia.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2500 });
    const personas = extractJson(raw);

    if (!Array.isArray(personas) || personas.length === 0) {
      throw new Error('La IA no devolvió buyer personas válidos');
    }

    mostrarPreviewBuyerPersonas(estrategiaId, personas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function mostrarPreviewBuyerPersonas(estrategiaId, personas) {
  const cardsHtml = personas.map((bp, i) => `
    <div class="buyer-persona-card" data-bp-idx="${i}">
      <span class="editable-label">Nombre del perfil</span>
      <h4 class="editable-field" contenteditable="true" data-field="nombre" data-placeholder="Ej: Sofía, 32, profesional con miedo al dentista">${esc(bp.nombre || '')}</h4>
      <span class="editable-label">📊 Demografía</span>
      <div class="editable-field" contenteditable="true" data-field="demografia" data-placeholder="Edad, género, ocupación, zona">${esc(bp.demografia || '')}</div>
      <span class="editable-label">🌱 Contexto</span>
      <div class="editable-field" contenteditable="true" data-field="contexto" data-placeholder="Cómo vive, qué hace en el día a día">${esc(bp.contexto || '')}</div>
      <span class="editable-label">😣 Dolores</span>
      <div class="editable-field" contenteditable="true" data-field="dolores" data-placeholder="Qué le duele, qué le frustra">${esc(bp.dolores || '')}</div>
      <span class="editable-label">🎯 Deseos</span>
      <div class="editable-field" contenteditable="true" data-field="deseos" data-placeholder="Qué quiere lograr, cómo quiere sentirse">${esc(bp.deseos || '')}</div>
      <span class="editable-label">🚫 Objeciones</span>
      <div class="editable-field" contenteditable="true" data-field="objeciones" data-placeholder="Por qué no compraría">${esc(bp.objeciones || '')}</div>
      <span class="editable-label">📱 Canales</span>
      <div class="editable-field" contenteditable="true" data-field="canales" data-placeholder="En qué redes consume contenido">${esc(bp.canales || '')}</div>
      <div style="margin-top: 10px; text-align: right;">
        <button class="btn-ghost btn-danger btn-sm" onclick="removePreviewCard(this, 'bp-idx')" style="font-size: 11.5px;">🗑 Eliminar este perfil</button>
      </div>
    </div>
  `).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header">✨ Propuesta de la IA — click en cualquier texto para editarlo</div>
      <div class="editable-hint">
        💡 Podés editar cualquier campo, eliminar perfiles enteros, o aceptar como está. Después de guardar, también vas a poder volver a editar.
      </div>
      <div id="buyerPersonasPreview">${cardsHtml}</div>
    </div>
  `;
  window._pendingEstrategiaId = estrategiaId;

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-secondary" onclick="generarBuyerPersonas('${estrategiaId}')">🔄 Regenerar</button>
    <button class="btn btn-primary" onclick="aceptarBuyerPersonas()">✓ Aceptar y guardar</button>
  `;
}

function removePreviewCard(btn, idxAttr) {
  const card = btn.closest('[data-' + idxAttr + ']');
  if (card) card.remove();
}

function extractBuyerPersonasFromDOM() {
  const cards = document.querySelectorAll('#buyerPersonasPreview [data-bp-idx]');
  const personas = [];
  cards.forEach(card => {
    const bp = {};
    card.querySelectorAll('[data-field]').forEach(field => {
      const val = field.innerText.trim();
      if (val) bp[field.dataset.field] = val;
    });
    if (bp.nombre || bp.demografia || bp.dolores) personas.push(bp);
  });
  return personas;
}

async function aceptarBuyerPersonas() {
  const personas = extractBuyerPersonasFromDOM();
  if (personas.length === 0) {
    showToast('No hay perfiles para guardar', 'error');
    return;
  }
  const estrategiaId = window._pendingEstrategiaId;
  try {
    await sheetUpdate('Estrategias', estrategiaId, { buyer_personas_json: JSON.stringify(personas) });
    closeModal();
    showToast('Buyer personas guardados', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function generarPilares(estrategiaId) {
  if (!checkApiKey()) return;
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  if (!estrategia) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  abrirModalGeneracion(
    'Generar Pilares de contenido',
    '🪶',
    `La IA va a proponer 4-5 pilares de contenido con porcentajes sugeridos para el calendario de ${cliente.nombre}.`
  );

  // Incluir buyer personas si ya los hay
  const buyerPersonas = parseJsonSafe(estrategia.buyer_personas_json);
  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS DEFINIDOS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores}; deseos: ${bp.deseos}`).join('\n')
    : '';

  const systemPrompt = `Sos una estrategista de contenido para redes sociales. Trabajás para Carrusel MKT, una agencia argentina.

Tu tarea: generar pilares de contenido accionables y variados para una estrategia específica.

REGLAS:
- Los pilares son CATEGORÍAS TEMÁTICAS recurrentes que estructurarán el calendario de contenido.
- Proponé 4 o 5 pilares, no más.
- Cada pilar debe conectar con dolores/deseos del público y con los objetivos del cliente.
- Los porcentajes deben sumar 100%.
- Típicamente: un pilar educativo, uno aspiracional/inspiracional, uno de venta, uno de marca/detrás de escena. Adaptá según el momento del cliente.
- Considerá el MOMENTO del cliente: en pre-lanzamiento hay más presentación, en crecimiento más educativo, en consolidación más venta, etc.
- Usá español rioplatense.

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin explicaciones). Formato exacto:

[
  {
    "nombre": "Nombre corto y evocativo del pilar",
    "porcentaje": 35,
    "descripcion": "Qué tipo de contenido entra en este pilar y por qué es importante para esta estrategia",
    "aborda": "Qué dolor o deseo del público aborda este pilar",
    "temas": ["Tema concreto 1", "Tema concreto 2", "Tema concreto 3", "Tema concreto 4"]
  }
]`;

  const userPrompt = `Información del cliente:

${buildBriefContext(state.currentClienteId)}

Información de la estrategia:

${buildEstrategiaContext(estrategia)}${buyerContext}

Generá 4 o 5 pilares de contenido para esta estrategia, con porcentajes que sumen 100%.`;

  try {

        <button class="btn-ghost btn-danger btn-sm" onclick="removePreviewCard(this, 'pilar-idx'); actualizarTotalPilares();" style="font-size: 11.5px;">🗑 Eliminar este pilar</button>
      </div>
    </div>
  `).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header" id="pilaresHeader">✨ Propuesta de pilares (total: ${total}%)</div>
      <div class="editable-hint">
        💡 Podés editar cualquier texto o porcentaje, eliminar pilares completos, o aceptar como está. Los porcentajes deberían sumar 100%.
      </div>
      <div id="pilaresPreview">${cardsHtml}</div>
    </div>
  `;
  window._pendingEstrategiaId = estrategiaId;

  // Recalcular total al cambiar porcentajes
  setTimeout(() => {
    document.querySelectorAll('#pilaresPreview input[data-field="porcentaje"]').forEach(inp => {
      inp.addEventListener('input', actualizarTotalPilares);
    });
  }, 50);

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-secondary" onclick="generarPilares('${estrategiaId}')">🔄 Regenerar</button>
    <button class="btn btn-primary" onclick="aceptarPilares()">✓ Aceptar y guardar</button>
  `;
}

function actualizarTotalPilares() {
  const inputs = document.querySelectorAll('#pilaresPreview input[data-field="porcentaje"]');
  let total = 0;
  inputs.forEach(inp => { total += Number(inp.value) || 0; });
  const header = $('pilaresHeader');
  if (header) {
    const color = total === 100 ? 'var(--verde)' : 'var(--fucsia)';
    header.innerHTML = `✨ Propuesta de pilares (total: <span style="color: ${color};">${total}%</span>)`;
  }
}

function extractPilaresFromDOM() {
  const cards = document.querySelectorAll('#pilaresPreview [data-pilar-idx]');
  const pilares = [];
  cards.forEach(card => {
    const p = {};
    card.querySelectorAll('[data-field]').forEach(field => {
      let val;
      if (field.tagName === 'INPUT') val = field.value.trim();
      else val = field.innerText.trim();
      if (field.dataset.field === 'porcentaje') {
        p.porcentaje = Number(val) || 0;
      } else if (field.dataset.field === 'temas') {
        if (val) p.temas = val.split(',').map(t => t.trim()).filter(t => t);
      } else if (val) {
        p[field.dataset.field] = val;
      }
    });
    if (p.nombre || p.descripcion) pilares.push(p);
  });
  return pilares;
}

async function aceptarPilares() {
  const pilares = extractPilaresFromDOM();
  if (pilares.length === 0) {
    showToast('No hay pilares para guardar', 'error');
    return;
  }
  const estrategiaId = window._pendingEstrategiaId;
  try {
    await sheetUpdate('Estrategias', estrategiaId, { pilares_json: JSON.stringify(pilares) });
    closeModal();
    showToast('Pilares guardados', 'success');
    renderTabEstrategia();

}

// ============================================================================
// TAB: IDEAS (banco de ideas del cliente)
// ============================================================================
const FORMATOS_CONTENIDO = ['Post', 'Carrusel', 'Reel', 'Story', 'Video'];

let ideaFilters = { pilar: 'todos', formato: 'todos', estado: 'todos' };

async function renderTabIdeas() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando banco de ideas...</div>`;

  try {
    // Cargar ideas + briefs + estrategias en paralelo (los necesito para generar)
    const [ideasRes, briefsRes, estrategiasRes] = await Promise.all([
      sheetRead('Ideas'),
      sheetRead('Briefs'),
      sheetRead('Estrategias'),
    ]);
    const ideas = ideasRes.data.filter(i => i.cliente_id === cliente.id);
    state.ideas = ideas;
    state.briefs = briefsRes.data;
    state.estrategias = estrategiasRes.data.filter(e => e.cliente_id === cliente.id);

    renderIdeasList();
  } catch (e) {
    $('tabContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

function renderIdeasList() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
  const pilares = estrategiaActiva ? parseJsonSafe(estrategiaActiva.pilares_json) : [];

  // Aplicar filtros
  let ideasFiltradas = [...state.ideas];
  if (ideaFilters.pilar !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => i.pilar === ideaFilters.pilar);
  if (ideaFilters.formato !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => i.formato === ideaFilters.formato);
  if (ideaFilters.estado !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => (i.estado || 'Sin usar') === ideaFilters.estado);

  // Ordenar: sin usar primero, después por fecha
  ideasFiltradas.sort((a, b) => {
    const orden = { 'Sin usar': 0, 'Agendada': 1, 'Publicada': 2 };
    const oA = orden[a.estado || 'Sin usar'] ?? 3;
    const oB = orden[b.estado || 'Sin usar'] ?? 3;
    if (oA !== oB) return oA - oB;
    return (b.fecha_creada || '').localeCompare(a.fecha_creada || '');
  });

  // Stats
  const stats = {
    total: state.ideas.length,
    sinUsar: state.ideas.filter(i => (i.estado || 'Sin usar') === 'Sin usar').length,
    agendadas: state.ideas.filter(i => i.estado === 'Agendada').length,
    publicadas: state.ideas.filter(i => i.estado === 'Publicada').length,
  };

  // Filtros de pilar dinámicos
  const pilarFilters = ['todos', ...new Set(state.ideas.map(i => i.pilar).filter(Boolean))];

  const ideasHtml = ideasFiltradas.length === 0 ? `
    <div class="empty-state">
      <p>${state.ideas.length === 0 ? 'Aún no hay ideas cargadas.' : 'No hay ideas con esos filtros.'}</p>
      ${state.ideas.length === 0 ? `
        <p style="font-size: 12px; margin-top: 8px;">Generá un lote de ideas con IA, o agregá manualmente las primeras.</p>
        <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
          <button class="btn btn-secondary" onclick="openIdeaModal()">+ Agregar manualmente</button>
          ${estrategiaActiva ? `<button class="gen-btn" onclick="abrirGeneradorIdeas()">✨ Generar lote con IA</button>` : ''}
        </div>
      ` : ''}
    </div>
  ` : ideasFiltradas.map(idea => renderIdeaCard(idea)).join('');

  $('tabContent').innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
      <div>
        <h3>Banco de ideas</h3>
        <p style="color: var(--gris-text-soft); font-size: 13px; margin-top: 2px;">
          ${stats.total} ideas · ${stats.sinUsar} sin usar · ${stats.agendadas} agendadas · ${stats.publicadas} publicadas
        </p>
      </div>
      <div style="display: flex; gap: 8px;">
        <button class="btn btn-secondary btn-sm" onclick="openIdeaModal()">+ Manual</button>
        ${estrategiaActiva ? `<button class="gen-btn gen-btn-small" onclick="abrirGeneradorIdeas()">✨ Generar ideas con IA</button>` : ''}
      </div>
    </div>

    ${!estrategiaActiva ? `
      <div style="padding: 12px 14px; background: #fff4e0; border-radius: var(--radio-sm); margin-bottom: 14px; font-size: 13px; color: #8a6a20;">
        ⚠️ Para generar ideas con IA necesitás tener una estrategia <strong>Principal</strong> activa (con pilares definidos) para este cliente.
      </div>
    ` : ''}

    ${state.ideas.length > 0 ? `
      <div class="idea-filters">
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Pilar</div>
        ${pilarFilters.map(p => `
          <button class="idea-filter ${ideaFilters.pilar === p ? 'active' : ''}" onclick="setIdeaFilter('pilar', '${esc(p)}')">${p === 'todos' ? 'Todos' : esc(p)}</button>
        `).join('')}
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;">Formato</div>
        <button class="idea-filter ${ideaFilters.formato === 'todos' ? 'active' : ''}" onclick="setIdeaFilter('formato', 'todos')">Todos</button>
        ${FORMATOS_CONTENIDO.map(f => `
          <button class="idea-filter ${ideaFilters.formato === f ? 'active' : ''}" onclick="setIdeaFilter('formato', '${f}')">${f}</button>
        `).join('')}
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;">Estado</div>
        <button class="idea-filter ${ideaFilters.estado === 'todos' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'todos')">Todos</button>
        <button class="idea-filter ${ideaFilters.estado === 'Sin usar' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Sin usar')">Sin usar</button>
        <button class="idea-filter ${ideaFilters.estado === 'Agendada' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Agendada')">Agendadas</button>
        <button class="idea-filter ${ideaFilters.estado === 'Publicada' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Publicada')">Publicadas</button>
      </div>
    ` : ''}

    <div id="ideasList">${ideasHtml}</div>
  `;
}

function setIdeaFilter(tipo, valor) {
  ideaFilters[tipo] = valor;
  renderIdeasList();
}

function renderIdeaCard(idea) {
  const estado = idea.estado || 'Sin usar';
  const estadoClase = estado.toLowerCase().replace(/ /g, '-');
  const tieneCopyDesarrollado = idea.copy && idea.copy.trim();

  return `
    <div class="idea-card estado-${estadoClase}">
      <div class="idea-header">
        <div class="idea-title">${esc(idea.titulo || '(sin título)')}</div>
        <span class="badge badge-${estado === 'Sin usar' ? 'idea' : estado === 'Agendada' ? 'revision' : 'publicada'}">${esc(estado)}</span>
      </div>

      <div class="idea-meta">
        ${idea.pilar ? `<span class="idea-chip pilar">🪶 ${esc(idea.pilar)}</span>` : ''}
        ${idea.formato ? `<span class="idea-chip formato">${esc(idea.formato)}</span>` : ''}
        ${idea.origen === 'IA' ? `<span class="idea-chip origen-ia">🤖 IA</span>` : `<span class="idea-chip origen-manual">✏️ Manual</span>`}
        ${tieneCopyDesarrollado ? `<span class="idea-chip" style="background: #e6f4ef; color: var(--verde);">✓ Copy desarrollado</span>` : ''}
      </div>

      ${idea.hook ? `<div class="idea-hook">"${esc(idea.hook)}"</div>` : ''}
      ${idea.idea && idea.idea !== idea.titulo ? `<div class="idea-descripcion">${esc(idea.idea)}</div>` : ''}

      ${tieneCopyDesarrollado ? `
        <details style="margin-bottom: 10px;">
          <summary style="cursor: pointer; color: var(--petroleo); font-size: 12.5px; font-weight: 600;">Ver copy completo</summary>
          <div style="padding: 10px 12px; background: #f8fbfd; border-radius: 6px; margin-top: 6px; font-size: 13px; white-space: pre-wrap;">${esc(idea.copy)}</div>
          ${idea.hashtags ? `<div style="margin-top: 6px; font-size: 12px; color: var(--gris-text-soft);">${esc(idea.hashtags)}</div>` : ''}
          ${idea.cta ? `<div style="margin-top: 4px; font-size: 12px;"><strong>CTA:</strong> ${esc(idea.cta)}</div>` : ''}
        </details>
      ` : ''}

      <div class="idea-actions">
        ${estado !== 'Publicada' ? `
          ${!tieneCopyDesarrollado ? `<button class="gen-btn gen-btn-small" onclick="desarrollarIdea('${esc(idea.id)}')">✨ Desarrollar copy</button>` : ''}
          ${estado !== 'Agendada' ? `<button class="btn btn-primary btn-sm" onclick="agendarIdea('${esc(idea.id)}')">📅 Agendar</button>` : ''}
        ` : ''}
        <button class="btn btn-secondary btn-sm" onclick="openIdeaModal('${esc(idea.id)}')">✏️ Editar</button>
        <button class="btn-ghost btn-danger btn-sm" onclick="confirmDeleteIdea('${esc(idea.id)}', '${esc((idea.titulo || '').replace(/'/g, "\\'"))}')">🗑</button>
      </div>
    </div>`;
}

    ? pilares.map(p => `<option value="${esc(p.nombre)}" ${idea.pilar === p.nombre ? 'selected' : ''}>${esc(p.nombre)}</option>`).join('')

    <div class="modal-header">

      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Título *</label>
        <input type="text" class="form-input" id="f_titulo" value="${esc(idea.titulo || '')}" placeholder="Nombre corto y descriptivo de la idea">
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Pilar</label>
          <select class="form-select" id="f_pilar">

            ${pilaresOptions}
          </select>

            ${FORMATOS_CONTENIDO.map(f => `<option value="${f}" ${idea.formato === f ? 'selected' : ''}>${f}</option>`).join('')}

        </div>
      </div>
      <div class="form-row">

        <input type="text" class="form-input" id="f_hook" value="${esc(idea.hook || '')}" placeholder="Primera línea que capta la atención">
      </div>
      <div class="form-row">
        <label class="form-label">Descripción / Idea</label>
        <textarea class="form-textarea" id="f_idea" placeholder="Desarrollo de la idea, qué contar, ángulo...">${esc(idea.idea || '')}</textarea>
      </div>
      ${idea.copy ? `
        <div class="form-row">
          <label class="form-label">Copy desarrollado</label>
          <textarea class="form-textarea" id="f_copy" style="min-height: 120px;">${esc(idea.copy || '')}</textarea>
        </div>
        <div class="form-row-grid">
          <div>
            <label class="form-label">Hashtags</label>
            <textarea class="form-textarea" id="f_hashtags" style="min-height: 60px;">${esc(idea.hashtags || '')}</textarea>
          </div>
          <div>
            <label class="form-label">CTA</label>
            <input type="text" class="form-input" id="f_cta" value="${esc(idea.cta || '')}">
          </div>
        </div>
      ` : ''}
      <div class="form-row">
        <label class="form-label">Estado</label>
        <select class="form-select" id="f_estado">
          <option value="Sin usar" ${(idea.estado || 'Sin usar') === 'Sin usar' ? 'selected' : ''}>Sin usar</option>
          <option value="Agendada" ${idea.estado === 'Agendada' ? 'selected' : ''}>Agendada</option>
          <option value="Publicada" ${idea.estado === 'Publicada' ? 'selected' : ''}>Publicada</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Notas</label>
        <textarea class="form-textarea" id="f_notas">${esc(idea.notas || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveIdea('${id || ''}')">${esNueva ? 'Crear idea' : 'Guardar'}</button>
    </div>`;
  $('modalOverlay').classList.add('active');
  setTimeout(() => $('f_titulo').focus(), 100);
}

async function saveIdea(id) {
  const titulo = $('f_titulo').value.trim();
  if (!titulo) { showToast('El título es obligatorio', 'error'); return; }
  const idea = id ? state.ideas.find(i => i.id === id) : {};

  const data = {
    cliente_id: state.currentClienteId,
    titulo,
    pilar: $('f_pilar').value,
    formato: $('f_formato').value,
    hook: $('f_hook').value.trim(),
    idea: $('f_idea').value.trim(),
    estado: $('f_estado').value,
    notas: $('f_notas').value.trim(),
  };

  // Si existe copy y el modal lo mostró, también guardarlo
  if ($('f_copy')) data.copy = $('f_copy').value.trim();
  if ($('f_hashtags')) data.hashtags = $('f_hashtags').value.trim();
  if ($('f_cta')) data.cta = $('f_cta').value.trim();

  try {
    if (id) {
      await sheetUpdate('Ideas', id, data);
      showToast('Idea actualizada', 'success');
    } else {
      data.id = genId('idea');
      data.fecha_creada = todayISO();
      data.origen = 'Manual';
      await sheetAppend('Ideas', data);
      showToast('Idea creada', 'success');
    }
    closeModal();
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function confirmDeleteIdea(id, titulo) {
  $('modal').className = 'modal';
  $('modal').innerHTML = `
    <div class="modal-header"><h2>Eliminar idea</h2><button class="btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="modal-body"><p>¿Eliminar la idea <strong>${esc(titulo)}</strong>?</p></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" style="background: var(--rojo);" onclick="deleteIdea('${id}')">Eliminar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

async function deleteIdea(id) {
  try {
    await sheetDelete('Ideas', id);
    closeModal();
    showToast('Idea eliminada', 'success');
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function abrirGeneradorIdeas() {
  if (!checkApiKey()) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

async function ejecutarGeneradorIdeas(estrategiaId) {
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  const pilarElegido = $('gen_pilar').value;
  const cantidad = parseInt($('gen_cantidad').value);
  const formato = $('gen_formato').value;
  const tipoEnfoque = $('gen_tipo_enfoque').value;

  // Construir el enfoque principal según el tipo elegido
  let enfoquePrincipal = null;
  let enfoqueLabel = '';

  if (tipoEnfoque === 'fase') {
    const fase = FASES_MOMENTO.find(f => f.v === estrategia.momento_fase);
    const faseNombre = fase ? fase.label : estrategia.momento_fase;
    enfoqueLabel = 'Fase: ' + faseNombre;
    enfoquePrincipal = {
      tipo: 'fase',
      descripcion: faseNombre,
      contexto: estrategia.momento_descripcion || '',
      fase: estrategia.momento_fase,
    };
  } else if (tipoEnfoque === 'campana') {
    const campanaId = $('gen_campana_id').value;
    const campana = state.estrategias.find(e => e.id === campanaId);
    if (campana) {
      enfoqueLabel = 'Campaña: ' + campana.nombre;
      enfoquePrincipal = {
        tipo: 'campana',
        descripcion: campana.nombre,
        objetivo: campana.objetivo_principal || '',
        contexto: campana.momento_descripcion || '',
        fechas: `${campana.fecha_inicio || ''}${campana.fecha_fin ? ' a ' + campana.fecha_fin : ''}`,
      };
    }
  } else if (tipoEnfoque === 'tema') {
    const tema = $('gen_tema_libre').value.trim();
    if (tema) {
      enfoqueLabel = 'Tema: ' + tema.substring(0, 40) + (tema.length > 40 ? '...' : '');
      enfoquePrincipal = {
        tipo: 'tema',
        descripcion: tema,
      };
    }
  }

  const detalles = $('gen_detalles') ? $('gen_detalles').value.trim() : '';

  abrirModalGeneracion(
    'Generando ideas',
    '✨',
    `Generando ${cantidad} ideas${enfoqueLabel ? ' — ' + enfoqueLabel : ''}.`
  );

  const buyerPersonas = parseJsonSafe(estrategia.buyer_personas_json);
  const pilares = parseJsonSafe(estrategia.pilares_json);
  const tonoVoz = parseJsonSafe(estrategia.tono_voz_json);

  const pilaresContext = pilarElegido === 'todos'
    ? pilares.map(p => `- ${p.nombre} (${p.porcentaje || 0}%): ${p.descripcion || ''}. Aborda: ${p.aborda || ''}`).join('\n')
    : (() => {
        const p = pilares.find(x => x.nombre === pilarElegido);
        return p ? `PILAR: ${p.nombre}\nDescripción: ${p.descripcion || ''}\nAborda: ${p.aborda || ''}\nTemas ejemplo: ${Array.isArray(p.temas) ? p.temas.join(', ') : (p.temas || '')}` : '';
      })();

  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores || '-'}; deseos: ${bp.deseos || '-'}`).join('\n')
    : '';

  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}`
    : '';

  const formatoContext = formato === 'variado'
    ? 'Mezclá formatos: mayoritariamente carruseles y reels (son lo que mejor funciona), algunos posts simples y stories.'
    : `TODAS las ideas deben ser en formato: ${formato}.`;

  // Construir el bloque de ENFOQUE PRINCIPAL — el cambio más importante
  let enfoqueBloque = '';
  let reglaEnfoquePrompt = '';
  if (enfoquePrincipal) {
    if (enfoquePrincipal.tipo === 'fase') {
      enfoqueBloque = `
========================================
🎯 ENFOQUE PRINCIPAL OBLIGATORIO DEL LOTE
========================================
TODAS las ${cantidad} ideas deben servir a este momento: ${enfoquePrincipal.descripcion}
${enfoquePrincipal.contexto ? 'Contexto específico: ' + enfoquePrincipal.contexto : ''}

Esto significa:
- Cada idea debe estar pensada PARA este momento, no para cualquier momento.
- Si es pre-lanzamiento: todas apuntan a generar expectativa, presentar a la marca/equipo, construir comunidad antes de abrir, hablar de lo que viene, mostrar preparación.
- Si es lanzamiento: todas refuerzan la apertura, invitan a conocer, generan urgencia de los primeros días.
- Si es crecimiento: todas aportan valor educativo/aspiracional para sumar audiencia nueva.
- Si es consolidación: todas apuntan a conversión, casos de éxito, diferenciación vs competencia.
- Si es reposicionamiento: todas refuerzan el nuevo mensaje.
- Si es relanzamiento: todas hablan del regreso, qué hay de nuevo, por qué ahora.

NO mezcles ideas "genéricas del rubro" que servirían en cualquier momento. TODAS tienen que estar pensadas para ${enfoquePrincipal.descripcion}.
`;
      reglaEnfoquePrompt = `OBLIGATORIO: Las ${cantidad} ideas deben estar CADA UNA conectada al momento "${enfoquePrincipal.descripcion}". No ideas genéricas. Si la idea también funcionaría fuera de este momento, repensala.`;
    } else if (enfoquePrincipal.tipo === 'campana') {
      enfoqueBloque = `
========================================
🎯 ENFOQUE PRINCIPAL OBLIGATORIO DEL LOTE
========================================
TODAS las ${cantidad} ideas deben servir a la campaña: "${enfoquePrincipal.descripcion}"
Objetivo de la campaña: ${enfoquePrincipal.objetivo}
${enfoquePrincipal.contexto ? 'Contexto: ' + enfoquePrincipal.contexto : ''}
Fechas: ${enfoquePrincipal.fechas}

Cada idea debe estar pensada para esta campaña específica. No ideas del rubro en general.
`;
      reglaEnfoquePrompt = `OBLIGATORIO: Las ${cantidad} ideas deben estar CADA UNA conectada a la campaña "${enfoquePrincipal.descripcion}".`;
    } else if (enfoquePrincipal.tipo === 'tema') {
      enfoqueBloque = `
========================================
🎯 ENFOQUE PRINCIPAL OBLIGATORIO DEL LOTE
========================================
Directiva específica de la estratega: "${enfoquePrincipal.descripcion}"

TODAS las ${cantidad} ideas deben cumplir esta directiva. Si una idea no encaja, no la incluyas.
`;
      reglaEnfoquePrompt = `OBLIGATORIO: Las ${cantidad} ideas deben cumplir la directiva: "${enfoquePrincipal.descripcion}".`;
    }
  }

  const detallesContext = detalles ? `\n\nDETALLES ADICIONALES DE LA ESTRATEGA:\n${detalles}` : '';

  const systemPrompt = `Sos una estratega de contenido de Carrusel MKT, agencia argentina. Generás ideas de contenido para redes sociales que son ACCIONABLES, ESPECÍFICAS y conectan con el público.

REGLAS FUNDAMENTALES:
${enfoquePrincipal ? `\n⚠️ REGLA #1 — ENFOQUE OBLIGATORIO ⚠️\n${reglaEnfoquePrompt}\nEsta regla es inviolable. Antes de proponer cada idea, preguntate: "¿esta idea está 100% alineada con el enfoque principal?". Si no, descartala y proponé otra.\n` : ''}
- VARIEDAD DE TEMAS: cada idea del lote debe tocar un tema DIFERENTE dentro del enfoque. No generes 3 ideas distintas sobre el mismo tema (ej: no 3 ideas sobre implantes).
- ESPECIFICIDAD: nada genérico. Nada de "5 tips sobre X" o "Hablemos de Y". Ir directo al ángulo concreto.
- HOOK CRÍTICO: tiene que parar el scroll. Curiosidad, polémica, pregunta inesperada, dato sorprendente, confesión, historia.
- CONEXIÓN CON DOLORES/DESEOS de los buyer personas. No contenido autorreferencial del cliente.
- COMPACTAS: el campo "idea" debe ser un desarrollo de 2-3 líneas máximo (no slide por slide, eso es para el generador de carrusel). Explicar el ángulo y qué mensaje da.
- Usá español rioplatense (vos, no tú).
${formatoContext}

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin texto adicional):

[
  {
    "titulo": "Título corto descriptivo (para identificar la idea rápido)",
    "pilar": "Nombre exacto del pilar",
    "formato": "Post | Carrusel | Reel | Story | Video",
    "hook": "Primera frase del post (máximo 15 palabras)",
    "idea": "Desarrollo compacto: qué ángulo toma, qué mensaje da, por qué funciona. 2-3 líneas máximo."
  }
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

ESTRATEGIA ACTIVA: ${estrategia.nombre}
Momento: ${estrategia.momento_fase || ''}
Objetivo: ${estrategia.objetivo_principal}
${estrategia.momento_descripcion ? 'Contexto: ' + estrategia.momento_descripcion : ''}

PILARES:
${pilaresContext}${buyerContext}${tonoContext}${enfoqueBloque}${detallesContext}

Generá EXACTAMENTE ${cantidad} ideas ${pilarElegido === 'todos' ? 'distribuidas proporcionalmente según los porcentajes de los pilares' : 'del pilar "' + pilarElegido + '"'}.

${enfoquePrincipal ? `\n⚠️ ANTES DE ENTREGAR: revisá cada una de las ${cantidad} ideas. ¿Todas están 100% conectadas al enfoque principal? Si alguna no lo está, reemplazala.` : ''}`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 4000 });
    const ideas = extractJson(raw);
    if (!Array.isArray(ideas) || ideas.length === 0) throw new Error('La IA no devolvió ideas válidas');
    mostrarPreviewIdeas(ideas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}
