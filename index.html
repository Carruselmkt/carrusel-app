async function desarrollarIdea(ideaId) {
  if (!checkApiKey()) return;
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea) return;
  const estrategia = state.estrategias.find(e => e.cliente_id === idea.cliente_id && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  abrirModalGeneracion(
    'Desarrollar copy completo',
    '✨',
    `La IA va a desarrollar el copy completo para la idea "${idea.titulo}".`
  );

  await generarCopyIA({
    titulo: idea.titulo,
    pilar: idea.pilar,
    formato: idea.formato,
    hook: idea.hook,
    idea: idea.idea,
    estrategia: estrategia,
    onAccept: async (copyData) => {
      // Actualizar la idea existente con el copy
      try {
        await sheetUpdate('Calendario', ideaId, {
          copy: copyData.copy || '',
          hashtags: copyData.hashtags || '',
          cta: copyData.cta || '',
          hook: copyData.hook || idea.hook || '',
        });
        closeModal();
        showToast('Copy desarrollado y guardado', 'success');
        renderTabIdeas();
      } catch (e) { showToast('Error: ' + e.message, 'error'); }
    }
  });
}

// ============================================================================
// GENERADOR DE COPY (reutilizable: desde calendario o desde idea)
// ============================================================================
async function generarCopyIA({ titulo, pilar, formato, hook, idea, estrategia, onAccept, instrucciones }) {
  const buyerPersonas = estrategia ? parseJsonSafe(estrategia.buyer_personas_json) : [];
  const tonoVoz = estrategia ? parseJsonSafe(estrategia.tono_voz_json) : {};
  const pilares = estrategia ? parseJsonSafe(estrategia.pilares_json) : [];
  const pilarInfo = pilares.find(p => p.nombre === pilar);

  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores || '-'}; deseos: ${bp.deseos || '-'}`).join('\n')
    : '';

  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}\nEmojis: ${tonoVoz.emojis || 'sin restricciones'}\nEjemplos de frases de la marca:\n${tonoVoz.ejemplos || ''}`
    : '';

  const pilarContext = pilarInfo ? `\nPILAR DE CONTENIDO: ${pilarInfo.nombre}\nDescripción: ${pilarInfo.descripcion || ''}\nAborda: ${pilarInfo.aborda || ''}` : (pilar ? '\nPILAR: ' + pilar : '');

  const formatoReglas = {
    'Post': 'Un post simple de feed. Copy conciso de 3-6 líneas.',
    'Carrusel': 'Carrusel de 5-8 slides. En el copy NO reemplazás al carrusel; el copy del pie debe complementar, despertar curiosidad y cerrar con CTA. Dejá las slides para el generador de carrusel.',
    'Reel': 'Reel de video corto. En el copy NO escribís el guión (eso es otro generador); escribís solo el caption que acompaña al reel.',
    'Story': 'Story de 24h. Texto más breve, directo.',
    'Video': 'Video largo. Caption descriptivo con contexto.',
  };
  const formatoReglaEspecifica = formatoReglas[formato] || 'Caption general.';

  const systemPrompt = `Sos una copywriter de Carrusel MKT, agencia argentina. Especialista en contenido para redes sociales que genera engagement real.

REGLAS DE COPYWRITING:
- El hook DEBE parar el scroll. Usá recursos: pregunta inesperada, dato sorprendente, confesión, historia personal, contradicción, número específico, promesa concreta.
- El copy debe tener VOZ. Nada de textos genéricos que podrían aplicarse a cualquier marca.
- Usá oraciones CORTAS mezcladas con algunas más largas. Ritmo.
- Espacios en blanco: hacé saltos de línea. No bloques densos.
- Siempre hay un CTA claro al final, adaptado al momento del cliente.
- Hashtags: entre 8 y 15, mezclá de alta y baja cantidad de publicaciones para maximizar alcance. Prioritariamente en español, locales si aplica.
- Usá español rioplatense (vos, no tú).
- Respetá RIGUROSAMENTE el tono de voz definido.

⚠️ REGLA INVIOLABLE — NO INVENTAR:
- Si el campo "Desarrollo" o las "Notas" tienen un guión/ángulo específico, ESE es el punto de partida. NO inventes otra historia ni cambies el ángulo.
- NO inventes productos, servicios, momentos, anécdotas o detalles que no estén explícitos en el brief del cliente o en la idea/notas.
- Si los datos son insuficientes, escribí algo más general (sin inventar detalles concretos) antes que fabricar una historia.
- Si el cliente es una marca de servicios (ej: agencia de marketing), NO inventes que vende productos físicos. Si es una marca de productos físicos, NO inventes servicios. Atenete a lo que dice el brief.

FORMATO ESPECÍFICO: ${formatoReglaEspecifica}

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin texto extra):

{
  "hook": "Primera línea que para el scroll",
  "copy": "Copy completo del post, con saltos de línea reales \\n entre párrafos",
  "hashtags": "#hashtag1 #hashtag2 #hashtag3 ...",
  "cta": "Llamado a la acción específico (ej: 'Agendá tu turno en el link de la bio')"
}`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}

${pilarContext}${buyerContext}${tonoContext}

IDEA A DESARROLLAR:
Título: ${titulo}
Formato: ${formato || 'Post'}
${hook ? 'Hook base: ' + hook : ''}
${idea ? '\n⚠️ DESARROLLO / GUIÓN / ÁNGULO ESPECÍFICO QUE DEBÉS RESPETAR (esto es lo que la marca quiere comunicar — NO LO IGNORES, NO LO REEMPLACES POR OTRA HISTORIA):\n' + idea : ''}
${instrucciones ? '\nINSTRUCCIONES ADICIONALES: ' + instrucciones : ''}

Desarrollá el copy completo, respetando el ángulo del desarrollo si se especificó arriba.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2000 });
    const copyData = extractJson(raw);
    if (!copyData || typeof copyData !== 'object') throw new Error('La IA no devolvió copy válido');
    mostrarPreviewCopy(copyData, onAccept, { titulo, pilar, formato, estrategia });
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header">✨ Copy generado — click en cualquier campo para editarlo</div>
      <div class="editable-hint">
        💡 Editá lo que necesites. El copy se guarda con los campos tal como los dejes.

        <div class="editable-field" contenteditable="true" data-field="copy" data-placeholder="Cuerpo del post" style="min-height: 140px; white-space: pre-wrap;">${esc(copyData.copy || '')}</div>
        <span class="editable-label">Hashtags</span>

      </div>
    </div>
  `;

  window._pendingCopyOnAccept = onAccept;
  window._pendingCopyContext = context;

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-secondary" onclick="regenerarCopy()">🔄 Regenerar</button>
    <button class="btn btn-primary" onclick="aceptarCopyGenerado()">✓ Aceptar y guardar</button>
  `;
}

function extractCopyFromDOM() {
  const data = {};
  document.querySelectorAll('#copyPreview [data-field]').forEach(field => {
    const val = field.innerText.trim();
    if (val) data[field.dataset.field] = val;
  });
  return data;
}

async function aceptarCopyGenerado() {
  const copyData = extractCopyFromDOM();
  const onAccept = window._pendingCopyOnAccept;
  if (onAccept) await onAccept(copyData);
}

async function regenerarCopy() {
  const ctx = window._pendingCopyContext;
  if (!ctx) return;
  abrirModalGeneracion('Regenerando copy', '✨', 'Generando otra propuesta...');
  await generarCopyIA({
    ...ctx,
    hook: '',
    idea: '',
    onAccept: window._pendingCopyOnAccept,
  });
}

// GENERAR COPY DESDE EL EDITOR DE PUBLICACIÓN
// ============================================================================
async function generarCopyDesdeEditorPost() {
  if (!checkApiKey()) return;

  // Leer datos actuales del editor de publicación
  const titulo = $('f_titulo') ? $('f_titulo').value.trim() : '';
  const pilar = $('f_pilar') ? $('f_pilar').value.trim() : '';
  const formato = $('f_formato') ? $('f_formato').value : 'Post';
  const hook = $('f_hook') ? $('f_hook').value.trim() : '';
  const notas = $('f_notas') ? $('f_notas').value.trim() : '';
  const cta = $('f_cta') ? $('f_cta').value.trim() : '';

  if (!titulo && !pilar && !hook && !notas) {
    showToast('Completá al menos el título, pilar, hook o notas para que la IA tenga contexto', 'error');
    return;
  }

  // Cargar estrategia activa si no está
  if (!state.estrategias || state.estrategias.length === 0 || !state.estrategias.some(e => e.cliente_id === state.currentClienteId)) {
    try {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data; // cargar todas, no filtrar — así no se pisan entre clientes
    } catch (e) {}
  }
  const estrategia = state.estrategias.find(e => e.cliente_id === state.currentClienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  // Guardar el modal actual para reabrirlo después
  window._postModalEditorData = {
    fecha_publicacion: $('f_fecha_publicacion').value,
    hora: $('f_hora').value,
    red_social: $('f_red_social').value,
    formato, pilar, titulo, hook,
    copy: $('f_copy').value,
    hashtags: $('f_hashtags').value,
    cta: $('f_cta').value,
    link_diseno: $('f_link_diseno').value,
    link_multimedia: $('f_link_multimedia').value,
    estado: $('f_estado').value,
    descripcion_visual: $('f_descripcion_visual') ? $('f_descripcion_visual').value : '',
    notas: $('f_notas').value,
    postId: window._postModalEditingId || null,
  };

  abrirModalGeneracion(
    'Generando copy',
    '✨',
    `Generando copy para "${titulo || pilar || hook}"...`
  );

  // Construir el campo "idea" combinando notas + CTA si los hay
  // Esto es CRÍTICO: las notas suelen tener el ángulo/guión del post que la IA debe respetar.
  let ideaContexto = '';
  if (notas) ideaContexto += notas;
  if (cta) ideaContexto += (ideaContexto ? '\n\n' : '') + 'CTA deseado: ' + cta;

  await generarCopyIA({
    titulo, pilar, formato, hook,
    idea: ideaContexto,
    estrategia,
    onAccept: async (copyData) => {
      // Volver al editor con los datos generados, preservando carrusel/reel si había
      window._preservarPendings = true;
      closeModal();
      const saved = window._postModalEditorData;
      setTimeout(() => {
        openPostModal(saved.postId, saved.fecha_publicacion);
        setTimeout(() => {
          // Llenar campos generados
          if ($('f_hook') && copyData.hook) $('f_hook').value = copyData.hook;
          if ($('f_copy') && copyData.copy) $('f_copy').value = copyData.copy;
          if ($('f_hashtags') && copyData.hashtags) $('f_hashtags').value = copyData.hashtags;
          if ($('f_cta') && copyData.cta) $('f_cta').value = copyData.cta;
          // Restaurar los otros campos
          if ($('f_hora') && saved.hora) $('f_hora').value = saved.hora;
          if ($('f_red_social') && saved.red_social) $('f_red_social').value = saved.red_social;
          if ($('f_formato') && saved.formato) $('f_formato').value = saved.formato;
          if ($('f_pilar') && saved.pilar) $('f_pilar').value = saved.pilar;
          if ($('f_titulo') && saved.titulo) $('f_titulo').value = saved.titulo;
          if ($('f_estado') && saved.estado) $('f_estado').value = saved.estado;
          if ($('f_link_diseno') && saved.link_diseno) $('f_link_diseno').value = saved.link_diseno;
          if ($('f_link_multimedia') && saved.link_multimedia) $('f_link_multimedia').value = saved.link_multimedia;
          if ($('f_descripcion_visual') && saved.descripcion_visual) $('f_descripcion_visual').value = saved.descripcion_visual;
          if ($('f_notas') && saved.notas) $('f_notas').value = saved.notas;
          showToast('Copy generado — revisá y guardá', 'success');
        }, 150);
      }, 100);
    }
  });
}

function iconForRed(red) {
  const r = (red || '').toLowerCase();
  if (r.includes('insta')) return '📷';
  if (r.includes('face')) return '📘';
  if (r.includes('tiktok')) return '🎵';
  if (r.includes('linked')) return '💼';
  if (r.includes('youtube') || r.includes('yt')) return '📺';
  if (r.includes('twitter') || r === 'x') return '🐦';
  if (r.includes('whats')) return '💬';
  if (r.includes('pinter')) return '📌';
  return '🔗';
}

// ============================================================================
// VISTA GRILLA (mensual clásica)
// ============================================================================
function renderCalendarioGrilla(posts, year, month) {
  // Primera fecha del mes
  const firstDay = new Date(year, month, 1);
  const firstDayWeek = firstDay.getDay();
  const mondayOffset = firstDayWeek === 0 ? 6 : firstDayWeek - 1;
  const startDate = new Date(year, month, 1 - mondayOffset);

  // Generar 42 celdas (6 semanas)
  const today = new Date(); today.setHours(0,0,0,0);
  let dayCells = '';
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const dateStr = toLocalISODate(d);
    const isOtherMonth = d.getMonth() !== month;
    const isToday = d.getTime() === today.getTime();
    const dayPosts = posts.filter(p => p.fecha_publicacion === dateStr);
    const postsHtml = dayPosts.map(p => `
      <div class="calendar-post ${(p.estado || 'idea').toLowerCase()}"
        draggable="true"
        ondragstart="onDragStartPost(event, '${esc(p.id)}')"
        ondragend="onDragEndPost(event)"
        onclick="event.stopPropagation(); openPostModal('${esc(p.id)}')"
        title="${esc(p.titulo || p.hook || 'Sin título')} (arrastrá para mover de día)">
        ${esc(p.titulo || p.hook || '(sin título)')}
      </div>`).join('');
    // Si la celda tiene posts, el clic en el espacio vacío también abre el selector de ideas;
    // si no tiene posts, todo el cuadro abre el selector.
    const tieneAlgo = dayPosts.length > 0;
    dayCells += `
      <div class="calendar-day ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}"
        data-fecha="${dateStr}"
        ondragover="onDragOverDay(event)"
        ondragleave="onDragLeaveDay(event)"
        ondrop="onDropDay(event, '${dateStr}')"
        onclick="${tieneAlgo ? '' : `abrirSelectorIdeasParaDia('${dateStr}')`}">
        <div class="calendar-day-num">${d.getDate()}</div>
        ${postsHtml}
        ${tieneAlgo ? `<div class="calendar-day-add" onclick="event.stopPropagation(); abrirSelectorIdeasParaDia('${dateStr}')" title="Agregar publicación">+</div>` : ''}
      </div>`;
  }

  return `
    <div class="calendar-grid">
      <div class="calendar-day-header">Lun</div>
      <div class="calendar-day-header">Mar</div>
      <div class="calendar-day-header">Mié</div>
      <div class="calendar-day-header">Jue</div>
      <div class="calendar-day-header">Vie</div>
      <div class="calendar-day-header">Sáb</div>
      <div class="calendar-day-header">Dom</div>
      ${dayCells}
    </div>
    <div style="margin-top: 14px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 11.5px; color: var(--gris-text-muted);">
      <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #eef2f6; border-left: 3px solid var(--gris-text-muted); border-radius: 2px;"></span>Idea</span>
      <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #fff4e0; border-left: 3px solid var(--amarillo); border-radius: 2px;"></span>Borrador</span>
      <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #e6f0fb; border-left: 3px solid var(--petroleo); border-radius: 2px;"></span>En revisión</span>
      <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #e6f4ef; border-left: 3px solid var(--verde); border-radius: 2px;"></span>Aprobada</span>
      <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #d4e9e0; border-left: 3px solid #1d6b4e; border-radius: 2px;"></span>Publicada</span>
    </div>`;
}

// Helper: fecha local en ISO sin problemas de UTC
function toLocalISODate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

// ============================================================================
// DRAG & DROP: mover publicaciones entre días arrastrándolas
// ============================================================================
function onDragStartPost(ev, postId) {
  ev.dataTransfer.setData('text/plain', postId);
  ev.dataTransfer.effectAllowed = 'move';
  ev.target.classList.add('dragging');
  // Atenuar levemente el resto de las celdas mientras arrastrás
  setTimeout(() => document.querySelectorAll('.calendar-day').forEach(c => c.classList.add('drag-active')), 0);
}

function onDragEndPost(ev) {
  ev.target.classList.remove('dragging');
  document.querySelectorAll('.calendar-day').forEach(c => {
    c.classList.remove('drag-active');
    c.classList.remove('drag-over');
  });
}

function onDragOverDay(ev) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  ev.currentTarget.classList.add('drag-over');
}

function onDragLeaveDay(ev) {
  // currentTarget puede salir y entrar varias veces por el bubbling de hijos
  if (!ev.currentTarget.contains(ev.relatedTarget)) {
    ev.currentTarget.classList.remove('drag-over');
  }
}

async function onDropDay(ev, fechaDestino) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('drag-over');
  const postId = ev.dataTransfer.getData('text/plain');
  if (!postId) return;
  const post = state.calendario.find(p => p.id === postId);
  if (!post) return;
  if (post.fecha_publicacion === fechaDestino) return; // mismo día, no hace falta nada

  // Optimistic UI: actualizo en memoria y refresco antes de confirmar el guardado en sheets
  const fechaOriginal = post.fecha_publicacion;
  post.fecha_publicacion = fechaDestino;
  renderTabCalendario();

  try {
    await sheetUpdate('Calendario', postId, { fecha_publicacion: fechaDestino });
    showToast(`Movido a ${formatDateEs(fechaDestino)}`, 'success');
  } catch (e) {
    // Si falla, vuelvo atrás
    post.fecha_publicacion = fechaOriginal;
    renderTabCalendario();
    showToast('Error al mover: ' + e.message, 'error');
  }
}

    </div>
    <div class="modal-body">

      </p>

      <div style="display: flex; gap: 8px; margin-bottom: 14px;">

        </button>

      ${ideasCliente.length === 0 ? `

          <p style="color: var(--gris-text-soft); font-size: 13px; margin: 0;">
            No hay ideas sin usar en el banco de este cliente.
          </p>
          <p style="color: var(--gris-text-muted); font-size: 12px; margin-top: 6px;">
            Las ideas sin agendar aparecen acá. Generá ideas desde la pestaña "Banco de ideas".
          </p>
        </div>
      ` : `
        <div style="border-top: 1px solid var(--gris-border); padding-top: 12px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px;">
            <strong style="font-size: 13px;">💡 Ideas sin usar (${ideasCliente.length})</strong>
            ${pilaresUnicos.length > 1 ? `
              <div style="display: flex; gap: 4px; flex-wrap: wrap;">
                ${pilaresUnicos.map(pil => `
                  <button class="idea-filter ${state._selectorIdeasFiltro === pil ? 'active' : ''}"
                    onclick="filtrarSelectorIdeas('${esc(pil)}', '${esc(fecha)}')"
                    style="font-size: 11px; padding: 3px 8px;">
                    ${esc(pil)}
                  </button>
                `).join('')}
              </div>
            ` : ''}

          <div id="selectorIdeasLista" style="max-height: 50vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">

    </div>`;
  $('modalOverlay').classList.add('active');
}

function renderListaSelectorIdeas(ideasCliente, fecha) {
  const filtro = state._selectorIdeasFiltro || 'Todos';
  const ideasFiltradas = filtro === 'Todos' ? ideasCliente : ideasCliente.filter(i => i.pilar === filtro);

  if (ideasFiltradas.length === 0) {
    return `<p style="font-size: 12.5px; color: var(--gris-text-muted); padding: 12px;">No hay ideas con ese pilar.</p>`;
  }

  return ideasFiltradas.map(idea => {
    const tieneCopy = idea.copy && idea.copy.trim();
    const formato = idea.formato || 'Post';
    const pilar = idea.pilar || '';
    return `
      <div class="selector-idea-card" onclick="agendarIdeaEnFecha('${esc(idea.id)}', '${esc(fecha)}')">
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 13px; font-weight: 600; color: #2a2a2a; line-height: 1.3;">
            ${esc(idea.titulo || '(sin título)')}
          </div>
          ${idea.hook ? `<div style="font-size: 11.5px; color: var(--gris-text-soft); margin-top: 3px; font-style: italic;">"${esc(idea.hook)}"</div>` : ''}
          <div style="display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap;">
            <span style="font-size: 10px; padding: 1px 6px; background: var(--fucsia); color: #fff; border-radius: 3px; font-weight: 600;">${esc(formato)}</span>
            ${pilar ? `<span style="font-size: 10px; padding: 1px 6px; background: var(--petroleo); color: #fff; border-radius: 3px; font-weight: 600;">${esc(pilar)}</span>` : ''}
            ${!tieneCopy ? `<span style="font-size: 10px; padding: 1px 6px; background: #fff4e0; color: #8a6a20; border-radius: 3px; font-weight: 600;">sin copy</span>` : ''}
          </div>
        </div>
        <div style="font-size: 18px; color: var(--fucsia); padding-left: 10px;">→</div>
      </div>
    `;
  }).join('');
}

function filtrarSelectorIdeas(pilar, fecha) {
  state._selectorIdeasFiltro = pilar;
  // Re-render solo del bloque de ideas + botones de filtro
  abrirSelectorIdeasParaDia(fecha);
}

// Variante de confirmarAgendarIdea para usar desde el selector del día (sin pedir más datos)
async function agendarIdeaEnFecha(ideaId, fecha) {
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea) { showToast('Idea no encontrada', 'error'); return; }

  // Modelo unificado: actualizar el registro existente con la fecha
  try {
    await sheetUpdate('Calendario', ideaId, {
      fecha_publicacion: fecha,
      red_social: idea.red_social || 'Instagram',
      estado: 'Borrador',
    });
    closeModal();
    showToast(`Agendada para ${formatDateEs(fecha)}`, 'success');
    renderTabCalendario();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// ============================================================================
// VISTA CARDS (tipo Kalend.ia)
// ============================================================================
function renderCalendarioCards(posts, year, month) {
  // Filtrar solo posts del mes visible (con fecha), ordenados por fecha
  const monthPosts = posts
    .filter(p => {
      if (!p.fecha_publicacion) return false;
      const pd = new Date(p.fecha_publicacion + 'T00:00:00');
      return pd.getFullYear() === year && pd.getMonth() === month;
    })
    .sort((a, b) => (a.fecha_publicacion || '').localeCompare(b.fecha_publicacion || ''));

  if (monthPosts.length === 0) {
    return `
      <div class="cal-empty-cards">
        <p style="font-size: 14px; margin: 0 0 4px;">📭 No hay publicaciones en este mes.</p>
        <p style="font-size: 12.5px; margin: 0 0 14px;">Generalas con IA o creá una manual para empezar.</p>
        <button class="btn btn-primary btn-sm" onclick="openPostModal()">+ Nueva publicación</button>
      </div>
    `;
  }

  // Agrupar por semana (una sección por semana)
  const porSemana = {};
  monthPosts.forEach(p => {
    const d = new Date(p.fecha_publicacion + 'T00:00:00');
    const semanaInicio = getLunesDeSemana(d);
    const key = toLocalISODate(semanaInicio);
    if (!porSemana[key]) porSemana[key] = { inicio: semanaInicio, posts: [] };
    porSemana[key].posts.push(p);
  });

  const semanasOrdenadas = Object.keys(porSemana).sort();
  const today = new Date(); today.setHours(0,0,0,0);

  const seccionesHtml = semanasOrdenadas.map(key => {
    const { inicio, posts: semanaPosts } = porSemana[key];
    const fin = new Date(inicio); fin.setDate(fin.getDate() + 6);
    const tituloSemana = `Semana del ${inicio.getDate()} al ${fin.getDate()} de ${inicio.toLocaleDateString('es-AR', { month: 'short' })}`;

    const cardsHtml = semanaPosts.map(p => renderCalCard(p, today)).join('');

    return `
      <div>
        <div class="cal-cards-section-title">
          📅 ${esc(tituloSemana)}
          <span class="cal-cards-section-count">${semanaPosts.length} ${semanaPosts.length === 1 ? 'post' : 'posts'}</span>
        </div>
        <div class="cards-grid">
          ${cardsHtml}
        </div>
      </div>
    `;
  }).join('');

  return seccionesHtml;
}

function getLunesDeSemana(d) {
  const x = new Date(d);
  x.setHours(0,0,0,0);
  const dow = x.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  x.setDate(x.getDate() + diff);
  return x;
}

function renderCalCard(p, today) {
  const formatoKey = (p.formato || 'post').toLowerCase().replace(/\s+/g, '_');
  const estadoKey = (p.estado || 'idea').toLowerCase();
  const fechaObj = p.fecha_publicacion ? new Date(p.fecha_publicacion + 'T00:00:00') : null;
  const esHoy = fechaObj && fechaObj.getTime() === today.getTime();

  const nombresDias = ['DOM', 'LUN', 'MAR', 'MIÉ', 'JUE', 'VIE', 'SÁB'];
  const diaLabel = fechaObj ? `${nombresDias[fechaObj.getDay()]} ${fechaObj.getDate()}` : 'SIN FECHA';
  const redSocial = p.red_social || 'Instagram';

  const titulo = p.titulo || p.hook || '(sin título)';
  // Preview: combina descripcion / cta / objetivo
  const preview = p.descripcion || p.hook || p.cta || '';

  const pilar = p.pilar ? `<div class="cal-card-pilar-chip">${esc(p.pilar)}</div>` : '';
  const formato = p.formato || 'Post';

  return `
    <div class="cal-card" onclick="openPostModal('${esc(p.id)}')">
      <div class="cal-card-border ${formatoKey}"></div>
      <div class="cal-card-head">
        <div class="cal-card-day ${esHoy ? 'today' : ''}">${esc(diaLabel)}</div>
        <div class="cal-card-format-badge ${formatoKey}">${esc(formato)}</div>
      </div>
      <div class="cal-card-network">📷 ${esc(redSocial)}</div>
      ${pilar}
      <div class="cal-card-title">${esc(titulo)}</div>
      ${preview ? `<div class="cal-card-preview">${esc(preview)}</div>` : '<div style="flex: 1;"></div>'}
      <div class="cal-card-footer">
        <div class="cal-card-estado-chip ${estadoKey}">${esc(p.estado || 'Idea')}</div>
        <div class="cal-card-arrow">→</div>
      </div>
    </div>
  `;
}

async function savePost(id) {
  const fecha = $('f_fecha_publicacion').value;
  if (!fecha) { showToast('La fecha es obligatoria', 'error'); return; }
  const data = {
    cliente_id: state.currentClienteId,
    fecha_publicacion: fecha,
    hora: $('f_hora').value,
    red_social: $('f_red_social').value,
    formato: $('f_formato').value,
    pilar: $('f_pilar').value.trim(),
    titulo: $('f_titulo').value.trim(),
    hook: $('f_hook').value.trim(),
    copy: $('f_copy').value.trim(),
    hashtags: $('f_hashtags').value.trim(),
    cta: $('f_cta').value.trim(),
    link_diseno: $('f_link_diseno').value.trim(),
    link_multimedia: $('f_link_multimedia').value.trim(),
    estado: $('f_estado').value,
    descripcion_visual: $('f_descripcion_visual') ? $('f_descripcion_visual').value.trim() : '',
    notas: $('f_notas').value.trim(),
  };

  // Si hay carrusel pendiente de guardar, incluirlo
  if (window._pendingCarruselSlides) {
    data.carrusel_slides = window._pendingCarruselSlides;
  }
  // Si hay guión de reel pendiente, incluirlo
  if (window._pendingReelGuion) {
    data.reel_guion = window._pendingReelGuion;
  }
  // Si hay secuencia de historias pendiente, incluirla
  if (window._pendingHistoriasSecuencia) {
    data.historias_secuencia = window._pendingHistoriasSecuencia;
  }
  // Si hay anuncio Meta pendiente, incluirlo
  if (window._pendingAnuncioMeta) {
    data.anuncio_meta = window._pendingAnuncioMeta;
  }

  try {
    if (id) {
      await sheetUpdate('Calendario', id, data);
      showToast('Publicación actualizada', 'success');
    } else {
      data.id = genId('pub');
      await sheetAppend('Calendario', data);
      showToast('Publicación creada', 'success');
    }
    // Limpiar globals pendientes
    window._pendingCarruselSlides = null;
    window._pendingReelGuion = null;
    closeModal();
    renderTabCalendario();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

  const historia = $('st_historia').value.trim();
  const cta = $('st_cta').value.trim();

  if (!clienteId) { showToast('Elegí un cliente', 'error'); return; }
  if (!historia || historia.length < 30) { showToast('La historia es muy corta. Contala con un poco más de detalle.', 'error'); return; }

  state.currentClienteId = clienteId;
  const cliente = state.clientes.find(c => c.id === clienteId);

function extraerStorytellingDelDOM(formato) {
  const cards = document.querySelectorAll('#storytellingPreview .st-pieza');
  const piezas = [];
  cards.forEach((card, i) => {
    const pieza = { n: i + 1 };
    card.querySelectorAll('[data-field]').forEach(el => {
      pieza[el.dataset.field] = el.innerText.trim();
    });
    const tipoEl = card.querySelector('[data-tipo]');
    const tiempoEl = card.querySelector('.st-pieza-tiempo');
    if (tipoEl) {
      // Sacar el emoji y quedarnos con el tipo en lower
      const txt = tipoEl.innerText.toLowerCase();
      if (txt.includes('hook') || txt.includes('portada')) pieza.tipo = formato === 'carrusel' ? 'portada' : 'hook';
      else if (txt.includes('desarrollo')) pieza.tipo = 'desarrollo';
      else if (txt.includes('giro')) pieza.tipo = 'giro';
      else if (txt.includes('cierre')) pieza.tipo = 'cierre';
    }
    if (tiempoEl) pieza.tiempo = tiempoEl.innerText.trim();
    piezas.push(pieza);
  });
  return piezas;
}

async function guardarStorytellingComoIdea() {
  const ctx = window._storytellingCtx;
  if (!ctx) return;
  const piezas = extraerStorytellingDelDOM(ctx.formato);
  if (piezas.length === 0) { showToast('No hay piezas para guardar', 'error'); return; }

  const cliente = state.clientes.find(c => c.id === ctx.clienteId);
  const formatoMap = { historias: 'Story', carrusel: 'Carrusel', reel: 'Reel' };
  const formatoIdea = formatoMap[ctx.formato];
  const propositoLabels = { inspirar: 'Inspirar', vender: 'Vender', educar: 'Educar', entretener: 'Entretener' };

  // Título: tomamos del primer hook/titular
  let titulo = '';
  if (ctx.formato === 'historias') titulo = piezas[0].texto_principal || 'Storytelling';
  else if (ctx.formato === 'carrusel') titulo = piezas[0].titular || 'Storytelling';
  else titulo = piezas[0].voz_en_off || piezas[0].texto_pantalla || 'Storytelling';
  if (titulo.length > 80) titulo = titulo.substring(0, 77) + '...';

  // Hook
  let hook = '';
  if (ctx.formato === 'historias') hook = piezas[0].texto_principal || '';
  else if (ctx.formato === 'carrusel') hook = piezas[0].titular || '';
  else hook = piezas[0].voz_en_off || '';

  // Notas con prefijo según formato
  let notas = '';
  if (ctx.formato === 'historias') {
    notas = 'HISTORIAS_SECUENCIA:' + JSON.stringify(piezas);
  } else if (ctx.formato === 'carrusel') {
    // Convertir formato carrusel-storytelling al formato slides estándar para reusar el visualizador
    const slides = piezas.map((p, i) => ({
      n: p.n || (i + 1),
      titulo: p.titular || '',
      texto: p.subtitulo || '',
      visual: p.visual_sugerido || '',
      copy_pie: p.copy_pie || '',
    }));
    notas = 'CARRUSEL_SLIDES:' + JSON.stringify(slides);
  } else if (ctx.formato === 'reel') {
    // Convertir al formato escenas estándar
    const escenas = piezas.map((p, i) => ({
      n: p.n || (i + 1),
      tiempo: p.tiempo || '',
      texto_pantalla: p.texto_pantalla || '',
      voz: p.voz_en_off || '',
      accion: p.accion_visual || '',
      tipo_plano: p.tipo_plano || '',
    }));
    notas = 'REEL_GUION:' + JSON.stringify(escenas);
  }

  const idea = {
    id: genId('idea'),
    cliente_id: ctx.clienteId,
    fecha_creada: todayISO(),
    titulo: titulo,
    pilar: '',
    formato: formatoIdea,

// Guía estratégica del embudo de conversión que se inyecta en el prompt
const GUIA_ANUNCIOS_META = `
ESTRATEGIA DE EMBUDO PARA ANUNCIOS META:

═══ TOFU (TOP OF FUNNEL) — AUDIENCIA FRÍA ═══
Objetivo: que TE CONOZCAN. La gente NO te conoce, NO está buscando lo que vendés todavía.
- Hook impactante: pregunta polémica, dato sorpresivo, imagen mental fuerte. PARÁ el scroll.
- NO vender directamente. Si vendés en frío, te ignoran.
- Foco en: educación, entretenimiento, conexión emocional, valor puro.
- Formato ideal: video de reel (alcance), historia con storytelling, carrusel educativo.
- CTA suave: "Más info", "Ver más", "Saber más" — todavía no "Comprar".
- Métricas a mirar: CTR (interés), VTR si es video, costo por reproducción.

═══ MOFU (MIDDLE OF FUNNEL) — AUDIENCIA TIBIA ═══
Objetivo: que CONFÍEN. Ya te conocen pero todavía no compran.
- Posicionamiento + autoridad. Mostrar que sabés de lo que hablás.
- Educar sobre el problema, no sobre el producto todavía.
- Testimonios suaves o de proceso ("Te muestro cómo").
- Casos de éxito reales (con detalles concretos).
- CTA medio: "Reservá una consulta", "Conocé el método", "Descargá esta guía".
- Audiencia: retargeting de quienes vieron 50%+ del video TOFU, visitaron web, interactuaron con perfil.

═══ BOFU (BOTTOM OF FUNNEL) — AUDIENCIA CALIENTE ═══
Objetivo: que COMPREN. Ya te conocen, ya confían. Hay que cerrar.
- Oferta clara, urgencia real (no inventada), prueba social fuerte.
- Testimonios contundentes con resultados concretos.
- Garantías, beneficios extra, bonos.
- CTA fuerte: "Comprá ahora", "Reservá tu lugar", "Aprovechá antes de que termine".
- Audiencia: retargeting de quienes visitaron checkout, agregaron al carrito, vieron páginas de venta.

PRINCIPIOS DE COPYWRITING PARA META:
1. PRIMER SEGUNDO crítico: el hook gana o pierde la batalla en 1-3 segundos.
2. ESPECIFICIDAD vence genérico: "ahorrá 30 minutos por día" > "ahorrá tiempo".
3. EMOCIÓN + LÓGICA: emoción engancha, lógica justifica la decisión.
4. OBJECIÓN + RESPUESTA: identificá la objeción principal y respondela en el copy.
5. PROOF (prueba social): números, testimonios, resultados, casos.
6. UN OBJETIVO POR ANUNCIO: no mezclar TOFU con BOFU, no pedir 2 cosas al mismo CTA.
7. ESCRIBIR PARA UNO, NO PARA MUCHOS: el copy debe sonar como un mensaje 1 a 1.

BENCHMARKS DE PERFORMANCE EN ARGENTINA (2024-2026, rangos amplios — varían por rubro y segmentación):
- CTR (Click Through Rate): TOFU 0.8-1.5% / MOFU 1.5-3% / BOFU 3-6%.
- CPM (costo por 1000 impresiones): rango ARS 1500-5000 según segmentación.
- CPL (costo por lead): muy variable, e-commerce ARS 800-2500, servicios ARS 2000-8000.
- VTR (Video Through Rate): TOFU 15-25% / MOFU 25-40%.
NO inventes números fuera de estos rangos. Si dudás, dejá rango "varía según segmentación".

VARIANTES PARA TESTING A/B:
Cada variante debe testear UNA hipótesis distinta:
- Variante 1: hook más emocional vs racional
- Variante 2: CTA directo vs CTA suave
- Variante 3: con testimonio vs sin testimonio
- O: video vs estático, copy corto vs largo, etc.
NUNCA hacer 3 variantes idénticas con cambios menores. Cada una testea algo distinto.
`;

function extraerVariantesAnuncioDelDOM() {
  const cards = document.querySelectorAll('.ad-variante');
  const variantes = [];
  cards.forEach((card, i) => {
    const v = { n: i + 1 };
    card.querySelectorAll('[data-field]').forEach(el => {
      v[el.dataset.field] = el.innerText.trim();
    });
    variantes.push(v);
  });
  return variantes;
}

async function guardarAnuncioMetaComoIdea() {
  const ctx = window._anuncioMetaCtx;
  if (!ctx) return;

  // Extraer variantes editadas del DOM y mantener todo el resto del JSON original
  const variantesEditadas = extraerVariantesAnuncioDelDOM();
  const dataFinal = { ...ctx.fullData };

  // Mergear las ediciones del usuario con la data original (mantener escenas, specs, métricas)
  dataFinal.variantes = ctx.fullData.variantes.map((vOriginal, i) => {
    const vEditada = variantesEditadas[i] || {};
    return { ...vOriginal, ...vEditada };
  });

  const cliente = state.clientes.find(c => c.id === ctx.clienteId);
  const faseLabels = { tofu: 'TOFU', mofu: 'MOFU', bofu: 'BOFU' };

  // Título: tomar el hook de la variante 1
  let titulo = (variantesEditadas[0] && variantesEditadas[0].hook) || 'Anuncio Meta';
  if (titulo.length > 80) titulo = titulo.substring(0, 77) + '...';

  const idea = {
    id: genId('idea'),
    cliente_id: ctx.clienteId,
    fecha_creada: todayISO(),
    titulo: `[${faseLabels[ctx.fase]}] ` + titulo,
    pilar: '',
    formato: 'Anuncio Meta',
    hook: (variantesEditadas[0] && variantesEditadas[0].hook) || '',
    idea: `Anuncio Meta · ${faseLabels[ctx.fase]} · ${dataFinal.variantes.length} variantes · ${ctx.ubicaciones.join(', ')}`,
    notas: 'ANUNCIO_META:' + JSON.stringify({ ...dataFinal, fase: ctx.fase, objetivo: ctx.objetivo, producto: ctx.producto, oferta: ctx.oferta, ubicaciones: ctx.ubicaciones }),
    estado: 'Idea',
    origen: 'IA',
  };

  try {
    await sheetAppend('Calendario', idea);
    closeModal();
    showToast(`✓ Anuncio (${dataFinal.variantes.length} variantes) guardado en el banco`, 'success');
    if (state.currentClienteId === ctx.clienteId && state.currentClienteTab === 'ideas') {
      renderTabIdeas();
    }

    showToast('Error guardando: ' + e.message, 'error');

}

async function cargarPilaresClienteLibre() {
  const clienteId = $('libre_cliente').value;
  const pilarSelect = $('libre_pilar');
  if (!pilarSelect) return;
  pilarSelect.innerHTML = '<option value="">—</option>';
  if (!clienteId) {
    // Si no hay cliente, limpiar referencias para evitar uso accidental
    window._libreClienteId = null;
    window._libreEstrategia = null;
    return;
  }
  try {
    // Cargar estrategias del cliente para extraer pilares
    const { data } = await sheetRead('Estrategias');
    const estrategiaActiva = data.find(e => e.cliente_id === clienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
    if (estrategiaActiva) {
      const pilares = parseJsonSafe(estrategiaActiva.pilares_json);
      pilares.forEach(p => {
        pilarSelect.innerHTML += `<option value="${esc(p.nombre)}">${esc(p.nombre)}</option>`;
      });
    }
    // Guardar el cliente_id y estrategia para usarlos al ejecutar
    window._libreClienteId = clienteId;
    window._libreEstrategia = estrategiaActiva || null;
  } catch (e) { console.warn('Error cargando pilares:', e); }
}

async function ejecutarGeneradorLibre(tipo) {
  if (!checkApiKey()) return;
  const clienteId = $('libre_cliente').value;
  const titulo = $('libre_titulo').value.trim();
  const pilar = $('libre_pilar').value;
  const hook = $('libre_hook').value.trim();
  const contexto = $('libre_contexto').value.trim();

  if (!clienteId) { showToast('Elegí un cliente', 'error'); return; }
  if (!titulo) { showToast('Poné un título o tema', 'error'); return; }

  // Setear estado para que los generadores funcionen bien
  state.currentClienteId = clienteId;

  // Cargar brief y estrategia del cliente si no están
  try {
    if (!state.briefs || state.briefs.length === 0) {
      const { data } = await sheetRead('Briefs');
      state.briefs = data;
    }
    if (!state.estrategias || !state.estrategias.some(e => e.cliente_id === clienteId)) {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data;
    }
  } catch (e) { showToast('Error cargando datos: ' + e.message, 'error'); return; }

  const estrategia = state.estrategias.find(e => e.cliente_id === clienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  // Mostrar modal de generación
  const titulos = {
    copy: { icon: '📝', title: 'Generando copy' },
    carrusel: { icon: '🎠', title: 'Generando carrusel' },
    reel: { icon: '🎬', title: 'Generando reel' },
  };
  const t = titulos[tipo];
  abrirModalGeneracion(t.title, t.icon, `Generando ${tipo} para "${titulo}"...`);

  // Disparar el generador correspondiente
  if (tipo === 'copy') {
    await generarCopyLibre({ clienteId, titulo, pilar, hook, contexto, estrategia });
  } else if (tipo === 'carrusel') {
    await generarCarruselLibre({ clienteId, titulo, pilar, hook, contexto, estrategia });
  } else if (tipo === 'reel') {
    await generarReelLibre({ clienteId, titulo, pilar, hook, contexto, estrategia });
  }
}

async function generarCarruselLibre({ clienteId, titulo, pilar, hook, contexto, estrategia }) {
  const tonoVoz = estrategia ? parseJsonSafe(estrategia.tono_voz_json) : {};
  const buyerPersonas = estrategia ? parseJsonSafe(estrategia.buyer_personas_json) : [];

  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores || '-'}; deseos: ${bp.deseos || '-'}`).join('\n')
    : '';
  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}\nEmojis: ${tonoVoz.emojis || ''}`
    : '';

  const systemPrompt = `Sos una diseñadora de contenido de Carrusel MKT, agencia argentina. Especialista en armar carruseles de Instagram que son leídos de principio a fin.

REGLAS DE CARRUSELES:
- Total: entre 5 y 8 slides.
- Slide 1 (portada): el HOOK visual. Texto corto, impacto fuerte.
- Slides intermedios: desarrollan el tema de forma progresiva. Cada slide aporta valor.
- Último slide: CTA claro.
- TEXTOS CORTOS Y LEGIBLES.
- Usá español rioplatense.
- Respetá el tono de voz del cliente.

FORMATO DE SALIDA: SOLO un JSON válido (sin markdown):
[
  { "numero": 1, "tipo": "Portada", "texto_principal": "...", "texto_secundario": "...", "visual": "..." },
  { "numero": 2, "tipo": "Desarrollo", "texto_principal": "...", "texto_secundario": "...", "visual": "..." },
  { "numero": "último", "tipo": "CTA", "texto_principal": "...", "texto_secundario": "...", "visual": "..." }
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === clienteId).nombre}

${buildBriefContext(clienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}${buyerContext}${tonoContext}

TEMA DEL CARRUSEL:
Título: ${titulo}
${pilar ? 'Pilar: ' + pilar : ''}
${hook ? 'Hook: ' + hook : ''}
${contexto ? 'Contexto/ángulo: ' + contexto : ''}

Generá la estructura del carrusel, slide por slide.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 3000 });
    const slides = extractJson(raw);
    if (!Array.isArray(slides) || slides.length === 0) throw new Error('No se pudo generar el carrusel');
    mostrarPreviewCarruselLibre(slides, { clienteId, titulo, pilar, hook, contexto });
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

REGLAS DE CARRUSELES:
- Total: entre 5 y 8 slides.
- Slide 1 (portada): el HOOK visual. Texto corto, impacto fuerte. Hace que paren el scroll y deslicen.
- Slides intermedios: desarrollan el tema de forma progresiva. Cada slide aporta valor. Conectadas narrativamente (cada una genera ganas de ver la siguiente).
- Último slide: CTA claro. Invitación a comentar, guardar, compartir, visitar perfil o link.
- TEXTOS CORTOS Y LEGIBLES: un carrusel se lee en segundos. Evitá párrafos largos. Ideas principales en grande, detalles en chico.

FORMATO DE SALIDA: SOLO un JSON válido (sin markdown):

    "texto_secundario": "...",
    "visual": "..."

${buildBriefContext(state.currentClienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}${buyerContext}${tonoContext}

TEMA DEL CARRUSEL:
Título: ${titulo}
${pilar ? 'Pilar: ' + pilar : ''}
${hook ? 'Hook: ' + hook : ''}
${copy ? 'Copy del pie: ' + copy : ''}
${notas ? '\n⚠️ NOTAS / GUIÓN / ÁNGULO ESPECÍFICO QUE DEBÉS RESPETAR (esto es lo que la marca quiere comunicar):\n' + notas : ''}
${cta ? 'CTA deseado: ' + cta : ''}

function extractCarruselFromDOM() {
  const cards = document.querySelectorAll('#carruselPreview [data-slide-idx]');
  const slides = [];
  cards.forEach((card, i) => {
    const slide = { numero: i + 1 };
    const tipoMatch = card.className.match(/slide-card (\w+)/);
    slide.tipo = tipoMatch ? (tipoMatch[1].charAt(0).toUpperCase() + tipoMatch[1].slice(1)) : 'Desarrollo';
    card.querySelectorAll('[data-field]').forEach(field => {
      const val = field.innerText.trim();
      if (val) slide[field.dataset.field] = val;
    });
    slides.push(slide);
  });
  return slides;
}

async function aceptarCarrusel() {
  const slides = extractCarruselFromDOM();
  const saved = window._postModalEditorData;

  // Marcar los slides que queremos mantener después de cerrar el modal de preview
  window._pendingCarruselSlides = JSON.stringify(slides);
  window._preservarPendings = true;

  // Volver al editor con los slides cargados
  closeModal();
  setTimeout(() => {
    openPostModal(saved.postId, saved.fecha_publicacion);
    setTimeout(() => {
      // Restaurar todos los campos del editor
      if ($('f_hora') && saved.hora) $('f_hora').value = saved.hora;
      if ($('f_red_social') && saved.red_social) $('f_red_social').value = saved.red_social;
      if ($('f_formato')) $('f_formato').value = 'Carrusel';

      if ($('f_copy') && saved.copy) $('f_copy').value = saved.copy;
      if ($('f_hashtags') && saved.hashtags) $('f_hashtags').value = saved.hashtags;
      if ($('f_cta') && saved.cta) $('f_cta').value = saved.cta;
      if ($('f_link_diseno') && saved.link_diseno) $('f_link_diseno').value = saved.link_diseno;
      if ($('f_link_multimedia') && saved.link_multimedia) $('f_link_multimedia').value = saved.link_multimedia;
          if ($('f_descripcion_visual') && saved.descripcion_visual) $('f_descripcion_visual').value = saved.descripcion_visual;
      if ($('f_estado') && saved.estado) $('f_estado').value = saved.estado;
      if ($('f_notas') && saved.notas) $('f_notas').value = saved.notas;
      // Los slides ya están guardados en window._pendingCarruselSlides desde antes de closeModal

function mostrarIndicadorCarrusel(cantidad) {
  const hashInput = $('f_hashtags');
  if (!hashInput) return;
  // Insertar un indicador visual arriba del hook
  const hookField = $('f_hook');
  if (!hookField) return;
  const existing = document.getElementById('carrusel_indicador');

    <button type="button" class="btn-ghost btn-sm" onclick="verCarruselGuardado()" style="font-size: 12px;">Ver slides</button>
  `;

}

  const json = window._pendingCarruselSlides;

  let slides;
  try {
    slides = JSON.parse(json);

    showToast('El carrusel guardado tiene un formato inválido', 'error');
    return;
  }
  if (!Array.isArray(slides) || slides.length === 0) {
    showToast('El carrusel está vacío', 'error');
    return;
  }

  const html = slides.map((s, i) => {
    const tipo = s.tipo || 'Desarrollo';

    return `
    <div class="slide-card ${tipoLower}">

      ${s.texto_secundario ? `<div class="slide-section"><span class="slide-section-label">Texto secundario (detalle)</span><div>${esc(s.texto_secundario)}</div></div>` : ''}
      ${s.visual ? `<div class="slide-section"><span class="slide-section-label">🎨 Visual sugerido</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(s.visual)}</div></div>` : ''}
    </div>`;
  }).join('');

  window._preservarPendings = true;
  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>🎠 Carrusel · ${slides.length} slides</h2>
      <button class="btn-ghost" onclick="volverAlPostModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size: 12px; color: var(--gris-text-soft); margin-bottom: 12px;">Vista de solo lectura. Para editar el carrusel, usá el botón "Regenerar" desde el editor de la publicación.</p>
      ${html}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="volverAlPostModal()">Volver a la publicación</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

    hashtags: $('f_hashtags').value,
    cta: $('f_cta').value,
    link_diseno: $('f_link_diseno').value,
    link_multimedia: $('f_link_multimedia').value,
    estado: $('f_estado').value,
    descripcion_visual: $('f_descripcion_visual') ? $('f_descripcion_visual').value : '',
    notas: $('f_notas').value,
    postId: window._postModalEditingId || null,
  };

  if (!state.estrategias || state.estrategias.length === 0 || !state.estrategias.some(e => e.cliente_id === state.currentClienteId)) {
    try {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data;
    } catch (e) {}
  }
  const estrategia = state.estrategias.find(e => e.cliente_id === state.currentClienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');

  abrirModalGeneracion('Generando guión de reel', '🎬', `Armando escenas para "${titulo || hook}"...`);

  const tonoVoz = estrategia ? parseJsonSafe(estrategia.tono_voz_json) : {};
  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\n\nTONO DE VOZ:\n${tonoVoz.tono || ''}\nPalabras SÍ: ${tonoVoz.si || ''}\nPalabras NO: ${tonoVoz.no || ''}`
    : '';

  const systemPrompt = `Sos una productora de reels de Carrusel MKT, agencia argentina. Especialista en reels que capturan la atención en los primeros 3 segundos.

REGLAS DE REELS:
- Duración total: entre 15 y 45 segundos. Recomendado: 20-30s.
- Escena 1 (0-3s): HOOK VISUAL que frena el scroll. Texto en pantalla grande + acción impactante. Nunca desperdiciar estos segundos.
- Escenas intermedias: desarrollan el tema con ritmo rápido. Cortes cada 2-4 segundos.
- Escena final: CTA + loop (termina de forma que invite a verlo de nuevo).
- TEXTO EN PANTALLA: corto, grande, legible. Los reels se miran sin sonido.
- VOZ EN OFF O AUDIO: sugerir tipo de audio (música trending, voz propia, audio viral, etc.).
- ACCIÓN: qué se ve, qué se filma, qué pasa.
- Usá español rioplatense.

FORMATO DE SALIDA: SOLO un JSON válido (sin markdown):

[
  {
    "tiempo": "0-3s",
    "texto_pantalla": "Texto que aparece en pantalla (corto, 5-8 palabras máx)",
    "voz_audio": "Lo que se dice o tipo de audio: 'Voz en off: ...' o 'Música trending tipo X' o 'Audio viral: ...'",
    "accion": "Qué pasa en cámara: qué se filma, movimientos, planos"
  },
  ...
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

${estrategia ? buildEstrategiaContext(estrategia) : ''}${tonoContext}

TEMA DEL REEL:
Título: ${titulo}
${pilar ? 'Pilar: ' + pilar : ''}
${hook ? 'Hook: ' + hook : ''}
${copy ? 'Contexto del copy: ' + copy : ''}
${notas ? '\n⚠️ NOTAS / GUIÓN / ÁNGULO ESPECÍFICO QUE DEBÉS RESPETAR (esto es lo que la marca quiere comunicar):\n' + notas : ''}
${cta ? 'CTA deseado: ' + cta : ''}

⚠️ MUY IMPORTANTE: si hay notas/guión específico arriba, ese es el ángulo central. NO inventes otra historia. NO inventes productos, servicios, momentos o detalles que no estén en las notas o en el brief del cliente. Si los datos son insuficientes, usá un tono más general antes que inventar.

Generá el guión completo, escena por escena.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2500 });
    const escenas = extractJson(raw);
    if (!Array.isArray(escenas) || escenas.length === 0) throw new Error('No se pudo generar el guión');
    mostrarPreviewReel(escenas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function extractReelFromDOM() {
  const cards = document.querySelectorAll('#reelPreview [data-escena-idx]');
  const escenas = [];
  cards.forEach(card => {
    const esc = {};
    card.querySelectorAll('[data-field]').forEach(field => {
      const val = field.innerText.trim();
      if (val) esc[field.dataset.field] = val;
    });
    escenas.push(esc);
  });
  return escenas;
}

async function abrirGeneradorCalendarioMensual() {
  if (!checkApiKey()) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => e.cliente_id === state.currentClienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
  if (!estrategiaActiva) {
    showToast('Necesitás una estrategia Principal activa para este cliente', 'error');
    return;
  }
  const pilares = parseJsonSafe(estrategiaActiva.pilares_json);
  if (pilares.length === 0) {
    showToast('La estrategia no tiene pilares. Generalos primero.', 'error');
    return;
  }

  const hoy = new Date();
  const proximoMes = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 1);
  const defaultMes = proximoMes.toISOString().substring(0, 7); // YYYY-MM

  // Detectar campañas activas
  const campanasActivas = state.estrategias.filter(e =>
    (e.estado || 'Activa') === 'Activa' && e.tipo === 'Campana'
  );

  const frecuenciaCliente = cliente.frecuencia_posts || '8';

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>📅 Generar calendario mensual</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="color: var(--gris-text-soft); font-size: 13px; margin-bottom: 16px;">
        La IA va a armar el calendario completo para ${esc(cliente.nombre)} respetando pilares, porcentajes y frecuencia.
      </p>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Mes a generar</label>
          <input type="month" class="form-input" id="mes_target" value="${defaultMes}">
        </div>
        <div>
          <label class="form-label">Cantidad de publicaciones</label>
          <select class="form-select" id="mes_cantidad">
            <option value="6" ${frecuenciaCliente === '6' ? 'selected' : ''}>6 posts</option>
            <option value="8" ${frecuenciaCliente === '8' ? 'selected' : ''}>8 posts</option>
            <option value="12" ${frecuenciaCliente === '12' ? 'selected' : ''}>12 posts</option>
            <option value="16">16 posts</option>
            <option value="20">20 posts</option>
          </select>
        </div>
      </div>

      ${campanasActivas.length > 0 ? `
        <div class="form-row">
          <label class="form-label">Campañas activas detectadas</label>
          <div style="padding: 10px 12px; background: var(--crema); border-radius: 6px; font-size: 12.5px;">
            ${campanasActivas.map(c => `
              <label style="display: block; padding: 4px 0; cursor: pointer;">
                <input type="checkbox" checked data-campana-id="${esc(c.id)}"> <strong>${esc(c.nombre)}</strong> (${formatDateEs(c.fecha_inicio)}${c.fecha_fin ? ' → ' + formatDateEs(c.fecha_fin) : ''})
              </label>
            `).join('')}
            <div style="font-size: 11px; color: var(--gris-text-muted); margin-top: 4px;">
              Destildá las que no querés considerar en este calendario.
            </div>
          </div>
        </div>
      ` : ''}

async function ejecutarGeneradorCalendarioMensual(estrategiaId) {
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  const mesTarget = $('mes_target').value; // YYYY-MM
  const cantidad = parseInt($('mes_cantidad').value);
  const eventos = $('mes_eventos').value.trim();
  const temas = $('mes_temas').value.trim();
  const distribFormatos = $('mes_formatos').value;

  // Campañas seleccionadas
  const campanasSeleccionadas = [];
  document.querySelectorAll('[data-campana-id]').forEach(cb => {
    if (cb.checked) {
      const camp = state.estrategias.find(e => e.id === cb.dataset.campanaId);
      if (camp) campanasSeleccionadas.push(camp);
    }
  });

  // Días permitidos
  const diasPermitidos = Array.from(document.querySelectorAll('[data-dia]'))
    .filter(cb => cb.checked)
    .map(cb => parseInt(cb.dataset.dia));

  if (diasPermitidos.length === 0) {
    showToast('Tildá al menos un día de publicación', 'error');
    return;
  }

  // Construir lista de fechas válidas del mes
  const [anio, mes] = mesTarget.split('-').map(Number);
  const diasDelMes = new Date(anio, mes, 0).getDate();
  const fechasValidas = [];
  for (let d = 1; d <= diasDelMes; d++) {
    const fecha = new Date(anio, mes - 1, d);
    const diaSemana = fecha.getDay() === 0 ? 7 : fecha.getDay(); // Dom=7, Lun=1
    if (diasPermitidos.includes(diaSemana)) {
      fechasValidas.push(fecha.toISOString().split('T')[0]);
    }
  }

  if (fechasValidas.length < cantidad) {
    showToast(`No hay suficientes días disponibles (${fechasValidas.length}) para ${cantidad} posts. Sumá más días.`, 'error');
    return;
  }

  abrirModalGeneracion(
    'Generando calendario',
    '📅',
    `Armando ${cantidad} publicaciones para ${mesTarget}...`
  );

  const buyerPersonas = parseJsonSafe(estrategia.buyer_personas_json);
  const pilares = parseJsonSafe(estrategia.pilares_json);
  const tonoVoz = parseJsonSafe(estrategia.tono_voz_json);

  const pilaresContext = pilares.map(p =>
    `- "${p.nombre}" (${p.porcentaje || 0}%): ${p.descripcion || ''}`
  ).join('\n');

  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}`).join('\n')
    : '';

  const tonoContext = (tonoVoz && Object.keys(tonoVoz).length > 0)
    ? `\nTono: ${tonoVoz.tono || ''}`
    : '';

  const formatoContext = distribFormatos === 'balanceado'
    ? 'Mezclá: 40% carruseles, 35% reels, 15% posts, 10% stories (aproximado).'
    : distribFormatos === 'reels_carruseles'
    ? 'Priorizá: 50% reels, 40% carruseles, 10% posts.'
    : 'Variá mucho: incluí todos los formatos (post, carrusel, reel, story, video).';

  const campanasContext = campanasSeleccionadas.length > 0
    ? '\n\nCAMPAÑAS ACTIVAS EN EL MES (deben aparecer en el calendario):\n' +
      campanasSeleccionadas.map(c => `- "${c.nombre}" (${c.fecha_inicio} a ${c.fecha_fin}): ${c.objetivo_principal || ''}`).join('\n')
    : '';

  const eventosContext = eventos ? `\n\nEVENTOS ESPECIALES Y FECHAS RELEVANTES DEL MES:\n${eventos}` : '';
  const temasContext = temas ? `\n\nTEMAS ESPECÍFICOS A TRATAR ESTE MES:\n${temas}` : '';

  const systemPrompt = `Sos una estratega de contenido de Carrusel MKT. Armás calendarios editoriales mensuales completos para clientes.

REGLAS DEL CALENDARIO MENSUAL:
- Distribuir las publicaciones a lo largo del mes (no amontonar al principio).
- Respetar RIGUROSAMENTE los porcentajes de los pilares. Si un pilar es 40%, debe tener 40% de los posts.
- Si hay campañas activas, DEBE haber posts que las impulsen cerca de sus fechas.
- Si hay eventos especiales (Día de la Madre, feriados, lanzamientos), DEBE haber posts que los aprovechen.
- Asignar fechas elegidas de la lista de fechas permitidas que te paso.
- Variar formatos según la distribución pedida.
- Cada post debe ser DIFERENTE a los otros (distintos temas, ángulos).
- Crear una narrativa mensual: el calendario debe tener coherencia global, no ser posts sueltos.
${formatoContext}

==========================================================
📚 GUÍA ESTRATÉGICA SOBRE HISTORIAS DE INSTAGRAM
(aplicar SIEMPRE que en el calendario haya formato "Story" o "Historia")
==========================================================
${GUIA_ESTRATEGIA_HISTORIAS}

REGLAS ADICIONALES PARA HISTORIAS EN EL CALENDARIO:
- Si hay historias planificadas, equilibrá entre CONEXIÓN y VENTA. Como referencia, una proporción saludable es ~60% conexión / ~30% venta / ~10% educativas.
- Por cada historia de venta, asegurate que haya al menos una de conexión cercana (mismo día o el día anterior).
- Si proponés historias de venta, indicá CUÁL FÓRMULA usar (PAS / BBB / SOS) en el campo "idea".
- Indicá en el campo "idea" si la historia es CONEXIÓN, VENTA o EDUCATIVA (escribilo explícito al inicio, ej: "Tipo: CONEXIÓN — ...").
- Adaptá los ejemplos al rubro real del cliente: si es servicios profesionales, usá "paciente/cliente"; si es producto físico, usá "compradora"; si es educación/cursos, usá "alumna"; etc.
- Mantené el principio: la conexión construye, la venta usa esa confianza.

FORMATO DE SALIDA: SOLO un JSON válido (sin markdown):

[
  {
    "fecha": "YYYY-MM-DD (una de las fechas permitidas)",
    "pilar": "Nombre exacto del pilar",
    "formato": "Post | Carrusel | Reel | Story | Video",
    "titulo": "Título corto interno",
    "hook": "Primera línea del post",
    "idea": "Desarrollo breve: 2-3 líneas sobre qué va este post, qué ángulo, qué mensaje"
  }
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

ESTRATEGIA ACTIVA: ${estrategia.nombre}
Momento: ${estrategia.momento_fase || ''}
Objetivo: ${estrategia.objetivo_principal}
${estrategia.momento_descripcion ? 'Contexto: ' + estrategia.momento_descripcion : ''}

PILARES DE CONTENIDO (con porcentajes obligatorios):
${pilaresContext}${buyerContext}${tonoContext}${campanasContext}${eventosContext}${temasContext}

MES: ${mesTarget}
CANTIDAD: ${cantidad} publicaciones
FECHAS PERMITIDAS para asignar (elegí entre estas):
${fechasValidas.join(', ')}

Generá EXACTAMENTE ${cantidad} publicaciones distribuidas en el mes, respetando los pilares, las campañas y los eventos.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 5000 });
    const posts = extractJson(raw);
    if (!Array.isArray(posts) || posts.length === 0) throw new Error('No se pudo generar el calendario');
    // Ordenar por fecha
    posts.sort((a, b) => (a.fecha || '').localeCompare(b.fecha || ''));
    mostrarPreviewCalendarioMensual(posts, mesTarget);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function mostrarPreviewCalendarioMensual(posts, mes) {
  const itemsHtml = posts.map((p, i) => `
    <div class="mes-generado-item" data-post-idx="${i}">
      <input type="checkbox" checked data-post-check="${i}">
      <div class="mes-generado-fecha">${p.fecha ? formatDateEs(p.fecha) : '?'}</div>
      <div style="flex: 1;">
        <div style="font-weight: 600; font-size: 13.5px; margin-bottom: 4px;">${esc(p.titulo || 'Publicación ' + (i+1))}</div>
        <div style="display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap;">
          ${p.pilar ? `<span class="idea-chip pilar">🪶 ${esc(p.pilar)}</span>` : ''}
          ${p.formato ? `<span class="idea-chip formato">${esc(p.formato)}</span>` : ''}
        </div>
        ${p.hook ? `<div style="font-size: 12.5px; font-style: italic; color: var(--fucsia); margin-bottom: 4px;">"${esc(p.hook)}"</div>` : ''}
        ${p.idea ? `<div style="font-size: 12.5px; color: var(--gris-text-soft);">${esc(p.idea)}</div>` : ''}
      </div>
    </div>
  `).join('');

  // Stats
  const pilares = {};
  const formatos = {};
  posts.forEach(p => {
    if (p.pilar) pilares[p.pilar] = (pilares[p.pilar] || 0) + 1;
    if (p.formato) formatos[p.formato] = (formatos[p.formato] || 0) + 1;
  });
  const pilaresStat = Object.entries(pilares).map(([k, v]) => `${k}: ${v}`).join(' · ');
  const formatosStat = Object.entries(formatos).map(([k, v]) => `${k}: ${v}`).join(' · ');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header">📅 ${posts.length} publicaciones generadas para ${mes}</div>
      <div style="padding: 12px; background: #fff; border-radius: 6px; margin-bottom: 10px; font-size: 12px;">
        <div><strong>Pilares:</strong> ${pilaresStat}</div>
        <div style="margin-top: 2px;"><strong>Formatos:</strong> ${formatosStat}</div>
      </div>
      <div class="editable-hint">
        💡 Destildá las publicaciones que no querés crear. Después de guardar, podés editar cada una individualmente desde el calendario.
      </div>
      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button class="btn btn-secondary btn-sm" onclick="togglePostsMensual(true)">Seleccionar todas</button>
        <button class="btn btn-secondary btn-sm" onclick="togglePostsMensual(false)">Ninguna</button>
      </div>
      <div style="max-height: 450px; overflow-y: auto;">${itemsHtml}</div>
    </div>
  `;
  window._pendingPostsMensual = posts;

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-primary" onclick="aceptarPostsMensual()">✓ Crear publicaciones seleccionadas</button>
  `;
}

function togglePostsMensual(value) {
  document.querySelectorAll('[data-post-check]').forEach(cb => { cb.checked = value; });
}

async function aceptarPostsMensual() {
  const posts = window._pendingPostsMensual;
  const checked = Array.from(document.querySelectorAll('[data-post-check]'))
    .filter(cb => cb.checked)
    .map(cb => parseInt(cb.dataset.postCheck));
  const seleccionados = checked.map(i => posts[i]);

  if (seleccionados.length === 0) {
    showToast('No seleccionaste ninguna publicación', 'error');
    return;
  }

  showAutosave('saving', `Creando ${seleccionados.length} publicaciones...`);

  try {
    for (const p of seleccionados) {
      await sheetAppend('Calendario', {
        id: genId('pub'),
        cliente_id: state.currentClienteId,
        fecha_publicacion: p.fecha || '',
        red_social: 'Instagram',
        formato: p.formato || 'Post',
        pilar: p.pilar || '',
        titulo: p.titulo || '',
        hook: p.hook || '',
        copy: p.idea || '',
        estado: 'Idea',
      });
    }
    showAutosave('saved', `${seleccionados.length} publicaciones creadas`);
    closeModal();
    showToast(`${seleccionados.length} publicaciones agregadas al calendario`, 'success');
    // Si estamos en la solapa Calendario del cliente, refrescar
    if (state.currentClienteTab === 'calendario') {
      renderTabCalendario();
    } else {
      // Llevar al cliente y abrir calendario
      state.currentClienteTab = 'calendario';
      renderClienteDetalle();
    }
  } catch (e) {
    showAutosave('error', 'Error');
    showToast('Error: ' + e.message, 'error');
  }
}

let serviciosFilter = 'activos'; // 'activos', 'inactivos', 'todos'

async function renderServicios() {

function renderServiciosList() {
  let servicios = [...state.servicios];

  // Filtro
  if (serviciosFilter === 'activos') servicios = servicios.filter(s => (s.activo || 'Sí') === 'Sí');
  else if (serviciosFilter === 'inactivos') servicios = servicios.filter(s => s.activo === 'No');

  // Ordenar por precio descendente
  servicios.sort((a, b) => (Number(b.precio_ars) || 0) - (Number(a.precio_ars) || 0));

  const activos = state.servicios.filter(s => (s.activo || 'Sí') === 'Sí').length;
  const inactivos = state.servicios.filter(s => s.activo === 'No').length;

  const contenido = servicios.length === 0 ? `
    <div class="empty-state">
      <p>${state.servicios.length === 0 ? 'Todavía no creaste ningún servicio.' : 'No hay servicios con este filtro.'}</p>
      ${state.servicios.length === 0 ? `
        <p style="font-size: 12.5px; margin-top: 8px;">
          Empezá creando los paquetes básicos que ofrecés. Ejemplo: "Gestión mensual completa", "Branding inicial", "Asesoría por hora".
        </p>
        <button class="btn btn-primary" onclick="openServicioModal()" style="margin-top: 16px;">+ Crear primer servicio</button>
      ` : ''}
    </div>
  ` : `
    <div class="servicios-grid">
      ${servicios.map(s => renderServicioCard(s)).join('')}
    </div>
  `;

  $('serviciosContent').innerHTML = `
    <div style="display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;">
      <button class="idea-filter ${serviciosFilter === 'activos' ? 'active' : ''}" onclick="setServiciosFilter('activos')">Activos (${activos})</button>
      <button class="idea-filter ${serviciosFilter === 'inactivos' ? 'active' : ''}" onclick="setServiciosFilter('inactivos')">Inactivos (${inactivos})</button>
      <button class="idea-filter ${serviciosFilter === 'todos' ? 'active' : ''}" onclick="setServiciosFilter('todos')">Todos (${state.servicios.length})</button>
    </div>
    ${contenido}
  `;
}

function setServiciosFilter(val) {
  serviciosFilter = val;
  renderServiciosList();
}

function renderServicioCard(s) {
  const activo = (s.activo || 'Sí') === 'Sí';
  const incluye = parseIncluye(s.incluye);
  const clientesConEsteServicio = state.clientes.filter(c => c.servicio_contratado === s.nombre).length;

  const precioArs = s.precio_ars ? `$${formatMiles(s.precio_ars)}` : 'A convenir';
  const precioUsd = s.precio_usd ? ` · USD ${formatMiles(s.precio_usd)}` : '';

  return `
    <div class="servicio-card ${activo ? '' : 'inactivo'}">
      <div class="servicio-card-header">
        <div class="servicio-nombre">${esc(s.nombre || '(sin nombre)')}</div>
        ${!activo ? '<span class="badge" style="background: var(--gris-bg); color: var(--gris-text-muted);">Inactivo</span>' : ''}
      </div>
      ${s.duracion ? `<span class="servicio-duracion">⏱ ${esc(s.duracion)}</span>` : ''}
      ${s.descripcion ? `<div class="servicio-descripcion">${esc(s.descripcion)}</div>` : ''}
      <div class="servicio-precio">${esc(precioArs)} <span class="servicio-precio-usd">ARS${precioUsd}</span></div>
      ${incluye.length > 0 ? `
        <ul class="servicio-incluye">
          ${incluye.map(i => `<li>${esc(i)}</li>`).join('')}
        </ul>
      ` : ''}
      ${clientesConEsteServicio > 0 ? `<div class="servicio-stat">👥 ${clientesConEsteServicio} cliente${clientesConEsteServicio > 1 ? 's' : ''} con este servicio</div>` : ''}
      <div class="servicio-actions">
        <button class="btn btn-secondary btn-sm" onclick="openServicioModal('${esc(s.id)}')">✏️ Editar</button>
        <button class="btn-ghost btn-sm" onclick="duplicarServicio('${esc(s.id)}')" title="Crear uno nuevo basado en este">📋 Duplicar</button>
        <button class="btn-ghost btn-sm" onclick="toggleActivoServicio('${esc(s.id)}')">${activo ? '⏸ Desactivar' : '▶ Reactivar'}</button>
        ${clientesConEsteServicio === 0 ? `<button class="btn-ghost btn-danger btn-sm" onclick="confirmDeleteServicio('${esc(s.id)}', '${esc((s.nombre || '').replace(/'/g, "\\'"))}')">🗑</button>` : ''}
      </div>
    </div>
  `;
}

function formatMiles(n) {
  const num = Number(n);
  if (isNaN(num)) return String(n);
  return num.toLocaleString('es-AR');
}

function parseIncluye(str) {
  if (!str) return [];
  // Separadores: saltos de línea o "|"
  return String(str).split(/\n|\|/).map(s => s.trim()).filter(s => s);
}

function recolectarIncluye() {
  const inputs = document.querySelectorAll('#incluyeContainer input[type="text"]');

    if (val) items.push(val);

}

async function saveServicio(id) {
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

  const data = {
    nombre,
    descripcion: $('f_descripcion').value.trim(),
    duracion: $('f_duracion').value,
    precio_ars: $('f_precio_ars').value.trim(),
    precio_usd: $('f_precio_usd').value.trim(),
    incluye: recolectarIncluye(),
    activo: $('f_activo').value,
    notas: $('f_notas').value.trim(),
  };

  try {
    if (id) {
      await sheetUpdate('Servicios', id, data);
      showToast('Servicio actualizado', 'success');
    } else {
      data.id = genId('serv');
      data.fecha_creacion = todayISO();
      await sheetAppend('Servicios', data);
      showToast('Servicio creado', 'success');
    }
    closeModal();
    renderServicios();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}
