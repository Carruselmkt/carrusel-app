async function ejecutarGeneradorReporte() {
  const clienteId = $('f_cliente_rep').value;
  const mes = Number($('f_mes_rep').value);
  const anio = Number($('f_anio_rep').value);
  if (!clienteId) { showToast('Elegí un cliente', 'error'); return; }

  const cliente = state.clientes.find(c => c.id === clienteId);

  // Cargar datos necesarios
  try {
    if (!state.metricas || state.metricas.length === 0) {
      const { data } = await sheetRead('Metricas');
      state.metricas = data;
    }
    if (!state.calendario || state.calendario.length === 0) {
      const { data } = await sheetRead('Calendario');
      state.calendario = data;
    }
    if (!state.estrategias || state.estrategias.length === 0) {
      const { data } = await sheetRead('Estrategias');
      state.estrategias = data;
    }
    if (!state.briefs || state.briefs.length === 0) {
      const { data } = await sheetRead('Briefs');
      state.briefs = data;
    }
  } catch (e) { showToast('Error cargando datos: ' + e.message, 'error'); return; }

  const nombresMeses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  // Buscar métricas del mes: cualquier registro cuyo período caiga dentro del mes
  const mesInicio = new Date(anio, mes - 1, 1);
  const mesFin = new Date(anio, mes, 0); // último día
  const metricasDelMes = state.metricas.filter(m => {
    if (m.cliente_id !== clienteId) return false;
    if (!m.fecha_desde || !m.fecha_hasta) return false;
    const d = new Date(m.fecha_desde + 'T00:00:00');
    const h = new Date(m.fecha_hasta + 'T00:00:00');
    // Si el período se solapa con el mes
    return (h >= mesInicio && d <= mesFin);
  });

  // Si no hay métricas del mes, el reporte avisa
  const sumMet = (campo) => metricasDelMes.reduce((s, m) => s + (Number(m[campo]) || 0), 0);
  const maxMet = (campo) => {
    // Para seguidores_fin tomar el más reciente
    if (metricasDelMes.length === 0) return 0;
    return Number(metricasDelMes.sort((a, b) => (b.fecha_hasta || '').localeCompare(a.fecha_hasta || ''))[0][campo]) || 0;
  };

  // Consolidar todos los tipos de contenido únicos publicados en el período
  const tiposUnicos = new Set();
  metricasDelMes.forEach(m => {
    (parseJsonSafe(m.tipos_contenido) || []).forEach(t => tiposUnicos.add(t));
  });
  const tiposArr = Array.from(tiposUnicos);

  // Consolidar período total (primer inicio al último fin)
  let periodoDesde = null, periodoHasta = null, diasTotal = 0;
  if (metricasDelMes.length > 0) {
    const desdes = metricasDelMes.map(m => m.fecha_desde).filter(x => x).sort();
    const hastas = metricasDelMes.map(m => m.fecha_hasta).filter(x => x).sort();
    periodoDesde = desdes[0];
    periodoHasta = hastas[hastas.length - 1];
    if (periodoDesde && periodoHasta) {
      diasTotal = Math.round((new Date(periodoHasta + 'T00:00:00') - new Date(periodoDesde + 'T00:00:00')) / (1000 * 60 * 60 * 24)) + 1;
    }
  }

  // Métricas mes anterior (simples, para comparar)
  const mesAntInicio = new Date(anio, mes - 2, 1);
  const mesAntFin = new Date(anio, mes - 1, 0);
  const metricasAnt = state.metricas.filter(m => {
    if (m.cliente_id !== clienteId) return false;
    if (!m.fecha_hasta) return false;
    const h = new Date(m.fecha_hasta + 'T00:00:00');
    return (h >= mesAntInicio && h <= mesAntFin);
  });
  const sumMetAnt = (campo) => metricasAnt.reduce((s, m) => s + (Number(m[campo]) || 0), 0);

  // Posts del mes
  const postsMes = state.calendario.filter(p => {
    if (p.cliente_id !== clienteId) return false;
    if (!p.fecha_publicacion) return false;
    const f = new Date(p.fecha_publicacion + 'T00:00:00');
    return f.getMonth() + 1 === mes && f.getFullYear() === anio;
  });

  const estrategia = state.estrategias.find(e => e.cliente_id === clienteId && e.tipo === 'Principal' && (e.estado || 'Activa') === 'Activa');
  const kpis = estrategia ? normalizarKpis(parseJsonSafe(estrategia.kpis_sugeridos_json)) : [];

  abrirModalGeneracion('Generando reporte', '📄', `Analizando ${cliente.nombre} · ${nombresMeses[mes-1]} ${anio}...`);

  // Contexto KPIs con cumplimiento
  const valorActual = (metricaAsociada) => {
    if (metricaAsociada === 'seguidores_fin') return maxMet('seguidores_fin');
    return sumMet(metricaAsociada);
  };

  const kpisContexto = kpis.length > 0 ? `
KPIs DEFINIDOS EN LA ESTRATEGIA (estos son la prioridad del reporte):
${kpis.map(k => {
  const actual = k.metrica_asociada && k.metrica_asociada !== 'otro' ? valorActual(k.metrica_asociada) : 'n/d';
  const metaNum = Number(k.meta);
  let cumplimiento = '';
  if (!isNaN(metaNum) && metaNum > 0 && typeof actual === 'number') {
    const pct = Math.round((actual / metaNum) * 100);
    cumplimiento = pct >= 100 ? `✅ CUMPLIDO (${pct}%)` : `⚠️ Por debajo (${pct}%)`;
  }
  return `- [${k.prioridad || 'media'}] ${k.nombre} | Meta: ${k.meta || 'sin meta'} ${k.unidad || ''} | Actual: ${actual} | ${cumplimiento}`;
}).join('\n')}
` : 'KPIs: no definidos en la estrategia';

  const tiposLabel = tiposArr.length > 0
    ? tiposArr.map(t => (TIPOS_CONTENIDO.find(x => x.v === t) || {}).l || t).join(', ')
    : 'no especificado';

  const metricasContexto = metricasDelMes.length > 0 ? `
MÉTRICAS CARGADAS (${metricasDelMes.length} registros de período):
- Período total cubierto: ${periodoDesde} → ${periodoHasta} (${diasTotal} días)
- Tipos de contenido publicados: ${tiposLabel}
- Visualizaciones: ${sumMet('visualizaciones')}
- Cuentas alcanzadas: ${sumMet('cuentas_alcanzadas')}
- Interacciones: ${sumMet('interacciones')}
- Seguidores al final del período: ${maxMet('seguidores_fin')}
- Empezaron a seguir: ${sumMet('empezaron_seguir')}
- Dejaron de seguir: ${sumMet('dejaron_seguir')}
- Me gusta: ${sumMet('me_gusta')}
- Respuestas: ${sumMet('respuestas')}
- Veces compartido: ${sumMet('veces_compartido')}
- Guardados: ${sumMet('guardados')}
- Visitas al perfil: ${sumMet('visitas_perfil')}
- Toques en enlace externo: ${sumMet('toques_enlace_externo')}
- Toques en dirección: ${sumMet('toques_direccion')}
${metricasDelMes.map(m => m.notas).filter(n => n).map(n => '- Nota: ' + n).join('\n')}
` : 'MÉTRICAS: no se cargaron métricas de este período';

  const metricasComparadas = metricasAnt.length > 0 ? `
COMPARACIÓN CON MES ANTERIOR (${nombresMeses[(mes - 2 + 12) % 12]}):
- Visualizaciones: ${sumMetAnt('visualizaciones')} → ${sumMet('visualizaciones')}
- Cuentas alcanzadas: ${sumMetAnt('cuentas_alcanzadas')} → ${sumMet('cuentas_alcanzadas')}
- Interacciones: ${sumMetAnt('interacciones')} → ${sumMet('interacciones')}
- Empezaron a seguir: ${sumMetAnt('empezaron_seguir')} → ${sumMet('empezaron_seguir')}
` : '';

  const postsContexto = postsMes.length > 0 ? `
PUBLICACIONES DEL MES (${postsMes.length} en total):
${postsMes.slice(0, 25).map(p => `- [${p.formato || 'post'}] ${p.titulo || p.hook || 'Sin título'} ${p.pilar ? '(' + p.pilar + ')' : ''}`).join('\n')}
` : 'PUBLICACIONES DEL MES: ninguna registrada en el calendario';

  const estrategiaContexto = estrategia ? `
ESTRATEGIA ACTIVA:
- Objetivo: ${estrategia.objetivo_principal || 'n/d'}
- Fase: ${estrategia.momento_fase || 'n/d'}
${estrategia.metricas_meta ? '- Métricas meta (texto libre): ' + estrategia.metricas_meta : ''}
` : '';

  // CONSIDERACIONES ESPECIALES (importantes para el prompt)
  const consideracionesEspeciales = [];
  if (tiposArr.length === 1 && tiposArr[0] === 'historias') {
    consideracionesEspeciales.push('⚠️ En este período SOLO se publicaron HISTORIAS. Esto significa que: (a) NO se espera crecimiento fuerte de seguidores (las historias no son descubribles como los reels), (b) la métrica clave es la RETENCIÓN y las RESPUESTAS, no el alcance orgánico, (c) no corresponde criticar falta de seguidores nuevos.');
  }
  if (tiposArr.length === 0) {
    consideracionesEspeciales.push('⚠️ No se especificó tipo de contenido publicado. Adaptá el análisis a las métricas disponibles sin suponer qué se publicó.');
  }
  if (diasTotal > 0 && diasTotal < 7) {
    consideracionesEspeciales.push(`⚠️ El período analizado es MUY CORTO (${diasTotal} días). Las comparaciones mensuales o proyecciones no aplican. Hablá de lo que se leyó en estos días específicos, sin extrapolar.`);
  } else if (diasTotal >= 7 && diasTotal < 20) {
    consideracionesEspeciales.push(`⚠️ El período analizado es parcial (${diasTotal} días). Si comparás con mes anterior completo, aclará el sesgo.`);
  }
  if (metricasDelMes.length === 0) {
    consideracionesEspeciales.push('⚠️ NO hay métricas cargadas para este mes. Generá un reporte corto basado SOLO en las publicaciones del calendario y la estrategia. Dejá claro al cliente que se necesitan métricas para un análisis numérico.');
  }
  if (kpis.length === 0) {
    consideracionesEspeciales.push('⚠️ No hay KPIs definidos en la estrategia. El reporte se basa solo en métricas generales sin referencia a metas.');
  }

  const systemPrompt = `Sos una analista de marketing digital de Carrusel MKT, agencia argentina de Mendoza. Escribís reportes mensuales profesionales para clientes, con tono cálido, real y profesional (sin exageraciones ni jerga corporativa).

PRINCIPIOS CLAVE:
1. Los KPIs de la estrategia son LA PRIORIDAD. Si están definidos, el reporte debe centrarse en ellos: qué se cumplió, qué no, y por qué.
2. Sé honesta: si algo bajó o no se logró, decilo sin rodeos pero con empatía.
3. Adaptá el análisis al CONTEXTO REAL del período (duración, tipo de contenido, limitaciones).
4. Español rioplatense (vos, ustedes). Tono conversacional pero profesional.
5. ⚠️ CRÍTICO — NO INVENTES: usá EXCLUSIVAMENTE los datos que te paso en el contexto. NO inventes:
   - Metas numéricas que no estén en los KPIs definidos
   - Nombres de personas (dueño/a, responsable) que no estén en el brief
   - Títulos de publicaciones futuras que no estén en el calendario
   - Benchmarks de industria o comparaciones con otras marcas
   - Porcentajes "esperados" que no estén explícitamente definidos como meta
   - Datos de meses anteriores si no te los pasé
   Si necesitás un dato que no tenés, decí "no hay datos disponibles" o "sin información de referencia" en lugar de inventarlo.
6. Para los KPIs: usá SOLO los KPIs de la lista que te paso, con las metas exactas que te indico. Si un KPI no tiene meta definida, no le inventes una. Si la métrica_asociada es "otro", decí que requiere medición manual.

ESTRUCTURA DEL REPORTE (markdown):

# Reporte de ${nombresMeses[mes-1]} ${anio}
## ${cliente.nombre}

## 📈 Resumen ejecutivo
[2-3 oraciones. Qué pasó en el período, principal logro o hallazgo, próximo paso crítico.]

${kpis.length > 0 ? `## 🎯 Cumplimiento de KPIs
[Para CADA KPI definido, decir explícitamente: nombre, meta, valor actual, y si se cumplió o no. Usar ✅ cumplido / ⚠️ por debajo / 🎯 en proceso. Explicar el PORQUÉ con una frase.]
` : ''}
## 📊 Métricas del período
[Repaso breve de las métricas generales. Comparar con mes anterior SI hay datos completos. Explicar variaciones importantes.]

## 🔍 Análisis y aprendizajes
[Qué funcionó, qué patrones aparecieron, qué pilar/formato rindió mejor. Basado en lo que se publicó y las métricas reales.]

## 🚀 Recomendaciones
[3 a 5 acciones concretas y realistas para el próximo período. Alineadas con los KPIs pendientes.]

REGLAS FIRMES:
- Si no tenés datos para una sección, decilo ("En este período no tuvimos métricas suficientes para evaluar X") en vez de inventar.
- Nunca exageres ("¡impresionante crecimiento!" si apenas creció 2 seguidores).
- NO inventes benchmarks de industria ni porcentajes "esperables". Solo mencioná los números que te pasé.
- NO inventes títulos de publicaciones que no estén en la lista del calendario. Si querés sugerir contenido nuevo, usá lenguaje como "sugiero publicar contenido sobre X" sin ponerle título específico.
- NO inventes nombres de personas. Si no te paso nombre del responsable, usá "el cliente" o el nombre de la marca.
- Devolvés SOLO el markdown del reporte, sin preámbulo, sin cierre tipo "espero que te sirva".`;

  const userPrompt = `Generá el reporte mensual para:

CLIENTE: ${cliente.nombre}
RUBRO: ${cliente.rubro || 'n/d'}
MES DEL REPORTE: ${nombresMeses[mes-1]} ${anio}

${estrategiaContexto}
${kpisContexto}
${metricasContexto}
${metricasComparadas}
${postsContexto}

${consideracionesEspeciales.length > 0 ? 'CONSIDERACIONES ESPECIALES PARA ESTE REPORTE:\n' + consideracionesEspeciales.map(c => '- ' + c).join('\n') : ''}

Generá el reporte completo siguiendo la estructura, centrándote en el cumplimiento de los KPIs definidos.`;

  try {
    const contenidoMd = await callClaude(systemPrompt, userPrompt, { maxTokens: 3000 });
    if (!contenidoMd || contenidoMd.trim().length < 50) throw new Error('La IA no devolvió un reporte válido');

    const existente = state.reportes.find(r => r.cliente_id === clienteId && Number(r.mes) === mes && Number(r.anio) === anio);
    if (existente) {
      // Hay un reporte previo del mismo mes: preguntar al usuario qué hacer
      closeModal();
      mostrarDialogoVersionado(clienteId, mes, anio, contenidoMd, existente);
      return;
    } else {
      await sheetAppend('Reportes', {
        id: genId('rep'),
        cliente_id: clienteId,
        mes,
        anio,
        contenido_md: contenidoMd,
        fecha_generacion: todayISO(),
        estado: 'Generado',
      });
      showToast('Reporte generado', 'success');
    }
    closeModal();
    renderReportes();
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

// Cuando ya existe un reporte del mismo cliente+mes+año, preguntar al usuario
function mostrarDialogoVersionado(clienteId, mes, anio, contenidoNuevo, existente) {
  const cliente = state.clientes.find(c => c.id === clienteId);
  const nombresMeses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const periodo = `${nombresMeses[mes - 1]} ${anio}`;

  // Guardamos el contenido nuevo en una variable temporal accesible desde los onclick
  state._reporteVersionPendiente = { clienteId, mes, anio, contenidoNuevo, existenteId: existente.id };

  $('modal').className = 'modal';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>📋 Ya existe un reporte de ${esc(periodo)}</h2>
      <button class="btn-ghost" onclick="cancelarVersionado()">✕</button>
    </div>
    <div class="modal-body">
      <p style="color: var(--gris-text-soft); font-size: 13.5px; line-height: 1.6;">
        Generaste un nuevo reporte para <strong>${esc(cliente ? cliente.nombre : '')}</strong> · ${esc(periodo)}, pero ya tenés uno guardado de ese mes (generado el ${esc(formatDateEs(existente.fecha_generacion))}).
      </p>
      <p style="color: var(--gris-text-soft); font-size: 13.5px; margin-top: 12px;">
        ¿Qué querés hacer?
      </p>
      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 16px;">
        <button class="btn btn-secondary" onclick="aplicarVersionado('reemplazar')" style="text-align: left; padding: 12px 14px; height: auto;">
          <strong style="display: block; margin-bottom: 2px;">🔁 Reemplazar el anterior</strong>
          <span style="font-size: 12px; color: var(--gris-text-soft); font-weight: 400;">El reporte viejo se pierde y queda solo el nuevo.</span>
        </button>
        <button class="btn btn-primary" onclick="aplicarVersionado('nueva')" style="text-align: left; padding: 12px 14px; height: auto;">
          <strong style="display: block; margin-bottom: 2px;">📑 Guardar como versión nueva</strong>
          <span style="font-size: 12px; color: rgba(255,255,255,0.85); font-weight: 400;">Se guardan los dos. Vas a poder compararlos en el historial.</span>
        </button>
        <button class="btn-ghost" onclick="cancelarVersionado()" style="margin-top: 4px;">Cancelar (descartar el reporte nuevo)</button>
      </div>
    </div>`;
  $('modalOverlay').classList.add('active');
}

function cancelarVersionado() {
  state._reporteVersionPendiente = null;
  closeModal();
}

async function aplicarVersionado(modo) {
  const pend = state._reporteVersionPendiente;
  if (!pend) { closeModal(); return; }
  state._reporteVersionPendiente = null;

  try {
    if (modo === 'reemplazar') {
      await sheetUpdate('Reportes', pend.existenteId, {
        contenido_md: pend.contenidoNuevo,
        fecha_generacion: todayISO(),
        estado: 'Generado',
      });
      showToast('Reporte reemplazado', 'success');
    } else {
      // nueva versión: append con mismo cliente+mes+anio
      await sheetAppend('Reportes', {
        id: genId('rep'),
        cliente_id: pend.clienteId,
        mes: pend.mes,
        anio: pend.anio,
        contenido_md: pend.contenidoNuevo,
        fecha_generacion: todayISO(),
        estado: 'Generado',
      });
      showToast('Versión nueva guardada', 'success');
    }
    closeModal();
    renderReportes();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function editarReporte(id) {
  const r = state.reportes.find(x => x.id === id);
  if (!r) return;
  const cliente = state.clientes.find(c => c.id === r.cliente_id);
  const nombresMeses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>✏️ Editar reporte: ${esc(cliente ? cliente.nombre : '?')} · ${nombresMeses[Number(r.mes) - 1]} ${r.anio}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size: 12.5px; color: var(--gris-text-soft); margin-bottom: 10px;">
        El reporte está en markdown. Usá # para títulos grandes, ## para secundarios, **texto** para negritas, - para listas.
      </p>
      <textarea class="form-textarea" id="f_reporte_md" style="min-height: 500px; font-family: 'Courier New', monospace; font-size: 13px;">${esc(r.contenido_md || '')}</textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveReporte('${esc(id)}')">Guardar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

async function saveReporte(id) {
  const contenido_md = $('f_reporte_md').value.trim();
  if (!contenido_md) { showToast('El contenido no puede estar vacío', 'error'); return; }
  try {
    await sheetUpdate('Reportes', id, { contenido_md, estado: 'Editado' });
    showToast('Reporte guardado', 'success');
    closeModal();
    renderReportes();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function copiarReporte(id) {
  const r = state.reportes.find(x => x.id === id);
  if (!r) return;
  const texto = r.contenido_md || '';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(texto).then(() => {
      showToast('Reporte copiado al portapapeles', 'success');
    });
  }
}

        <div>Generado el ${esc(formatDateEs(r.fecha_generacion))}</div>
      </div>
    </div>
  `;
  document.body.appendChild(container);

  const nombreArchivo = `Reporte ${cliente ? cliente.nombre.replace(/\s+/g, '_') : 'cliente'} - ${periodo.replace(' ', '_')}.pdf`;

  const opciones = {
    margin: 0,
    filename: nombreArchivo,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      logging: false,
      backgroundColor: '#ffffff',
      windowWidth: container.offsetWidth,
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] },
  };

  // Damos un tick para que el DOM termine de renderizar + cargar fuentes
  setTimeout(() => {
    html2pdf().set(opciones).from(container).save().then(() => {
      if (document.body.contains(container)) document.body.removeChild(container);
      if (document.body.contains(overlay)) document.body.removeChild(overlay);
      showToast('PDF descargado ✓', 'success');
    }).catch(err => {
      if (document.body.contains(container)) document.body.removeChild(container);
      if (document.body.contains(overlay)) document.body.removeChild(overlay);
      showToast('Error generando PDF: ' + err.message + '. Probá con "Vista imprimible".', 'error');
    });
  }, 300);
}

// MIGRACIÓN: Unificar Ideas y Calendario en una sola tabla
// ============================================================================
async function ejecutarMigracionIdeasCalendario() {
  const result = $('migracionResult');

  // Confirmación primero
  if (!confirm('¿Confirmás ejecutar la migración? Es seguro pero se recomienda hacer una copia de respaldo de la planilla antes.\n\nEsta acción:\n• Mueve todas las ideas a la hoja Calendario\n• Elimina las filas duplicadas (ideas que ya estaban agendadas)\n• Vacía la hoja Ideas\n\nNo se puede deshacer desde la app.')) return;

  result.innerHTML = '<div class="loading"><div class="spinner"></div>Migrando...</div>';

  try {
    // 1. Leer ambas tablas
    const [ideasRes, calRes] = await Promise.all([
      sheetRead('Ideas'),
      sheetRead('Calendario'),
    ]);
    const ideas = ideasRes.data;
    const publicaciones = calRes.data;

    // 2. Crear set de idea_id que ya están en calendario (estos son los duplicados)
    const idsAgendados = new Set(
      publicaciones.filter(p => p.idea_id).map(p => p.idea_id)
    );

    // 3. Filtrar ideas que NO están agendadas (las que sí están las descartamos porque ya viven en calendario)
    const ideasParaMigrar = ideas.filter(i => !idsAgendados.has(i.id));

    let migradas = 0;
    let descartadas = ideas.length - ideasParaMigrar.length;
    const errores = [];

    // 4. Migrar las no agendadas a Calendario con estado 'Idea' y sin fecha
    for (const idea of ideasParaMigrar) {
      try {
        const nuevaFila = {
          id: idea.id, // mantengo el mismo ID para no romper referencias
          cliente_id: idea.cliente_id || '',
          fecha_publicacion: '', // sin fecha = es solo idea
          hora: '',
          red_social: '',
          formato: idea.formato || 'Post',
          pilar: idea.pilar || '',
          titulo: idea.titulo || '',
          hook: idea.hook || '',
          copy: idea.copy || '',
          hashtags: idea.hashtags || '',
          cta: idea.cta || '',
          estado: 'Idea',
          descripcion_visual: '',
          notas: idea.notas || '',
          idea_text: idea.idea || '', // por si tenían descripción larga separada
          fecha_creada: idea.fecha_creada || todayISO(),
          origen: idea.origen || 'Migración',
        };

        // Si la idea tenía un tipo especial guardado en notas (carrusel/reel/etc), preservarlo
        if (idea.notas && typeof idea.notas === 'string') {
          if (idea.notas.startsWith('CARRUSEL_SLIDES:')) {
            nuevaFila.carrusel_slides = idea.notas.substring('CARRUSEL_SLIDES:'.length);
          } else if (idea.notas.startsWith('REEL_GUION:')) {
            nuevaFila.reel_guion = idea.notas.substring('REEL_GUION:'.length);
          } else if (idea.notas.startsWith('HISTORIAS_SECUENCIA:')) {
            nuevaFila.historias_secuencia = idea.notas.substring('HISTORIAS_SECUENCIA:'.length);
          } else if (idea.notas.startsWith('ANUNCIO_META:')) {
            nuevaFila.anuncio_meta = idea.notas.substring('ANUNCIO_META:'.length);
          }
        }

        await sheetAppend('Calendario', nuevaFila);
        migradas++;
      } catch (e) {
        errores.push(`${idea.titulo || idea.id}: ${e.message}`);
      }
    }

    // 5. Eliminar TODAS las filas de la hoja Ideas (las migradas + las duplicadas)
    let eliminadas = 0;
    for (const idea of ideas) {
      try {
        await sheetDelete('Calendario', idea.id);
        eliminadas++;
      } catch (e) {
        errores.push(`No se pudo eliminar ${idea.titulo || idea.id}: ${e.message}`);
      }
    }

    // 6. Reportar resultado
    result.innerHTML = `
      <div style="padding: 14px; background: ${errores.length === 0 ? '#e6f4ef' : '#fff4e0'}; border-radius: 8px; border: 1px solid ${errores.length === 0 ? 'var(--verde)' : 'var(--amarillo)'};">
        <strong style="color: ${errores.length === 0 ? 'var(--verde)' : '#8a6a20'};">
          ${errores.length === 0 ? '✓ Migración completada' : '⚠ Migración con avisos'}
        </strong>
        <div style="font-size: 13px; margin-top: 8px; line-height: 1.7;">
          • ${migradas} ideas movidas a Calendario (con estado "Idea")<br>
          • ${descartadas} ideas descartadas por estar duplicadas en Calendario<br>
          • ${eliminadas} filas eliminadas de la hoja Ideas
        </div>
        ${errores.length > 0 ? `
          <details style="margin-top: 10px;">
            <summary style="cursor: pointer; font-size: 12.5px;">Ver ${errores.length} avisos</summary>
            <div style="margin-top: 6px; font-size: 12px; color: var(--gris-text-soft); max-height: 150px; overflow-y: auto; padding: 8px; background: #fff; border-radius: 4px;">
              ${errores.map(e => `<div>• ${esc(e)}</div>`).join('')}
            </div>
          </details>
        ` : ''}
        <div style="font-size: 12px; color: var(--gris-text-soft); margin-top: 10px;">
          Recargá la página (Ctrl+F5) para ver todo unificado.
        </div>
      </div>
    `;
  } catch (e) {
    result.innerHTML = `<div style="padding: 12px; background: #fef2f2; border-radius: 6px; color: var(--rojo);">Error: ${esc(e.message)}</div>`;
  }
}

// ============================================================================
// EVENTS
// ============================================================================
document.addEventListener('DOMContentLoaded', () => {
  $('loginBtn').addEventListener('click', handleLogin);
  $('logoutBtn').addEventListener('click', handleLogout);
  document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.page));
  });
  $('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
});

function waitForGoogle() {
  if (typeof google !== 'undefined' && typeof gapi !== 'undefined') {
    initGapi();
    initGoogleAuth();
  } else { setTimeout(waitForGoogle, 100); }
}
waitForGoogle();
</script>
</body>
</html>
