const ETAPAS_PROSPECTO = [
  { id: 'Primer contacto', icon: '📥', color: '#176b87' },
  { id: 'En conversación', icon: '💬', color: '#0f6b8e' },
  { id: 'Brief pre-contratación', icon: '📋', color: '#2e7a9e' },
  { id: 'Propuesta enviada', icon: '💰', color: '#c06a3d' },
  { id: 'Esperando decisión', icon: '⏳', color: '#8a6a20' },
  { id: 'Ganado', icon: '✅', color: '#1e7a5e' },
  { id: 'Perdido', icon: '❌', color: '#a83a3a' },
];

const CANALES_CONTACTO = ['WhatsApp', 'Instagram', 'Email', 'Teléfono', 'Referido', 'Web', 'Evento', 'Otro'];
const MOTIVOS_PERDIDO = [
  'Presupuesto no alcanza',
  'Timing no es el adecuado',
  'Eligió otra agencia',
  'No necesitaba lo que ofrezco',
  'Dejó de responder',
  'Decidió hacerlo internamente',
  'Otro',
];

async function renderProspectos() {
  const main = $('mainContent');
  main.innerHTML = `
    <div class="page-header">
      <div class="page-title-area">
        <h1 class="page-title">Prospectos</h1>
        <div class="page-subtitle">Pipeline de potenciales clientes. Arrastrá las tarjetas entre columnas para cambiar de etapa.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" onclick="openProspectoModal()">+ Nuevo prospecto</button>
      </div>
    </div>
    <div id="prospectosContent"><div class="loading"><div class="spinner"></div>Cargando prospectos...</div></div>
  `;

  try {
    const [prospRes, servRes, clientesRes] = await Promise.all([
      sheetRead('Prospectos'),
      sheetRead('Servicios'),
      sheetRead('Clientes'),
    ]);
    state.prospectos = prospRes.data;
    state.servicios = servRes.data;
    state.clientes = clientesRes.data;

    // Migración silenciosa: si hay prospectos con estado viejo "Brief enviado",
    // los actualizamos a "Brief pre-contratación" en la planilla
    const paraMigrar = state.prospectos.filter(p => p.estado === 'Brief enviado');
    if (paraMigrar.length > 0) {
      for (const p of paraMigrar) {
        try {
          await sheetUpdate('Prospectos', p.id, { estado: 'Brief pre-contratación' });
          p.estado = 'Brief pre-contratación';
        } catch (e) { console.warn('Error migrando prospecto:', e); }
      }
    }

    renderProspectosKanban();
  } catch (e) {
    $('prospectosContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

function renderProspectosKanban() {
  const prospectos = state.prospectos;

  // Agrupar por etapa
  const porEtapa = {};
  ETAPAS_PROSPECTO.forEach(e => { porEtapa[e.id] = []; });
  prospectos.forEach(p => {
    const estado = p.estado || 'Primer contacto';
    if (porEtapa[estado]) porEtapa[estado].push(p);
    else porEtapa['Primer contacto'].push(p);
  });

  // Stats
  const activos = prospectos.filter(p => !['Ganado', 'Perdido'].includes(p.estado)).length;
  const ganados = prospectos.filter(p => p.estado === 'Ganado').length;
  const perdidos = prospectos.filter(p => p.estado === 'Perdido').length;
  const cerrados = ganados + perdidos;
  const tasaConversion = cerrados > 0 ? Math.round((ganados / cerrados) * 100) : 0;

  // Alertas de inactividad (solo prospectos activos)
  const hoy = new Date();
  const sinActividad7 = prospectos.filter(p => {
    if (['Ganado', 'Perdido'].includes(p.estado)) return false;
    const ult = p.fecha_ultimo_contacto || p.fecha_primer_contacto || p.fecha_creacion;
    if (!ult) return false;
    const dias = diasDesde(ult, hoy);
    return dias >= 7;
  }).length;

  const statsHtml = `
    <div class="prospectos-stats">
      <div class="stat-card">
        <div class="stat-card-label">Activos</div>
        <div class="stat-card-value">${activos}</div>
        <div class="stat-card-sub">prospectos en proceso</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Ganados</div>
        <div class="stat-card-value" style="color: var(--verde);">${ganados}</div>
        <div class="stat-card-sub">convertidos en clientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">Tasa de conversión</div>
        <div class="stat-card-value">${tasaConversion}%</div>
        <div class="stat-card-sub">${ganados} de ${cerrados} cerrados</div>
      </div>
      ${sinActividad7 > 0 ? `
        <div class="stat-card alerta">
          <div class="stat-card-label">⚠️ Sin actividad +7 días</div>
          <div class="stat-card-value">${sinActividad7}</div>
          <div class="stat-card-sub">requieren seguimiento</div>
        </div>
      ` : ''}
    </div>
  `;

  // Kanban
  const kanbanHtml = `
    <div class="kanban-container">
      ${ETAPAS_PROSPECTO.map(etapa => `
        <div class="kanban-column"
             data-etapa="${esc(etapa.id)}"
             ondragover="onKanbanDragOver(event)"
             ondragleave="onKanbanDragLeave(event)"
             ondrop="onKanbanDrop(event, '${esc(etapa.id)}')">
          <div class="kanban-column-header">
            <div class="kanban-column-title">
              <span>${etapa.icon}</span>
              <span>${esc(etapa.id)}</span>
            </div>
            <div class="kanban-column-count">${porEtapa[etapa.id].length}</div>
          </div>
          <div class="kanban-cards">
            ${porEtapa[etapa.id].map(p => renderProspectoCard(p)).join('')}
          </div>
          <button class="kanban-add-btn" onclick="openProspectoModal(null, '${esc(etapa.id)}')">+ Agregar en ${esc(etapa.id)}</button>
        </div>
      `).join('')}
    </div>
  `;

  const empty = prospectos.length === 0 ? `
    <div class="empty-state">
      <p>Todavía no cargaste ningún prospecto.</p>
      <p style="font-size: 12.5px; margin-top: 8px;">Los prospectos son potenciales clientes que todavía no firmaron. A medida que avanzás con cada uno, arrastrás la tarjeta entre columnas para ver en qué etapa están.</p>
      <button class="btn btn-primary" onclick="openProspectoModal()" style="margin-top: 16px;">+ Cargar primer prospecto</button>
    </div>
  ` : '';

  $('prospectosContent').innerHTML = prospectos.length > 0 ? statsHtml + kanbanHtml : empty;
}

function diasDesde(fechaStr, ahora) {
  try {
    const d = new Date(fechaStr);
    const diff = ahora - d;
    return Math.floor(diff / (1000 * 60 * 60 * 24));
  } catch { return 0; }
}

function renderProspectoCard(p) {
  const ultimaFecha = p.fecha_ultimo_contacto || p.fecha_primer_contacto || p.fecha_creacion;
  const dias = ultimaFecha ? diasDesde(ultimaFecha, new Date()) : 0;
  const estadoActivo = !['Ganado', 'Perdido'].includes(p.estado);

  let alertaClase = '';
  let alertaHtml = '';
  if (estadoActivo && dias >= 14) {
    alertaClase = 'alerta-14';
    alertaHtml = `<div class="prospecto-alerta-dias danger">🔴 ${dias} días sin actividad</div>`;
  } else if (estadoActivo && dias >= 7) {
    alertaClase = 'alerta-7';
    alertaHtml = `<div class="prospecto-alerta-dias warn">🟡 ${dias} días sin actividad</div>`;
  }

  const presupuestoChip = p.presupuesto_ars
    ? `<span class="prospecto-chip presupuesto">$${formatMiles(p.presupuesto_ars)}</span>`
    : '';
  const canalChip = p.canal_contacto
    ? `<span class="prospecto-chip canal">${esc(p.canal_contacto)}</span>`
    : '';
  const servicioChip = p.servicio_interes
    ? `<span class="prospecto-chip">💼 ${esc(truncar(p.servicio_interes, 24))}</span>`
    : '';

  return `
    <div class="prospecto-card ${alertaClase}"
         draggable="true"
         data-prospecto-id="${esc(p.id)}"
         ondragstart="onProspectoDragStart(event, '${esc(p.id)}')"
         ondragend="onProspectoDragEnd(event)"
         onclick="openProspectoModal('${esc(p.id)}')">
      <div class="prospecto-card-nombre">${esc(p.nombre || '(sin nombre)')}</div>
      ${p.rubro ? `<div class="prospecto-card-rubro">${esc(p.rubro)}</div>` : ''}
      <div class="prospecto-card-chips">
        ${canalChip}
        ${presupuestoChip}
        ${servicioChip}
      </div>
      ${p.proximo_paso ? `<div class="prospecto-proximo-paso">→ ${esc(truncar(p.proximo_paso, 60))}</div>` : ''}
      ${alertaHtml}
    </div>
  `;
}

function truncar(s, max) {
  if (!s) return '';
  s = String(s);
  return s.length > max ? s.substring(0, max - 1) + '…' : s;
}

// ============================================================================
// DRAG & DROP
// ============================================================================
function onProspectoDragStart(e, prospectoId) {
  e.dataTransfer.setData('text/plain', prospectoId);
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
  // Evitar que el click abra el modal al soltar
  window._dragEnCurso = true;
}

function onProspectoDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over'));
  // Permitir clicks de nuevo después de un tick
  setTimeout(() => { window._dragEnCurso = false; }, 100);
}

function onKanbanDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onKanbanDragLeave(e) {
  // Solo quitar la clase si realmente salió de la columna (no si entró a un hijo)
  if (e.currentTarget.contains(e.relatedTarget)) return;
  e.currentTarget.classList.remove('drag-over');
}

async function onKanbanDrop(e, nuevaEtapa) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const prospectoId = e.dataTransfer.getData('text/plain');
  if (!prospectoId) return;

  const prospecto = state.prospectos.find(p => p.id === prospectoId);
  if (!prospecto) return;
  if (prospecto.estado === nuevaEtapa) return;

  // Casos especiales
  if (nuevaEtapa === 'Ganado') {
    preguntarConvertirACliente(prospectoId);
    return;
  }
  if (nuevaEtapa === 'Perdido') {
    preguntarMotivoPerdido(prospectoId);
    return;
  }

  // Cambio normal de etapa
  try {
    await sheetUpdate('Prospectos', prospectoId, {
      estado: nuevaEtapa,
      fecha_ultimo_contacto: todayISO(),
    });
    prospecto.estado = nuevaEtapa;
    prospecto.fecha_ultimo_contacto = todayISO();
    showToast(`Movido a "${nuevaEtapa}"`, 'success');
    renderProspectosKanban();
  } catch (err) { showToast('Error: ' + err.message, 'error'); }
}

async function saveProspecto(id) {
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

  const data = {
    nombre,
    rubro: $('f_rubro').value.trim(),
    canal_contacto: $('f_canal_contacto').value,
    contacto: $('f_contacto').value.trim(),
    origen: $('f_origen').value.trim(),
    necesidad: $('f_necesidad').value.trim(),
    presupuesto_ars: $('f_presupuesto_ars').value.trim(),
    servicio_interes: $('f_servicio_interes').value,
    estado: $('f_estado').value,
    fecha_primer_contacto: $('f_fecha_primer_contacto').value,
    fecha_ultimo_contacto: $('f_fecha_ultimo_contacto').value,
    proximo_paso: $('f_proximo_paso').value.trim(),
  };
  if ($('f_motivo_perdido')) data.motivo_perdido = $('f_motivo_perdido').value.trim();

  try {
    if (id) {
      await sheetUpdate('Prospectos', id, data);
      showToast('Prospecto actualizado', 'success');
    } else {
      data.id = genId('prosp');
      data.fecha_creacion = todayISO();
      data.historial = JSON.stringify([]);
      await sheetAppend('Prospectos', data);
      showToast('Prospecto creado', 'success');
    }
    closeModal();
    renderProspectos();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function agregarNotaHistorial(prospectoId) {
  const texto = $('f_nueva_nota').value.trim();
  if (!texto) { showToast('Escribí la nota', 'error'); return; }

  const prospecto = state.prospectos.find(p => p.id === prospectoId);
  if (!prospecto) return;

  const historial = parseJsonSafe(prospecto.historial) || [];
  const nueva = {
    fecha: todayISO(),
    hora: new Date().toTimeString().substring(0, 5),
    texto,
  };
  historial.push(nueva);

  try {
    await sheetUpdate('Prospectos', prospectoId, {
      historial: JSON.stringify(historial),
      fecha_ultimo_contacto: todayISO(),
    });
    prospecto.historial = JSON.stringify(historial);
    prospecto.fecha_ultimo_contacto = todayISO();
    showToast('Nota agregada', 'success');
    // Reabrir el modal con el historial actualizado
    openProspectoModal(prospectoId);
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function soloMarcarGanado(prospectoId) {
  try {
    await sheetUpdate('Prospectos', prospectoId, {
      estado: 'Ganado',
      fecha_ultimo_contacto: todayISO(),
    });
    const p = state.prospectos.find(x => x.id === prospectoId);

    closeModal();
    showToast('Marcado como Ganado', 'success');
    renderProspectosKanban();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function convertirAProspectoACliente(prospectoId) {
  const prospecto = state.prospectos.find(p => p.id === prospectoId);
  if (!prospecto) return;

  closeModal();

  // Abrir modal de nuevo cliente con datos pre-cargados
  await openClienteModal(null);

  // Pre-cargar los campos con los datos del prospecto
  setTimeout(() => {
    if ($('f_nombre')) $('f_nombre').value = prospecto.nombre || '';
    if ($('f_rubro')) $('f_rubro').value = prospecto.rubro || '';
    if ($('f_canal_comunicacion')) $('f_canal_comunicacion').value = prospecto.canal_contacto || '';
    if ($('f_notas')) {
      $('f_notas').value = `Convertido desde prospecto. ${prospecto.origen ? 'Origen: ' + prospecto.origen + '. ' : ''}${prospecto.necesidad ? 'Necesidad inicial: ' + prospecto.necesidad : ''}`;
    }
    // Seleccionar el servicio si existe
    const servicioSelect = $('f_servicio_select');
    if (servicioSelect && prospecto.servicio_interes) {
      // Buscar la opción que coincida
      const options = Array.from(servicioSelect.options);
      const match = options.find(o => o.value === prospecto.servicio_interes);
      if (match) {
        servicioSelect.value = prospecto.servicio_interes;
      } else {
        // No está en el catálogo, usar custom
        servicioSelect.value = '__custom__';
        toggleServicioCustom();
        setTimeout(() => {
          if ($('f_servicio_custom')) $('f_servicio_custom').value = prospecto.servicio_interes;
        }, 60);
      }
    }

    // Guardar el prospectoId para vincular después
    window._prospectoAConvertir = prospectoId;

    // Reemplazar el botón de guardar para que también marque el prospecto como ganado
    const footer = $('modal').querySelector('.modal-footer');
    if (footer) {
      footer.innerHTML = `
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveClienteYConvertir()">✨ Crear cliente y cerrar prospecto</button>
      `;
    }

    // Info banner arriba
    const body = $('modal').querySelector('.modal-body');
    if (body) {
      const banner = document.createElement('div');
      banner.style.cssText = 'padding: 10px 14px; background: #f6faf8; border: 1px solid var(--verde); border-radius: 6px; margin-bottom: 14px; font-size: 12.5px; color: #1a6447;';
      banner.innerHTML = `✅ <strong>Convirtiendo prospecto en cliente.</strong> Los datos se pre-cargaron desde el prospecto. Ajustá lo que falte y guardá.`;
      body.insertBefore(banner, body.firstChild);
    }
  }, 200);
}

async function saveClienteYConvertir() {
  const prospectoId = window._prospectoAConvertir;
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

  // Leer servicio desde select o custom
  let servicioContratado = '';
  const servicioSelect = $('f_servicio_select');
  if (servicioSelect) {
    servicioContratado = servicioSelect.value === '__custom__'
      ? ($('f_servicio_custom') ? $('f_servicio_custom').value.trim() : '')
      : servicioSelect.value;
  } else if ($('f_servicio_contratado')) {
    servicioContratado = $('f_servicio_contratado').value.trim();
  }

  const data = {
    id: genId('cli'),
    nombre,
    tipo_cliente: $('f_tipo_cliente').value,
    rubro: $('f_rubro').value.trim(),
    estado: $('f_estado').value,
    servicio_contratado: servicioContratado,
    frecuencia_posts: $('f_frecuencia_posts').value,
    fecha_inicio_servicio: $('f_fecha_inicio_servicio').value,
    canal_comunicacion: $('f_canal_comunicacion').value.trim(),
    rondas_revision: $('f_rondas_revision').value,
    notas: $('f_notas').value.trim(),
    fecha_alta: todayISO(),
  };

  try {
    await sheetAppend('Clientes', data);
    // Marcar el prospecto como Ganado con vínculo al cliente
    await sheetUpdate('Prospectos', prospectoId, {
      estado: 'Ganado',
      fecha_ultimo_contacto: todayISO(),
      cliente_id_convertido: data.id,
    });
    window._prospectoAConvertir = null;
    closeModal();
    showToast('Cliente creado y prospecto cerrado 🎉', 'success');
    // Volver al módulo de prospectos
    navigateTo('prospectos');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function renderTabOnboarding() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando onboarding...</div>`;

  try {
    // Cargar onboardings y plantillas
    const [onbRes, plantRes] = await Promise.all([
      sheetRead('Onboarding'),
      sheetRead('Plantillas_Onboarding'),
    ]);
    state.onboardings = onbRes.data;
    state.plantillasOnboarding = plantRes.data;

    // Si no hay plantillas en la planilla, cargamos las iniciales
    if (state.plantillasOnboarding.length === 0) {
      for (const p of PLANTILLAS_INICIALES) {
        await sheetAppend('Plantillas_Onboarding', {
          id: p.id,
          nombre: p.nombre,
          contenido: p.contenido,
          variables_disponibles: p.variables,
          activa: 'Sí',
          orden: String(p.orden),
        });
      }
      // Recargar
      const { data } = await sheetRead('Plantillas_Onboarding');
      state.plantillasOnboarding = data;
    } else {
      // Agregar plantillas nuevas que no estén en la planilla (migración suave)
      const idsExistentes = state.plantillasOnboarding.map(p => p.id);
      const faltantes = PLANTILLAS_INICIALES.filter(p => !idsExistentes.includes(p.id));
      if (faltantes.length > 0) {
        for (const p of faltantes) {
          await sheetAppend('Plantillas_Onboarding', {
            id: p.id,
            nombre: p.nombre,
            contenido: p.contenido,
            variables_disponibles: p.variables,
            activa: 'Sí',
            orden: String(p.orden),
          });
        }
        const { data } = await sheetRead('Plantillas_Onboarding');
        state.plantillasOnboarding = data;
      }
    }

    // Buscar onboarding de este cliente
    let onboarding = state.onboardings.find(o => o.cliente_id === cliente.id);

    // Migración suave: si el cliente tiene onboarding viejo de 9 pasos base sin modificar,
    // insertar los 3 pasos nuevos (material, producción, revisión) en las posiciones correctas.
    // Solo migra si detecta la estructura original exacta (no si el usuario editó los pasos).
    if (onboarding) {
      const pasosActuales = parseJsonSafe(onboarding.pasos_json) || [];
      if (pasosActuales.length === 9) {
        // Verificar si son los 9 originales buscando el emoji del paso final
        const ultimoPaso = pasosActuales[pasosActuales.length - 1];
        const octavoPaso = pasosActuales[7];
        if (ultimoPaso && ultimoPaso.emoji === '🚀' && octavoPaso && octavoPaso.emoji === '📊') {
          // Es la estructura vieja: insertamos los 3 nuevos pasos entre el 8 (calendario) y el 9 (primer post)
          const nuevosPasos = [
            { id: 'paso_8_mat', emoji: '📸', texto: 'Recibir material visual del cliente (fotos, videos, logos)', plantilla: 'solicitud_material', accion: null, completado: false, fecha_completado: '', fecha_limite: '', notas: '' },
            { id: 'paso_9_prod', emoji: '🎨', texto: 'Producir contenido del primer mes', plantilla: null, accion: 'calendario', completado: false, fecha_completado: '', fecha_limite: '', notas: '' },
            { id: 'paso_10_rev', emoji: '👀', texto: 'Presentar y revisar contenido con el cliente', plantilla: 'presentar_contenido', accion: 'calendario', completado: false, fecha_completado: '', fecha_limite: '', notas: '' },
          ];
          // Insertamos en posición 8 (después de "Presentar calendario")
          const pasosMigrados = [...pasosActuales.slice(0, 8), ...nuevosPasos, ...pasosActuales.slice(8)];
          onboarding.pasos_json = JSON.stringify(pasosMigrados);
          try {
            await sheetUpdate('Onboarding', onboarding.id, { pasos_json: onboarding.pasos_json });
          } catch (e) { console.warn('No se pudo migrar el onboarding:', e); }
        }
      }
    }

    // Si no tiene, crear uno nuevo con los pasos base
    if (!onboarding) {
      const pasosIniciales = PASOS_ONBOARDING_BASE.map((p, i) => ({
        id: 'paso_' + i,
        emoji: p.emoji,
        texto: p.texto,
        plantilla: p.plantilla,
        accion: p.accion,
        completado: false,
        fecha_completado: '',
        fecha_limite: '',
        notas: '',
      }));

      onboarding = {
        id: genId('onb'),
        cliente_id: cliente.id,
        pasos_json: JSON.stringify(pasosIniciales),
        fecha_creacion: todayISO(),
      };
      await sheetAppend('Onboarding', onboarding);
      state.onboardings.push(onboarding);
    }

    renderOnboardingUI(onboarding);
  } catch (e) {
    $('tabContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

  const completados = pasos.filter(p => p.completado).length;
  const total = pasos.length;
  const porcentaje = total > 0 ? Math.round((completados / total) * 100) : 0;
  const onboardingCompleto = porcentaje === 100;

  const itemsHtml = pasos.map((paso, idx) => renderOnboardingPaso(paso, idx, onboarding.id)).join('');

  $('tabContent').innerHTML = `
    <div class="onboarding-header">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; flex-wrap: wrap;">
        <div>
          <h3 style="margin: 0 0 4px;">${onboardingCompleto ? '🎉 Onboarding completo' : '🚀 Onboarding en curso'}</h3>
          <div style="color: var(--gris-text-soft); font-size: 13px;">

        </div>
        <div style="text-align: right;">

      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill" style="width: ${porcentaje}%;"></div>
      </div>
    </div>

    <div id="onbList">${itemsHtml}</div>

    <button class="btn btn-secondary btn-sm" onclick="agregarPasoCustom('${esc(onboarding.id)}')" style="margin-top: 12px;">+ Agregar paso personalizado</button>
  `;
}

  return `

                     style="border: 1px solid var(--gris-border); padding: 2px 6px; border-radius: 4px; font-size: 11.5px;">
            </div>
            ${paso.completado && paso.fecha_completado ? `

                ✓ Completado el ${esc(formatDateEs(paso.fecha_completado))}

            ${tienePlantilla ? `<button class="btn btn-secondary btn-sm" onclick="verPlantilla('${esc(paso.plantilla)}')">📋 Ver plantilla</button>` : ''}

async function togglePasoCompletado(onboardingId, pasoIdx, checked) {
  const onb = state.onboardings.find(o => o.id === onboardingId);
  if (!onb) return;
  const pasos = parseJsonSafe(onb.pasos_json) || [];
  if (!pasos[pasoIdx]) return;

  pasos[pasoIdx].completado = checked;
  pasos[pasoIdx].fecha_completado = checked ? todayISO() : '';

  onb.pasos_json = JSON.stringify(pasos);
  try {
    await sheetUpdate('Onboarding', onboardingId, { pasos_json: onb.pasos_json });
    // Si se completó todo, registrar fecha
    const todosCompletos = pasos.every(p => p.completado);
    if (todosCompletos && !onb.fecha_completado) {
      await sheetUpdate('Onboarding', onboardingId, { fecha_completado: todayISO() });
      onb.fecha_completado = todayISO();
      showToast('🎉 ¡Onboarding completado!', 'success');
    }
    renderOnboardingUI(onb);
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function guardarTextoPaso(onboardingId, pasoIdx, nuevoTexto) {
  const onb = state.onboardings.find(o => o.id === onboardingId);
  if (!onb) return;
  const pasos = parseJsonSafe(onb.pasos_json) || [];
  if (!pasos[pasoIdx]) return;
  const textoLimpio = nuevoTexto.trim();
  if (!textoLimpio || pasos[pasoIdx].texto === textoLimpio) return;

  pasos[pasoIdx].texto = textoLimpio;
  onb.pasos_json = JSON.stringify(pasos);
  try {
    await sheetUpdate('Onboarding', onboardingId, { pasos_json: onb.pasos_json });
    showAutosave('saved', 'Guardado');
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function confirmDeletePaso(onboardingId, pasoIdx) {
  const onb = state.onboardings.find(o => o.id === onboardingId);
  const paso = parseJsonSafe(onb.pasos_json)[pasoIdx];
  if (!paso) return;

  if (!confirm(`¿Eliminar el paso "${paso.texto}" de este onboarding?`)) return;
  eliminarPaso(onboardingId, pasoIdx);
}

async function eliminarPaso(onboardingId, pasoIdx) {
  const onb = state.onboardings.find(o => o.id === onboardingId);
  if (!onb) return;
  const pasos = parseJsonSafe(onb.pasos_json) || [];
  pasos.splice(pasoIdx, 1);
  onb.pasos_json = JSON.stringify(pasos);
  try {
    await sheetUpdate('Onboarding', onboardingId, { pasos_json: onb.pasos_json });
    showToast('Paso eliminado', 'success');
    renderOnboardingUI(onb);
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function guardarPasoCustom(onboardingId) {
  const texto = $('f_paso_texto').value.trim();
  if (!texto) { showToast('Poné una descripción', 'error'); return; }

  const onb = state.onboardings.find(o => o.id === onboardingId);
  if (!onb) return;
  const pasos = parseJsonSafe(onb.pasos_json) || [];

  const nuevo = {
    id: 'paso_custom_' + Date.now(),
    emoji: $('f_paso_emoji').value.trim() || '✅',
    texto,
    plantilla: null,
    accion: null,
    completado: false,
    fecha_completado: '',
    fecha_limite: $('f_paso_fecha_limite').value,
    notas: '',
  };
  pasos.push(nuevo);
  onb.pasos_json = JSON.stringify(pasos);

  try {
    await sheetUpdate('Onboarding', onboardingId, { pasos_json: onb.pasos_json });
    closeModal();
    showToast('Paso agregado', 'success');
    renderOnboardingUI(onb);

function reemplazarVariables(texto, cliente) {
  if (!texto) return '';
  const vars = {
    '{nombre_cliente}': cliente ? (cliente.nombre || '[nombre del cliente]') : '[nombre del cliente]',
    '{servicio}': cliente ? (cliente.servicio_contratado || '[servicio]') : '[servicio]',
    '{rubro}': cliente ? (cliente.rubro || '[rubro]') : '[rubro]',
    '{rondas_revision}': cliente ? (cliente.rondas_revision || '2') : '2',
    '{nombre_agencia}': 'Carrusel MKT',
    '{email_agencia}': '[tu email]',
  };
  let resultado = texto;
  Object.entries(vars).forEach(([k, v]) => {
    resultado = resultado.split(k).join(v);
  });
  return resultado;
}

function copiarPlantilla(btn) {
  const contenido = $('plantilla_contenido');
  if (!contenido) return;
  const texto = contenido.innerText;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(texto).then(() => {
      mostrarCopiadoOk();
    }).catch(() => copiarFallback(texto));
  } else {
    copiarFallback(texto);
  }
}

function copiarFallback(texto) {
  // Fallback con textarea invisible
  const textarea = document.createElement('textarea');
  textarea.value = texto;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    mostrarCopiadoOk();
  } catch (e) {
    showToast('No se pudo copiar. Seleccioná y copiá manualmente.', 'error');
  }
  document.body.removeChild(textarea);
}

function mostrarCopiadoOk() {
  const el = $('copy_success');
  if (el) {
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 2000);
  }
}

async function renderDashboard() {
  const main = $('mainContent');
  const hoy = new Date();
  const saludo = getSaludo(hoy);
  const nombreCorto = state.user ? (state.user.name || '').split(' ')[0] : '';

  main.innerHTML = `
    <div class="page-header">
      <div class="page-title-area">
        <h1 class="page-title">${saludo}${nombreCorto ? ', ' + esc(nombreCorto) : ''}!</h1>
        <div class="page-subtitle">Resumen de tu día · ${esc(formatDateEsLarga(hoy))}</div>
      </div>
    </div>
    <div id="dashboardContent"><div class="loading"><div class="spinner"></div>Armando tu panel...</div></div>
  `;

  try {
    // Cargar todos los datos necesarios en paralelo
    const [clientesRes, prospectosRes, calendarioRes, ingresosRes, onboardingsRes, estrategiasRes] = await Promise.all([
      sheetRead('Clientes'),
      sheetRead('Prospectos'),
      sheetRead('Calendario'),
      sheetRead('Finanzas_Ingresos'),
      sheetRead('Onboarding'),
      sheetRead('Estrategias'),
    ]);
    state.clientes = clientesRes.data;
    state.prospectos = prospectosRes.data;
    state.calendario = calendarioRes.data;
    state.onboardings = onboardingsRes.data;
    state.estrategias = estrategiasRes.data;
    const ingresos = ingresosRes.data;

    renderDashboardContent(ingresos);
  } catch (e) {
    $('dashboardContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

function getSaludo(d) {
  const h = d.getHours();
  if (h < 12) return 'Buen día';
  if (h < 19) return 'Buenas tardes';
  return 'Buenas noches';
}

function formatDateEsLarga(d) {
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]}`;
}

function renderDashboardContent(ingresos) {
  const hoy = new Date();
  const mesActual = hoy.getMonth() + 1;
  const anioActual = hoy.getFullYear();

  // ============== KPIs ==============
  const clientesActivos = state.clientes.filter(c => (c.estado || 'Activo') === 'Activo').length;
  const prospectosActivos = state.prospectos.filter(p => !['Ganado', 'Perdido'].includes(p.estado)).length;

  // Ingresos del mes
  const ingresosMes = ingresos
    .filter(i => Number(i.mes) === mesActual && Number(i.anio) === anioActual)
    .reduce((sum, i) => sum + (Number(i.monto_ars) || 0), 0);
  const ingresosPendientes = ingresos
    .filter(i => Number(i.mes) === mesActual && Number(i.anio) === anioActual && i.estado === 'Pendiente')
    .reduce((sum, i) => sum + (Number(i.monto_ars) || 0), 0);

  // Publicaciones esta semana
  const semanaEnd = new Date(hoy);
  semanaEnd.setDate(hoy.getDate() + 7);
  const postsSemana = state.calendario.filter(p => {
    if (!p.fecha_publicacion) return false;
    // Parseamos como hora local agregando T00:00:00, sino JS interpreta YYYY-MM-DD como UTC
    // y en Argentina (UTC-3) las fechas quedan corridas un día atrás.
    const f = new Date(p.fecha_publicacion + 'T00:00:00');
    return f >= hoy && f <= semanaEnd;
  });

  const kpisHtml = `
    <div class="dashboard-grid">
      <div class="kpi-card" onclick="navigateTo('clientes')">
        <div class="kpi-icon">👥</div>
        <div class="kpi-label">Clientes activos</div>
        <div class="kpi-value">${clientesActivos}</div>
        <div class="kpi-sub">${state.clientes.length} totales</div>
      </div>
      <div class="kpi-card ingresos" onclick="navigateTo('finanzas')">
        <div class="kpi-icon">💰</div>
        <div class="kpi-label">Ingresos del mes</div>
        <div class="kpi-value">$${formatMiles(ingresosMes)}</div>
        <div class="kpi-sub">${ingresosPendientes > 0 ? `$${formatMiles(ingresosPendientes)} pendientes` : 'Todo cobrado ✓'}</div>
      </div>
      <div class="kpi-card prospectos" onclick="navigateTo('prospectos')">
        <div class="kpi-icon">🎯</div>
        <div class="kpi-label">Prospectos activos</div>
        <div class="kpi-value">${prospectosActivos}</div>
        <div class="kpi-sub">${state.prospectos.filter(p => p.estado === 'Ganado').length} convertidos</div>
      </div>
      <div class="kpi-card publicaciones" onclick="abrirAgendaConsolidada()">
        <div class="kpi-icon">📅</div>
        <div class="kpi-label">Posts próximos 7 días</div>
        <div class="kpi-value">${postsSemana.length}</div>
        <div class="kpi-sub">${postsSemana.filter(p => p.estado === 'Publicada').length} ya publicados</div>
      </div>
    </div>
  `;

  // ============== PRÓXIMAS ACCIONES ==============
  const accionesHtml = generarSeccionAcciones(postsSemana);

  // ============== ALERTAS ==============
  const alertasHtml = generarSeccionAlertas();

  // ============== GRÁFICO DE INGRESOS ==============
  const graficoHtml = generarGraficoIngresos(ingresos);

  $('dashboardContent').innerHTML = `
    ${kpisHtml}
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;" class="dashboard-two-cols">
      ${accionesHtml}
      ${alertasHtml}
    </div>
    ${graficoHtml}
  `;

  // Forzar responsivo si es una pantalla chica
  if (window.innerWidth < 900) {
    document.querySelector('.dashboard-two-cols').style.gridTemplateColumns = '1fr';
  }
}

function generarSeccionAcciones(postsSemana) {
  const hoy = new Date();
  const acciones = [];

  // Prospectos con próximo paso cercano o sin actividad
  state.prospectos
    .filter(p => !['Ganado', 'Perdido'].includes(p.estado))
    .forEach(p => {
      const ultFecha = p.fecha_ultimo_contacto || p.fecha_primer_contacto || p.fecha_creacion;
      const dias = ultFecha ? diasDesde(ultFecha, hoy) : 0;
      if (dias >= 7 && p.proximo_paso) {
        acciones.push({
          tipo: 'prospecto',
          texto: `${p.proximo_paso}`,
          detalle: `${p.nombre} · ${dias} días sin actividad`,
          icon: '🎯',
          onClick: `navigateTo('prospectos')`,
        });
      }
    });

  // Publicaciones que necesitan revisión
  state.calendario
    .filter(p => p.estado === 'Revisión')
    .slice(0, 3)
    .forEach(p => {
      const cliente = state.clientes.find(c => c.id === p.cliente_id);
      acciones.push({
        tipo: 'revision',
        texto: `Revisar: ${p.titulo || p.hook || 'publicación'}`,
        detalle: `${cliente ? cliente.nombre : ''} · ${formatDateEs(p.fecha_publicacion)}`,
        icon: '👀',
        onClick: `openCliente('${p.cliente_id}', 'calendario')`,
      });
    });

  // Onboardings con pasos pendientes
  state.onboardings.forEach(o => {
    if (o.fecha_completado) return;
    const pasos = parseJsonSafe(o.pasos_json) || [];
    const proximoPendiente = pasos.find(p => !p.completado);
    if (proximoPendiente) {
      const cliente = state.clientes.find(c => c.id === o.cliente_id);
      if (cliente && (cliente.estado || 'Activo') === 'Activo') {
        acciones.push({
          tipo: 'onboarding',
          texto: `${proximoPendiente.emoji || '•'} ${proximoPendiente.texto}`,
          detalle: `Onboarding · ${cliente.nombre}`,
          icon: '🚀',
          onClick: `openCliente('${o.cliente_id}', 'onboarding')`,
        });
      }
    }
  });

  if (acciones.length === 0) {
    return `
      <div class="dashboard-section">
        <div class="dashboard-section-title">✓ Próximas acciones</div>
        <div style="color: var(--gris-text-soft); font-size: 13px; text-align: center; padding: 20px 10px;">
          No tenés acciones urgentes pendientes. ¡Buen trabajo! 🎉
        </div>
      </div>
    `;
  }

  // Mostrar máximo 6 acciones
  const acc = acciones.slice(0, 6);

  return `
    <div class="dashboard-section">
      <div class="dashboard-section-title">📌 Próximas acciones</div>
      ${acc.map(a => `
        <div class="dashboard-list-item" style="cursor: pointer;" onclick="${a.onClick}">
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 13px; font-weight: 500;">${a.icon} ${esc(a.texto)}</div>
            <div style="font-size: 11.5px; color: var(--gris-text-muted); margin-top: 2px;">${esc(a.detalle)}</div>
          </div>
          <div style="color: var(--fucsia); font-size: 16px;">→</div>
        </div>
      `).join('')}
    </div>
  `;
}

function generarSeccionAlertas() {
  const alertas = [];
  const hoy = new Date();

  // Prospectos sin actividad 14+ días
  const sinActividad14 = state.prospectos.filter(p => {
    if (['Ganado', 'Perdido'].includes(p.estado)) return false;
    const ult = p.fecha_ultimo_contacto || p.fecha_primer_contacto || p.fecha_creacion;
    return ult && diasDesde(ult, hoy) >= 14;
  });
  if (sinActividad14.length > 0) {
    alertas.push({
      tipo: 'danger',
      texto: `${sinActividad14.length} prospecto${sinActividad14.length > 1 ? 's' : ''} sin actividad hace +14 días`,
      accion: `<button class="btn btn-secondary btn-sm" onclick="navigateTo('prospectos')">Ver</button>`,
    });
  }

  // Clientes activos sin estrategia Principal activa
  const sinEstrategia = state.clientes.filter(c => {
    if ((c.estado || 'Activo') !== 'Activo') return false;
    return !state.estrategias.some(e =>
      e.cliente_id === c.id && e.tipo === 'Principal' && (e.estado || 'Activa') === 'Activa'
    );
  });
  if (sinEstrategia.length > 0) {
    alertas.push({
      tipo: 'warn',
      texto: `${sinEstrategia.length} cliente${sinEstrategia.length > 1 ? 's' : ''} sin estrategia Principal activa`,
      accion: '',
    });
  }

  // Clientes activos sin calendario del mes actual
  const mesActual = hoy.getMonth() + 1;
  const anioActual = hoy.getFullYear();
  const clientesSinCalendario = state.clientes.filter(c => {
    if ((c.estado || 'Activo') !== 'Activo') return false;
    const postsDelMes = state.calendario.filter(p => {
      if (p.cliente_id !== c.id) return false;
      if (!p.fecha_publicacion) return false;
      const f = new Date(p.fecha_publicacion + 'T00:00:00');
      return f.getMonth() + 1 === mesActual && f.getFullYear() === anioActual;
    });
    return postsDelMes.length === 0;
  });
  if (clientesSinCalendario.length > 0) {
    alertas.push({
      tipo: 'info',
      texto: `${clientesSinCalendario.length} cliente${clientesSinCalendario.length > 1 ? 's' : ''} sin publicaciones este mes`,
      accion: '',
    });
  }

  if (alertas.length === 0) {
    return `
      <div class="dashboard-section">
        <div class="dashboard-section-title">✨ Todo en orden</div>
        <div style="color: var(--gris-text-soft); font-size: 13px; text-align: center; padding: 20px 10px;">
          No hay alertas activas. Seguí así! 🌟
        </div>
      </div>
    `;
  }

  return `
    <div class="dashboard-section">
      <div class="dashboard-section-title">⚠️ Alertas</div>
      ${alertas.map(a => `
        <div class="alerta-item ${a.tipo}">
          <div style="flex: 1;">${esc(a.texto)}</div>
          ${a.accion}
        </div>
      `).join('')}
    </div>
  `;
}

function generarGraficoIngresos(ingresos) {
  const hoy = new Date();
  const meses = [];

  // Últimos 6 meses
  for (let i = 5; i >= 0; i--) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
    const mes = d.getMonth() + 1;
    const anio = d.getFullYear();
    const total = ingresos
      .filter(ing => Number(ing.mes) === mes && Number(ing.anio) === anio && ing.estado !== 'Vencido')
      .reduce((sum, ing) => sum + (Number(ing.monto_ars) || 0), 0);
    const nombresMeses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    meses.push({
      label: nombresMeses[d.getMonth()],
      valor: total,
    });
  }

  const maximo = Math.max(...meses.map(m => m.valor), 1);
  const hayDatos = meses.some(m => m.valor > 0);

  if (!hayDatos) {
    return `
      <div class="dashboard-section">
        <div class="dashboard-section-title">📈 Evolución de ingresos</div>
        <div style="color: var(--gris-text-soft); font-size: 13px; text-align: center; padding: 30px;">
          Todavía no cargaste ingresos. <a href="#" onclick="navigateTo('finanzas'); return false;" style="color: var(--fucsia);">Andá a Finanzas</a> para empezar.
        </div>
      </div>
    `;
  }

  return `
    <div class="dashboard-section">
      <div class="dashboard-section-title">📈 Evolución de ingresos · últimos 6 meses</div>
      <div class="grafico-barras">
        ${meses.map(m => {
          const altura = (m.valor / maximo) * 100;
          return `
            <div class="barra-item">
              <div class="barra-valor">${m.valor > 0 ? '$' + formatMilesCompacto(m.valor) : ''}</div>
              <div class="barra-bar" style="height: ${Math.max(altura, m.valor > 0 ? 8 : 0)}%;"></div>
              <div class="barra-label">${m.label}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function formatMilesCompacto(n) {
  const num = Number(n);
  if (isNaN(num)) return '0';
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0', '') + 'M';
  if (num >= 1000) return Math.round(num / 1000) + 'k';
  return String(num);
}

// ============================================================================
// AGENDA CONSOLIDADA (modal con todos los posts próximos de todos los clientes)
// ============================================================================
let _agendaFiltros = { cliente: '', formato: '', estado: '' };

async function abrirAgendaConsolidada() {
  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>📅 Agenda · Próximos 7 días</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="agendaContent"><div class="loading"><div class="spinner"></div>Cargando agenda...</div></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;
  $('modalOverlay').classList.add('active');

  try {
    // Asegurar que tenemos datos cargados
    if (!state.calendario || state.calendario.length === 0) {
      const { data } = await sheetRead('Calendario');
      state.calendario = data;
    }
    if (!state.clientes || state.clientes.length === 0) {
      const { data } = await sheetRead('Clientes');
      state.clientes = data;
    }
    renderAgendaConsolidada();
  } catch (e) {
    $('agendaContent').innerHTML = `<div style="color: var(--rojo); padding: 14px;">Error: ${esc(e.message)}</div>`;
  }
}

function renderAgendaConsolidada() {
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
  const finRango = new Date(hoy); finRango.setDate(hoy.getDate() + 7);

  // Filtrar posts en la ventana de 7 días
  let posts = state.calendario.filter(p => {
    if (!p.fecha_publicacion) return false;
    const f = new Date(p.fecha_publicacion + 'T00:00:00');
    return f >= hoy && f <= finRango;
  });

  // Aplicar filtros
  if (_agendaFiltros.cliente) posts = posts.filter(p => p.cliente_id === _agendaFiltros.cliente);
  if (_agendaFiltros.formato) posts = posts.filter(p => (p.formato || '').toLowerCase() === _agendaFiltros.formato.toLowerCase());
  if (_agendaFiltros.estado) posts = posts.filter(p => (p.estado || 'Idea') === _agendaFiltros.estado);

  // Ordenar por fecha
  posts.sort((a, b) => (a.fecha_publicacion || '').localeCompare(b.fecha_publicacion || ''));

  // Estadísticas
  const totalSinFiltrar = state.calendario.filter(p => {
    if (!p.fecha_publicacion) return false;
    const f = new Date(p.fecha_publicacion + 'T00:00:00');
    return f >= hoy && f <= finRango;
  }).length;

  // Generar dropdowns de filtros
  const clientesConPosts = [...new Set(state.calendario.filter(p => {
    if (!p.fecha_publicacion) return false;
    const f = new Date(p.fecha_publicacion + 'T00:00:00');
    return f >= hoy && f <= finRango;
  }).map(p => p.cliente_id))];

  const filtrosHtml = `
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 10px; background: var(--gris-bg); border-radius: 8px;">
      <select class="form-select" style="flex: 1; min-width: 140px;" onchange="aplicarFiltroAgenda('cliente', this.value)">
        <option value="">👥 Todos los clientes</option>
        ${clientesConPosts.map(cid => {
          const c = state.clientes.find(x => x.id === cid);
          return c ? `<option value="${esc(cid)}" ${_agendaFiltros.cliente === cid ? 'selected' : ''}>${esc(c.nombre)}</option>` : '';
        }).join('')}
      </select>
      <select class="form-select" style="flex: 1; min-width: 130px;" onchange="aplicarFiltroAgenda('formato', this.value)">
        <option value="">🎯 Todos los formatos</option>
        <option value="Reel" ${_agendaFiltros.formato === 'Reel' ? 'selected' : ''}>🎬 Reel</option>
        <option value="Carrusel" ${_agendaFiltros.formato === 'Carrusel' ? 'selected' : ''}>🎠 Carrusel</option>
        <option value="Story" ${_agendaFiltros.formato === 'Story' ? 'selected' : ''}>📖 Story</option>
        <option value="Post" ${_agendaFiltros.formato === 'Post' ? 'selected' : ''}>📷 Post</option>
        <option value="Publicación" ${_agendaFiltros.formato === 'Publicación' ? 'selected' : ''}>📷 Publicación</option>
      </select>
      <select class="form-select" style="flex: 1; min-width: 130px;" onchange="aplicarFiltroAgenda('estado', this.value)">
        <option value="">📌 Todos los estados</option>
        <option value="Idea" ${_agendaFiltros.estado === 'Idea' ? 'selected' : ''}>💡 Idea</option>
        <option value="Borrador" ${_agendaFiltros.estado === 'Borrador' ? 'selected' : ''}>📝 Borrador</option>
        <option value="Revisión" ${_agendaFiltros.estado === 'Revisión' ? 'selected' : ''}>👀 Revisión</option>
        <option value="Aprobada" ${_agendaFiltros.estado === 'Aprobada' ? 'selected' : ''}>✅ Aprobada</option>
        <option value="Publicada" ${_agendaFiltros.estado === 'Publicada' ? 'selected' : ''}>🚀 Publicada</option>
      </select>
      ${(_agendaFiltros.cliente || _agendaFiltros.formato || _agendaFiltros.estado) ? `
        <button class="btn-ghost btn-sm" onclick="limpiarFiltrosAgenda()">✕ Limpiar filtros</button>
      ` : ''}
    </div>
  `;

  // Si no hay posts después de filtrar
  if (posts.length === 0) {
    const filtrosActivos = _agendaFiltros.cliente || _agendaFiltros.formato || _agendaFiltros.estado;
    $('agendaContent').innerHTML = `
      ${filtrosHtml}
      <div style="text-align: center; padding: 30px; color: var(--gris-text-muted);">
        ${filtrosActivos
          ? '🔍 No hay publicaciones que coincidan con estos filtros.'
          : (totalSinFiltrar === 0
              ? '📭 No hay publicaciones agendadas en los próximos 7 días.'
              : 'No hay publicaciones para mostrar.')}
      </div>
    `;
    return;
  }

  // Agrupar por día
  const grupos = {};
  posts.forEach(p => {
    if (!grupos[p.fecha_publicacion]) grupos[p.fecha_publicacion] = [];
    grupos[p.fecha_publicacion].push(p);
  });

  const fechasOrdenadas = Object.keys(grupos).sort();
  const diasNombre = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];

  const seccionesHtml = fechasOrdenadas.map(fecha => {
    const d = new Date(fecha + 'T00:00:00');
    const diff = Math.round((d - hoy) / (1000 * 60 * 60 * 24));
    let etiquetaDia = '';
    if (diff === 0) etiquetaDia = '🔴 Hoy';
    else if (diff === 1) etiquetaDia = '⚡ Mañana';
    else if (diff === 2) etiquetaDia = 'Pasado mañana';
    else etiquetaDia = diasNombre[d.getDay()];

    const fechaLabel = `${etiquetaDia} · ${formatDateEs(fecha)}`;
    const postsDelDia = grupos[fecha];

    return `
      <div style="margin-bottom: 18px;">
        <div style="font-family: 'Fraunces', serif; font-size: 14px; font-weight: 700;
                    color: var(--fucsia); padding: 6px 0; margin-bottom: 8px;
                    border-bottom: 2px solid var(--fucsia-light); display: flex; justify-content: space-between;">
          <span>${esc(fechaLabel)}</span>
          <span style="font-size: 11px; color: var(--gris-text-muted); font-family: 'Inter', sans-serif; font-weight: 500;">
            ${postsDelDia.length} ${postsDelDia.length === 1 ? 'post' : 'posts'}
          </span>
        </div>
        ${postsDelDia.map(p => renderAgendaPost(p)).join('')}
      </div>
    `;
  }).join('');

  $('agendaContent').innerHTML = filtrosHtml + `
    <div style="font-size: 12.5px; color: var(--gris-text-soft); margin-bottom: 14px;">
      Mostrando <strong>${posts.length}</strong> de ${totalSinFiltrar} ${totalSinFiltrar === 1 ? 'publicación' : 'publicaciones'} agendadas en los próximos 7 días.
    </div>
    ${seccionesHtml}
  `;
}

function aplicarFiltroAgenda(campo, valor) {

function ejecutarExportarPlanningExcel() {
  const desde = $('exp_desde').value;
  const hasta = $('exp_hasta').value;
  const estilo = document.querySelector('input[name="exp_estilo"]:checked').value;
  const incluirInternas = $('exp_incluir_internas').checked;
  const incluirPublicadas = $('exp_incluir_publicadas').checked;

  if (!desde || !hasta) { showToast('Elegí un rango de fechas', 'error'); return; }
  if (hasta < desde) { showToast('La fecha hasta no puede ser anterior a la fecha desde', 'error'); return; }

  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  // Filtrar posts del cliente en el rango
  let posts = state.calendario.filter(p => {
    if (p.cliente_id !== cliente.id) return false;
    if (!p.fecha_publicacion) return false;
    return p.fecha_publicacion >= desde && p.fecha_publicacion <= hasta;
  });

  if (!incluirPublicadas) {
    posts = posts.filter(p => p.estado !== 'Publicada');
  }

  posts.sort((a, b) => (a.fecha_publicacion || '').localeCompare(b.fecha_publicacion || ''));

  if (posts.length === 0) {
    showToast('No hay publicaciones en ese rango con los filtros aplicados', 'error');
    return;
  }

  generarExcelPlanning(cliente, posts, desde, hasta, estilo, incluirInternas);
}

function generarExcelPlanning(cliente, posts, desde, hasta, estilo, incluirInternas) {
  // Construir filas
  const filas = posts.map(p => {
    const fila = {
      'Fecha': formatDateEs(p.fecha_publicacion),
      'Día': new Date(p.fecha_publicacion + 'T00:00:00').toLocaleDateString('es-AR', { weekday: 'long' }),
      'Red Social': p.red_social || 'Instagram',
      'Formato': p.formato || 'Post',
      'Pilar': p.pilar || '',
      'Estado': p.estado || 'Idea',
      'Título': p.titulo || '',
      'Hook': p.hook || '',
    };

    if (estilo === 'completo') {
      // Copy / texto completo según el tipo
      let contenidoDetallado = '';

      // Helper: parsear contenido especial desde columna dedicada O desde notas
      const tryParse = (raw) => { try { return JSON.parse(raw); } catch (e) { return null; } };

      // Carruseles (columna dedicada o notas)
      let slidesData = p.carrusel_slides ? tryParse(p.carrusel_slides) : null;
      if (!slidesData && p.notas && p.notas.startsWith('CARRUSEL_SLIDES:')) {
        slidesData = tryParse(p.notas.substring('CARRUSEL_SLIDES:'.length));
      }
      if (Array.isArray(slidesData)) {
        contenidoDetallado = slidesData.map((s, i) => {
          const partes = [`SLIDE ${i + 1}:`];
          if (s.titulo) partes.push('Título: ' + s.titulo);
          if (s.texto) partes.push('Texto: ' + s.texto);
          if (s.copy_pie) partes.push('Pie: ' + s.copy_pie);
          if (s.visual && incluirInternas) partes.push('[Visual sugerido: ' + s.visual + ']');
          return partes.join('\n');
        }).join('\n\n');
      }

      // Reels
      if (!contenidoDetallado) {
        let escenasData = p.reel_guion ? tryParse(p.reel_guion) : null;
        if (!escenasData && p.notas && p.notas.startsWith('REEL_GUION:')) {
          escenasData = tryParse(p.notas.substring('REEL_GUION:'.length));
        }
        if (Array.isArray(escenasData)) {
          contenidoDetallado = escenasData.map((e, i) => {
            const partes = [`ESCENA ${i + 1}` + (e.tiempo ? ` (${e.tiempo})` : '') + ':'];
            if (e.tipo_plano && incluirInternas) partes.push('Plano: ' + e.tipo_plano);
            if (e.voz || e.voz_audio || e.voz_en_off) partes.push('Voz/Audio: ' + (e.voz || e.voz_audio || e.voz_en_off));
            if (e.texto_pantalla) partes.push('Texto en pantalla: ' + e.texto_pantalla);
            if (e.accion || e.accion_visual) partes.push('Acción: ' + (e.accion || e.accion_visual));
            return partes.join('\n');
          }).join('\n\n');
        }
      }

      // Historias
      if (!contenidoDetallado) {
        let histData = p.historias_secuencia ? tryParse(p.historias_secuencia) : null;
        if (!histData && p.notas && p.notas.startsWith('HISTORIAS_SECUENCIA:')) {
          histData = tryParse(p.notas.substring('HISTORIAS_SECUENCIA:'.length));
        }
        if (Array.isArray(histData)) {
          contenidoDetallado = histData.map((h, i) => {
            const partes = [`HISTORIA ${i + 1}` + (h.tipo ? ` [${h.tipo}]` : '') + ':'];
            if (h.texto_principal) partes.push('Texto: ' + h.texto_principal);
            if (h.zocalo) partes.push('Zócalo: ' + h.zocalo);
            if (h.visual_sugerido && incluirInternas) partes.push('[Visual: ' + h.visual_sugerido + ']');
            return partes.join('\n');
          }).join('\n\n');
        }
      }

      // Anuncio Meta
      if (!contenidoDetallado) {
        let anuncioData = p.anuncio_meta ? tryParse(p.anuncio_meta) : null;
        if (!anuncioData && p.notas && p.notas.startsWith('ANUNCIO_META:')) {
          anuncioData = tryParse(p.notas.substring('ANUNCIO_META:'.length));
        }
        if (anuncioData && Array.isArray(anuncioData.variantes)) {
          const partes = [];
          if (anuncioData.estrategia_general) partes.push('ESTRATEGIA: ' + anuncioData.estrategia_general);
          anuncioData.variantes.forEach((v, i) => {
            partes.push(`\n--- VARIANTE ${i + 1} ${v.formato_creativo ? '(' + v.formato_creativo + ')' : ''} ---`);
            if (v.hipotesis && incluirInternas) partes.push('Hipótesis: ' + v.hipotesis);
            if (v.hook) partes.push('Hook: ' + v.hook);
            if (v.copy_principal) partes.push('Copy: ' + v.copy_principal);
            if (v.titular) partes.push('Titular: ' + v.titular);
            if (v.descripcion) partes.push('Descripción: ' + v.descripcion);
            if (v.cta_boton) partes.push('CTA: ' + v.cta_boton);
            if (v.concepto_visual) partes.push('Visual: ' + v.concepto_visual);
          });
          contenidoDetallado = partes.join('\n');
        }
      }

      // Si no hay contenido especial, usar el copy normal
      if (!contenidoDetallado && p.copy) contenidoDetallado = p.copy;
      if (!contenidoDetallado && p.idea) contenidoDetallado = p.idea;

      fila['Contenido / Guión / Slides'] = contenidoDetallado;
      fila['CTA'] = p.cta || '';
      fila['Hashtags'] = p.hashtags || '';
      fila['Descripción visual / Guión'] = p.descripcion_visual || '';

      if (incluirInternas) {
        fila['Notas internas'] = (p.notas && !p.notas.startsWith('CARRUSEL_SLIDES:') &&
                                   !p.notas.startsWith('REEL_GUION:') &&
                                   !p.notas.startsWith('HISTORIAS_SECUENCIA:')) ? p.notas : '';
      }
    }

    return fila;
  });

  // Crear hoja con anchos de columna optimizados
  const ws = XLSX.utils.json_to_sheet(filas);

  // Calcular anchos
  const cols = Object.keys(filas[0]);
  ws['!cols'] = cols.map(col => {
    const headerLen = col.length;
    let maxLen = headerLen;
    filas.forEach(f => {
      const v = String(f[col] || '');
      // Para contenido largo, limitamos el ancho a 60
      const lineas = v.split('\n');
      lineas.forEach(l => { if (l.length > maxLen) maxLen = Math.min(l.length, 60); });
    });
    if (col === 'Contenido / Guión / Slides') return { wch: 60 };
    if (col === 'Descripción visual / Guión') return { wch: 50 };
    if (col === 'Hook' || col === 'Título') return { wch: 35 };
    if (col === 'CTA' || col === 'Hashtags' || col === 'Notas internas') return { wch: 25 };
    return { wch: Math.max(headerLen + 2, Math.min(maxLen + 2, 25)) };
  });

  // Habilitar wrap text en celdas con saltos de línea
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r + 1; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (ws[addr] && typeof ws[addr].v === 'string' && ws[addr].v.includes('\n')) {
        ws[addr].s = { alignment: { wrapText: true, vertical: 'top' } };
      }
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Planning');

  // Hoja secundaria con resumen
  const totalPorFormato = {};
  const totalPorEstado = {};
  posts.forEach(p => {
    const f = p.formato || 'Post';
    const e = p.estado || 'Idea';
    totalPorFormato[f] = (totalPorFormato[f] || 0) + 1;
    totalPorEstado[e] = (totalPorEstado[e] || 0) + 1;
  });

  const resumenFilas = [
    { 'Métrica': 'Cliente', 'Valor': cliente.nombre },
    { 'Métrica': 'Período', 'Valor': formatDateEs(desde) + ' al ' + formatDateEs(hasta) },
    { 'Métrica': 'Total publicaciones', 'Valor': posts.length },
    { 'Métrica': '', 'Valor': '' },
    { 'Métrica': 'Por formato', 'Valor': '' },
    ...Object.entries(totalPorFormato).map(([k, v]) => ({ 'Métrica': '  ' + k, 'Valor': v })),
    { 'Métrica': '', 'Valor': '' },
    { 'Métrica': 'Por estado', 'Valor': '' },
    ...Object.entries(totalPorEstado).map(([k, v]) => ({ 'Métrica': '  ' + k, 'Valor': v })),
    { 'Métrica': '', 'Valor': '' },
    { 'Métrica': 'Generado por', 'Valor': 'Carrusel MKT 🎠' },
    { 'Métrica': 'Fecha', 'Valor': formatDateEs(todayISO()) },
  ];

  const wsResumen = XLSX.utils.json_to_sheet(resumenFilas);
  wsResumen['!cols'] = [{ wch: 25 }, { wch: 35 }];
  XLSX.utils.book_append_sheet(wb, wsResumen, 'Resumen');

  const nombreArchivo = `Planning ${cliente.nombre.replace(/\s+/g, '_')} - ${desde} al ${hasta}.xlsx`;
  XLSX.writeFile(wb, nombreArchivo);

  closeModal();
  showToast(`✓ Excel descargado · ${posts.length} publicaciones`, 'success');
}

function generarExcelIdeas(cliente, ideas, incluirInternas) {
  if (typeof XLSX === 'undefined') {
    showToast('La librería de Excel todavía está cargando, probá en unos segundos.', 'error');
    return;
  }

  const filas = ideas.map(idea => {
    const fila = {
      'Fecha creada': formatDateEs(idea.fecha_creada),
      'Título': idea.titulo || '',
      'Pilar': idea.pilar || '',
      'Formato': idea.formato || '',
      'Hook': idea.hook || '',
      'Idea / Descripción': idea.idea_text || idea.idea || '',
      'Estado': idea.estado || 'Sin usar',
    };

    // Contenido detallado según formato
    let contenidoDetallado = '';
    if (idea.notas && typeof idea.notas === 'string') {
      if (idea.notas.startsWith('CARRUSEL_SLIDES:')) {
        try {
          const slides = JSON.parse(idea.notas.substring('CARRUSEL_SLIDES:'.length));
          contenidoDetallado = slides.map((s, i) => {
            const partes = [`SLIDE ${i + 1}:`];
            if (s.titulo) partes.push('Título: ' + s.titulo);
            if (s.texto) partes.push('Texto: ' + s.texto);
            if (s.copy_pie) partes.push('Pie: ' + s.copy_pie);
            if (s.visual && incluirInternas) partes.push('[Visual: ' + s.visual + ']');
            return partes.join('\n');
          }).join('\n\n');
        } catch (e) {}
      } else if (idea.notas.startsWith('REEL_GUION:')) {
        try {
          const escenas = JSON.parse(idea.notas.substring('REEL_GUION:'.length));
          contenidoDetallado = escenas.map((e, i) => {
            const partes = [`ESCENA ${i + 1}` + (e.tiempo ? ` (${e.tiempo})` : '') + ':'];
            if (e.tipo_plano && incluirInternas) partes.push('Plano: ' + e.tipo_plano);
            if (e.voz || e.voz_audio || e.voz_en_off) partes.push('Voz/Audio: ' + (e.voz || e.voz_audio || e.voz_en_off));
            if (e.texto_pantalla) partes.push('Texto en pantalla: ' + e.texto_pantalla);
            if (e.accion || e.accion_visual) partes.push('Acción: ' + (e.accion || e.accion_visual));
            return partes.join('\n');
          }).join('\n\n');
        } catch (e) {}
      } else if (idea.notas.startsWith('HISTORIAS_SECUENCIA:')) {
        try {
          const historias = JSON.parse(idea.notas.substring('HISTORIAS_SECUENCIA:'.length));
          contenidoDetallado = historias.map((h, i) => {
            const partes = [`HISTORIA ${i + 1}` + (h.tipo ? ` [${h.tipo}]` : '') + ':'];
            if (h.texto_principal) partes.push('Texto: ' + h.texto_principal);
            if (h.zocalo) partes.push('Zócalo: ' + h.zocalo);
            if (h.visual_sugerido && incluirInternas) partes.push('[Visual: ' + h.visual_sugerido + ']');
            return partes.join('\n');
          }).join('\n\n');
        } catch (e) {}
      }
    }

    // Si no hay contenido especial, usar el copy
    if (!contenidoDetallado && idea.copy) contenidoDetallado = idea.copy;

    fila['Contenido / Guión / Slides'] = contenidoDetallado;
    fila['CTA'] = idea.cta || '';
    fila['Hashtags'] = idea.hashtags || '';

    if (incluirInternas) {
      const notasInternas = (idea.notas && !idea.notas.startsWith('CARRUSEL_SLIDES:') &&
                             !idea.notas.startsWith('REEL_GUION:') &&
                             !idea.notas.startsWith('HISTORIAS_SECUENCIA:')) ? idea.notas : '';
      fila['Notas internas'] = notasInternas;
    }

    return fila;
  });

  const ws = XLSX.utils.json_to_sheet(filas);
  const cols = Object.keys(filas[0]);
  ws['!cols'] = cols.map(col => {
    if (col === 'Contenido / Guión / Slides') return { wch: 60 };
    if (col === 'Hook' || col === 'Título' || col === 'Idea / Descripción') return { wch: 35 };
    if (col === 'CTA' || col === 'Hashtags' || col === 'Notas internas') return { wch: 25 };
    return { wch: 18 };
  });

  // Wrap text en celdas con saltos
  const range = XLSX.utils.decode_range(ws['!ref']);
  for (let R = range.s.r + 1; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({ r: R, c: C });
      if (ws[addr] && typeof ws[addr].v === 'string' && ws[addr].v.includes('\n')) {
        ws[addr].s = { alignment: { wrapText: true, vertical: 'top' } };
      }
    }
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ideas');
  const nombreArchivo = `Ideas ${cliente.nombre.replace(/\s+/g, '_')} - ${todayISO()}.xlsx`;
  XLSX.writeFile(wb, nombreArchivo);
  showToast(`✓ Excel descargado · ${ideas.length} ideas`, 'success');
}

let ingresosFiltroMes = null; // por defecto mes actual

function renderFinanzasIngresos() {

    ingresosFiltroMes = `${hoy.getFullYear()}-${String(hoy.getMonth() + 1).padStart(2, '0')}`;
  }
  const [anioStr, mesStr] = ingresosFiltroMes.split('-');
  const anio = Number(anioStr);
  const mes = Number(mesStr);

  const ingresosDelMes = state.finanzas_ingresos.filter(i => Number(i.mes) === mes && Number(i.anio) === anio);
  const totalMes = ingresosDelMes.reduce((s, i) => s + (Number(i.monto_ars) || 0), 0);
  const cobrado = ingresosDelMes.filter(i => i.estado === 'Cobrado').reduce((s, i) => s + (Number(i.monto_ars) || 0), 0);
  const pendiente = ingresosDelMes.filter(i => i.estado === 'Pendiente').reduce((s, i) => s + (Number(i.monto_ars) || 0), 0);
  const vencido = ingresosDelMes.filter(i => i.estado === 'Vencido').reduce((s, i) => s + (Number(i.monto_ars) || 0), 0);

  const filas = ingresosDelMes.map(i => {
    const cliente = state.clientes.find(c => c.id === i.cliente_id);
    return `
      <tr>
        <td>${esc(cliente ? cliente.nombre : '(cliente borrado)')}</td>

async function generarIngresosAutomaticos() {
  const [anioStr, mesStr] = ingresosFiltroMes.split('-');
  const anio = Number(anioStr);
  const mes = Number(mesStr);

  const clientesActivos = state.clientes.filter(c => (c.estado || 'Activo') === 'Activo' && c.servicio_contratado);
  if (clientesActivos.length === 0) {
    showToast('No hay clientes activos con servicio asignado', 'error');
    return;
  }

  // Ya existen?
  const yaExistentes = state.finanzas_ingresos.filter(i => Number(i.mes) === mes && Number(i.anio) === anio);
  const yaGenerados = new Set(yaExistentes.map(i => i.cliente_id));

  const aGenerar = clientesActivos.filter(c => !yaGenerados.has(c.id));

  if (aGenerar.length === 0) {
    showToast('Ya existen ingresos de todos los clientes activos para este mes', 'success');
    return;
  }

  if (!confirm(`¿Generar ${aGenerar.length} ingreso${aGenerar.length > 1 ? 's' : ''} automáticamente según los servicios contratados? (podés editarlos después)`)) return;

  showAutosave('saving', `Generando ${aGenerar.length} ingresos...`);

  try {
    for (const c of aGenerar) {
      const servicio = state.servicios.find(s => s.nombre === c.servicio_contratado);
      const monto = servicio ? (servicio.precio_ars || 0) : 0;
      await sheetAppend('Finanzas_Ingresos', {
        id: genId('ing'),
        cliente_id: c.id,
        mes,
        anio,
        concepto: c.servicio_contratado,
        monto_ars: monto,
        monto_usd: servicio ? (servicio.precio_usd || '') : '',
        fecha_emision: todayISO(),
        estado: 'Pendiente',
      });
    }
    showAutosave('saved', 'Ingresos generados');
    showToast(`${aGenerar.length} ingresos creados como Pendientes`, 'success');
    renderFinanzas();
  } catch (e) {
    showAutosave('error', 'Error');
    showToast('Error: ' + e.message, 'error');
  }
}

// ---- PROYECCIÓN ----
function renderFinanzasProyeccion() {
  const hoy = new Date();
  const meses = [];

  // Próximos 3 meses + actual
  for (let i = 0; i < 4; i++) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth() + i, 1);
    const mes = d.getMonth() + 1;
    const anio = d.getFullYear();

    // Ingresos confirmados (cargados en la planilla)
    const ingresosMes = state.finanzas_ingresos.filter(ing => Number(ing.mes) === mes && Number(ing.anio) === anio);
    const ingresosTotal = ingresosMes.reduce((s, ing) => s + (Number(ing.monto_ars) || 0), 0);

    // Proyección basada en clientes activos con servicios
    const clientesActivos = state.clientes.filter(c => (c.estado || 'Activo') === 'Activo' && c.servicio_contratado);
    let proyectado = 0;
    clientesActivos.forEach(c => {
      const servicio = state.servicios.find(s => s.nombre === c.servicio_contratado);
      if (servicio) proyectado += Number(servicio.precio_ars) || 0;
    });

    // Egresos recurrentes
    const egresosRecurrentes = state.finanzas_egresos.filter(e => e.recurrente === 'Sí');
    const egresosTotal = egresosRecurrentes.reduce((s, e) => s + (Number(e.monto_ars) || 0), 0);

    const nombresMeses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    meses.push({
      nombre: `${nombresMeses[d.getMonth()]} ${anio}`,
      ingresosConfirmados: ingresosTotal,
      ingresosProyectados: i === 0 ? 0 : proyectado, // mes actual no lo proyectamos
      egresos: egresosTotal,
      esActual: i === 0,
    });
  }

  $('finanzasContent').innerHTML = `
    <div class="card" style="margin-bottom: 16px;">
      <div class="card-title">📈 Proyección próximos 3 meses</div>
      <p style="color: var(--gris-text-soft); font-size: 13px;">
        La proyección se calcula automáticamente basada en tus clientes activos con servicios contratados. Los egresos recurrentes se suman cada mes.
      </p>
    </div>

    <table class="finanzas-tabla">
      <thead>
        <tr>
          <th>Mes</th>
          <th>Ingresos confirmados</th>
          <th>Ingresos proyectados</th>
          <th>Egresos recurrentes</th>
          <th>Balance estimado</th>
        </tr>
      </thead>
      <tbody>
        ${meses.map(m => {
          const totalIngresos = m.ingresosConfirmados + m.ingresosProyectados;
          const balance = totalIngresos - m.egresos;
          return `
            <tr ${m.esActual ? 'style="background: #fef8fb;"' : ''}>
              <td style="font-weight: 600;">${esc(m.nombre)}${m.esActual ? ' <span style="font-size: 11px; color: var(--fucsia); font-weight: 700;">(actual)</span>' : ''}</td>
              <td class="monto-positivo">$${formatMiles(m.ingresosConfirmados)}</td>
              <td style="color: var(--gris-text-soft);">${m.ingresosProyectados > 0 ? '+$' + formatMiles(m.ingresosProyectados) : '—'}</td>
              <td class="monto-negativo">-$${formatMiles(m.egresos)}</td>
              <td style="font-weight: 700; color: ${balance >= 0 ? 'var(--verde)' : 'var(--rojo)'};">$${formatMiles(balance)}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

function renderMetricasList() {
  const clientesActivos = state.clientes.filter(c => (c.estado || 'Activo') === 'Activo');

  if (state.metricas.length === 0) {
    $('metricasContent').innerHTML = `
      <div class="empty-state">

        <p style="font-size: 12.5px; margin-top: 8px;">
          Cargá métricas por período (de los últimos 3 días, una semana, un mes completo, lo que te sirva).
          <br>La app te va a mostrar el cumplimiento de los KPIs que definiste en la estrategia.
        </p>
        <button class="btn btn-primary" onclick="openMetricasModal()" style="margin-top: 16px;">+ Cargar primeras métricas</button>
      </div>
    `;
    return;
  }

  // Agrupar por cliente
  const porCliente = {};
  state.metricas.forEach(m => {
    if (!porCliente[m.cliente_id]) porCliente[m.cliente_id] = [];
    porCliente[m.cliente_id].push(m);
  });

  // Estado por cliente del toggle "período / mes" (persiste mientras la página esté montada)
  if (!state.metricasVistaPorCliente) state.metricasVistaPorCliente = {};

  const cards = clientesActivos.map(c => {
    const metricasCliente = (porCliente[c.id] || []).sort((a, b) =>
      (b.fecha_hasta || '').localeCompare(a.fecha_hasta || '')
    );
    if (metricasCliente.length === 0) {
      return `
        <div class="metricas-cliente-card">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin: 0;">${esc(c.nombre)}</h3>

        </div>
      `;
    }

    const ultima = metricasCliente[0];
    // Default: si hay 2+ períodos del mes de la última carga, mostrar "Mes completo". Si no, "Período".
    if (!state.metricasVistaPorCliente[c.id]) {
      const periodosDelMesUltima = metricasDelMismoMes(metricasCliente, ultima.fecha_hasta);
      state.metricasVistaPorCliente[c.id] = periodosDelMesUltima.length > 1 ? 'mes' : 'periodo';

  $('metricasContent').innerHTML = cards;

// Devuelve los períodos cuyo fecha_hasta cae en el mismo mes calendario que la fecha de referencia (YYYY-MM-DD)
function metricasDelMismoMes(metricasCliente, fechaRefIso) {
  if (!fechaRefIso) return [];
  const ref = new Date(fechaRefIso + 'T00:00:00');
  const mes = ref.getMonth();
  const anio = ref.getFullYear();
  return metricasCliente.filter(m => {
    if (!m.fecha_hasta) return false;
    const h = new Date(m.fecha_hasta + 'T00:00:00');
    return h.getMonth() === mes && h.getFullYear() === anio;
  });
}

// Suma campos numéricos de varias métricas. Para 'seguidores_fin' devuelve el del período más reciente.
function consolidarMetricas(metricasArr) {
  if (!metricasArr || metricasArr.length === 0) return {};
  const camposSuma = [
    'visualizaciones', 'cuentas_alcanzadas', 'interacciones',
    'empezaron_seguir', 'dejaron_seguir', 'me_gusta', 'respuestas',
    'veces_compartido', 'guardados', 'visitas_perfil',
    'toques_enlace_externo', 'toques_direccion'
  ];
  const out = {};
  camposSuma.forEach(k => {
    out[k] = metricasArr.reduce((s, m) => s + (Number(m[k]) || 0), 0);
  });
  // seguidores_fin = el del período más reciente (es un saldo, no se suma)
  const ordenadas = [...metricasArr].sort((a, b) => (b.fecha_hasta || '').localeCompare(a.fecha_hasta || ''));
  out.seguidores_fin = Number(ordenadas[0].seguidores_fin) || 0;
  // Tipos de contenido únicos consolidados
  const tiposSet = new Set();
  metricasArr.forEach(m => (parseJsonSafe(m.tipos_contenido) || []).forEach(t => tiposSet.add(t)));
  out._tiposContenido = Array.from(tiposSet);
  // Período total: del más antiguo al más reciente
  const desdes = metricasArr.map(m => m.fecha_desde).filter(Boolean).sort();
  const hastas = metricasArr.map(m => m.fecha_hasta).filter(Boolean).sort();
  out._fechaDesde = desdes[0];
  out._fechaHasta = hastas[hastas.length - 1];
  out._cantidadPeriodos = metricasArr.length;
  return out;
}

// Llamado por el toggle del card
function cambiarVistaMetricas(clienteId, vista) {
  if (!state.metricasVistaPorCliente) state.metricasVistaPorCliente = {};
  state.metricasVistaPorCliente[clienteId] = vista;
  renderMetricasList();
}

function renderMetricaCard(cliente, ultima, historial) {
  // Buscar KPIs del cliente
  const estrategiaActiva = state.estrategias.find(e =>
    e.cliente_id === cliente.id && e.tipo === 'Principal' && (e.estado || 'Activa') === 'Activa'
  );
  const kpis = estrategiaActiva ? normalizarKpis(parseJsonSafe(estrategiaActiva.kpis_sugeridos_json)) : [];

  // Determinar vista actual y armar dataset consolidado si hace falta
  const vista = (state.metricasVistaPorCliente && state.metricasVistaPorCliente[cliente.id]) || 'periodo';
  const periodosMes = metricasDelMismoMes(historial, ultima.fecha_hasta);
  const hayMultiPeriodos = periodosMes.length > 1;
  const usarMes = vista === 'mes' && hayMultiPeriodos;

  // Datos a mostrar (vista período = última métrica; vista mes = consolidado del mes)
  const datos = usarMes ? consolidarMetricas(periodosMes) : ultima;

  // Etiqueta de período y formatos según vista
  const nombresMesesLargos = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  let periodoLabel, tiposLabel;
  if (usarMes) {
    const refMes = new Date(ultima.fecha_hasta);
    periodoLabel = `${nombresMesesLargos[refMes.getMonth()]} ${refMes.getFullYear()} · ${periodosMes.length} períodos cargados`;
    const tipos = datos._tiposContenido || [];
    tiposLabel = tipos.length > 0
      ? tipos.map(t => (TIPOS_CONTENIDO.find(x => x.v === t) || {}).l || t).join(' · ')
      : 'sin especificar';
  } else {
    periodoLabel = `${formatDateEs(ultima.fecha_desde)} → ${formatDateEs(ultima.fecha_hasta)}`;
    const tipos = parseJsonSafe(ultima.tipos_contenido) || [];
    tiposLabel = tipos.length > 0
      ? tipos.map(t => (TIPOS_CONTENIDO.find(x => x.v === t) || {}).l || t).join(' · ')
      : 'sin especificar';
  }

  // Toggle (solo lo mostramos si hay 2+ períodos del mes de la última carga)
  const toggleHtml = hayMultiPeriodos ? `
    <div style="display: inline-flex; background: var(--gris-bg); border-radius: 8px; padding: 3px; margin-bottom: 12px; font-size: 12px;">

        style="padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
          background: ${vista === 'mes' ? 'var(--fucsia)' : 'transparent'};
          color: ${vista === 'mes' ? '#fff' : 'var(--gris-text-soft)'};">
        Mes completo
      </button>
    </div>
  ` : '';

  // KPIs
  const tituloKpis = usarMes ? '🎯 Cumplimiento de KPIs del mes' : '🎯 Cumplimiento de KPIs del período';
  const kpisHtml = kpis.length > 0 ? `
    <div style="margin-top: 14px; background: linear-gradient(135deg, #fef8fb 0%, #fefbf7 100%); border: 1px solid var(--fucsia-light); border-radius: 8px; padding: 12px 14px;">

    </div>
  `;

  // Métricas básicas
  const metricasMostrar = [

    { key: 'cuentas_alcanzadas', label: 'Cuentas alcanzadas', icon: '📡' },

function renderKpiCumplimiento(kpi, metrica) {
  const metaNum = Number(kpi.meta);
  const tieneMeta = !isNaN(metaNum) && metaNum > 0;
  const valorActual = Number(metrica[kpi.metrica_asociada]) || 0;

  let estadoIcon = '🎯';
  let estadoColor = 'var(--petroleo)';
  let estadoLabel = '';
  let porcentaje = 0;

  if (kpi.metrica_asociada === 'otro' || !tieneMeta) {
    estadoIcon = '📋';
    estadoColor = 'var(--gris-text-muted)';
    estadoLabel = 'medición manual';
  } else {
    porcentaje = Math.round((valorActual / metaNum) * 100);
    if (porcentaje >= 100) {
      estadoIcon = '✅';
      estadoColor = 'var(--verde)';
      estadoLabel = '¡Cumplido!';
    } else if (porcentaje >= 70) {
      estadoIcon = '🟡';
      estadoColor = '#c47d1a';
      estadoLabel = 'Cerca (' + porcentaje + '%)';
    } else {
      estadoIcon = '⚠️';
      estadoColor = 'var(--rojo)';
      estadoLabel = 'Por debajo (' + porcentaje + '%)';
    }
  }

  const prioridadBadge = kpi.prioridad === 'alta' ? '<span style="font-size: 10px; padding: 1px 5px; background: var(--fucsia); color: #fff; border-radius: 3px; margin-left: 4px; font-weight: 700;">ALTA</span>' : '';

  return `
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px dashed var(--gris-border);">
      <div style="flex: 1; min-width: 0;">
        <div style="font-size: 13px; font-weight: 600;">${estadoIcon} ${esc(kpi.nombre)} ${prioridadBadge}</div>
        ${tieneMeta ? `
          <div style="font-size: 11px; color: var(--gris-text-muted); margin-top: 1px;">
            Actual: <strong>${formatMiles(valorActual)}</strong> ${esc(kpi.unidad || '')} · Meta: <strong>${formatMiles(metaNum)}</strong>
          </div>
        ` : `
          <div style="font-size: 11px; color: var(--gris-text-muted); margin-top: 1px;">
            ${esc(kpi.unidad || '')}
          </div>
        `}
      </div>
      <div style="font-size: 11.5px; font-weight: 600; color: ${estadoColor}; text-align: right; padding-left: 8px;">
        ${esc(estadoLabel)}
      </div>
    </div>
  `;
}

async function saveMetrica(id) {

  // Extraer tipos de contenido

  const data = {

    guardados: $('f_guardados').value.trim(),
    visitas_perfil: $('f_visitas_perfil').value.trim(),
    toques_enlace_externo: $('f_toques_enlace_externo').value.trim(),
    toques_direccion: $('f_toques_direccion').value.trim(),
    notas: $('f_notas').value.trim(),
  };

  try {
    if (id) {

// Mini renderer de markdown (títulos, listas, bold)
function renderMarkdown(md) {
  if (!md) return '';
  let html = esc(md);
  html = html.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Listas
  html = html.replace(/(?:^|\n)((?:- .+\n?)+)/g, (m) => {
    const items = m.trim().split('\n').map(l => l.replace(/^- /, '')).map(l => `<li>${l}</li>`).join('');
    return '\n<ul>' + items + '</ul>';
  });
  // Párrafos (líneas en blanco)
  html = html.split(/\n\n+/).map(p => {
    if (p.trim().startsWith('<h') || p.trim().startsWith('<ul')) return p;
    return p.trim() ? `<p>${p.replace(/\n/g, '<br>')}</p>` : '';
  }).join('\n');
  return html;
}
