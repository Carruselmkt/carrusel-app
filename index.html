async function renderTabBrief() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando brief...</div>`;

  try {
    const [briefRes, fodaRes] = await Promise.all([
      sheetRead('Briefs'),
      sheetRead('FODA').catch(() => ({ data: [] })),
    ]);
    state.briefs = briefRes.data;
    state.foda = fodaRes.data;
    let brief = briefRes.data.find(b => b.cliente_id === cliente.id) || { cliente_id: cliente.id };
    let foda = fodaRes.data.find(f => f.cliente_id === cliente.id) || null;

    const sectionsHtml = BRIEF_SECTIONS.map(section => {
      const totalFields = section.fields.length;
      const completedFields = section.fields.filter(f => brief[f.k] && brief[f.k].trim()).length;
      const isComplete = completedFields === totalFields;
      const isPartial = completedFields > 0 && !isComplete;

      const fieldsHtml = section.fields.map(f => {
        const val = brief[f.k] || '';
        const input = f.type === 'textarea'
          ? `<textarea class="form-textarea" data-field="${f.k}" onblur="saveBriefField('${cliente.id}', '${f.k}', this.value)">${esc(val)}</textarea>`
          : `<input type="text" class="form-input" data-field="${f.k}" value="${esc(val)}" onblur="saveBriefField('${cliente.id}', '${f.k}', this.value)">`;
        return `
          <div class="form-row">
            <label class="form-label">${esc(f.label)}</label>
            ${input}
          </div>`;
      }).join('');

      return `
        <div class="brief-section ${isComplete || isPartial ? 'open' : ''}" data-section="${section.id}">
          <div class="brief-section-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="brief-section-icon">${section.icon}</span>
            <span class="brief-section-title">${esc(section.title)}</span>
            <span class="brief-progress ${isComplete ? 'complete' : ''}">${completedFields}/${totalFields}</span>
            <span class="brief-section-caret">▸</span>
          </div>
          <div class="brief-section-body">${fieldsHtml}</div>
        </div>`;
    }).join('');

    const totalAll = BRIEF_SECTIONS.reduce((a, s) => a + s.fields.length, 0);
    const completedAll = BRIEF_SECTIONS.reduce((a, s) => a + s.fields.filter(f => brief[f.k] && brief[f.k].trim()).length, 0);
    const pct = Math.round((completedAll / totalAll) * 100);

    // Sección FODA (parte del brief, al final)
    const fodaCompleta = foda && (foda.fortalezas || foda.oportunidades || foda.debilidades || foda.amenazas);
    const fodaSection = renderFODASection(cliente.id, foda, fodaCompleta);

    $('tabContent').innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px;">
        <div>
          <h3>Brief del cliente</h3>

            Se guarda automáticamente al salir de cada campo.
          </p>
        </div>
        <div style="text-align: right;">
          <div style="font-size: 11.5px; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;">Progreso total</div>
          <div style="font-size: 22px; font-family: 'Fraunces', serif; font-weight: 600; color: ${pct === 100 ? 'var(--verde)' : 'var(--fucsia)'};">${pct}%</div>
          <div style="font-size: 11px; color: var(--gris-text-muted);">${completedAll} de ${totalAll} campos</div>
        </div>
      </div>
      ${sectionsHtml}

  } catch (e) {

async function saveFODAField(clienteId, field, value) {
  const key = 'foda_' + clienteId + '_' + field;
  clearTimeout(autosaveTimers[key]);
  autosaveTimers[key] = setTimeout(async () => {
    showAutosave('saving', 'Guardando FODA...');
    try {
      const { data } = await sheetRead('FODA');
      const existing = data.find(f => f.cliente_id === clienteId);
      const hoy = todayISO();
      if (existing) {
        if ((existing[field] || '') === value) { showAutosave('saved', 'Guardado'); return; }
        await sheetUpdate('FODA', existing.id, { [field]: value, fecha_actualizacion: hoy });
      } else {
        const nuevo = {
          id: genId('foda'),
          cliente_id: clienteId,
          fortalezas: '',
          oportunidades: '',
          debilidades: '',
          amenazas: '',
          fecha_creacion: hoy,
          fecha_actualizacion: hoy,
          [field]: value,
        };
        await sheetAppend('FODA', nuevo);
      }
      showAutosave('saved', 'Guardado');
    } catch (e) {
      showAutosave('error', 'Error al guardar FODA');
      console.error(e);
    }
  }, 400);
}

// Helper para obtener FODA de un cliente (para inyectar en prompts)
async function obtenerFODA(clienteId) {
  try {
    if (!state.foda || state.foda.length === 0) {
      const { data } = await sheetRead('FODA');
      state.foda = data;
    }
    return state.foda.find(f => f.cliente_id === clienteId) || null;
  } catch (e) {
    return null;
  }
}

function buildFODAContext(clienteId) {
  const foda = (state.foda || []).find(f => f.cliente_id === clienteId);
  if (!foda) return '';
  const partes = [];
  if (foda.fortalezas) partes.push(`FORTALEZAS:\n${foda.fortalezas}`);
  if (foda.oportunidades) partes.push(`OPORTUNIDADES:\n${foda.oportunidades}`);
  if (foda.debilidades) partes.push(`DEBILIDADES:\n${foda.debilidades}`);
  if (foda.amenazas) partes.push(`AMENAZAS:\n${foda.amenazas}`);
  if (partes.length === 0) return '';
  return `\n\nANÁLISIS FODA DEL CLIENTE:\n${partes.join('\n\n')}`;
}

async function abrirGeneradorFODA(clienteId) {
  if (!checkApiKey()) return;
  const cliente = state.clientes.find(c => c.id === clienteId);
  if (!cliente) return;

  // Verificar que el brief tenga datos suficientes (con las claves reales del brief)
  const brief = (state.briefs || []).find(b => b.cliente_id === clienteId) || {};
  const camposRelevantes = [
    'productos_servicios','historia','mision_vision_valores',
    'publico_objetivo','objetivo_general','objetivo_redes',
    'que_transmitir','competencia_local','competencia_nacional',
    'mas_rentable','mas_vendido','funcionamiento'
  ];
  const completos = camposRelevantes.filter(k => brief[k] && brief[k].trim()).length;

  if (completos < 3) {
    showToast('Completá al menos 3 campos del brief (productos, público, objetivos, etc.) antes de generar el FODA con IA.', 'error');
    return;
  }

  // Verificar si ya hay FODA cargado y advertir
  const fodaActual = (state.foda || []).find(f => f.cliente_id === clienteId);
  const tieneContenido = fodaActual && (fodaActual.fortalezas || fodaActual.oportunidades || fodaActual.debilidades || fodaActual.amenazas);

  if (tieneContenido) {
    if (!confirm('Ya hay un FODA cargado. Si generás uno nuevo, se va a sobrescribir el actual.\n\n¿Continuar?')) return;
  }

  abrirModalGeneracion('Generando FODA con IA', '🎯', cliente.nombre);

  try {
    const briefContexto = buildBriefContext(clienteId);

    const systemPrompt = `Sos analista estratégica de Carrusel MKT, agencia argentina. Tu tarea es generar un análisis FODA profesional y específico para un cliente.

PRINCIPIOS CLAVE:
1. Cada cuadrante debe tener entre 3 y 5 puntos concretos, no genéricos.
2. ESPECIFICIDAD: nada de "tiene buenos productos" — usá detalles del brief ("ofrece atención online en zonas con poca cobertura").
3. Las FORTALEZAS son INTERNAS y POSITIVAS (lo que la marca controla y le juega a favor).
4. Las DEBILIDADES son INTERNAS y NEGATIVAS (lo que la marca controla pero le juega en contra: carencias, faltantes).
5. Las OPORTUNIDADES son EXTERNAS y POSITIVAS (contexto del mercado, tendencias, huecos a aprovechar).
6. Las AMENAZAS son EXTERNAS y NEGATIVAS (competencia, cambios, riesgos del entorno).
7. Las amenazas y oportunidades deben referirse al MERCADO/CONTEXTO del rubro, no a problemas internos.
8. Español rioplatense (vos, ustedes).
9. Cada punto en una línea, empezando con guión "- ".

ESTRUCTURA DE CADA PUNTO:
"- [Aspecto concreto]: [implicancia o explicación breve]"
Ejemplo: "- Atención personalizada online: permite cubrir pacientes en zonas con poca oferta especializada"

NO inventes datos que no estén en el brief. Si no hay info para un cuadrante, decí "- (Completar manualmente con conocimiento del cliente)".

FORMATO DE SALIDA: SOLO un JSON válido, sin markdown, sin texto adicional:
{
  "fortalezas": "- punto 1\\n- punto 2\\n- punto 3",
  "oportunidades": "- punto 1\\n- punto 2\\n- punto 3",
  "debilidades": "- punto 1\\n- punto 2\\n- punto 3",
  "amenazas": "- punto 1\\n- punto 2\\n- punto 3"
}`;

    const userPrompt = `CLIENTE: ${cliente.nombre}
${briefContexto}

Generá el análisis FODA completo basándote en el brief. Devolvé SOLO el JSON.`;

    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2000 });
    const fodaPropuesta = extractJson(raw);

    if (!fodaPropuesta || typeof fodaPropuesta !== 'object') {
      throw new Error('La IA no devolvió un FODA válido');
    }

    mostrarPreviewFODA(clienteId, fodaPropuesta);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function mostrarPreviewFODA(clienteId, foda) {
  const cliente = state.clientes.find(c => c.id === clienteId);

async function guardarFODAGenerado() {
  const ctx = window._fodaCtx;
  if (!ctx) return;

  const fortalezas = $('foda_preview_fortalezas').value.trim();
  const oportunidades = $('foda_preview_oportunidades').value.trim();
  const debilidades = $('foda_preview_debilidades').value.trim();
  const amenazas = $('foda_preview_amenazas').value.trim();
  const hoy = todayISO();

  try {
    const { data } = await sheetRead('FODA');
    const existing = data.find(f => f.cliente_id === ctx.clienteId);
    if (existing) {
      await sheetUpdate('FODA', existing.id, {
        fortalezas, oportunidades, debilidades, amenazas,
        fecha_actualizacion: hoy,
      });
    } else {
      await sheetAppend('FODA', {
        id: genId('foda'),
        cliente_id: ctx.clienteId,
        fortalezas, oportunidades, debilidades, amenazas,
        fecha_creacion: hoy,
        fecha_actualizacion: hoy,
      });
    }
    // Refrescar state
    const { data: nuevosFoda } = await sheetRead('FODA');
    state.foda = nuevosFoda;

    closeModal();
    showToast('✓ FODA guardado correctamente', 'success');
    if (state.currentClienteTab === 'brief') renderTabBrief();
  } catch (e) {
    showToast('Error guardando: ' + e.message, 'error');
  }
}

async function saveBriefField(clienteId, field, value) {
  // Debounce: evitar saves consecutivos del mismo campo
  const key = clienteId + '_' + field;
  clearTimeout(autosaveTimers[key]);
  autosaveTimers[key] = setTimeout(async () => {
    showAutosave('saving', 'Guardando...');
    try {
      // Buscar brief existente
      const { data } = await sheetRead('Briefs');
      const existing = data.find(b => b.cliente_id === clienteId);
      if (existing) {
        if ((existing[field] || '') === value) { showAutosave('saved', 'Guardado'); return; }
        await sheetUpdate('Briefs', existing.id, { [field]: value });
      } else {
        const newBrief = { id: genId('bri'), cliente_id: clienteId, fecha_completado: todayISO(), [field]: value };
        await sheetAppend('Briefs', newBrief);
      }
      showAutosave('saved', 'Guardado');
      // Actualizar contador de progreso sin re-renderizar todo
      updateBriefProgress(clienteId, field, value);
    } catch (e) {
      showAutosave('error', 'Error al guardar');
      console.error(e);
    }
  }, 400);
}

function updateBriefProgress(clienteId, field, value) {
  // Encontrar la sección que contiene el campo
  const section = BRIEF_SECTIONS.find(s => s.fields.some(f => f.k === field));
  if (!section) return;
  const sectionEl = document.querySelector(`[data-section="${section.id}"]`);
  if (!sectionEl) return;
  const inputs = sectionEl.querySelectorAll('[data-field]');
  let completed = 0;
  inputs.forEach(inp => { if (inp.value && inp.value.trim()) completed++; });
  const progressEl = sectionEl.querySelector('.brief-progress');
  if (progressEl) {
    progressEl.textContent = `${completed}/${section.fields.length}`;
    progressEl.classList.toggle('complete', completed === section.fields.length);
  }
  // actualizar progreso global
  let totalAll = 0, completedAll = 0;
  BRIEF_SECTIONS.forEach(s => {
    const se = document.querySelector(`[data-section="${s.id}"]`);
    if (!se) return;
    const ins = se.querySelectorAll('[data-field]');
    totalAll += ins.length;
    ins.forEach(i => { if (i.value && i.value.trim()) completedAll++; });
  });
  const pct = Math.round((completedAll / totalAll) * 100);
  const pctEl = document.querySelector('#tabContent > div:first-child > div:last-child > div:nth-child(2)');
  if (pctEl) {
    pctEl.textContent = pct + '%';
    pctEl.style.color = pct === 100 ? 'var(--verde)' : 'var(--fucsia)';
    const countEl = pctEl.nextElementSibling;
    if (countEl) countEl.textContent = `${completedAll} de ${totalAll} campos`;
  }
}

async function callClaude(systemPrompt, userPrompt, options = {}) {
  if (!state.apiKey) {
    throw new Error('No hay API key configurada. Cargala en la hoja "Config" de tu planilla (fila con clave "anthropic_api_key").');
  }

  const model = options.model || 'claude-sonnet-4-5';
  const maxTokens = options.maxTokens || 2048;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model,
        max_tokens: maxTokens,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }],
      }),
    });

    if (!res.ok) {
      const errorData = await res.json().catch(() => ({}));
      const msg = errorData?.error?.message || `Error ${res.status}`;
      if (res.status === 401) throw new Error('API key inválida. Verificala en la hoja Config de tu planilla.');
      if (res.status === 429) throw new Error('Límite de velocidad alcanzado. Esperá unos segundos y reintentá.');
      if (res.status === 400 && msg.includes('credit')) throw new Error('Sin crédito disponible en Anthropic. Cargá más en console.anthropic.com');
      throw new Error(msg);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    return text;
  } catch (e) {
    if (e.message.includes('Failed to fetch')) {
      throw new Error('Error de red. Verificá tu conexión a internet.');
    }
    throw e;
  }
}

// Extrae el primer bloque JSON válido de una respuesta de texto
function extractJson(text) {
  // Intento 1: parsear directo
  try { return JSON.parse(text); } catch (e) {}
  // Intento 2: buscar entre ```json ... ```
  const match1 = text.match(/```json\s*([\s\S]*?)\s*```/);
  if (match1) { try { return JSON.parse(match1[1]); } catch (e) {} }
  // Intento 3: buscar entre ``` ... ```
  const match2 = text.match(/```\s*([\s\S]*?)\s*```/);
  if (match2) { try { return JSON.parse(match2[1]); } catch (e) {} }
  // Intento 4: buscar primer { o [ hasta el último } o ]
  const first = Math.min(
    text.indexOf('{') === -1 ? Infinity : text.indexOf('{'),
    text.indexOf('[') === -1 ? Infinity : text.indexOf('[')
  );
  const last = Math.max(text.lastIndexOf('}'), text.lastIndexOf(']'));
  if (first !== Infinity && last !== -1 && last > first) {
    try { return JSON.parse(text.substring(first, last + 1)); } catch (e) {}
  }
  throw new Error('La IA no devolvió un JSON válido. Intentá regenerar.');
}

function buildEstrategiaContext(estrategia) {
  let ctx = `NOMBRE DE LA ESTRATEGIA: ${estrategia.nombre}\n`;
  ctx += `TIPO: ${estrategia.tipo}\n`;
  if (estrategia.momento_fase) {
    const fase = FASES_MOMENTO.find(f => f.v === estrategia.momento_fase);
    ctx += `MOMENTO/FASE: ${fase ? fase.label : estrategia.momento_fase}\n`;
  }
  if (estrategia.momento_descripcion) ctx += `CONTEXTO DEL MOMENTO: ${estrategia.momento_descripcion}\n`;
  ctx += `OBJETIVO PRINCIPAL: ${estrategia.objetivo_principal}\n`;
  if (estrategia.metricas_meta) ctx += `METAS CONCRETAS: ${estrategia.metricas_meta}\n`;
  if (estrategia.fecha_inicio) ctx += `FECHAS: ${estrategia.fecha_inicio}${estrategia.fecha_fin ? ' a ' + estrategia.fecha_fin : ''}\n`;
  return ctx;
}

async function renderTabEstrategia() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  try {

      sheetRead('Estrategias'),
      sheetRead('Briefs'),

function parseJsonSafe(str) {
  if (!str || str === '') return [];
  try {
    const parsed = JSON.parse(str);
    return parsed;
  } catch (e) { return []; }
}

async function saveEstrategia(id) {
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }
  const objetivo = $('f_objetivo_principal').value.trim();
  if (!objetivo) { showToast('El objetivo principal es obligatorio', 'error'); return; }

  const data = {
    cliente_id: state.currentClienteId,
    nombre,
    tipo: $('f_tipo').value,
    estado: 'Activa',
    fecha_inicio: $('f_fecha_inicio').value,
    fecha_fin: $('f_fecha_fin').value,
    momento_fase: $('f_momento_fase').value,
    momento_descripcion: $('f_momento_descripcion').value.trim(),
    objetivo_principal: objetivo,
    metricas_meta: $('f_metricas_meta').value.trim(),
    notas: $('f_notas').value.trim(),
  };

  try {
    if (id) {
      await sheetUpdate('Estrategias', id, data);
      showToast('Estrategia actualizada', 'success');
    } else {
      data.id = genId('est');
      data.fecha_creacion = todayISO();
      data.buyer_personas_json = '';
      data.pilares_json = '';
      data.tono_voz_json = '';
      data.kpis_sugeridos_json = '';
      await sheetAppend('Estrategias', data);
      showToast('Estrategia creada', 'success');
    }
    closeModal();
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function cerrarEstrategia(id, motivo) {
  const est = state.estrategias.find(e => e.id === id);
  if (!est) return;
  const esCumplida = motivo === 'cumplida';
  $('modal').className = 'modal';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>${esCumplida ? 'Cerrar como cumplida' : 'Cerrar como descartada'}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p>Vas a cerrar la estrategia <strong>${esc(est.nombre)}</strong>.</p>
      <p style="margin-top: 10px; color: var(--gris-text-soft); font-size: 13px;">
        ${esCumplida ? 'Se marcará como cumplida y pasará al historial. Podés reactivarla en cualquier momento.' : 'Se marcará como descartada y pasará al historial.'}
      </p>
      <div class="form-row" style="margin-top: 14px;">
        <label class="form-label">Notas de cierre (opcional)</label>
        <textarea class="form-textarea" id="f_nota_cierre" placeholder="¿Cómo resultó? ¿Qué aprendiste?"></textarea>
      </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarCierreEstrategia('${id}', '${motivo}')">Confirmar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

async function confirmarCierreEstrategia(id, motivo) {
  const est = state.estrategias.find(e => e.id === id);
  if (!est) return;
  const notaCierre = $('f_nota_cierre').value.trim();
  const nuevasNotas = notaCierre
    ? (est.notas ? est.notas + '\n\n--- Cierre ---\n' + notaCierre : 'Cierre: ' + notaCierre)
    : est.notas;
  const estado = motivo === 'cumplida' ? 'Cumplida' : 'Descartada';
  try {
    await sheetUpdate('Estrategias', id, {
      estado,
      fecha_cierre: todayISO(),
      notas: nuevasNotas,
    });
    closeModal();
    showToast('Estrategia cerrada', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function reactivarEstrategia(id) {
  try {
    await sheetUpdate('Estrategias', id, { estado: 'Activa', fecha_cierre: '' });
    showToast('Estrategia reactivada', 'success');
    renderTabEstrategia();

}

async function generarBuyerPersonas(estrategiaId) {
  if (!checkApiKey()) return;
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  if (!estrategia) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  abrirModalGeneracion(
    'Generar Buyer Personas',
    '👥',
    `La IA va a analizar el brief de ${cliente.nombre} y la estrategia "${estrategia.nombre}" para proponer 2-3 perfiles detallados de público objetivo.`
  );

  const systemPrompt = `Sos una estrategista de marketing digital experta en crear buyer personas detallados y útiles. Trabajás para Carrusel MKT, una agencia argentina dirigida por Marianela.

Tu tarea: a partir de la información de un cliente, generás 2 o 3 buyer personas (perfiles de público objetivo) detallados y accionables.

REGLAS:
- Los buyer personas deben ser específicos y diferenciados entre sí (distinto perfil demográfico, distinto momento de vida, distintos dolores).
- Los dolores, deseos y objeciones tienen que estar conectados con lo que el cliente ofrece.
- Usá español rioplatense (vos, no tú).
- NO inventes datos que no se pueden deducir del brief. Si algo no está claro, usá perfiles razonables para el rubro y momento.

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin texto extra, sin markdown, sin explicaciones). Formato exacto:

[
  {
    "nombre": "Nombre descriptivo del perfil (ej: 'Sofía, 32, profesional con miedo al dentista')",
    "demografia": "Edad, género, ocupación, zona de residencia, nivel socioeconómico",
    "contexto": "Cómo vive, qué hace en el día a día, en qué momento de vida está",
    "dolores": "Qué le duele, qué la frustra, qué problemas quiere resolver. Sé específico.",
    "deseos": "Qué quiere lograr, cómo se quiere sentir, qué aspira",
    "objeciones": "Por qué NO le compraría a este cliente (miedos, creencias que la frenan)",
    "canales": "En qué redes y formatos consume contenido, horarios"
  }
]`;

  const userPrompt = `Información del cliente:

${buildBriefContext(state.currentClienteId)}

Información de la estrategia actual:

${buildEstrategiaContext(estrategia)}

Generá 2 o 3 buyer personas para esta estrategia.`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 2500 });
    const personas = extractJson(raw);

    if (!Array.isArray(personas) || personas.length === 0) {
      throw new Error('La IA no devolvió buyer personas válidos');
    }

    mostrarPreviewBuyerPersonas(estrategiaId, personas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function mostrarPreviewBuyerPersonas(estrategiaId, personas) {
  const cardsHtml = personas.map((bp, i) => `
    <div class="buyer-persona-card" data-bp-idx="${i}">
      <span class="editable-label">Nombre del perfil</span>
      <h4 class="editable-field" contenteditable="true" data-field="nombre" data-placeholder="Ej: Sofía, 32, profesional con miedo al dentista">${esc(bp.nombre || '')}</h4>
      <span class="editable-label">📊 Demografía</span>
      <div class="editable-field" contenteditable="true" data-field="demografia" data-placeholder="Edad, género, ocupación, zona">${esc(bp.demografia || '')}</div>
      <span class="editable-label">🌱 Contexto</span>
      <div class="editable-field" contenteditable="true" data-field="contexto" data-placeholder="Cómo vive, qué hace en el día a día">${esc(bp.contexto || '')}</div>
      <span class="editable-label">😣 Dolores</span>
      <div class="editable-field" contenteditable="true" data-field="dolores" data-placeholder="Qué le duele, qué le frustra">${esc(bp.dolores || '')}</div>
      <span class="editable-label">🎯 Deseos</span>
      <div class="editable-field" contenteditable="true" data-field="deseos" data-placeholder="Qué quiere lograr, cómo quiere sentirse">${esc(bp.deseos || '')}</div>
      <span class="editable-label">🚫 Objeciones</span>
      <div class="editable-field" contenteditable="true" data-field="objeciones" data-placeholder="Por qué no compraría">${esc(bp.objeciones || '')}</div>
      <span class="editable-label">📱 Canales</span>
      <div class="editable-field" contenteditable="true" data-field="canales" data-placeholder="En qué redes consume contenido">${esc(bp.canales || '')}</div>
      <div style="margin-top: 10px; text-align: right;">
        <button class="btn-ghost btn-danger btn-sm" onclick="removePreviewCard(this, 'bp-idx')" style="font-size: 11.5px;">🗑 Eliminar este perfil</button>
      </div>
    </div>
  `).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header">✨ Propuesta de la IA — click en cualquier texto para editarlo</div>
      <div class="editable-hint">
        💡 Podés editar cualquier campo, eliminar perfiles enteros, o aceptar como está. Después de guardar, también vas a poder volver a editar.
      </div>
      <div id="buyerPersonasPreview">${cardsHtml}</div>
    </div>
  `;
  window._pendingEstrategiaId = estrategiaId;

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-secondary" onclick="generarBuyerPersonas('${estrategiaId}')">🔄 Regenerar</button>
    <button class="btn btn-primary" onclick="aceptarBuyerPersonas()">✓ Aceptar y guardar</button>
  `;
}

function removePreviewCard(btn, idxAttr) {
  const card = btn.closest('[data-' + idxAttr + ']');
  if (card) card.remove();
}

function extractBuyerPersonasFromDOM() {
  const cards = document.querySelectorAll('#buyerPersonasPreview [data-bp-idx]');
  const personas = [];
  cards.forEach(card => {
    const bp = {};
    card.querySelectorAll('[data-field]').forEach(field => {
      const val = field.innerText.trim();
      if (val) bp[field.dataset.field] = val;
    });
    if (bp.nombre || bp.demografia || bp.dolores) personas.push(bp);
  });
  return personas;
}

async function aceptarBuyerPersonas() {
  const personas = extractBuyerPersonasFromDOM();
  if (personas.length === 0) {
    showToast('No hay perfiles para guardar', 'error');
    return;
  }
  const estrategiaId = window._pendingEstrategiaId;
  try {
    await sheetUpdate('Estrategias', estrategiaId, { buyer_personas_json: JSON.stringify(personas) });
    closeModal();
    showToast('Buyer personas guardados', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

async function generarPilares(estrategiaId) {
  if (!checkApiKey()) return;
  const estrategia = state.estrategias.find(e => e.id === estrategiaId);
  if (!estrategia) return;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);

  abrirModalGeneracion(
    'Generar Pilares de contenido',
    '🪶',
    `La IA va a proponer 4-5 pilares de contenido con porcentajes sugeridos para el calendario de ${cliente.nombre}.`
  );

  // Incluir buyer personas si ya los hay
  const buyerPersonas = parseJsonSafe(estrategia.buyer_personas_json);
  const buyerContext = buyerPersonas.length > 0
    ? '\n\nBUYER PERSONAS DEFINIDOS:\n' + buyerPersonas.map(bp => `- ${bp.nombre}: dolores: ${bp.dolores}; deseos: ${bp.deseos}`).join('\n')
    : '';

  const systemPrompt = `Sos una estrategista de contenido para redes sociales. Trabajás para Carrusel MKT, una agencia argentina.

function mostrarPreviewPilares(estrategiaId, pilares) {
  const total = pilares.reduce((sum, p) => sum + (Number(p.porcentaje) || 0), 0);
  const cardsHtml = pilares.map((p, i) => `
    <div class="pilar-card" data-pilar-idx="${i}">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px;">
        <div style="flex: 1;">
          <span class="editable-label">Nombre del pilar</span>

        </div>
        <div style="text-align: center;">
          <span class="editable-label">%</span>
          <input type="number" class="form-input" data-field="porcentaje" value="${esc(String(p.porcentaje || ''))}" style="width: 70px; padding: 4px 6px; font-size: 13px; text-align: center;" min="0" max="100">
        </div>
      </div>
      <span class="editable-label">Descripción</span>

      <span class="editable-label">Aborda (dolor/deseo del público)</span>
      <div class="editable-field" contenteditable="true" data-field="aborda" data-placeholder="Qué dolor o deseo del público aborda">${esc(p.aborda || '')}</div>
      <span class="editable-label">Ejemplos de temas (separados por coma)</span>
      <div class="editable-field" contenteditable="true" data-field="temas" data-placeholder="Tema 1, Tema 2, Tema 3">${esc(Array.isArray(p.temas) ? p.temas.join(', ') : (p.temas || ''))}</div>
      <div style="margin-top: 10px; text-align: right;">
        <button class="btn-ghost btn-danger btn-sm" onclick="removePreviewCard(this, 'pilar-idx'); actualizarTotalPilares();" style="font-size: 11.5px;">🗑 Eliminar este pilar</button>
      </div>
    </div>
  `).join('');

  $('genModalBody').innerHTML = `
    <div class="gen-preview">
      <div class="gen-preview-header" id="pilaresHeader">✨ Propuesta de pilares (total: ${total}%)</div>
      <div class="editable-hint">
        💡 Podés editar cualquier texto o porcentaje, eliminar pilares completos, o aceptar como está. Los porcentajes deberían sumar 100%.
      </div>
      <div id="pilaresPreview">${cardsHtml}</div>
    </div>
  `;
  window._pendingEstrategiaId = estrategiaId;

  // Recalcular total al cambiar porcentajes
  setTimeout(() => {
    document.querySelectorAll('#pilaresPreview input[data-field="porcentaje"]').forEach(inp => {
      inp.addEventListener('input', actualizarTotalPilares);
    });
  }, 50);

  $('genModalFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">Descartar</button>
    <button class="btn btn-secondary" onclick="generarPilares('${estrategiaId}')">🔄 Regenerar</button>
    <button class="btn btn-primary" onclick="aceptarPilares()">✓ Aceptar y guardar</button>
  `;
}

function actualizarTotalPilares() {
  const inputs = document.querySelectorAll('#pilaresPreview input[data-field="porcentaje"]');
  let total = 0;
  inputs.forEach(inp => { total += Number(inp.value) || 0; });
  const header = $('pilaresHeader');
  if (header) {
    const color = total === 100 ? 'var(--verde)' : 'var(--fucsia)';
    header.innerHTML = `✨ Propuesta de pilares (total: <span style="color: ${color};">${total}%</span>)`;
  }
}

function extractPilaresFromDOM() {
  const cards = document.querySelectorAll('#pilaresPreview [data-pilar-idx]');
  const pilares = [];
  cards.forEach(card => {
    const p = {};
    card.querySelectorAll('[data-field]').forEach(field => {
      let val;
      if (field.tagName === 'INPUT') val = field.value.trim();
      else val = field.innerText.trim();
      if (field.dataset.field === 'porcentaje') {
        p.porcentaje = Number(val) || 0;
      } else if (field.dataset.field === 'temas') {
        if (val) p.temas = val.split(',').map(t => t.trim()).filter(t => t);
      } else if (val) {
        p[field.dataset.field] = val;
      }
    });
    if (p.nombre || p.descripcion) pilares.push(p);
  });
  return pilares;
}

async function aceptarPilares() {
  const pilares = extractPilaresFromDOM();
  if (pilares.length === 0) {
    showToast('No hay pilares para guardar', 'error');
    return;
  }
  const estrategiaId = window._pendingEstrategiaId;
  try {
    await sheetUpdate('Estrategias', estrategiaId, { pilares_json: JSON.stringify(pilares) });
    closeModal();
    showToast('Pilares guardados', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

PRINCIPIOS ESTRATÉGICOS PARA HISTORIAS DE INSTAGRAM:

1. EXISTEN 2 TIPOS DE HISTORIAS, JAMÁS LAS MEZCLES EN LA MISMA TANDA:

   A) HISTORIAS DE CONEXIÓN — Objetivo: que el público sienta familiaridad y subir el alcance general de la cuenta.

      ✓ Sin guión previo, sin edición forzada.

        - "Empecé a probar [algo nuevo] y les muestro cómo me fue"
        - "Pedirle a la audiencia un consejo: '¿qué les parece esto?'"
        - "Contar algo random que pasó en el día/semana"
        - "Mostrar un detrás de escena del trabajo"
        - "Una opinión personal sobre algo del rubro"

   B) HISTORIAS DE VENTA — Objetivo: iniciar UNA conversación de venta concreta.
      ✓ Máximo 3 historias por tanda.
      ✓ Una por objetivo, sin mezclar.
      ✓ Conectar con el dolor/sueño del cliente ideal, no con vos.

     Ej: "¿Llevás meses con [problema]? Si no lo tratás, puede volverse [consecuencia peor]. Mandame un mensaje."

   FÓRMULA 2 — BBB (Beneficio · Beneficio · Beneficio + CTA)
     Ej: "¿Querés evitar [beneficio 1]? ¿Querés evitar [beneficio 2]? ¿Querés evitar [beneficio 3]? Escribime y te ayudo."

   FÓRMULA 3 — SOS (Sueño · Obstáculo · Solución + CTA)
     Ej: "¿Querés [sueño]? Pero te frena [obstáculo]. Escribime y te muestro cómo lograrlo."

   También funciona el split en 2 historias:
     Historia 1: P + A (Problema + Agitación, deja la pregunta)
     Historia 2: T + S + CTA (Testimonio o ejemplo + Solución + Llamado a la acción)

3. POR QUÉ IMPORTAN LAS HISTORIAS DE CONEXIÓN:
   - Elevan las visualizaciones de toda la cuenta.

4. PROPUESTA DE GRILLA SEMANAL CON INTENCIÓN (no es rígida, es propuesta):
   - Lunes: CONEXIÓN (random, hasta 4 historias)
   - Martes: VENTA (1 historia, fórmula PAS)
   - Miércoles: EDUCATIVO (sin pensarlo demasiado, 1 historia)
   - Jueves: descanso o borrador
   - Viernes: VENTA (hasta 3 historias, con video o capturas tipo testimonio)
   - Sábado: CONEXIÓN o EDUCATIVO (hasta 3 historias)

5. BENCHMARK DE VISUALIZACIONES (% sobre seguidores totales):
   - Menos del 1%: preocupante.
   - Entre 1% y 5%: aceptable.
   - Entre 5% y 10%: bueno.
   - 10% o más: óptimo.
   IMPORTANTE: las historias de conexión SUBEN este porcentaje. Las de venta lo BAJAN — y está bien.

6. REGLA DE ORO: La conexión construye la confianza. La venta la usa. Sin las dos, el sistema no funciona.
`;

// GUÍA STORYTELLING (principios narrativos para el generador de storytelling)
// ============================================================================
const GUIA_STORYTELLING = `
PRINCIPIOS FUNDAMENTALES DEL STORYTELLING:

1. LA HISTORIA EN SÍ
- Conflicto claro: toda buena historia necesita una tensión. Sin problema no hay interés.
- Personajes con los que conectar: el público necesita identificarse o empatizar con alguien.
- Arco narrativo: inicio que engancha, desarrollo que sostiene, cierre que satisface.

2. CONEXIÓN EMOCIONAL
- Las emociones son el vehículo principal. Los datos informan, las historias mueven.
- Apelar a experiencias universales (miedo, esperanza, pérdida, superación) genera resonancia inmediata.
- Mostrar vulnerabilidad o autenticidad genera más confianza que la perfección.

3. PROPÓSITO
- Saber por qué se cuenta la historia define cómo contarla. Cada elemento debe servir al propósito; lo que no suma, resta.

4. PÚBLICO
- Conocer a quién te dirigís es tan importante como la historia misma.
- El lenguaje, el tono y los detalles deben resonar con ellos, no solo con vos.

5. ESTRUCTURA
- Modelo del héroe: situación → desafío → transformación. Refleja cómo vivimos.
- Esquema simple: contexto → problema → solución → resultado.
- Para historias cortas: hook → tensión → giro → resolución.

6. FORMA DE CONTAR
- El RITMO importa: pausas, detalles sensoriales, variaciones.
- LA ESPECIFICIDAD VENDE: "perdí todo en 3 meses" es menos poderoso que "el martes 14 cerré la empresa donde trabajé 7 años". Ir a lo concreto, evitar lo genérico.
- MOSTRAR EN VEZ DE DECIR: en lugar de "fue difícil", describí qué se sentía.
- DETALLES SENSORIALES: olores, sonidos, texturas, expresiones. Hacen la historia tangible.

7. AUTENTICIDAD
- Las historias fabricadas o exageradas se notan. La verdad, incluso incómoda, genera más impacto.
- No agregar "drama de más" donde no lo hay.
- Si la historia es cruda o tiene puntos de tensión, no suavizarlos.

REGLA DE ORO: una buena historia tiene EMOCIÓN + ESTRUCTURA + PROPÓSITO + VERDAD. El resto es técnica.

REGLAS DE EJECUCIÓN:
- Identificá el conflicto/tensión central de la historia bruta y construí el arco alrededor de eso.
- Si el propósito es VENDER, asegurate de que el cliente o el oyente se vea en la historia (es él quien atraviesa el conflicto, no solo vos).
- Si el propósito es INSPIRAR, enfocá en la transformación, no en la fórmula.
- Si el propósito es EDUCAR, usá la historia como vehículo de la lección, sin moralejas explícitas.
- Si el propósito es ENTRETENER, priorizá ritmo, sorpresa, humor o reverso.
- Buscá los detalles específicos en la historia bruta. Si la persona dice "tuve un mal día", preguntáte "¿qué pasó EXACTAMENTE?" e inventalo verosímil si hace falta para hacer la historia real (manteniendo la verdad emocional).
- Cortes claros entre escenas. Cada slide/historia/escena debe tener UN momento clave.
- El hook (primera línea/slide/segundo) tiene que ser una pregunta, una declaración fuerte o una imagen mental que para el scroll. Evitá "Hola, hoy les voy a contar..."
`;

  { v: 'visitas_perfil', l: 'Visitas al perfil' },
  { v: 'toques_enlace_externo', l: 'Toques en link bio' },
  { v: 'toques_direccion', l: 'Toques en dirección' },
  { v: 'otro', l: 'Otro (manual)' },
];

// Normaliza KPIs viejos (strings) al formato nuevo (objetos)
function normalizarKpis(kpis) {
  if (!Array.isArray(kpis)) return [];
  return kpis.map(k => {
    if (typeof k === 'string') {
      // KPI viejo: solo texto
      return { nombre: k, meta: '', unidad: '', metrica_asociada: 'otro', prioridad: 'media' };
    }
    // KPI nuevo (objeto)
    return {
      nombre: k.nombre || '',
      meta: k.meta || '',
      unidad: k.unidad || '',
      metrica_asociada: k.metrica_asociada || 'otro',
      prioridad: k.prioridad || 'media',
    };
  });
}

// Renderiza los KPIs en modo lectura (para la vista de estrategia)
function renderKpisVistaLectura(kpis) {
  const prioridadColor = { alta: 'var(--fucsia)', media: 'var(--petroleo)', baja: 'var(--gris-text-muted)' };
  const prioridadLabel = { alta: '⭐ Alta', media: 'Media', baja: 'Baja' };

  return kpis.map(k => {
    const tieneMetaNumerica = k.meta && !isNaN(Number(k.meta));
    const metricaLabel = (METRICAS_ASOCIADAS.find(m => m.v === k.metrica_asociada) || {}).l || 'Manual';
    return `
      <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-left: 3px solid ${prioridadColor[k.prioridad] || prioridadColor.media}; background: #fafafa; border-radius: 0 4px 4px 0; margin-bottom: 6px;">
        <div style="flex: 1; min-width: 0;">
          <div style="font-weight: 600; font-size: 13.5px; color: var(--gris-text);">${esc(k.nombre)}</div>
          <div style="font-size: 11.5px; color: var(--gris-text-muted); margin-top: 2px;">
            📊 ${esc(metricaLabel)} · ${esc(prioridadLabel[k.prioridad] || 'Media')}
          </div>
        </div>
        ${tieneMetaNumerica ? `
          <div style="text-align: right; padding-left: 10px;">
            <div style="font-size: 17px; font-weight: 700; color: var(--fucsia); font-family: 'Fraunces', serif;">${formatMilesCompacto(k.meta)}</div>
            ${k.unidad ? `<div style="font-size: 10.5px; color: var(--gris-text-muted);">${esc(k.unidad)}</div>` : ''}
          </div>
        ` : `
          <div style="font-size: 11px; color: var(--gris-text-muted); font-style: italic;">sin meta</div>
        `}
      </div>
    `;
  }).join('');
}

function mostrarPreviewKpis(estrategiaId, kpis) {
  const kpisNormalizados = normalizarKpis(kpis);

  const itemsHtml = kpisNormalizados.map((k, i) => renderKpiEditRow(k, i)).join('');

function renderKpiEditRow(k, i) {

        </div>
        <div>
          <div style="font-size: 10.5px; color: var(--gris-text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;">Unidad</div>
          <input type="text" class="form-input kpi-unidad" value="${esc(k.unidad || '')}" placeholder="ej: cuentas, %, por mes" style="padding: 5px 8px; font-size: 12.5px;">

        <div>
          <div style="font-size: 10.5px; color: var(--gris-text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 2px;">Métrica asociada</div>
          <select class="form-select kpi-metrica" style="padding: 5px 8px; font-size: 12.5px;">

            <option value="media" ${(k.prioridad || 'media') === 'media' ? 'selected' : ''}>Media</option>

}

function agregarKpiManual() {
  const container = $('kpisPreview');
  const btn = container.querySelector('button');
  const existing = container.querySelectorAll('[data-kpi-idx]');
  const newIdx = existing.length;
  const div = document.createElement('div');
  div.innerHTML = renderKpiEditRow({}, newIdx);
  container.insertBefore(div.firstElementChild, btn);
  container.querySelector(`[data-kpi-idx="${newIdx}"] .kpi-nombre`).focus();
}

function extractKpisFromDOM() {
  const cards = document.querySelectorAll('#kpisPreview [data-kpi-idx]');
  const kpis = [];
  cards.forEach(card => {
    const nombre = card.querySelector('.kpi-nombre').value.trim();
    if (!nombre) return;
    kpis.push({
      nombre,
      meta: card.querySelector('.kpi-meta').value.trim(),
      unidad: card.querySelector('.kpi-unidad').value.trim(),
      metrica_asociada: card.querySelector('.kpi-metrica').value,
      prioridad: card.querySelector('.kpi-prioridad').value,
    });
  });
  return kpis;
}

async function aceptarKpis() {
  const kpis = extractKpisFromDOM();
  if (kpis.length === 0) {
    showToast('No hay KPIs para guardar', 'error');
    return;
  }
  const estrategiaId = window._pendingEstrategiaId;
  try {
    await sheetUpdate('Estrategias', estrategiaId, { kpis_sugeridos_json: JSON.stringify(kpis) });
    closeModal();
    showToast('KPIs guardados', 'success');
    renderTabEstrategia();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

const FORMATOS_CONTENIDO = ['Post', 'Carrusel', 'Reel', 'Story', 'Video'];

let ideaFilters = { pilar: 'todos', formato: 'todos', estado: 'todos' };
let ideaSelectMode = false;
let ideaSelectedIds = new Set();

function toggleIdeaSelectMode() {
  ideaSelectMode = !ideaSelectMode;
  if (!ideaSelectMode) ideaSelectedIds.clear();
  renderIdeasList();
  renderIdeaSelectBar();
}

function toggleIdeaSelect(ideaId) {
  if (!ideaSelectMode) return;
  if (ideaSelectedIds.has(ideaId)) ideaSelectedIds.delete(ideaId);
  else ideaSelectedIds.add(ideaId);
  renderIdeasList();
  renderIdeaSelectBar();
}

function selectAllIdeasVisibles() {
  // Selecciona todas las ideas visibles (con los filtros actuales aplicados).
  // Modelo unificado: 'Sin usar' = sin fecha_publicacion; 'Agendada' = con fecha y no publicada; 'Publicada' = estado === 'Publicada'.
  let visibles = [...state.ideas];
  if (ideaFilters.pilar !== 'todos') visibles = visibles.filter(i => i.pilar === ideaFilters.pilar);
  if (ideaFilters.formato !== 'todos') visibles = visibles.filter(i => i.formato === ideaFilters.formato);
  if (ideaFilters.estado === 'Sin usar') visibles = visibles.filter(i => !i.fecha_publicacion);
  else if (ideaFilters.estado === 'Agendada') visibles = visibles.filter(i => !!i.fecha_publicacion && i.estado !== 'Publicada');
  else if (ideaFilters.estado === 'Publicada') visibles = visibles.filter(i => i.estado === 'Publicada');
  visibles.forEach(i => ideaSelectedIds.add(i.id));
  renderIdeasList();
  renderIdeaSelectBar();
}

function deseleccionarTodasIdeas() {
  ideaSelectedIds.clear();
  renderIdeasList();
  renderIdeaSelectBar();
}

function renderIdeaSelectBar() {
  let bar = document.getElementById('ideaSelectBar');
  if (!ideaSelectMode || ideaSelectedIds.size === 0) {
    if (bar) bar.remove();
    return;
  }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'ideaSelectBar';
    bar.className = 'idea-select-bar';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `
    <div class="idea-select-info">
      <strong>${ideaSelectedIds.size}</strong> ${ideaSelectedIds.size === 1 ? 'idea seleccionada' : 'ideas seleccionadas'}
    </div>
    <div class="idea-select-actions">
      <button class="btn-ghost btn-sm" onclick="selectAllIdeasVisibles()">Seleccionar todas</button>
      <button class="btn-ghost btn-sm" onclick="deseleccionarTodasIdeas()">Limpiar</button>
      <button class="btn btn-primary btn-sm" onclick="abrirExportarIdeasExcel()" style="background: var(--verde);">📊 Exportar Excel</button>
      <button class="btn btn-secondary btn-sm" onclick="toggleIdeaSelectMode()">✕ Salir</button>
    </div>
  `;
}

function abrirExportarIdeasExcel() {
  if (ideaSelectedIds.size === 0) { showToast('No hay ideas seleccionadas', 'error'); return; }

  $('modal').className = 'modal';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>📊 Exportar ideas a Excel</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="color: var(--gris-text-soft); font-size: 13px; margin-bottom: 14px;">
        Vas a exportar <strong>${ideaSelectedIds.size}</strong> ${ideaSelectedIds.size === 1 ? 'idea' : 'ideas'} con todo el contenido (copy, slides, escenas, historias).
      </p>
      <div class="form-row">
        <label style="display: flex; gap: 6px; align-items: center; cursor: pointer;">
          <input type="checkbox" id="exp_ideas_internas" checked>
          <span style="font-size: 13px;">Incluir notas internas y "[Visual sugerido]" (descomarcalo si es para enviar al cliente)</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="ejecutarExportarIdeasExcel()">📊 Generar Excel</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

function ejecutarExportarIdeasExcel() {
  const incluirInternas = $('exp_ideas_internas').checked;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const ideasSeleccionadas = state.ideas.filter(i => ideaSelectedIds.has(i.id));
  if (ideasSeleccionadas.length === 0) { showToast('No hay ideas seleccionadas', 'error'); return; }

  generarExcelIdeas(cliente, ideasSeleccionadas, incluirInternas);
  closeModal();
  // Salir del modo selección al completar
  ideaSelectMode = false;
  ideaSelectedIds.clear();
  renderIdeasList();
  renderIdeaSelectBar();
}

async function renderTabIdeas() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando banco de ideas...</div>`;

  try {
    // Modelo unificado: las "ideas" viven ahora en la tabla Calendario.
    // Una "idea" es un registro sin fecha_publicacion o con estado 'Idea'.
    const [calRes, briefsRes, estrategiasRes] = await Promise.all([
      sheetRead('Calendario'),
      sheetRead('Briefs'),
      sheetRead('Estrategias'),
    ]);
    const ideas = calRes.data.filter(i => i.cliente_id === cliente.id);
    state.ideas = ideas;
    state.calendario = ideas; // mismo array, una sola fuente de verdad
    state.briefs = briefsRes.data;
    state.estrategias = estrategiasRes.data.filter(e => e.cliente_id === cliente.id);

    renderIdeasList();
  } catch (e) {
    $('tabContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

function renderIdeasList() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => e.cliente_id === state.currentClienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
  const pilares = estrategiaActiva ? parseJsonSafe(estrategiaActiva.pilares_json) : [];

  // En el modelo unificado: una idea está "sin usar" si no tiene fecha_publicacion.
  // El estado 'Idea' o el campo estado vacío son equivalentes.
  // Si tiene fecha y no está publicada → "Agendada".
  // Helper:
  const esIdeaSinAgendar = (i) => !i.fecha_publicacion;
  const esAgendadaNoPublicada = (i) => !!i.fecha_publicacion && i.estado !== 'Publicada';
  const esPublicada = (i) => i.estado === 'Publicada';

  // Aplicar filtros
  let ideasFiltradas = [...state.ideas];
  if (ideaFilters.pilar !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => i.pilar === ideaFilters.pilar);
  if (ideaFilters.formato !== 'todos') ideasFiltradas = ideasFiltradas.filter(i => i.formato === ideaFilters.formato);
  if (ideaFilters.estado === 'Sin usar') ideasFiltradas = ideasFiltradas.filter(esIdeaSinAgendar);
  else if (ideaFilters.estado === 'Agendada') ideasFiltradas = ideasFiltradas.filter(esAgendadaNoPublicada);
  else if (ideaFilters.estado === 'Publicada') ideasFiltradas = ideasFiltradas.filter(esPublicada);

  // Ordenar: sin agendar primero, después por fecha
  ideasFiltradas.sort((a, b) => {
    const oA = esIdeaSinAgendar(a) ? 0 : esAgendadaNoPublicada(a) ? 1 : 2;
    const oB = esIdeaSinAgendar(b) ? 0 : esAgendadaNoPublicada(b) ? 1 : 2;
    if (oA !== oB) return oA - oB;
    // Dentro del mismo grupo: por fecha de creación o publicación, más reciente primero
    const fechaA = a.fecha_publicacion || a.fecha_creada || '';
    const fechaB = b.fecha_publicacion || b.fecha_creada || '';
    return fechaB.localeCompare(fechaA);
  });

  // Stats
  const stats = {
    total: state.ideas.length,
    sinUsar: state.ideas.filter(esIdeaSinAgendar).length,
    agendadas: state.ideas.filter(esAgendadaNoPublicada).length,
    publicadas: state.ideas.filter(esPublicada).length,
  };

  // Filtros de pilar dinámicos
  const pilarFilters = ['todos', ...new Set(state.ideas.map(i => i.pilar).filter(Boolean))];

  const ideasHtml = ideasFiltradas.length === 0 ? `
    <div class="empty-state">
      <p>${state.ideas.length === 0 ? 'Aún no hay ideas cargadas.' : 'No hay ideas con esos filtros.'}</p>
      ${state.ideas.length === 0 ? `
        <p style="font-size: 12px; margin-top: 8px;">Generá un lote de ideas con IA, o agregá manualmente las primeras.</p>
        <div style="display: flex; gap: 8px; justify-content: center; margin-top: 16px;">
          <button class="btn btn-secondary" onclick="openIdeaModal()">+ Agregar manualmente</button>
          ${estrategiaActiva ? `<button class="gen-btn" onclick="abrirGeneradorIdeas()">✨ Generar lote con IA</button>` : ''}
        </div>
      ` : ''}
    </div>
  ` : ideasFiltradas.map(idea => renderIdeaCard(idea)).join('');

  $('tabContent').innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
      <div>
        <h3>Banco de ideas</h3>
        <p style="color: var(--gris-text-soft); font-size: 13px; margin-top: 2px;">
          ${stats.total} ideas · ${stats.sinUsar} sin usar · ${stats.agendadas} agendadas · ${stats.publicadas} publicadas
        </p>
      </div>
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn ${ideaSelectMode ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="toggleIdeaSelectMode()" title="Seleccionar varias ideas">
          ${ideaSelectMode ? '✓ Modo selección activo' : '☑️ Seleccionar'}
        </button>
        <button class="btn btn-secondary btn-sm" onclick="openIdeaModal()">+ Manual</button>
        ${estrategiaActiva ? `<button class="gen-btn gen-btn-small" onclick="abrirGeneradorIdeas()">✨ Generar ideas con IA</button>` : ''}
      </div>
    </div>

    ${!estrategiaActiva ? `
      <div style="padding: 12px 14px; background: #fff4e0; border-radius: var(--radio-sm); margin-bottom: 14px; font-size: 13px; color: #8a6a20;">
        ⚠️ Para generar ideas con IA necesitás tener una estrategia <strong>Principal</strong> activa (con pilares definidos) para este cliente.
      </div>
    ` : ''}

    ${state.ideas.length > 0 ? `
      <div class="idea-filters">
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em;">Pilar</div>
        ${pilarFilters.map(p => `
          <button class="idea-filter ${ideaFilters.pilar === p ? 'active' : ''}" onclick="setIdeaFilter('pilar', '${esc(p)}')">${p === 'todos' ? 'Todos' : esc(p)}</button>
        `).join('')}
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;">Formato</div>
        <button class="idea-filter ${ideaFilters.formato === 'todos' ? 'active' : ''}" onclick="setIdeaFilter('formato', 'todos')">Todos</button>
        ${FORMATOS_CONTENIDO.map(f => `
          <button class="idea-filter ${ideaFilters.formato === f ? 'active' : ''}" onclick="setIdeaFilter('formato', '${f}')">${f}</button>
        `).join('')}
        <div style="width: 100%; font-size: 11.5px; font-weight: 600; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 6px;">Estado</div>
        <button class="idea-filter ${ideaFilters.estado === 'todos' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'todos')">Todos</button>
        <button class="idea-filter ${ideaFilters.estado === 'Sin usar' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Sin usar')">Sin usar</button>
        <button class="idea-filter ${ideaFilters.estado === 'Agendada' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Agendada')">Agendadas</button>
        <button class="idea-filter ${ideaFilters.estado === 'Publicada' ? 'active' : ''}" onclick="setIdeaFilter('estado', 'Publicada')">Publicadas</button>
      </div>
    ` : ''}

    <div id="ideasList">${ideasHtml}</div>
  `;
}

function setIdeaFilter(tipo, valor) {
  ideaFilters[tipo] = valor;
  renderIdeasList();
}

function renderIdeaCard(idea) {
  // En el modelo unificado, el estado visual depende de si está agendada
  const estaPublicada = idea.estado === 'Publicada';
  const estaAgendada = !!idea.fecha_publicacion && !estaPublicada;
  const sinAgendar = !idea.fecha_publicacion;

  const estadoVisible = estaPublicada ? 'Publicada' : estaAgendada ? 'Agendada' : 'Sin usar';
  const estadoClase = estadoVisible.toLowerCase().replace(/ /g, '-');
  const tieneCopyDesarrollado = idea.copy && idea.copy.trim();

  // Detectar si tiene carrusel, reel, secuencia de historias o anuncio Meta guardados en notas
  let tieneCarrusel = false, tieneReel = false, tieneHistorias = false, tieneAnuncioMeta = false;
  let slidesCount = 0, escenasCount = 0, historiasCount = 0, variantesCount = 0, anuncioFase = '';
  if (idea.notas && typeof idea.notas === 'string') {
    if (idea.notas.startsWith('CARRUSEL_SLIDES:')) {
      tieneCarrusel = true;
      try {
        const slides = JSON.parse(idea.notas.substring('CARRUSEL_SLIDES:'.length));
        slidesCount = Array.isArray(slides) ? slides.length : 0;
      } catch (e) {}
    } else if (idea.notas.startsWith('REEL_GUION:')) {
      tieneReel = true;
      try {
        const escenas = JSON.parse(idea.notas.substring('REEL_GUION:'.length));
        escenasCount = Array.isArray(escenas) ? escenas.length : 0;
      } catch (e) {}
    } else if (idea.notas.startsWith('HISTORIAS_SECUENCIA:')) {
      tieneHistorias = true;
      try {
        const hist = JSON.parse(idea.notas.substring('HISTORIAS_SECUENCIA:'.length));
        historiasCount = Array.isArray(hist) ? hist.length : 0;
      } catch (e) {}
    } else if (idea.notas.startsWith('ANUNCIO_META:')) {
      tieneAnuncioMeta = true;
      try {
        const anuncio = JSON.parse(idea.notas.substring('ANUNCIO_META:'.length));
        variantesCount = Array.isArray(anuncio.variantes) ? anuncio.variantes.length : 0;
        anuncioFase = (anuncio.fase || '').toUpperCase();
      } catch (e) {}
    }
  }

  return `
    <div class="idea-card estado-${estadoClase} ${ideaSelectMode ? 'idea-card-selectable' : ''} ${ideaSelectMode && ideaSelectedIds.has(idea.id) ? 'idea-card-selected' : ''}" ${ideaSelectMode ? `onclick="toggleIdeaSelect('${esc(idea.id)}')"` : ''}>
      ${ideaSelectMode ? `
        <div class="idea-checkbox-wrap">
          <input type="checkbox" class="idea-checkbox" ${ideaSelectedIds.has(idea.id) ? 'checked' : ''} onclick="event.stopPropagation(); toggleIdeaSelect('${esc(idea.id)}')">
        </div>
      ` : ''}
      <div class="idea-header">
        <div class="idea-title">${esc(idea.titulo || '(sin título)')}</div>
        <span class="badge badge-${estadoVisible === 'Sin usar' ? 'idea' : estadoVisible === 'Agendada' ? 'revision' : 'publicada'}">${esc(estadoVisible)}${estaAgendada && idea.fecha_publicacion ? ` · ${formatDateEs(idea.fecha_publicacion)}` : ''}</span>
      </div>

      <div class="idea-meta">
        ${idea.pilar ? `<span class="idea-chip pilar">🪶 ${esc(idea.pilar)}</span>` : ''}
        ${idea.formato ? `<span class="idea-chip formato">${esc(idea.formato)}</span>` : ''}
        ${idea.origen === 'IA' ? `<span class="idea-chip origen-ia">🤖 IA</span>` : `<span class="idea-chip origen-manual">✏️ Manual</span>`}
        ${tieneCopyDesarrollado ? `<span class="idea-chip" style="background: #e6f4ef; color: var(--verde);">✓ Copy desarrollado</span>` : ''}
        ${tieneCarrusel ? `<span class="idea-chip" style="background: #fef0e5; color: #c06a3d;">🎠 ${slidesCount} slides</span>` : ''}
        ${tieneReel ? `<span class="idea-chip" style="background: #e6f0fb; color: var(--petroleo);">🎬 ${escenasCount} escenas</span>` : ''}
        ${tieneHistorias ? `<span class="idea-chip" style="background: #fef8e6; color: #8a6a20;">📖 ${historiasCount} historias</span>` : ''}
        ${tieneAnuncioMeta ? `<span class="idea-chip" style="background: #e3edff; color: #1877f2;">🎯 Anuncio ${anuncioFase} · ${variantesCount} var.</span>` : ''}
      </div>

      ${idea.hook ? `<div class="idea-hook">"${esc(idea.hook)}"</div>` : ''}
      ${(idea.idea_text || idea.idea) && (idea.idea_text || idea.idea) !== idea.titulo && !tieneCarrusel && !tieneReel && !tieneHistorias && !tieneAnuncioMeta ? `<div class="idea-descripcion">${esc(idea.idea_text || idea.idea)}</div>` : ''}

      ${tieneCopyDesarrollado ? `
        <details style="margin-bottom: 10px;">
          <summary style="cursor: pointer; color: var(--petroleo); font-size: 12.5px; font-weight: 600;">Ver copy completo</summary>
          <div style="padding: 10px 12px; background: #f8fbfd; border-radius: 6px; margin-top: 6px; font-size: 13px; white-space: pre-wrap;">${esc(idea.copy)}</div>
          ${idea.hashtags ? `<div style="margin-top: 6px; font-size: 12px; color: var(--gris-text-soft);">${esc(idea.hashtags)}</div>` : ''}
          ${idea.cta ? `<div style="margin-top: 4px; font-size: 12px;"><strong>CTA:</strong> ${esc(idea.cta)}</div>` : ''}
        </details>
      ` : ''}

      ${tieneCarrusel ? `
        <div style="margin-bottom: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="verCarruselDeIdea('${esc(idea.id)}')">🎠 Ver ${slidesCount} slides</button>
        </div>
      ` : ''}
      ${tieneReel ? `
        <div style="margin-bottom: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="verReelDeIdea('${esc(idea.id)}')">🎬 Ver ${escenasCount} escenas</button>
        </div>
      ` : ''}
      ${tieneHistorias ? `
        <div style="margin-bottom: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="verHistoriasDeIdea('${esc(idea.id)}')">📖 Ver ${historiasCount} historias</button>
        </div>
      ` : ''}
      ${tieneAnuncioMeta ? `
        <div style="margin-bottom: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="verAnuncioMetaDeIdea('${esc(idea.id)}')" style="background: #e3edff; color: #1877f2; border-color: #1877f2;">🎯 Ver anuncio · ${variantesCount} variantes</button>
        </div>
      ` : ''}

      <div class="idea-actions">
        ${!estaPublicada ? `
          ${!tieneCopyDesarrollado && !tieneCarrusel && !tieneReel && !tieneHistorias && !tieneAnuncioMeta ? `<button class="gen-btn gen-btn-small" onclick="desarrollarIdea('${esc(idea.id)}')">✨ Desarrollar copy</button>` : ''}
          ${sinAgendar ? `<button class="btn btn-primary btn-sm" onclick="agendarIdea('${esc(idea.id)}')">📅 Agendar</button>` : ''}
        ` : ''}
        <button class="btn btn-secondary btn-sm" onclick="openIdeaModal('${esc(idea.id)}')">✏️ Editar</button>
        <button class="btn-ghost btn-sm" onclick="duplicarIdea('${esc(idea.id)}')" title="Crear una copia sin agendar para reutilizar">📋 Duplicar</button>
        <button class="btn-ghost btn-danger btn-sm" onclick="confirmDeleteIdea('${esc(idea.id)}', '${esc((idea.titulo || '').replace(/'/g, "\\'"))}')">🗑</button>
      </div>
    </div>`;
}

// Duplicar una idea: crea una copia "sin usar" para reutilizar en otra fecha sin pisar la original
async function duplicarIdea(ideaId) {
  const original = state.ideas.find(i => i.id === ideaId);
  if (!original) { showToast('Idea no encontrada', 'error'); return; }

  const copia = { ...original };
  copia.id = genId('idea');
  copia.fecha_publicacion = '';
  copia.hora = '';
  copia.estado = 'Idea';
  copia.titulo = (original.titulo || '') + ' (copia)';
  copia.fecha_creada = todayISO();
  copia.idea_id = ''; // quitar referencia vieja si la hubiera

  try {
    await sheetAppend('Calendario', copia);
    showToast('Idea duplicada', 'success');
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

// Ver el carrusel guardado en una idea (solo lectura con opción de cerrar)
function verCarruselDeIdea(ideaId) {
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea || !idea.notas) return;
  let slides = [];
  try { slides = JSON.parse(idea.notas.substring('CARRUSEL_SLIDES:'.length)); } catch (e) { showToast('Error leyendo el carrusel', 'error'); return; }

  const slidesHtml = slides.map((s, i) => {
    const tipoLower = (s.tipo || 'Desarrollo').toLowerCase();
    return `
      <div class="slide-card ${tipoLower}">
        <span class="slide-number ${tipoLower}">Slide ${s.numero || (i+1)} · ${esc(s.tipo || 'Desarrollo')}</span>
        ${s.texto_principal ? `<div class="slide-section"><span class="slide-section-label">Texto principal</span><div style="font-weight: 600;">${esc(s.texto_principal)}</div></div>` : ''}
        ${s.texto_secundario ? `<div class="slide-section"><span class="slide-section-label">Texto secundario</span><div>${esc(s.texto_secundario)}</div></div>` : ''}
        ${s.visual ? `<div class="slide-section"><span class="slide-section-label">🎨 Visual</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(s.visual)}</div></div>` : ''}
      </div>`;
  }).join('');

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>🎠 Carrusel: ${esc(idea.titulo)}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${slidesHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

function verReelDeIdea(ideaId) {
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea || !idea.notas) return;
  let escenas = [];
  try { escenas = JSON.parse(idea.notas.substring('REEL_GUION:'.length)); } catch (e) { showToast('Error leyendo el guión', 'error'); return; }

  const escenasHtml = escenas.map(e => `
    <div class="escena-card">
      <span class="escena-tiempo">⏱️ ${esc(e.tiempo || '?')}</span>
      ${e.texto_pantalla ? `<div class="slide-section"><span class="slide-section-label">📝 Texto en pantalla</span><div style="font-weight: 600;">${esc(e.texto_pantalla)}</div></div>` : ''}
      ${e.voz_audio || e.voz ? `<div class="slide-section"><span class="slide-section-label">🎤 Voz / Audio</span><div>${esc(e.voz_audio || e.voz)}</div></div>` : ''}
      ${e.accion ? `<div class="slide-section"><span class="slide-section-label">🎬 Acción</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(e.accion)}</div></div>` : ''}
      ${e.tipo_plano ? `<div class="slide-section"><span class="slide-section-label">📹 Plano</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(e.tipo_plano)}</div></div>` : ''}
    </div>`).join('');

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>🎬 Reel: ${esc(idea.titulo)}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${escenasHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}

// Visualizador de secuencia de historias (storytelling formato historias)
function verHistoriasDeIdea(ideaId) {
  const idea = state.ideas.find(i => i.id === ideaId);
  if (!idea || !idea.notas) return;
  let historias = [];
  try { historias = JSON.parse(idea.notas.substring('HISTORIAS_SECUENCIA:'.length)); } catch (e) { showToast('Error leyendo las historias', 'error'); return; }

  const tipoLabel = { hook: '🎯 Hook', desarrollo: '🔄 Desarrollo', giro: '⚡ Giro', cierre: '✨ Cierre' };

  const historiasHtml = historias.map((h, i) => `
    <div class="escena-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
        <span class="escena-tiempo">📖 Historia ${i + 1}</span>
        ${h.tipo ? `<span style="font-size: 11px; padding: 2px 8px; background: var(--crema); border-radius: 10px; color: #8a6a20; font-weight: 600;">${tipoLabel[h.tipo] || h.tipo}</span>` : ''}
      </div>
      ${h.texto_principal ? `<div class="slide-section"><span class="slide-section-label">💬 Texto principal</span><div style="font-weight: 600;">${esc(h.texto_principal)}</div></div>` : ''}
      ${h.zocalo ? `<div class="slide-section"><span class="slide-section-label">📌 Zócalo / Titular</span><div>${esc(h.zocalo)}</div></div>` : ''}
      ${h.visual_sugerido ? `<div class="slide-section"><span class="slide-section-label">📷 Visual sugerido</span><div style="font-style: italic; color: var(--gris-text-soft);">${esc(h.visual_sugerido)}</div></div>` : ''}
      ${h.nota_narrativa ? `<div style="margin-top: 8px; padding: 6px 10px; background: #fef8e6; border-left: 3px solid #c4a01a; border-radius: 4px; font-size: 11.5px; color: #8a6a20;">💭 ${esc(h.nota_narrativa)}</div>` : ''}
    </div>`).join('');

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>📖 Secuencia de historias: ${esc(idea.titulo)}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">${historiasHtml}</div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`;
  $('modalOverlay').classList.add('active');
}


// ============================================================================
// MODAL DE IDEA (crear/editar manual)
// ============================================================================
function openIdeaModal(id = null) {
  const idea = id ? state.ideas.find(x => x.id === id) : {};
  const esNueva = !id;
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  const estrategiaActiva = state.estrategias.find(e => e.cliente_id === state.currentClienteId && (e.estado || 'Activa') === 'Activa' && e.tipo === 'Principal');
  const pilares = estrategiaActiva ? parseJsonSafe(estrategiaActiva.pilares_json) : [];

  const pilaresOptions = pilares.length > 0
    ? pilares.map(p => `<option value="${esc(p.nombre)}" ${idea.pilar === p.nombre ? 'selected' : ''}>${esc(p.nombre)}</option>`).join('')
    : '<option value="" disabled>No hay pilares definidos</option>';

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>${esNueva ? '+ Nueva idea' : '✏️ Editar idea'}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label class="form-label">Título *</label>
        <input type="text" class="form-input" id="f_titulo" value="${esc(idea.titulo || '')}" placeholder="Nombre corto y descriptivo de la idea">
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Pilar</label>
          <select class="form-select" id="f_pilar">
            <option value="">—</option>
            ${pilaresOptions}
          </select>
        </div>
        <div>
          <label class="form-label">Formato</label>
          <select class="form-select" id="f_formato">
            <option value="">—</option>
            ${FORMATOS_CONTENIDO.map(f => `<option value="${f}" ${idea.formato === f ? 'selected' : ''}>${f}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Hook / Gancho</label>
        <input type="text" class="form-input" id="f_hook" value="${esc(idea.hook || '')}" placeholder="Primera línea que capta la atención">
      </div>
      <div class="form-row">
        <label class="form-label">Descripción / Idea</label>
        <textarea class="form-textarea" id="f_idea" placeholder="Desarrollo de la idea, qué contar, ángulo...">${esc(idea.idea_text || idea.idea || '')}</textarea>
      </div>
      ${idea.copy ? `
        <div class="form-row">

async function saveIdea(id) {
  const titulo = $('f_titulo').value.trim();
  if (!titulo) { showToast('El título es obligatorio', 'error'); return; }
  const idea = id ? state.ideas.find(i => i.id === id) : {};

  // En el modelo unificado, una idea es un registro de Calendario sin fecha_publicacion (o con estado 'Idea').
  const data = {
    cliente_id: state.currentClienteId,
    titulo,
    pilar: $('f_pilar').value,
    formato: $('f_formato').value,
    hook: $('f_hook').value.trim(),
    notas: $('f_notas').value.trim(),
  };

  // Si el form tiene un campo "idea/descripción", lo guardo en notas (compatibilidad)
  // Solo si notas no está siendo usado para CARRUSEL_SLIDES/REEL_GUION/etc.
  if ($('f_idea')) {
    const ideaText = $('f_idea').value.trim();
    if (ideaText && !data.notas.match(/^(CARRUSEL_SLIDES|REEL_GUION|HISTORIAS_SECUENCIA|ANUNCIO_META):/)) {
      data.idea_text = ideaText;
    }
  }

  // Mapear estado: si es nueva o estaba como 'Sin usar', dejarla como 'Idea' (sin agendar).
  // Si ya estaba agendada, respetar lo que viniera.
  if ($('f_estado')) {
    const valorEstado = $('f_estado').value;
    // 'Sin usar' del modelo viejo → 'Idea' del nuevo
    data.estado = valorEstado === 'Sin usar' ? 'Idea' : valorEstado;
  } else {
    data.estado = idea.estado || 'Idea';
  }

  // Copy / hashtags / cta si están en el form
  if ($('f_copy')) data.copy = $('f_copy').value.trim();
  if ($('f_hashtags')) data.hashtags = $('f_hashtags').value.trim();
  if ($('f_cta')) data.cta = $('f_cta').value.trim();

  try {
    if (id) {
      await sheetUpdate('Calendario', id, data);
      showToast('Idea actualizada', 'success');
    } else {
      data.id = genId('idea');
      data.fecha_creada = todayISO();
      data.origen = 'Manual';
      data.fecha_publicacion = ''; // explícitamente sin fecha
      await sheetAppend('Calendario', data);
      showToast('Idea creada', 'success');
    }
    closeModal();
    renderTabIdeas();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

  if (tipoEnfoque === 'fase') {

- Por cada historia de venta que propongas, asegurate de proponer al menos una de conexión cercana en el calendario, para mantener el balance.
- Adaptá los ejemplos al rubro real del cliente: si es servicios profesionales, usá "paciente/cliente"; si es producto físico, usá "compradora"; si es educación/cursos, usá "alumna"; etc.
- En el copy de venta, usá EXPLÍCITAMENTE las fórmulas (PAS / BBB / SOS) y mencionalas en el desarrollo.

FORMATO DE SALIDA: devolvés SOLO un JSON válido (sin markdown, sin texto adicional):

[
  {
    "titulo": "Título corto descriptivo (para identificar la idea rápido)",
    "pilar": "Nombre exacto del pilar",
    "formato": "Post | Carrusel | Reel | Story | Video",
    "hook": "Primera frase del post (máximo 15 palabras)",
    "idea": "Desarrollo compacto: qué ángulo toma, qué mensaje da, por qué funciona. 2-3 líneas máximo."
  }
]`;

  const userPrompt = `Cliente: ${state.clientes.find(c => c.id === state.currentClienteId).nombre}

${buildBriefContext(state.currentClienteId)}

ESTRATEGIA ACTIVA: ${estrategia.nombre}
Momento: ${estrategia.momento_fase || ''}
Objetivo: ${estrategia.objetivo_principal}
${estrategia.momento_descripcion ? 'Contexto: ' + estrategia.momento_descripcion : ''}

PILARES:
${pilaresContext}${buyerContext}${tonoContext}${enfoqueBloque}${detallesContext}${antiRepeticionContext}

Generá EXACTAMENTE ${cantidad} ideas ${pilarElegido === 'todos' ? 'distribuidas proporcionalmente según los porcentajes de los pilares' : 'del pilar "' + pilarElegido + '"'}.

${enfoquePrincipal ? `\n⚠️ ANTES DE ENTREGAR: revisá cada una de las ${cantidad} ideas. ¿Todas están 100% conectadas al enfoque principal? Si alguna no lo está, reemplazala.` : ''}${ideasExistentes.length > 0 ? `\n⚠️ ANTES DE ENTREGAR: revisá la lista de "ideas existentes en el banco" y verificá que ninguna de las ${cantidad} ideas nuevas se solape con esas. Si una idea nueva tiene el mismo ángulo, tema o mensaje que una existente (aunque cambie el formato), reemplazala por algo realmente distinto.` : ''}`;

  try {
    const raw = await callClaude(systemPrompt, userPrompt, { maxTokens: 4000 });
    const ideas = extractJson(raw);
    if (!Array.isArray(ideas) || ideas.length === 0) throw new Error('La IA no devolvió ideas válidas');
    mostrarPreviewIdeas(ideas);
  } catch (e) {
    mostrarErrorGeneracion(e.message);
  }
}

function toggleAllIdeas(value) {
  document.querySelectorAll('[data-idea-check]').forEach(cb => { cb.checked = value; });
}

async function aceptarIdeasGeneradas() {
  const ideas = window._pendingIdeas;
  const checked = Array.from(document.querySelectorAll('[data-idea-check]'))
    .filter(cb => cb.checked)
    .map(cb => parseInt(cb.dataset.ideaCheck));
  const seleccionadas = checked.map(i => ideas[i]);

  if (seleccionadas.length === 0) {
    showToast('No seleccionaste ninguna idea', 'error');
    return;
  }

  showAutosave('saving', `Guardando ${seleccionadas.length} ideas...`);

  try {
    for (const idea of seleccionadas) {
      await sheetAppend('Calendario', {
        id: genId('idea'),
        cliente_id: state.currentClienteId,
        fecha_creada: todayISO(),
        titulo: idea.titulo || '',
        pilar: idea.pilar || '',
        formato: idea.formato || '',
        hook: idea.hook || '',
        idea: idea.idea || '',
        estado: 'Idea',
        origen: 'IA',
      });
    }
    showAutosave('saved', `${seleccionadas.length} ideas guardadas`);
    closeModal();
    showToast(`${seleccionadas.length} ideas guardadas en el banco`, 'success');
    renderTabIdeas();
  } catch (e) {
    showAutosave('error', 'Error al guardar');
    showToast('Error: ' + e.message, 'error');
  }
}
