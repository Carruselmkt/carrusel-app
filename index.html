<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrusel App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>
<style>
  :root {
    --fucsia: #ba0d66;
    --fucsia-dark: #8f0a4e;
    --fucsia-light: #e74a9a;
    --salmon: #f79f6f;
    --petroleo: #176b87;
    --petroleo-dark: #0f4d61;
    --crema: #fdf4e3;
    --gris-bg: #f7f7f5;
    --gris-card: #ffffff;
    --gris-border: #e5e5e0;
    --gris-text: #2a2a2a;
    --gris-text-soft: #6b6b6b;
    --gris-text-muted: #9a9a9a;
    --verde: #2d9d78;
    --rojo: #c43c3c;
    --amarillo: #e0a430;
    --sombra: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
    --sombra-lg: 0 4px 12px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.06);
    --radio: 10px;
    --radio-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--gris-bg);
    color: var(--gris-text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 { font-family: 'Fraunces', serif; font-weight: 600; letter-spacing: -0.01em; }
  h1 { font-size: 24px; }
  h2 { font-size: 20px; }
  h3 { font-size: 17px; }

  button { font-family: inherit; font-size: 14px; cursor: pointer; border: none; background: none; color: inherit; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  a { color: var(--petroleo); }

  /* ===== LOGIN ===== */
  .login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--crema) 0%, #fff 60%, var(--gris-bg) 100%);
    padding: 20px;
  }
  .login-box {
    background: #fff; padding: 44px 40px 40px; border-radius: 14px;
    box-shadow: var(--sombra-lg); max-width: 420px; width: 100%; text-align: center;
    border: 1px solid var(--gris-border);
  }
  .login-logo {
    font-family: 'Fraunces', serif; font-size: 36px; font-weight: 700;
    color: var(--fucsia); letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .login-subtitle { color: var(--gris-text-soft); font-size: 13px; margin-bottom: 32px; font-style: italic; }
  .login-text { color: var(--gris-text); margin-bottom: 28px; font-size: 14px; line-height: 1.6; }
  .google-btn {
    background: #fff; border: 1.5px solid var(--gris-border); padding: 12px 20px;
    border-radius: var(--radio); display: inline-flex; align-items: center; gap: 10px;
    font-weight: 500; color: var(--gris-text); transition: all 0.15s; width: 100%; justify-content: center;
  }
  .google-btn:hover { border-color: var(--fucsia); background: #fafafa; }
  .google-g {
    width: 18px; height: 18px;
    background: conic-gradient(from 0deg, #ea4335, #fbbc04, #34a853, #4285f4, #ea4335);
    border-radius: 50%;
  }
  .login-footer { margin-top: 28px; font-size: 12px; color: var(--gris-text-muted); line-height: 1.5; }

  /* ===== LAYOUT ===== */
  .app { display: none; min-height: 100vh; }
  .app.active { display: grid; grid-template-columns: 240px 1fr; }

  .sidebar {
    background: #fff; border-right: 1px solid var(--gris-border);
    padding: 20px 14px; display: flex; flex-direction: column;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .sidebar-logo {
    font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700;
    color: var(--fucsia); padding: 4px 10px 18px;
    border-bottom: 1px solid var(--gris-border); margin-bottom: 14px; letter-spacing: -0.02em;
  }
  .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 12px;
    border-radius: var(--radio-sm); color: var(--gris-text-soft);
    font-weight: 500; font-size: 13.5px; transition: all 0.12s; text-align: left; width: 100%;
  }
  .nav-item:hover { background: var(--gris-bg); color: var(--gris-text); }
  .nav-item.active { background: var(--fucsia); color: #fff; }
  .nav-item.disabled { color: var(--gris-text-muted); cursor: not-allowed; }
  .nav-item.disabled:hover { background: transparent; }
  .nav-icon { font-size: 16px; width: 18px; text-align: center; }
  .nav-badge {
    font-size: 9px; background: var(--gris-border); color: var(--gris-text-muted);
    padding: 2px 6px; border-radius: 20px; margin-left: auto; font-weight: 600;
  }
  .sidebar-user {
    padding-top: 14px; border-top: 1px solid var(--gris-border);
    display: flex; align-items: center; gap: 10px; font-size: 12px;
  }
  .user-avatar {
    width: 32px; height: 32px; background: var(--fucsia); color: #fff;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
  }
  .user-info { flex: 1; min-width: 0; overflow: hidden; }
  .user-name { font-weight: 600; color: var(--gris-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-email { color: var(--gris-text-muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .logout-btn { color: var(--gris-text-muted); font-size: 11px; padding: 4px; }
  .logout-btn:hover { color: var(--rojo); }

  .main { padding: 32px 40px; max-width: 1200px; width: 100%; }

  .page-header {
    display: flex; justify-content: space-between; align-items: flex-end;
    gap: 20px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .page-title { font-size: 28px; margin-bottom: 4px; }
  .page-subtitle { color: var(--gris-text-soft); font-size: 13.5px; }

  .breadcrumb {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    color: var(--gris-text-muted); margin-bottom: 12px;
  }
  .breadcrumb button { color: var(--petroleo); font-weight: 500; }
  .breadcrumb button:hover { text-decoration: underline; }

  /* ===== BOTONES ===== */
  .btn {
    padding: 9px 16px; border-radius: var(--radio-sm);
    font-weight: 500; font-size: 13.5px; display: inline-flex;
    align-items: center; gap: 6px; transition: all 0.12s;
  }
  .btn-primary { background: var(--fucsia); color: #fff; }
  .btn-primary:hover { background: var(--fucsia-dark); }
  .btn-secondary { background: #fff; color: var(--gris-text); border: 1px solid var(--gris-border); }
  .btn-secondary:hover { border-color: var(--fucsia); color: var(--fucsia); }
  .btn-ghost { color: var(--gris-text-soft); padding: 6px 10px; }
  .btn-ghost:hover { background: var(--gris-bg); color: var(--gris-text); }
  .btn-danger { color: var(--rojo); }
  .btn-danger:hover { background: #fef2f2; }
  .btn-sm { padding: 6px 12px; font-size: 12.5px; }

  /* ===== CARDS Y TABLAS ===== */
  .card {
    background: #fff; border: 1px solid var(--gris-border);
    border-radius: var(--radio); padding: 20px; box-shadow: var(--sombra);
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--gris-text-muted);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px;
  }

  .table-wrap { background: #fff; border: 1px solid var(--gris-border); border-radius: var(--radio); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 12px 16px; background: var(--gris-bg);
    font-weight: 600; color: var(--gris-text-soft); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--gris-border);
  }
  td { padding: 14px 16px; border-bottom: 1px solid var(--gris-border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.clickable { cursor: pointer; transition: background 0.1s; }
  tr.clickable:hover { background: #fafafa; }

  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
  }
  .badge-activo { background: #e6f4ef; color: var(--verde); }
  .badge-pausado { background: #fff4e0; color: var(--amarillo); }
  .badge-finalizado { background: var(--gris-bg); color: var(--gris-text-muted); }
  .badge-practica { background: #fde6f0; color: var(--fucsia); }
  .badge-idea { background: #eef2f6; color: var(--gris-text-soft); }
  .badge-borrador { background: #fff4e0; color: var(--amarillo); }
  .badge-revision { background: #e6f0fb; color: var(--petroleo); }
  .badge-aprobada { background: #e6f4ef; color: var(--verde); }
  .badge-publicada { background: #d4e9e0; color: #1d6b4e; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--gris-text-muted); }
  .empty-state h3 { color: var(--gris-text-soft); margin-bottom: 6px; }
  .empty-state p { margin-bottom: 20px; font-size: 13.5px; }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; max-width: 560px; width: 100%;
    max-height: 90vh; overflow-y: auto; box-shadow: var(--sombra-lg);
  }
  .modal-lg { max-width: 720px; }
  .modal-header {
    padding: 22px 26px 14px; border-bottom: 1px solid var(--gris-border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-body { padding: 22px 26px; }
  .modal-footer {
    padding: 16px 26px 22px; display: flex; justify-content: flex-end;
    gap: 10px; border-top: 1px solid var(--gris-border);
  }

  /* ===== FORMULARIOS ===== */
  .form-row { margin-bottom: 16px; }
  .form-row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 12.5px; font-weight: 600;
    color: var(--gris-text-soft); margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--gris-border);
    border-radius: var(--radio-sm); background: #fff; color: var(--gris-text);
    transition: border 0.12s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none; border-color: var(--fucsia);
  }
  .form-textarea { min-height: 80px; resize: vertical; font-family: inherit; }
  .form-help { font-size: 11.5px; color: var(--gris-text-muted); margin-top: 4px; }

  /* ===== TABS (solapas) ===== */
  .tabs-container { background: #fff; border: 1px solid var(--gris-border); border-radius: var(--radio); overflow: hidden; }
  .tabs-nav {
    display: flex; border-bottom: 1px solid var(--gris-border);
    overflow-x: auto; background: #fafafa;
  }
  .tab-btn {
    padding: 14px 20px; font-size: 13.5px; font-weight: 500;
    color: var(--gris-text-soft); white-space: nowrap;
    border-bottom: 2px solid transparent; transition: all 0.12s;
  }
  .tab-btn:hover { color: var(--gris-text); }
  .tab-btn.active { color: var(--fucsia); border-bottom-color: var(--fucsia); background: #fff; }
  .tab-content { padding: 24px; }

  /* ===== BRIEF: secciones plegables ===== */
  .brief-section {
    border: 1px solid var(--gris-border); border-radius: var(--radio);
    margin-bottom: 14px; overflow: hidden; background: #fff;
  }
  .brief-section-header {
    padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none; background: #fafafa;
    border-bottom: 1px solid transparent; transition: all 0.12s;
  }
  .brief-section-header:hover { background: #f3f3f0; }
  .brief-section.open .brief-section-header { border-bottom-color: var(--gris-border); }
  .brief-section-icon { font-size: 18px; }
  .brief-section-title { flex: 1; font-weight: 600; font-size: 14px; color: var(--gris-text); }
  .brief-section-caret { color: var(--gris-text-muted); transition: transform 0.15s; }
  .brief-section.open .brief-section-caret { transform: rotate(90deg); }
  .brief-section-body { display: none; padding: 18px; }
  .brief-section.open .brief-section-body { display: block; }
  .brief-progress {
    font-size: 11.5px; color: var(--gris-text-muted);
    padding: 2px 8px; border-radius: 10px; background: #fff;
    border: 1px solid var(--gris-border);
  }
  .brief-progress.complete { background: #e6f4ef; color: var(--verde); border-color: transparent; }

  /* ===== AUTOGUARDADO: indicador ===== */
  .autosave-indicator {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--gris-text); color: #fff; padding: 8px 16px;
    border-radius: 20px; font-size: 12px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 150;
    display: flex; align-items: center; gap: 8px;
  }
  .autosave-indicator.show { opacity: 1; }
  .autosave-indicator.saved { background: var(--verde); }
  .autosave-indicator.error { background: var(--rojo); }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 30px; right: 30px;
    background: var(--gris-text); color: #fff; padding: 12px 20px;
    border-radius: var(--radio); font-size: 13px; font-weight: 500;
    box-shadow: var(--sombra-lg); opacity: 0; transform: translateY(10px);
    transition: all 0.2s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--verde); }
  .toast.error { background: var(--rojo); }

  /* ===== CONFIG ===== */
  .config-item { padding: 16px 0; border-bottom: 1px solid var(--gris-border); }
  .config-item:last-child { border-bottom: none; }
  .config-label { font-weight: 600; margin-bottom: 2px; }
  .config-value { color: var(--gris-text-soft); font-size: 13px; word-break: break-all; font-family: 'Courier New', monospace; }
  .config-status {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px; font-size: 12px;
    font-weight: 600; margin-top: 6px;
  }
  .config-status.ok { background: #e6f4ef; color: var(--verde); }
  .config-status.error { background: #fde8e8; color: var(--rojo); }

  /* ===== LOADING ===== */
  .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--gris-text-muted); }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--gris-border);
    border-top-color: var(--fucsia); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== VISTA DETALLE CLIENTE ===== */
  .cliente-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px; background: #fff; border: 1px solid var(--gris-border);
    border-radius: var(--radio); margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
  }
  .cliente-header-info h2 { font-size: 24px; margin-bottom: 4px; }
  .cliente-header-meta { font-size: 13px; color: var(--gris-text-soft); display: flex; gap: 14px; flex-wrap: wrap; }
  .cliente-header-actions { display: flex; gap: 8px; }

  /* ===== CALENDARIO ===== */
  .calendar-controls {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
  }
  .calendar-month { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px; background: var(--gris-border); border: 1px solid var(--gris-border);
    border-radius: var(--radio); overflow: hidden;
  }
  .calendar-day-header {
    background: #fafafa; padding: 10px 8px; font-size: 11px;
    text-transform: uppercase; font-weight: 600; color: var(--gris-text-muted);
    text-align: center; letter-spacing: 0.04em;
  }
  .calendar-day {
    background: #fff; min-height: 100px; padding: 6px;
    display: flex; flex-direction: column; gap: 3px;
    cursor: pointer; transition: background 0.1s;
  }
  .calendar-day:hover { background: #fafafa; }
  .calendar-day.other-month { background: #f8f8f5; color: var(--gris-text-muted); }
  .calendar-day.today { background: #fff4e0; }
  .calendar-day-num { font-size: 12px; font-weight: 600; color: var(--gris-text-soft); }
  .calendar-day.today .calendar-day-num { color: var(--fucsia); font-weight: 700; }
  .calendar-post {
    font-size: 10.5px; padding: 3px 6px; border-radius: 4px;
    background: #eef2f6; color: var(--gris-text); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; border-left: 3px solid var(--gris-border);
  }
  .calendar-post.idea { border-left-color: var(--gris-text-muted); }
  .calendar-post.borrador { border-left-color: var(--amarillo); background: #fff4e0; }
  .calendar-post.revision { border-left-color: var(--petroleo); background: #e6f0fb; }
  .calendar-post.aprobada { border-left-color: var(--verde); background: #e6f4ef; }
  .calendar-post.publicada { border-left-color: #1d6b4e; background: #d4e9e0; }

  /* ===== ACCESOS ===== */
  .acceso-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; border: 1px solid var(--gris-border);
    border-radius: var(--radio-sm); margin-bottom: 10px;
  }
  .acceso-info { flex: 1; }
  .acceso-red { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .acceso-meta { font-size: 12px; color: var(--gris-text-muted); margin-top: 2px; }
  .acceso-actions { display: flex; gap: 6px; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    .app.active { grid-template-columns: 1fr; }
    .sidebar {
      position: static; height: auto; flex-direction: row; align-items: center;
      padding: 10px 14px; overflow-x: auto; overflow-y: hidden;
    }
    .sidebar-logo { border-bottom: none; padding: 4px 10px 4px 0; margin-bottom: 0; margin-right: 10px; border-right: 1px solid var(--gris-border); }
    .sidebar-nav { flex-direction: row; flex: 1; gap: 2px; overflow-x: auto; }
    .nav-item { white-space: nowrap; padding: 7px 10px; font-size: 12.5px; }
    .nav-item span:not(.nav-icon):not(.nav-badge) { display: none; }
    .sidebar-user { border-top: none; padding-top: 0; padding-left: 10px; border-left: 1px solid var(--gris-border); }
    .user-info { display: none; }
    .main { padding: 20px; }
    .page-title { font-size: 22px; }
    table { font-size: 13px; }
    th, td { padding: 10px 12px; }
    .form-row-grid { grid-template-columns: 1fr; }
    .calendar-day { min-height: 70px; padding: 4px; }
    .calendar-post { font-size: 9.5px; padding: 2px 4px; }
    .tab-btn { padding: 10px 14px; font-size: 12.5px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Carrusel</div>
    <div class="login-subtitle">Hacemos girar tu marca 🎠</div>
    <p class="login-text">Iniciá sesión con la cuenta de Google donde está tu planilla de datos.</p>
    <button class="google-btn" id="loginBtn">
      <span class="google-g"></span>
      <span>Iniciar sesión con Google</span>
    </button>
    <div class="login-footer">
      Los datos se guardan en tu Google Sheets.<br>
      Nada queda en esta compu.
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Carrusel</div>
    <nav class="sidebar-nav" id="sidebarNav">
      <button class="nav-item active" data-page="clientes">
        <span class="nav-icon">👥</span><span>Clientes</span>
      </button>
      <button class="nav-item disabled" disabled>
        <span class="nav-icon">🎯</span><span>Prospectos</span><span class="nav-badge">Fase 3</span>
      </button>
      <button class="nav-item disabled" disabled>
        <span class="nav-icon">💡</span><span>Ideas</span><span class="nav-badge">Fase 2</span>
      </button>
      <button class="nav-item disabled" disabled>
        <span class="nav-icon">📊</span><span>Métricas</span><span class="nav-badge">Fase 2</span>
      </button>
      <button class="nav-item disabled" disabled>
        <span class="nav-icon">✨</span><span>Generadores IA</span><span class="nav-badge">Fase 2</span>
      </button>
      <button class="nav-item disabled" disabled>
        <span class="nav-icon">💰</span><span>Finanzas</span><span class="nav-badge">Fase 4</span>
      </button>
      <button class="nav-item disabled" disabled>

      </button>

};

// ============================================================================

function $(id) { return document.getElementById(id); }
function esc(s) { if (s === undefined || s === null) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }

function showToast(msg, type = '') {

function showAutosave(estado, msg) {

}

function formatDateEs(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}
function todayISO() { return new Date().toISOString().split('T')[0]; }
function genId(prefix = 'id') { return prefix + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); }

// AUTH

  tokenClient = google.accounts.oauth2.initTokenClient({

// ============================================================================
// SHEETS
// ============================================================================
async function sheetRead(sheetName) {
  try {
    const res = await gapi.client.sheets.spreadsheets.values.get({
      spreadsheetId: CONFIG.SPREADSHEET_ID,
      range: sheetName,
    });
    const rows = res.result.values || [];
    if (rows.length < 2) return { headers: rows[0] || [], data: [] };
    const headers = rows[0];
    const data = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = row[i] || ''; });
      return obj;
    });
    return { headers, data };
  } catch (e) {
    console.error('sheetRead error:', e);
    throw new Error('No pude leer la hoja ' + sheetName);
  }
}

async function sheetAppend(sheetName, rowObj) {
  const { headers } = await sheetRead(sheetName);
  const row = headers.map(h => rowObj[h] || '');
  await gapi.client.sheets.spreadsheets.values.append({
    spreadsheetId: CONFIG.SPREADSHEET_ID, range: sheetName,
    valueInputOption: 'USER_ENTERED', insertDataOption: 'INSERT_ROWS',
    resource: { values: [row] },
  });
}

async function sheetUpdate(sheetName, idValue, rowObj, idCol = 'id') {
  const { headers, data } = await sheetRead(sheetName);
  const idx = data.findIndex(r => r[idCol] === idValue);
  if (idx === -1) throw new Error('No encontré el registro');
  const rowNum = idx + 2;
  const newRow = headers.map(h => rowObj[h] !== undefined ? rowObj[h] : (data[idx][h] || ''));
  await gapi.client.sheets.spreadsheets.values.update({
    spreadsheetId: CONFIG.SPREADSHEET_ID,
    range: `${sheetName}!A${rowNum}`,
    valueInputOption: 'USER_ENTERED',
    resource: { values: [newRow] },
  });
}

async function sheetDelete(sheetName, idValue, idCol = 'id') {
  const { data } = await sheetRead(sheetName);
  const idx = data.findIndex(r => r[idCol] === idValue);
  if (idx === -1) throw new Error('No encontré el registro');
  const rowNum = idx + 2;
  const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: CONFIG.SPREADSHEET_ID });
  const sheet = meta.result.sheets.find(s => s.properties.title === sheetName);
  if (!sheet) throw new Error('No encontré la hoja ' + sheetName);
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: CONFIG.SPREADSHEET_ID,
    resource: {
      requests: [{
        deleteDimension: {
          range: { sheetId: sheet.properties.sheetId, dimension: 'ROWS', startIndex: rowNum - 1, endIndex: rowNum }
        }
      }]
    }
  });
}

// Encuentra un registro por cliente_id en una hoja, lo crea si no existe. Devuelve el registro actualizado.
async function upsertByClienteId(sheetName, clienteId, dataObj) {
  const { data } = await sheetRead(sheetName);
  const existing = data.find(r => r.cliente_id === clienteId);
  if (existing) {
    await sheetUpdate(sheetName, existing.id, dataObj);
    return { ...existing, ...dataObj };
  } else {
    const newObj = { id: genId(sheetName.substr(0,3).toLowerCase()), cliente_id: clienteId, ...dataObj };
    await sheetAppend(sheetName, newObj);
    return newObj;
  }
}

async function saveCliente(id) {
  const nombre = $('f_nombre').value.trim();
  if (!nombre) { showToast('El nombre es obligatorio', 'error'); return; }

  const data = {
    nombre,
    tipo_cliente: $('f_tipo_cliente').value,
    rubro: $('f_rubro').value.trim(),
    estado: $('f_estado').value,
    servicio_contratado: $('f_servicio_contratado').value.trim(),
    frecuencia_posts: $('f_frecuencia_posts').value,
    fecha_inicio_servicio: $('f_fecha_inicio_servicio').value,
    canal_comunicacion: $('f_canal_comunicacion').value.trim(),
    rondas_revision: $('f_rondas_revision').value,
    notas: $('f_notas').value.trim(),
  };

  try {
    if (id) {
      await sheetUpdate('Clientes', id, data);
      showToast('Cliente actualizado', 'success');
      // actualizar en estado local
      const idx = state.clientes.findIndex(c => c.id === id);
      if (idx !== -1) state.clientes[idx] = { ...state.clientes[idx], ...data };
    } else {
      data.id = genId('cli');
      data.fecha_alta = todayISO();
      await sheetAppend('Clientes', data);
      state.clientes.push(data);
      showToast('Cliente creado', 'success');
    }
    closeModal();
    if (state.currentClienteId) renderClienteDetalle();
    else renderClientesList();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function renderTabBrief() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando brief...</div>`;

  try {
    const { data } = await sheetRead('Briefs');
    state.briefs = data;
    let brief = data.find(b => b.cliente_id === cliente.id) || { cliente_id: cliente.id };

    const sectionsHtml = BRIEF_SECTIONS.map(section => {
      const totalFields = section.fields.length;
      const completedFields = section.fields.filter(f => brief[f.k] && brief[f.k].trim()).length;
      const isComplete = completedFields === totalFields;
      const isPartial = completedFields > 0 && !isComplete;

      const fieldsHtml = section.fields.map(f => {
        const val = brief[f.k] || '';
        const input = f.type === 'textarea'
          ? `<textarea class="form-textarea" data-field="${f.k}" onblur="saveBriefField('${cliente.id}', '${f.k}', this.value)">${esc(val)}</textarea>`
          : `<input type="text" class="form-input" data-field="${f.k}" value="${esc(val)}" onblur="saveBriefField('${cliente.id}', '${f.k}', this.value)">`;
        return `
          <div class="form-row">
            <label class="form-label">${esc(f.label)}</label>
            ${input}
          </div>`;
      }).join('');

      return `
        <div class="brief-section ${isComplete || isPartial ? 'open' : ''}" data-section="${section.id}">
          <div class="brief-section-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="brief-section-icon">${section.icon}</span>
            <span class="brief-section-title">${esc(section.title)}</span>
            <span class="brief-progress ${isComplete ? 'complete' : ''}">${completedFields}/${totalFields}</span>
            <span class="brief-section-caret">▸</span>
          </div>
          <div class="brief-section-body">${fieldsHtml}</div>
        </div>`;
    }).join('');

    const totalAll = BRIEF_SECTIONS.reduce((a, s) => a + s.fields.length, 0);
    const completedAll = BRIEF_SECTIONS.reduce((a, s) => a + s.fields.filter(f => brief[f.k] && brief[f.k].trim()).length, 0);
    const pct = Math.round((completedAll / totalAll) * 100);

    $('tabContent').innerHTML = `
      <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px;">
        <div>
          <h3>Brief del cliente</h3>
          <p style="color: var(--gris-text-soft); font-size: 13px; margin-top: 2px;">
            Se guarda automáticamente al salir de cada campo.
          </p>
        </div>
        <div style="text-align: right;">
          <div style="font-size: 11.5px; color: var(--gris-text-muted); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600;">Progreso total</div>
          <div style="font-size: 22px; font-family: 'Fraunces', serif; font-weight: 600; color: ${pct === 100 ? 'var(--verde)' : 'var(--fucsia)'};">${pct}%</div>
          <div style="font-size: 11px; color: var(--gris-text-muted);">${completedAll} de ${totalAll} campos</div>
        </div>
      </div>
      ${sectionsHtml}`;
  } catch (e) {
    $('tabContent').innerHTML = `<div class="card" style="border-color: var(--rojo); background: #fef8f8;"><strong style="color: var(--rojo);">Error al cargar el brief</strong><p style="margin-top: 6px; font-size: 13px;">${esc(e.message)}</p></div>`;
  }
}

async function saveBriefField(clienteId, field, value) {
  // Debounce: evitar saves consecutivos del mismo campo
  const key = clienteId + '_' + field;
  clearTimeout(autosaveTimers[key]);
  autosaveTimers[key] = setTimeout(async () => {
    showAutosave('saving', 'Guardando...');
    try {
      // Buscar brief existente
      const { data } = await sheetRead('Briefs');
      const existing = data.find(b => b.cliente_id === clienteId);
      if (existing) {
        if ((existing[field] || '') === value) { showAutosave('saved', 'Guardado'); return; }
        await sheetUpdate('Briefs', existing.id, { [field]: value });
      } else {
        const newBrief = { id: genId('bri'), cliente_id: clienteId, fecha_completado: todayISO(), [field]: value };
        await sheetAppend('Briefs', newBrief);
      }
      showAutosave('saved', 'Guardado');
      // Actualizar contador de progreso sin re-renderizar todo
      updateBriefProgress(clienteId, field, value);
    } catch (e) {
      showAutosave('error', 'Error al guardar');
      console.error(e);
    }
  }, 400);
}

function updateBriefProgress(clienteId, field, value) {
  // Encontrar la sección que contiene el campo
  const section = BRIEF_SECTIONS.find(s => s.fields.some(f => f.k === field));
  if (!section) return;
  const sectionEl = document.querySelector(`[data-section="${section.id}"]`);
  if (!sectionEl) return;
  const inputs = sectionEl.querySelectorAll('[data-field]');
  let completed = 0;
  inputs.forEach(inp => { if (inp.value && inp.value.trim()) completed++; });
  const progressEl = sectionEl.querySelector('.brief-progress');
  if (progressEl) {
    progressEl.textContent = `${completed}/${section.fields.length}`;
    progressEl.classList.toggle('complete', completed === section.fields.length);
  }
  // actualizar progreso global
  let totalAll = 0, completedAll = 0;
  BRIEF_SECTIONS.forEach(s => {
    const se = document.querySelector(`[data-section="${s.id}"]`);
    if (!se) return;
    const ins = se.querySelectorAll('[data-field]');
    totalAll += ins.length;
    ins.forEach(i => { if (i.value && i.value.trim()) completedAll++; });
  });
  const pct = Math.round((completedAll / totalAll) * 100);
  const pctEl = document.querySelector('#tabContent > div:first-child > div:last-child > div:nth-child(2)');
  if (pctEl) {
    pctEl.textContent = pct + '%';
    pctEl.style.color = pct === 100 ? 'var(--verde)' : 'var(--fucsia)';
    const countEl = pctEl.nextElementSibling;
    if (countEl) countEl.textContent = `${completedAll} de ${totalAll} campos`;
  }
}

function iconForRed(red) {
  const r = (red || '').toLowerCase();
  if (r.includes('insta')) return '📷';
  if (r.includes('face')) return '📘';
  if (r.includes('tiktok')) return '🎵';
  if (r.includes('linked')) return '💼';
  if (r.includes('youtube') || r.includes('yt')) return '📺';
  if (r.includes('twitter') || r === 'x') return '🐦';
  if (r.includes('whats')) return '💬';
  if (r.includes('pinter')) return '📌';
  return '🔗';
}

async function renderTabCalendario() {
  const cliente = state.clientes.find(c => c.id === state.currentClienteId);
  $('tabContent').innerHTML = `<div class="loading"><div class="spinner"></div>Cargando calendario...</div>`;

  try {
    const { data } = await sheetRead('Calendario');
    const posts = data.filter(p => p.cliente_id === cliente.id);
    state.calendario = posts;

    const year = state.calendarDate.getFullYear();
    const month = state.calendarDate.getMonth();
    const monthName = state.calendarDate.toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });

    // Primera y última fecha del mes
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const firstDayWeek = firstDay.getDay(); // 0=Dom, 1=Lun...
    const mondayOffset = firstDayWeek === 0 ? 6 : firstDayWeek - 1;
    const startDate = new Date(year, month, 1 - mondayOffset);

    // Generar 42 celdas (6 semanas)
    const today = new Date(); today.setHours(0,0,0,0);
    let dayCells = '';
    for (let i = 0; i < 42; i++) {
      const d = new Date(startDate);
      d.setDate(startDate.getDate() + i);
      const dateStr = d.toISOString().split('T')[0];
      const isOtherMonth = d.getMonth() !== month;
      const isToday = d.getTime() === today.getTime();
      const dayPosts = posts.filter(p => p.fecha_publicacion === dateStr);
      const postsHtml = dayPosts.map(p => `
        <div class="calendar-post ${(p.estado || 'idea').toLowerCase()}" onclick="event.stopPropagation(); openPostModal('${esc(p.id)}')" title="${esc(p.titulo || p.hook || 'Sin título')}">
          ${esc(p.titulo || p.hook || '(sin título)')}
        </div>`).join('');
      dayCells += `
        <div class="calendar-day ${isOtherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}" onclick="openPostModal(null, '${dateStr}')">
          <div class="calendar-day-num">${d.getDate()}</div>
          ${postsHtml}
        </div>`;
    }

    // Estadísticas del mes visible
    const monthPosts = posts.filter(p => {
      if (!p.fecha_publicacion) return false;
      const pd = new Date(p.fecha_publicacion);
      return pd.getFullYear() === year && pd.getMonth() === month;
    });
    const stats = {
      total: monthPosts.length,
      publicadas: monthPosts.filter(p => p.estado === 'Publicada').length,
      pendientes: monthPosts.filter(p => p.estado !== 'Publicada').length,
    };

    $('tabContent').innerHTML = `
      <div class="calendar-controls">
        <div style="display: flex; align-items: center; gap: 10px;">
          <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)">‹</button>
          <div class="calendar-month">${monthName.charAt(0).toUpperCase() + monthName.slice(1)}</div>
          <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)">›</button>
          <button class="btn-ghost btn-sm" onclick="goToToday()">Hoy</button>
        </div>
        <div style="display: flex; align-items: center; gap: 14px;">
          <div style="font-size: 12px; color: var(--gris-text-soft);">
            ${stats.total} posts · ${stats.publicadas} publicadas · ${stats.pendientes} pendientes
          </div>
          <button class="btn btn-primary btn-sm" onclick="openPostModal()">+ Nueva publicación</button>
        </div>
      </div>
      <div class="calendar-grid">
        <div class="calendar-day-header">Lun</div>
        <div class="calendar-day-header">Mar</div>
        <div class="calendar-day-header">Mié</div>
        <div class="calendar-day-header">Jue</div>
        <div class="calendar-day-header">Vie</div>
        <div class="calendar-day-header">Sáb</div>
        <div class="calendar-day-header">Dom</div>
        ${dayCells}
      </div>
      <div style="margin-top: 14px; display: flex; gap: 14px; flex-wrap: wrap; font-size: 11.5px; color: var(--gris-text-muted);">
        <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #eef2f6; border-left: 3px solid var(--gris-text-muted); border-radius: 2px;"></span>Idea</span>
        <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #fff4e0; border-left: 3px solid var(--amarillo); border-radius: 2px;"></span>Borrador</span>
        <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #e6f0fb; border-left: 3px solid var(--petroleo); border-radius: 2px;"></span>En revisión</span>
        <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #e6f4ef; border-left: 3px solid var(--verde); border-radius: 2px;"></span>Aprobada</span>
        <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 10px; height: 10px; background: #d4e9e0; border-left: 3px solid #1d6b4e; border-radius: 2px;"></span>Publicada</span>
      </div>`;
  } catch (e) {
    $('tabContent').innerHTML = `<div class="card" style="border-color: var(--rojo);"><strong style="color: var(--rojo);">Error</strong><p>${esc(e.message)}</p></div>`;
  }
}

  state.calendarDate.setMonth(state.calendarDate.getMonth() + delta);
  renderTabCalendario();
}

  state.calendarDate = new Date();
  renderTabCalendario();

  const p = id ? state.calendario.find(x => x.id === id) : {};
  const esNuevo = !id;
  const fecha = p.fecha_publicacion || defaultDate || todayISO();

  $('modal').className = 'modal modal-lg';
  $('modal').innerHTML = `
    <div class="modal-header">
      <h2>${esNuevo ? 'Nueva publicación' : 'Editar publicación'}</h2>
      <button class="btn-ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row-grid">
        <div>
          <label class="form-label">Fecha *</label>
          <input type="date" class="form-input" id="f_fecha_publicacion" value="${esc(fecha)}">
        </div>
        <div>
          <label class="form-label">Hora</label>
          <input type="time" class="form-input" id="f_hora" value="${esc(p.hora || '')}">
        </div>
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Red social</label>
          <select class="form-select" id="f_red_social">
            <option value="Instagram" ${(p.red_social || 'Instagram') === 'Instagram' ? 'selected' : ''}>Instagram</option>
            <option value="Facebook" ${p.red_social === 'Facebook' ? 'selected' : ''}>Facebook</option>
            <option value="TikTok" ${p.red_social === 'TikTok' ? 'selected' : ''}>TikTok</option>
            <option value="LinkedIn" ${p.red_social === 'LinkedIn' ? 'selected' : ''}>LinkedIn</option>
            <option value="YouTube" ${p.red_social === 'YouTube' ? 'selected' : ''}>YouTube</option>
            <option value="Otra" ${p.red_social === 'Otra' ? 'selected' : ''}>Otra</option>
          </select>
        </div>
        <div>
          <label class="form-label">Formato</label>
          <select class="form-select" id="f_formato">
            <option value="Post" ${(p.formato || 'Post') === 'Post' ? 'selected' : ''}>Post</option>
            <option value="Carrusel" ${p.formato === 'Carrusel' ? 'selected' : ''}>Carrusel</option>
            <option value="Reel" ${p.formato === 'Reel' ? 'selected' : ''}>Reel</option>
            <option value="Story" ${p.formato === 'Story' ? 'selected' : ''}>Story</option>
            <option value="Video" ${p.formato === 'Video' ? 'selected' : ''}>Video</option>
          </select>
        </div>
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Pilar de contenido</label>
          <input type="text" class="form-input" id="f_pilar" value="${esc(p.pilar || '')}" placeholder="Ej: Educativo, Venta, Entretenimiento">
        </div>
        <div>
          <label class="form-label">Estado</label>
          <select class="form-select" id="f_estado">
            <option value="Idea" ${(p.estado || 'Idea') === 'Idea' ? 'selected' : ''}>Idea</option>
            <option value="Borrador" ${p.estado === 'Borrador' ? 'selected' : ''}>Borrador</option>
            <option value="Revision" ${p.estado === 'Revision' ? 'selected' : ''}>En revisión</option>
            <option value="Aprobada" ${p.estado === 'Aprobada' ? 'selected' : ''}>Aprobada</option>
            <option value="Publicada" ${p.estado === 'Publicada' ? 'selected' : ''}>Publicada</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Título interno</label>
        <input type="text" class="form-input" id="f_titulo" value="${esc(p.titulo || '')}" placeholder="Nombre corto para identificar el post">
      </div>
      <div class="form-row">
        <label class="form-label">Hook / Gancho</label>
        <input type="text" class="form-input" id="f_hook" value="${esc(p.hook || '')}" placeholder="Primera línea que capta la atención">
      </div>
      <div class="form-row">
        <label class="form-label">Copy / Descripción</label>
        <textarea class="form-textarea" id="f_copy" style="min-height: 120px;">${esc(p.copy || '')}</textarea>
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Hashtags</label>
          <textarea class="form-textarea" id="f_hashtags" style="min-height: 60px;">${esc(p.hashtags || '')}</textarea>
        </div>
        <div>
          <label class="form-label">CTA (Call to Action)</label>
          <input type="text" class="form-input" id="f_cta" value="${esc(p.cta || '')}" placeholder="Ej: Agendá tu turno">
        </div>
      </div>
      <div class="form-row-grid">
        <div>
          <label class="form-label">Link al diseño</label>
          <input type="url" class="form-input" id="f_link_diseno" value="${esc(p.link_diseno || '')}" placeholder="Link a Canva">
        </div>
        <div>
          <label class="form-label">Link al multimedia</label>
          <input type="url" class="form-input" id="f_link_multimedia" value="${esc(p.link_multimedia || '')}" placeholder="Foto/video del cliente">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">Notas</label>
        <textarea class="form-textarea" id="f_notas">${esc(p.notas || '')}</textarea>
      </div>
    </div>
    <div class="modal-footer" style="justify-content: space-between;">
      <div>
        ${!esNuevo ? `<button class="btn btn-ghost btn-danger" onclick="confirmDeletePost('${esc(p.id)}')">🗑 Eliminar</button>` : ''}
      </div>
      <div style="display: flex; gap: 10px;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="savePost('${id || ''}')">${esNuevo ? 'Crear' : 'Guardar'}</button>
      </div>
    </div>`;
  $('modalOverlay').classList.add('active');
}

async function savePost(id) {
  const fecha = $('f_fecha_publicacion').value;
  if (!fecha) { showToast('La fecha es obligatoria', 'error'); return; }
  const data = {
    cliente_id: state.currentClienteId,
    fecha_publicacion: fecha,
    hora: $('f_hora').value,
    red_social: $('f_red_social').value,
    formato: $('f_formato').value,
    pilar: $('f_pilar').value.trim(),
    titulo: $('f_titulo').value.trim(),
    hook: $('f_hook').value.trim(),
    copy: $('f_copy').value.trim(),
    hashtags: $('f_hashtags').value.trim(),
    cta: $('f_cta').value.trim(),
    link_diseno: $('f_link_diseno').value.trim(),
    link_multimedia: $('f_link_multimedia').value.trim(),
    estado: $('f_estado').value,
    notas: $('f_notas').value.trim(),
  };
  try {
    if (id) {
      await sheetUpdate('Calendario', id, data);
      showToast('Publicación actualizada', 'success');
    } else {
      data.id = genId('pub');
      await sheetAppend('Calendario', data);
      showToast('Publicación creada', 'success');
    }
    closeModal();
    renderTabCalendario();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

function confirmDeletePost(id) {
  closeModal();
  setTimeout(() => {
    $('modal').className = 'modal';
    $('modal').innerHTML = `
      <div class="modal-header"><h2>Eliminar publicación</h2><button class="btn-ghost" onclick="closeModal()">✕</button></div>
      <div class="modal-body"><p>¿Eliminar esta publicación del calendario?</p></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" style="background: var(--rojo);" onclick="deletePost('${id}')">Eliminar</button>
      </div>`;
    $('modalOverlay').classList.add('active');
  }, 100);
}

async function deletePost(id) {
  try {
    await sheetDelete('Calendario', id);
    closeModal();
    showToast('Eliminada', 'success');
    renderTabCalendario();
  } catch (e) { showToast('Error: ' + e.message, 'error'); }
}

    <div class="page-header">

      </div>
    </div>
    <div class="card" style="margin-top: 20px;">
      <div class="card-title">Versión de la app</div>
      <div class="config-item">
        <div class="config-label">Fase 1 — completa</div>
        <div style="font-size: 13px; color: var(--gris-text-soft); margin-top: 4px;">
          Módulos activos: Clientes · Brief · Accesos · Calendario<br>

        </div>
      </div>
    </div>`;
}

async function verificarHojas() {
  const hojas = ['Clientes','Prospectos','Briefs','Accesos','Estrategias','Calendario','Ideas','Servicios','Metricas','Onboarding','Finanzas_Ingresos','Finanzas_Egresos','Config'];
  const result = $('verifyResult');
  result.innerHTML = '<div class="loading"><div class="spinner"></div>Verificando...</div>';
  try {
    const meta = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: CONFIG.SPREADSHEET_ID });
    const hojasExistentes = meta.result.sheets.map(s => s.properties.title);
    const status = hojas.map(h => {
      const existe = hojasExistentes.includes(h);
      return `<div style="display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px;">
        <span style="color: ${existe ? 'var(--verde)' : 'var(--rojo)'}; font-weight: 700;">${existe ? '✓' : '✗'}</span>
        <span style="font-family: monospace;">${h}</span>
      </div>`;
    }).join('');
    const faltantes = hojas.filter(h => !hojasExistentes.includes(h));
    const ok = faltantes.length === 0;
    result.innerHTML = `
      <div style="padding: 12px; background: ${ok ? '#e6f4ef' : '#fef2f2'}; border-radius: 6px; margin-bottom: 10px;">
        <strong style="color: ${ok ? 'var(--verde)' : 'var(--rojo)'};">
          ${ok ? '✓ Todas las hojas están correctas' : `⚠ Faltan ${faltantes.length} hojas`}
        </strong>
        ${!ok ? `<div style="font-size: 12px; margin-top: 4px;">Faltan: ${faltantes.join(', ')}</div>` : ''}
      </div>
      ${status}`;
  } catch (e) { result.innerHTML = `<div style="color: var(--rojo);">Error: ${esc(e.message)}</div>`; }
}

document.addEventListener('DOMContentLoaded', () => {
  $('loginBtn').addEventListener('click', handleLogin);
  $('logoutBtn').addEventListener('click', handleLogout);
  document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
    btn.addEventListener('click', () => navigateTo(btn.dataset.page));
  });
  $('modalOverlay').addEventListener('click', (e) => {
    if (e.target.id === 'modalOverlay') closeModal();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
});

function waitForGoogle() {
  if (typeof google !== 'undefined' && typeof gapi !== 'undefined') {
    initGapi();
    initGoogleAuth();
  } else { setTimeout(waitForGoogle, 100); }
}
waitForGoogle();
